              <button onClick={() => askConfirm(`${inv.vendorName} ${inv.date} 거래명세서를 삭제할까요?`, () => onRemoveInvoice(inv.id))} style={{ flex: 0.8, padding: "7px 0", borderRadius: 7, border: "1px solid #E2C0C0", background: "#fff", color: "#A32D2D", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>삭제</button>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function BoxPlanModal({ unitItems, productMap, onCancel, onAutoSplit, onApply }) {
  // unitItems: 낱개 배열. 각 낱개를 묶거나(box) 개별로 둠.
  // boxes: 확정된 박스 배열(각각 낱개들의 인덱스 묶음). remaining: 아직 안 묶인 낱개 인덱스.
  const [checked, setChecked] = useState(new Set());
  const [boxes, setBoxes] = useState([]); // [[idx,idx], ...]
  const inBox = new Set(boxes.flat());
  const remaining = unitItems.map((_, i) => i).filter((i) => !inBox.has(i));

  function toggle(i) {
    setChecked((prev) => { const n = new Set(prev); n.has(i) ? n.delete(i) : n.add(i); return n; });
  }
  function bundlePartial() {
    const sel = [...checked].filter((i) => remaining.includes(i));
    if (sel.length < 1) return;
    setBoxes((prev) => [...prev, sel]);
    setChecked(new Set());
  }
  function bundleAll() {
    if (remaining.length < 1) return;
    setBoxes((prev) => [...prev, [...remaining]]);
    setChecked(new Set());
  }
  function removeBox(bi) {
    setBoxes((prev) => prev.filter((_, idx) => idx !== bi));
  }
  function labelFor(idxArr) {
    const map = {};
    idxArr.forEach((i) => { const u = unitItems[i]; const k = u.name; map[k] = (map[k] || 0) + 1; });
    return Object.entries(map).map(([nm, q]) => `${nm} X ${q}개`).join(", ");
  }
  function finish() {
    // 확정 박스 + 남은 낱개는 개별 박스
    const result = [...boxes.map((arr) => arr.map((i) => unitItems[i]))];
    remaining.forEach((i) => result.push([unitItems[i]]));
    if (result.length === 0) { onAutoSplit(); return; }
    onApply(result);
  }

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.4)", zIndex: 100, display: "flex", alignItems: "flex-end", justifyContent: "center" }} onClick={onCancel}>
      <div onClick={(e) => e.stopPropagation()} style={{ width: "100%", maxWidth: 390, background: "#fff", borderRadius: "20px 20px 0 0", maxHeight: "85vh", display: "flex", flexDirection: "column" }}>
        <div style={{ padding: "16px 18px 8px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div style={{ fontSize: 17, fontWeight: 700 }}>묶음선택</div>
          <button onClick={onCancel} style={{ border: "none", background: "none", color: "#5F5E5A", fontSize: 14, fontWeight: 700, cursor: "pointer" }}>닫기</button>
        </div>
        <div style={{ fontSize: 11.5, color: "#888780", padding: "0 18px 10px" }}>※묶을 상품을 체크 후 "부분묶음", 또는 전체를 한 박스로 "전체묶음". 안 묶은 상품은 개별(낱개 1박스)로 처리됩니다.</div>

        <div style={{ overflowY: "auto", padding: "0 14px", flex: 1 }}>
          {remaining.length === 0 && <div style={{ textAlign: "center", color: "#888780", fontSize: 13, padding: "20px 0" }}>남은 상품이 없습니다</div>}
          {remaining.map((i) => {
            const u = unitItems[i];
            return (
              <label key={i} style={{ display: "flex", alignItems: "center", gap: 10, padding: "11px 6px", borderBottom: "1px solid #F0F0EA", cursor: "pointer" }}>
                <input type="checkbox" checked={checked.has(i)} onChange={() => toggle(i)} style={{ width: 18, height: 18 }} />
                <span style={{ flex: 1, fontSize: 14 }}>{u.name}</span>
                <span style={{ fontSize: 13, color: "#5F5E5A" }}>{won(u.price || 0)}</span>
              </label>
            );
          })}
        </div>

        <div style={{ display: "flex", gap: 8, padding: "10px 16px" }}>
          <button onClick={bundleAll} style={{ flex: 1, padding: "11px 0", borderRadius: 9, border: "none", background: "#2F6F4E", color: "#fff", fontWeight: 700, fontSize: 14, cursor: "pointer" }}>전체묶음</button>
          <button onClick={bundlePartial} style={{ flex: 1, padding: "11px 0", borderRadius: 9, border: "none", background: checked.size > 0 ? "#3E9B6E" : "#B7C9BD", color: "#fff", fontWeight: 700, fontSize: 14, cursor: checked.size > 0 ? "pointer" : "not-allowed" }}>부분묶음 ({checked.size})</button>
        </div>

        {boxes.length > 0 && (
          <div style={{ padding: "4px 16px 8px", maxHeight: 160, overflowY: "auto" }}>
            <div style={{ fontSize: 11.5, fontWeight: 700, color: "#27500A", marginBottom: 6 }}>묶은 박스 ({boxes.length}개)</div>
            {boxes.map((arr, bi) => (
              <div key={bi} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "8px 0", borderBottom: "1px solid #F0F0EA" }}>
                <span style={{ fontSize: 13 }}>📦 {labelFor(arr)}</span>
                <button onClick={() => removeBox(bi)} style={{ border: "none", background: "none", color: "#D14343", fontSize: 18, cursor: "pointer", lineHeight: 1 }}>⊖</button>
              </div>
            ))}
          </div>
        )}

        <div style={{ display: "flex", gap: 8, padding: "10px 16px calc(16px + env(safe-area-inset-bottom, 0px))" }}>
          <button onClick={onAutoSplit} style={{ flex: 1, padding: "13px 0", borderRadius: 10, border: "1px solid #D3D1C7", background: "#fff", color: "#5F5E5A", fontWeight: 700, fontSize: 13, cursor: "pointer" }}>자동 묶음</button>
          <button onClick={finish} style={{ flex: 2, padding: "13px 0", borderRadius: 10, border: "none", background: "#2F6F4E", color: "#fff", fontWeight: 700, fontSize: 14, cursor: "pointer" }}>완료</button>
        </div>
      </div>
    </div>
  );
}

function InvoiceEditor({ mode, initial, vendors, products, onCancel, onSave }) {
  const [vendorId, setVendorId] = useState(initial?.vendorId || "");
  const [vendorName, setVendorName] = useState(initial?.vendorName || "");
  const [date, setDate] = useState(initial?.date || todayStr());
  const [items, setItems] = useState(initial?.items?.length ? initial.items.map((it) => ({ ...it })) : [{ name: "", unit: "kg", qty: 1, price: 0 }]);
  const [memo, setMemo] = useState(initial?.memo || "");

  function setItem(i, key, val) {
    setItems((prev) => prev.map((it, idx) => (idx === i ? { ...it, [key]: val } : it)));
  }
  function addItem() { setItems((prev) => [...prev, { name: "", unit: "kg", qty: 1, price: 0 }]); }
  function removeItem(i) { setItems((prev) => prev.filter((_, idx) => idx !== i)); }

  function pickVendor(id) {
    setVendorId(id);
    const v = vendors.find((x) => x.id === id);
    if (v) setVendorName(v.name);
  }
  function pickProduct(i, pid) {
    const p = products.find((x) => x.id === pid);
    if (p) setItems((prev) => prev.map((it, idx) => idx === i ? { ...it, name: p.name, unit: p.unit || "kg", price: p.wholesalePrice || p.price } : it));
  }

  const total = items.reduce((s, it) => s + (Number(it.price) || 0) * (Number(it.qty) || 0), 0);

  function save() {
    const cleanItems = items.filter((it) => it.name.trim()).map((it) => ({ name: it.name.trim(), unit: it.unit || "kg", qty: Number(it.qty) || 0, price: Number(it.price) || 0 }));
    if (!vendorName.trim()) { return; }
    if (cleanItems.length === 0) { return; }
    onSave({ vendorId, vendorName: vendorName.trim(), date, items: cleanItems, memo: memo.trim() });
  }

  return (
    <div>
      <button onClick={onCancel} style={{ background: "none", border: "none", color: "#5F5E5A", fontSize: 13, cursor: "pointer", padding: 0, marginBottom: 12 }}>← 거래명세서 목록으로</button>
      <h1 style={{ fontSize: 19, fontWeight: 700, margin: "2px 0 14px", letterSpacing: "-0.02em" }}>{mode === "edit" ? "거래명세서 수정" : "거래명세서 작성"}</h1>

      <div style={{ background: "#fff", border: "1px solid #E2E4DD", borderRadius: 10, padding: 12, marginBottom: 12 }}>
        <label style={{ fontSize: 11, color: "#888780", fontWeight: 700 }}>거래처(업체)</label>
        <select value={vendorId} onChange={(e) => pickVendor(e.target.value)} style={{ ...inputStyle(), margin: "4px 0 8px" }}>
          <option value="">직접 입력</option>
          {vendors.map((v) => <option key={v.id} value={v.id}>{v.name}</option>)}
        </select>
        <div style={{ display: "flex", gap: 8 }}>
          <input placeholder="업체명" value={vendorName} onChange={(e) => setVendorName(e.target.value)} style={inputStyle()} />
          <input type="date" value={date} onChange={(e) => setDate(e.target.value)} style={inputStyle()} />
        </div>
      </div>

      <div style={{ fontSize: 12, fontWeight: 700, color: "#27500A", marginBottom: 8 }}>품목</div>
      <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 10 }}>
        {items.map((it, i) => (
          <div key={i} style={{ background: "#fff", border: "1px solid #E2E4DD", borderRadius: 10, padding: 10 }}>
            <div style={{ display: "flex", gap: 6, marginBottom: 6 }}>
              <select value="" onChange={(e) => pickProduct(i, e.target.value)} style={{ ...inputStyle(), flex: 1, fontSize: 11.5 }}>
                <option value="">등록상품 선택</option>
                {products.map((p) => <option key={p.id} value={p.id}>{p.name}</option>)}
              </select>
              <button onClick={() => removeItem(i)} style={{ border: "none", background: "none", color: "#A32D2D", fontSize: 12, fontWeight: 700, cursor: "pointer", padding: "0 6px" }}>삭제</button>
            </div>
            <input placeholder="품목명" value={it.name} onChange={(e) => setItem(i, "name", e.target.value)} style={{ ...inputStyle(), marginBottom: 6 }} />
            <div style={{ display: "flex", gap: 6 }}>
              <input placeholder="규격" value={it.unit} onChange={(e) => setItem(i, "unit", e.target.value)} style={inputStyle()} />
              <input placeholder="수량" type="number" value={it.qty} onChange={(e) => setItem(i, "qty", e.target.value)} style={inputStyle()} />
              <input placeholder="단가" type="number" value={it.price} onChange={(e) => setItem(i, "price", e.target.value)} style={inputStyle()} />
            </div>
            <div style={{ fontSize: 11, color: "#888780", textAlign: "right", marginTop: 4 }}>금액 {won((Number(it.price) || 0) * (Number(it.qty) || 0))}</div>
          </div>
        ))}
      </div>
      <button onClick={addItem} style={{ width: "100%", padding: "9px 0", borderRadius: 8, border: "1px dashed #C0DD97", background: "#F7F8F4", color: "#27500A", fontWeight: 700, fontSize: 12, cursor: "pointer", marginBottom: 12 }}>+ 품목 추가</button>

      <input placeholder="메모 (선택)" value={memo} onChange={(e) => setMemo(e.target.value)} style={{ ...inputStyle(), marginBottom: 12 }} />

      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14, padding: "0 4px" }}>
        <span style={{ fontSize: 13, color: "#5F5E5A" }}>합계</span>
        <span style={{ fontSize: 18, fontWeight: 700 }}>{won(total)}</span>
      </div>

      <div style={{ display: "flex", gap: 8 }}>
        <button onClick={onCancel} style={{ flex: 1, padding: "12px 0", borderRadius: 10, border: "1px solid #D3D1C7", background: "#fff", color: "#5F5E5A", fontWeight: 700, fontSize: 13, cursor: "pointer" }}>취소</button>
        <button onClick={save} style={{ flex: 2, padding: "12px 0", borderRadius: 10, border: "none", background: "#2F6F4E", color: "#fff", fontWeight: 700, fontSize: 13, cursor: "pointer" }}>{mode === "edit" ? "수정 저장" : "거래명세서 저장"}</button>
      </div>
    </div>
  );
}

function VendorsTab({ vendors, orders, addVendor, addVendorsMulti, updateVendor, removeVendor, removeVendorsMulti, exportVendorsExcel, vendorInputRef, handleVendorUpload, askConfirm, onBack }) {
  const [form, setForm] = useState({ name: "", bizNo: "", ceo: "", phone: "", email: "", address: "", memo: "", bizLicense: "" });
  const [q, setQ] = useState("");
  const [licenseOcrLoading, setLicenseOcrLoading] = useState(false);
  const [foundSites, setFoundSites] = useState(null); // 종된사업장 명세에서 읽은 지점 목록
  const [checkedIds, setCheckedIds] = useState(new Set());

  function toggleChecked(id) {
    setCheckedIds((prev) => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id); else next.add(id);
      return next;
    });
  }

  function handleDeleteChecked() {
    const ids = [...checkedIds];
    if (ids.length === 0) return;
    askConfirm(`선택한 업체 ${ids.length}곳을 삭제할까요?`, () => {
      removeVendorsMulti(ids);
      setCheckedIds(new Set());
    });
  }

  // 한 줄(지점 행)에서 상호/대표자/주소 분리
  function parseSiteRow(rest) {
    const site = { name: "", ceo: "", address: "" };
    const dateM = rest.match(/\d{4}[\/.-]\d{1,2}[\/.-]\d{1,2}/);
    if (dateM) {
      site.name = rest.slice(0, dateM.index).trim();
      const after = rest.slice(dateM.index + dateM[0].length).trim();
      const ceoM = after.match(/^([가-힣]{2,4})\s+(.+)/);
      if (ceoM) {
        site.ceo = ceoM[1];
        site.address = ceoM[2].replace(/\s*(음식점업|제조업|도소매|소매업|도매업|서비스업|제과점업|숙박업|소매|도매)[\s\S]*$/, "").trim();
      } else { site.address = after; }
    } else { site.name = rest.trim(); }
    return site;
  }

  // 종된사업장 명세(여러 지점) 인식
  function parseMultiSite(text) {
    const out = { bizNo: "", sites: [] };
    if (!text) return out;
    const bizM = text.match(/\d{3}\s*-\s*\d{2}\s*-\s*\d{5}/);
    if (bizM) out.bizNo = bizM[0].replace(/\s/g, "");
    text.split("\n").map((l) => l.trim()).filter(Boolean).forEach((line) => {
      const m = line.match(/^(\d{4})\s+(.+)/); // 일련번호 + 나머지
      if (m && /[가-힣]{2,}/.test(m[2])) {
        const site = parseSiteRow(m[2]);
        if (site.name) out.sites.push(site);
      }
    });
    return out;
  }

  // 사업자등록증/명세 텍스트에서 단일 업체 정보 추출
  function parseLicenseText(text) {
    const out = { bizNo: "", name: "", ceo: "", address: "" };
    if (!text) return out;
    const clean = text.replace(/\s+/g, " ");
    const bizM = text.match(/\d{3}\s*-\s*\d{2}\s*-\s*\d{5}/);
    if (bizM) out.bizNo = bizM[0].replace(/\s/g, "");
    const nameM = clean.match(/(?:상\s*호|법\s*인\s*명|상호\(법인명\))\s*[:：]?\s*([^\s:：]{1,30}?)(?:\s*(?:성\s*명|대\s*표|등\s*록|사\s*업|주\s*소)|$)/);
    if (nameM) out.name = nameM[1].trim();
    const ceoM = clean.match(/(?:성\s*명|대\s*표\s*자?)\s*[:：]?\s*([가-힣]{2,5})/);
    if (ceoM) out.ceo = ceoM[1].trim();
    const addrM = clean.match(/(?:사업장\s*소재지|사업장\s*주소|소\s*재\s*지|주\s*소)\s*[:：]?\s*([가-힣0-9].{4,60}?)(?:\s*(?:업\s*태|종\s*목|개\s*업|발\s*급|$))/);
    if (addrM) out.address = addrM[1].trim();
    return out;
  }

  // 사업자등록증 사본 사진 업로드: 저장 + OCR로 정보 자동 채움
  function handleLicenseUpload(e) {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const img = new Image();
      img.onload = () => {
        const maxW = 1000;
        const scale = Math.min(1, maxW / img.width);
        const canvas = document.createElement("canvas");
        canvas.width = Math.round(img.width * scale);
        canvas.height = Math.round(img.height * scale);
        canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
        const dataUrl = canvas.toDataURL("image/jpeg", 0.8);
        setForm((prev) => ({ ...prev, bizLicense: dataUrl }));
        // OCR로 글자 인식 후 자동 채움 (보정된 고해상도 이미지로 인식)
        if (typeof Tesseract !== "undefined") {
          setLicenseOcrLoading(true);
          preprocessForOcr(file).then((ocrImg) => Tesseract.recognize(ocrImg || dataUrl, "kor+eng"))
            .then(({ data }) => {
              const text = data.text || "";
              const multi = parseMultiSite(text);
              if (multi.sites.length >= 2) {
                // 종된사업장 명세: 여러 지점 → 선택 목록 표시
                setForm((prev) => ({ ...prev, bizNo: prev.bizNo || multi.bizNo }));
                setFoundSites({ bizNo: multi.bizNo, sites: multi.sites.map((s) => ({ ...s, checked: true })) });
              } else {
                // 단일 사업자등록증
                const parsed = parseLicenseText(text);
                setForm((prev) => ({
                  ...prev,
                  name: prev.name || parsed.name,
                  bizNo: prev.bizNo || parsed.bizNo,
                  ceo: prev.ceo || parsed.ceo,
                  address: prev.address || parsed.address,
                }));
              }
            })
            .catch(() => {})
            .finally(() => setLicenseOcrLoading(false));
        }
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
    e.target.value = "";
  }
  const list = vendors.filter((v) => {
    const s = q.trim().toLowerCase();
    if (!s) return true;
    return (v.name || "").toLowerCase().includes(s) || (v.phone || "").includes(s) || (v.address || "").toLowerCase().includes(s);
  });
  return (
    <div>
      <button onClick={onBack} style={{ background: "none", border: "none", color: "#5F5E5A", fontSize: 13, cursor: "pointer", padding: 0, marginBottom: 12 }}>← 홈으로</button>
      <h1 style={{ fontSize: 19, fontWeight: 700, margin: "2px 0 14px", letterSpacing: "-0.02em" }}>업체(거래처) 관리</h1>

      <div style={{ display: "flex", gap: 6, marginBottom: 12 }}>
        <button onClick={exportVendorsExcel} style={toolBtnStyle("#2F6F4E")}>전체 다운로드</button>
        <button onClick={() => vendorInputRef.current?.click()} style={toolBtnStyle("#185FA5")}>업로드</button>
        <input ref={vendorInputRef} type="file" accept=".xlsx,.xls,.csv" onChange={handleVendorUpload} style={{ display: "none" }} />
      </div>

      <div style={{ background: "#fff", border: "1px solid #E2E4DD", borderRadius: 10, padding: 12, marginBottom: 16 }}>
        <input placeholder="업체명" value={form.name} onChange={(e) => setForm({ ...form, name: e.target.value })} style={{ ...inputStyle(), marginBottom: 8 }} />
        <div style={{ display: "flex", gap: 8, marginBottom: 8 }}>
          <input placeholder="사업자번호" value={form.bizNo} onChange={(e) => setForm({ ...form, bizNo: e.target.value })} style={inputStyle()} />
          <input placeholder="대표자" value={form.ceo} onChange={(e) => setForm({ ...form, ceo: e.target.value })} style={inputStyle()} />
        </div>
        <input placeholder="전화번호" value={form.phone} onChange={(e) => setForm({ ...form, phone: e.target.value })} style={{ ...inputStyle(), marginBottom: 8 }} />
        <input placeholder="담당자 이메일 (계산서·거래명세서 발송용)" type="email" value={form.email} onChange={(e) => setForm({ ...form, email: e.target.value })} style={{ ...inputStyle(), marginBottom: 8 }} />
        <input placeholder="주소" value={form.address} onChange={(e) => setForm({ ...form, address: e.target.value })} style={{ ...inputStyle(), marginBottom: 8 }} />
        <input placeholder="메모" value={form.memo} onChange={(e) => setForm({ ...form, memo: e.target.value })} style={{ ...inputStyle(), marginBottom: 10 }} />

        <label style={{ display: "block", marginBottom: 10 }}>
          <span style={{ fontSize: 12, color: "#5F5E5A", fontWeight: 700 }}>사업자등록증 사본 (사진) — 올리면 내용을 자동 인식해 채워줘요</span>
          {form.bizLicense ? (
            <div style={{ marginTop: 6, position: "relative", display: "inline-block" }}>
              <img src={form.bizLicense} alt="사업자등록증" style={{ width: "100%", maxWidth: 220, borderRadius: 8, border: "1px solid #E2E4DD" }} />
              <button onClick={(e) => { e.preventDefault(); setForm({ ...form, bizLicense: "" }); }} style={{ position: "absolute", top: 4, right: 4, background: "rgba(0,0,0,0.6)", color: "#fff", border: "none", borderRadius: "50%", width: 24, height: 24, cursor: "pointer", fontSize: 13 }}>×</button>
            </div>
          ) : (
            <div style={{ marginTop: 6, padding: "12px 0", borderRadius: 8, border: "1px dashed #C0C2B8", textAlign: "center", color: "#5F5E5A", fontSize: 12, cursor: "pointer", background: "#FAFBF8" }}>
              📷 사진 촬영 / 앨범에서 선택
            </div>
          )}
          <input type="file" accept="image/*" onChange={handleLicenseUpload} style={{ display: "none" }} />
        </label>
        {licenseOcrLoading && (
          <div style={{ fontSize: 11.5, color: "#185FA5", background: "#E6F1FB", borderRadius: 8, padding: "8px 10px", marginBottom: 10, textAlign: "center" }}>
            🔍 사업자등록증 내용을 인식하는 중이에요... (몇 초 걸려요)
          </div>
        )}

        {foundSites && foundSites.sites.length > 0 && (
          <div style={{ background: "#FAFBF8", border: "1px solid #C0DD97", borderRadius: 8, padding: "10px 12px", marginBottom: 10 }}>
            <div style={{ fontSize: 12, fontWeight: 700, color: "#27500A", marginBottom: 6 }}>
              지점 {foundSites.sites.length}개를 찾았어요 (사업자번호 {foundSites.bizNo}). 등록할 지점을 선택하세요.
            </div>
            {foundSites.sites.map((s, i) => (
              <label key={i} style={{ display: "flex", alignItems: "flex-start", gap: 8, padding: "6px 0", borderTop: i > 0 ? "1px solid #E6EFE9" : "none", cursor: "pointer" }}>
                <input type="checkbox" checked={s.checked} style={{ marginTop: 3 }}
                  onChange={() => setFoundSites((prev) => ({ ...prev, sites: prev.sites.map((x, idx) => idx === i ? { ...x, checked: !x.checked } : x) }))} />
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 13, fontWeight: 700 }}>{s.name}</div>
                  <div style={{ fontSize: 11, color: "#5F5E5A" }}>{s.address}{s.ceo ? ` · ${s.ceo}` : ""}</div>
                </div>
              </label>
            ))}
            <div style={{ fontSize: 11, color: "#5F5E5A", margin: "6px 0" }}>전화·이메일은 위 칸에 입력하면 모든 지점에 함께 저장돼요.</div>
            <button
              onClick={() => {
                const sel = foundSites.sites.filter((s) => s.checked);
                addVendorsMulti(sel, { bizNo: foundSites.bizNo, ceo: form.ceo, phone: form.phone, email: form.email, memo: form.memo, bizLicense: form.bizLicense });
                setFoundSites(null);
                setForm({ name: "", bizNo: "", ceo: "", phone: "", email: "", address: "", memo: "", bizLicense: "" });
              }}
              style={{ width: "100%", padding: "10px 0", borderRadius: 8, border: "none", background: "#2F6F4E", color: "#fff", fontWeight: 700, fontSize: 13, cursor: "pointer" }}>
              선택한 지점 모두 업체로 등록
            </button>
          </div>
        )}

        <button onClick={() => { addVendor(form); setForm({ name: "", bizNo: "", ceo: "", phone: "", email: "", address: "", memo: "", bizLicense: "" }); }} style={addBtnStyle}>업체 추가</button>
      </div>

      <input placeholder="업체 검색" value={q} onChange={(e) => setQ(e.target.value)} style={{ ...inputStyle(), marginBottom: 10 }} />

      {list.length > 0 && (
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
          <label style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12, color: "#5F5E5A", cursor: "pointer" }}>
            <input
              type="checkbox"
              checked={list.length > 0 && list.every((v) => checkedIds.has(v.id))}
              onChange={(e) => {
                setCheckedIds((prev) => {
                  const next = new Set(prev);
                  list.forEach((v) => (e.target.checked ? next.add(v.id) : next.delete(v.id)));
                  return next;
                });
              }}
            />
            전체선택
          </label>
          {checkedIds.size > 0 && (
            <button onClick={handleDeleteChecked} style={{ border: "none", background: "#E24B4A", color: "#fff", fontWeight: 700, fontSize: 12, padding: "6px 12px", borderRadius: 8, cursor: "pointer" }}>
              선택 삭제 ({checkedIds.size})
            </button>
          )}
        </div>
      )}

      <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
        {list.map((v) => (
          <VendorRow key={v.id} vendor={v} orders={orders} updateVendor={updateVendor} removeVendor={removeVendor} askConfirm={askConfirm} checked={checkedIds.has(v.id)} onToggleChecked={() => toggleChecked(v.id)} />
        ))}
        {list.length === 0 && <div style={{ padding: "30px 0", textAlign: "center", color: "#888780", fontSize: 13 }}>등록된 업체가 없습니다.</div>}
      </div>
    </div>
  );
}

function VendorRow({ vendor, orders, updateVendor, removeVendor, askConfirm, checked, onToggleChecked }) {
  const [editing, setEditing] = useState(false);
  const [form, setForm] = useState(vendor);
  const orderCount = orders.filter((o) => o.vendorId === vendor.id).length;
  if (editing) {
    return (
      <div style={{ background: "#fff", border: "1px solid #185FA5", borderRadius: 10, padding: 12 }}>
        <input placeholder="업체명" value={form.name} onChange={(e) => setForm({ ...form, name: e.target.value })} style={{ ...inputStyle(), marginBottom: 8 }} />
        <div style={{ display: "flex", gap: 8, marginBottom: 8 }}>
          <input placeholder="사업자번호" value={form.bizNo || ""} onChange={(e) => setForm({ ...form, bizNo: e.target.value })} style={inputStyle()} />
          <input placeholder="대표자" value={form.ceo || ""} onChange={(e) => setForm({ ...form, ceo: e.target.value })} style={inputStyle()} />
        </div>
        <input placeholder="전화번호" value={form.phone || ""} onChange={(e) => setForm({ ...form, phone: e.target.value })} style={{ ...inputStyle(), marginBottom: 8 }} />
        <input placeholder="담당자 이메일" type="email" value={form.email || ""} onChange={(e) => setForm({ ...form, email: e.target.value })} style={{ ...inputStyle(), marginBottom: 8 }} />
        <input placeholder="주소" value={form.address || ""} onChange={(e) => setForm({ ...form, address: e.target.value })} style={{ ...inputStyle(), marginBottom: 8 }} />
        <input placeholder="메모" value={form.memo || ""} onChange={(e) => setForm({ ...form, memo: e.target.value })} style={{ ...inputStyle(), marginBottom: 10 }} />
        <div style={{ display: "flex", gap: 8 }}>
          <button onClick={() => setEditing(false)} style={{ flex: 1, padding: "8px 0", borderRadius: 8, border: "1px solid #D3D1C7", background: "#fff", color: "#5F5E5A", fontWeight: 700, fontSize: 12, cursor: "pointer" }}>취소</button>
          <button onClick={() => { updateVendor(vendor.id, form); setEditing(false); }} style={{ flex: 2, padding: "8px 0", borderRadius: 8, border: "none", background: "#2F6F4E", color: "#fff", fontWeight: 700, fontSize: 12, cursor: "pointer" }}>저장</button>
        </div>
      </div>
    );
  }
  return (
    <div style={{ background: "#fff", border: "1px solid #E2E4DD", borderRadius: 10, padding: "10px 14px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
      <div style={{ display: "flex", alignItems: "flex-start", gap: 10, minWidth: 0 }}>
        <input type="checkbox" checked={!!checked} onChange={onToggleChecked} style={{ marginTop: 3, flexShrink: 0 }} />
        <div>
        <div style={{ fontWeight: 700, fontSize: 13 }}>{vendor.name} <span style={{ fontWeight: 400, color: "#888780", fontSize: 11 }}>· 주문 {orderCount}건</span></div>
        <div style={{ fontSize: 12, color: "#5F5E5A" }}>{vendor.phone}{vendor.address ? ` · ${vendor.address}` : ""}</div>
        {vendor.bizNo && <div style={{ fontSize: 11, color: "#888780" }}>사업자 {vendor.bizNo}{vendor.ceo ? ` · ${vendor.ceo}` : ""}</div>}
        {vendor.email && <div style={{ fontSize: 11, color: "#185FA5" }}>✉ {vendor.email}</div>}
        {vendor.bizLicense && (
          <a href={vendor.bizLicense} target="_blank" rel="noreferrer" style={{ display: "inline-flex", alignItems: "center", gap: 4, marginTop: 4, fontSize: 11, color: "#185FA5", textDecoration: "none" }}>
            <img src={vendor.bizLicense} alt="사업자등록증" style={{ width: 32, height: 32, borderRadius: 4, objectFit: "cover", border: "1px solid #E2E4DD" }} />
            사업자등록증 보기
          </a>
        )}
        </div>
      </div>
      <div style={{ display: "flex", gap: 10 }}>
        <button onClick={() => { setForm(vendor); setEditing(true); }} style={{ border: "none", background: "none", color: "#185FA5", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>수정</button>
        <button onClick={() => askConfirm(`${vendor.name} 업체를 삭제할까요?`, () => removeVendor(vendor.id))} style={removeBtnStyle}>삭제</button>
      </div>
    </div>
  );
}

function OrdersTab({
  statusFilter, setStatusFilter, methodFilter, setMethodFilter, dateFilter, setDateFilter,
  bizFilter, setBizFilter,
  searchQuery, setSearchQuery, counts, orders, customers, vendors, customerMap, orderTotal, onSelect,
  checkedIds, toggleCheck, toggleCheckAll, exportOrdersExcel, invoiceInputRef, handleInvoiceUpload,
  onOpenActions, onOpenInvoice, onNewOrder, onOpenBulkSms, onBulkOrder, onPickCustomerForOrder, onNewNameOrder,
  onDeleteChecked, onSetCheckedStatus, onExportVendorChecked, onSetCheckedBusiness, onExportFiltered,
}) {
  const allChecked = orders.length > 0 && orders.every((o) => checkedIds.has(o.id));

  // ★ v49: 주문창 검색어로 등록된 고객 + 업체를 함께 검색. 클릭하면 그 정보로 새 주문 작성.
  const contactMatches = (() => {
    const q = (searchQuery || "").trim().toLowerCase();
    if (!q) return [];
    const qNum = q.replace(/-/g, "");
    const hit = (x) =>
      (x.name || "").toLowerCase().includes(q) ||
      (x.phone || "").replace(/-/g, "").includes(qNum) ||
      (x.address || "").toLowerCase().includes(q) ||
      (x.memo || "").toLowerCase().includes(q);
    const cs = (customers || []).filter(hit).map((c) => ({ ...c, _kind: "customer" }));
    const vs = (vendors || []).filter(hit).map((v) => ({ ...v, _kind: "vendor" }));
    return [...vs, ...cs].slice(0, 8);   // 업체 먼저 노출
  })();

  return (
    <div>
      <button
        onClick={onNewOrder}
        style={{
          width: "100%", padding: "12px 0", borderRadius: 10, border: "none",
          background: "#2F6F4E", color: "#fff", fontWeight: 700, fontSize: 14,
          cursor: "pointer", marginBottom: 12, display: "flex", alignItems: "center",
          justifyContent: "center", gap: 6,
        }}
      >
        ＋ 새 주문 입력
      </button>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 6, marginBottom: 12 }}>
        <StatTile label="입금대기" value={counts.waiting} color="#993C1D" bg="#FAECE7" active={statusFilter === "waiting"} onClick={() => setStatusFilter(statusFilter === "waiting" ? "all" : "waiting")} />
        <StatTile label="결제완료" value={counts.pending} color="#854F0B" bg="#FAEEDA" active={statusFilter === "pending"} onClick={() => setStatusFilter(statusFilter === "pending" ? "all" : "pending")} />
        <StatTile label="발송준비" value={counts.ready} color="#185FA5" bg="#E6F1FB" active={statusFilter === "ready"} onClick={() => setStatusFilter(statusFilter === "ready" ? "all" : "ready")} />
        <StatTile label="발송완료" value={counts.shipped} color="#27500A" bg="#EAF3DE" active={statusFilter === "shipped"} onClick={() => setStatusFilter(statusFilter === "shipped" ? "all" : "shipped")} />
        <StatTile label="전체주문" value={counts.all} color="#5F5E5A" bg="#EDEEE8" active={statusFilter === "all"} onClick={() => setStatusFilter("all")} />
      </div>

      <div style={{ display: "flex", alignItems: "center", gap: 8, background: "#fff", border: "1px solid #E2E4DD", borderRadius: 10, padding: "8px 12px", marginBottom: 10 }}>
        <span style={{ color: "#888780" }}>🔍</span>
        <input
          value={searchQuery}
          onChange={(e) => setSearchQuery(e.target.value)}
          placeholder="주문자 / 연락처 / 상품명 / 고객 검색"
          style={{ flex: 1, border: "none", outline: "none", fontSize: 13 }}
        />
        {searchQuery && (
          <button onClick={() => setSearchQuery("")} style={{ border: "none", background: "none", color: "#888780", fontSize: 13, cursor: "pointer" }}>✕</button>
        )}

        <div style={{ background: "#F2F7EE", border: "1px solid #C0DD97", borderRadius: 10, padding: "8px 10px", marginBottom: 10 }}>
          {contactMatches.length > 0 ? (
            <>
              <div style={{ fontSize: 11, fontWeight: 700, color: "#27500A", marginBottom: 6 }}>

                {contactMatches.map((c) => (
                  <button
                    key={c._kind + c.id}
                    onClick={() => onPickCustomerForOrder(c)}
                    style={{ display: "flex", alignItems: "center", justifyContent: "space-between", width: "100%", textAlign: "left", background: "#fff", border: "1px solid #D7E6C4", borderRadius: 8, padding: "8px 10px", cursor: "pointer" }}
                  >
                    <div>
                      <div style={{ fontSize: 12.5, fontWeight: 700, color: "#1B2430" }}>
                        <span style={{ fontSize: 9.5, fontWeight: 700, color: c._kind === "vendor" ? "#854F0B" : "#2F6F4E", background: c._kind === "vendor" ? "#FAEEDA" : "#EAF3DE", padding: "1px 5px", borderRadius: 6, marginRight: 5 }}>{c._kind === "vendor" ? "업체" : "고객"}</span>
                        {c.name} <span style={{ fontWeight: 400, color: "#888780", fontSize: 11 }}>{c.phone}</span>
                      </div>
                      {c.address && <div style={{ fontSize: 10.5, color: "#888780", marginTop: 1 }}>{c.address}</div>}
                    </div>
                    <span style={{ fontSize: 11, fontWeight: 700, color: "#2F6F4E", flexShrink: 0, marginLeft: 8 }}>주문 작성 ›</span>
                  </button>
                ))}
              </div>
              <div style={{ fontSize: 10.5, color: "#888780", marginTop: 8, paddingTop: 8, borderTop: "1px dashed #C0DD97" }}>찾는 분이 없나요?</div>
            </>
          ) : (
            <div style={{ fontSize: 11.5, fontWeight: 700, color: "#854F0B", marginBottom: 8 }}>
              "{searchQuery.trim()}" — 등록된 고객·업체에 없어요. 신규로 볼게요.
            </div>
          )}
          {onNewNameOrder && (
            <button
              onClick={() => onNewNameOrder(searchQuery.trim())}
              style={{ width: "100%", marginTop: contactMatches.length > 0 ? 6 : 0, padding: "9px 0", borderRadius: 8, border: "none", background: "#2F6F4E", color: "#fff", fontWeight: 700, fontSize: 12.5, cursor: "pointer" }}
            >
              ＋ "{searchQuery.trim()}"(으)로 새 주문 작성 (신규 고객·업체)
            </button>
          )}
        </div>
      )}

      <div style={{ display: "flex", gap: 6, marginBottom: 10 }}>
        <select value={dateFilter} onChange={(e) => setDateFilter(e.target.value)} style={selectStyle}>
          <option value="all">날짜선택 (전체)</option>
          <option value="today">오늘</option>
          <option value="week">최근 7일</option>
          <option value="month">이번달</option>
        </select>
        <select value={methodFilter} onChange={(e) => setMethodFilter(e.target.value)} style={selectStyle}>
          <option value="all">주문수단 (전체)</option>
          <option value="message">메시지주문</option>
          <option value="direct">직접입력</option>
        </select>
        <select value={statusFilter} onChange={(e) => setStatusFilter(e.target.value)} style={selectStyle}>
          <option value="all">주문상태 (전체)</option>
          <option value="waiting">입금대기 {counts.waiting}</option>
          <option value="pending">결제완료 {counts.pending}</option>
          <option value="ready">발송준비 {counts.ready}</option>
          <option value="shipped">발송완료 {counts.shipped}</option>
        </select>
      </div>

      <div style={{ display: "flex", gap: 6, marginBottom: 10, fontSize: 11.5, color: "#5F5E5A" }}>
        <div style={{ flex: 1, textAlign: "center", padding: "7px 0", borderRadius: 8, background: "#F0F1EC", fontWeight: 700 }}>전체 {orders.length}건</div>
        <div style={{ flex: 1, textAlign: "center", padding: "7px 0", borderRadius: 8, background: "#EAF3DE", color: "#27500A", fontWeight: 700 }}>일반 {orders.filter((o) => !o.isBusiness).length}</div>
        <div style={{ flex: 1, textAlign: "center", padding: "7px 0", borderRadius: 8, background: "#FAEEDA", color: "#854F0B", fontWeight: 700 }}>🏢 업체 {orders.filter((o) => o.isBusiness).length}</div>
      </div>
      {(() => {
        // 이 화면(OrdersTab) 안에서 직접 계산 (App 쪽 변수를 잘못 가져다 쓰던 버그 수정)
        const isSearchingNow = searchQuery.trim() !== "";
        if (isSearchingNow) return null;
        const d = new Date();
        d.setDate(d.getDate() - 3);
        const cutoff = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
        const hiddenShippedCount = orders.filter((o) => {
          if (o.status !== "shipped") return false;
          const shippedDateStr = (o.shippedAt || o.createdAt || "").slice(0, 10);
          return shippedDateStr && shippedDateStr < cutoff;
        }).length;
        return hiddenShippedCount > 0 ? (
          <div style={{ fontSize: 10.5, color: "#888780", marginBottom: 8 }}>
            (발송완료 후 3일 지난 {hiddenShippedCount}건은 화면에서 숨겨져 있어요. 고객 이름·연락처로 검색하면 찾을 수 있어요)
          </div>
        ) : null;
      })()}

      <div style={{ display: "flex", gap: 6, marginBottom: 8 }}>
        <button onClick={() => invoiceInputRef.current?.click()} style={toolBtnStyle("#185FA5")}>송장번호 업로드</button>
        <button onClick={onBulkOrder} style={toolBtnStyle("#1B2430")}>📋 엑셀 파일 주문 등록</button>
        <input ref={invoiceInputRef} type="file" accept=".xlsx,.xls,.csv" onChange={handleInvoiceUpload} style={{ display: "none" }} />
      </div>
      {checkedIds.size > 0 && (
        <div style={{ display: "flex", gap: 6, marginBottom: 8 }}>
          <button onClick={onExportVendorChecked} style={toolBtnStyle("#2F6F4E")}>🏢 선택 중 업체주문 거래명세서</button>
        </div>
      )}
      <div style={{ fontSize: 10.5, color: "#5F5E5A", background: "#F0F1EC", borderRadius: 8, padding: "7px 10px", marginBottom: 8, lineHeight: 1.5 }}>
        업체·일반 주문이 함께 보입니다. 카드의 배지로 구분되며, 전체선택·다운로드 시 어느 쪽도 누락되지 않아요.
      </div>

      {statusFilter === "shipped" && (
        <div style={{ fontSize: 10.5, color: "#27500A", background: "#EAF3DE", borderRadius: 8, padding: "7px 10px", marginBottom: 8, lineHeight: 1.5 }}>
          발송완료 주문만 보고 있어요. "이 목록 전체 다운로드"로 다시 받아도 상태는 발송완료 그대로 유지돼요(재발송 가능).
        </div>
      )}

      {orders.length > 0 && (
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
          <label style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12, color: "#5F5E5A", cursor: "pointer" }}>
            <input type="checkbox" checked={allChecked} onChange={toggleCheckAll} />
            전체선택 ({orders.length}건)
          </label>
          <button onClick={() => onExportFiltered(orders)}
            style={{ padding: "7px 12px", borderRadius: 8, border: "none", background: "#2F6F4E", color: "#fff", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>
            ⬇ 이 목록 전체 다운로드 ({orders.length})
          </button>
        </div>
      )}

      {checkedIds.size > 0 && (
        <div style={{ background: "#1B2430", borderRadius: 10, padding: "10px 12px", marginBottom: 10 }}>
          <div style={{ fontSize: 12, fontWeight: 700, color: "#fff", marginBottom: 8 }}>선택한 {checkedIds.size}건 일괄 처리</div>
          {/* 다운로드 · 문자 · 삭제 (삭제는 작게) */}
          <div style={{ display: "flex", gap: 6, marginBottom: 6 }}>
            <button onClick={exportOrdersExcel} style={{ flex: 1, padding: "9px 0", borderRadius: 7, border: "none", background: "#2F6F4E", color: "#fff", fontWeight: 700, fontSize: 12, cursor: "pointer" }}>⬇ 다운로드 {checkedIds.size}</button>
            <button onClick={onOpenBulkSms} style={{ flex: 1, padding: "9px 0", borderRadius: 7, border: "none", background: "#854F0B", color: "#fff", fontWeight: 700, fontSize: 12, cursor: "pointer" }}>📱 문자 {checkedIds.size}</button>
            <button onClick={onDeleteChecked} style={{ width: 52, padding: "9px 0", borderRadius: 7, border: "none", background: "#A32D2D", color: "#fff", fontWeight: 700, fontSize: 11, cursor: "pointer" }}>삭제</button>
          </div>
          <div style={{ display: "flex", gap: 6, marginBottom: 6 }}>
            <button onClick={() => onSetCheckedStatus("pending")} style={batchBtnStyle("#FAEEDA", "#854F0B")}>결제완료로</button>
            <button onClick={() => onSetCheckedStatus("ready")} style={batchBtnStyle("#E6F1FB", "#185FA5")}>발송준비로</button>
            <button onClick={() => onSetCheckedStatus("shipped")} style={batchBtnStyle("#EAF3DE", "#27500A")}>발송완료로</button>
          </div>
          <div style={{ display: "flex", gap: 6 }}>
            <button onClick={() => onSetCheckedBusiness(true)} style={batchBtnStyle("#FAEEDA", "#854F0B")}>🏢 업체 주문으로</button>
            <button onClick={() => onSetCheckedBusiness(false)} style={batchBtnStyle("#EAF3DE", "#27500A")}>일반 주문으로</button>
          </div>
        </div>
      )}

      {orders.length === 0 && (
        <div style={{ padding: "50px 0", textAlign: "center", color: "#888780", fontSize: 13 }}>
          해당하는 주문이 없습니다.
        </div>
      )}

      <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
        {(() => {
          // 같은 사람(전화번호 기준) + 같은 날짜(orderGroupLabel)를 한 그룹으로 묶음
          // → 박스로 나뉜 주문들이 카드 하나 안에 고객정보 한 번 + 박스별 줄로 나열됨
          const groups = [];
          const groupIndex = {};
          orders.forEach((o) => {
            // 같은 사람이라도 "같은 날짜"만으로 묶으면, 예전에 이미 발송 끝난 주문과 오늘 새로
            // 등록한 주문이 한 카드에 섞여버려 혼동될 수 있음(중복 처리 위험) → batchId(한 번의
            // 등록 작업에서 함께 생성된 박스만 공유하는 고유번호)를 기준으로 정확하게 그룹핑.
            // batchId가 없는 옛 데이터는 createdAt으로, 그마저 없으면 주문 하나만 따로 표시.
            const key = `${o.recipient?.phone || o.recipient?.name || o.id}|${o.batchId || o.createdAt || o.id}`;
            if (groupIndex[key] === undefined) {
              groupIndex[key] = groups.length;
              groups.push({ key, list: [] });
            }
            groups[groupIndex[key]].list.push(o);
          });

          function toggleGroup(list) {
            const desired = !list.every((o) => checkedIds.has(o.id));
            list.forEach((o) => {
              if (checkedIds.has(o.id) !== desired) toggleCheck(o.id);
            });
          }

          return groups.map((g) => {
            const list = g.list;
            const first = list[0];
            const c = customerMap[first.customerId];
            const displayName = first.recipient?.name || (c ? c.name : "") || "현장 주문";
            const groupTotal = list.reduce((s, o) => s + orderTotal(o), 0);
            const multi = list.length > 1;
            return (
              <div key={g.key} style={{ marginBottom: 8 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "0 2px 4px" }}>
                  <span style={{ fontSize: 11, fontWeight: 700, color: "#888780" }}>{orderGroupLabel(first)}</span>
                </div>
                <div style={{ background: "#fff", border: "1px solid #E2E4DD", borderLeft: `4px solid ${(STATUS[first.status] || STATUS.pending).color}`, borderRadius: 10, padding: "10px 12px" }}>
                  {/* 고객(받는분) 정보 - 그룹당 한 번만 표시 */}
                  <div style={{ display: "flex", gap: 8, alignItems: "flex-start" }}>
                    <input
                      type="checkbox"
                      checked={list.every((o) => checkedIds.has(o.id))}
                      onChange={() => toggleGroup(list)}
                      style={{ marginTop: 2 }}
                    />
                    <div style={{ flex: 1, cursor: "pointer", minWidth: 0 }} onClick={() => onSelect(first.id)}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 2, gap: 6 }}>
                        <span style={{ fontWeight: 700, fontSize: 13, whiteSpace: "nowrap" }}>
                          {first.isBusiness ? <span style={{ fontSize: 9.5, fontWeight: 700, color: "#854F0B", background: "#FAEEDA", padding: "1px 5px", borderRadius: 6, marginRight: 5 }}>🏢업체</span> : <span style={{ fontSize: 9.5, fontWeight: 700, color: "#27500A", background: "#EAF3DE", padding: "1px 5px", borderRadius: 6, marginRight: 5 }}>일반</span>}
                          {displayName}
                        </span>
                        {first.subscriptionId && (
                          <span style={{ fontSize: 9.5, fontWeight: 700, color: "#185FA5", background: "#E6F1FB", padding: "1px 6px", borderRadius: 10, whiteSpace: "nowrap" }}>
                            정기구독 {first.subscriptionOccurrence}회차
                          </span>
                        )}
                        <span style={{ fontWeight: 400, color: "#888780", fontSize: 10.5, whiteSpace: "nowrap" }}>{first.recipient?.phone || ""}</span>
                        <span style={{ flex: 1, textAlign: "right", fontSize: 12, fontWeight: 700, color: "#1B2430" }}>{won(groupTotal)}</span>
                      </div>
                      {first.recipient?.address && (
                        <div style={{ fontSize: 10.5, color: "#888780", marginTop: 2, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                          [{first.recipient.postalCode || estimatePostalCode(first.recipient.address)}] {first.recipient.address}
                        </div>
                      )}
                    </div>
                    <button onClick={(e) => { e.stopPropagation(); onOpenActions(first.id); }} style={{ background: "none", border: "none", color: "#888780", fontSize: 16, cursor: "pointer", padding: 0, flexShrink: 0 }}>⋯</button>
                  </div>

                  {/* 박스(상품)별 줄 - 각자 수량/가격/송장/상태를 따로 가짐 */}
                  <div style={{ display: "flex", flexDirection: "column", marginTop: 8 }}>
                    {list.map((o, i) => {
                      const st = STATUS[o.status] || STATUS.pending;
                      return (
                        <div key={o.id} style={{ borderTop: "1px solid #F1F2EC", paddingTop: 7, marginTop: i === 0 ? 0 : 7 }}>
                          <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                            {multi && (
                              <input type="checkbox" checked={checkedIds.has(o.id)} onChange={() => toggleCheck(o.id)} style={{ flexShrink: 0 }} />
                            )}
                            <div style={{ flex: 1, cursor: "pointer", minWidth: 0 }} onClick={() => onSelect(o.id)}>
                              <div style={{ fontSize: 12, color: "#5F5E5A", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                                {o.boxInfo && <span style={{ fontSize: 9.5, fontWeight: 700, color: "#185FA5", background: "#E6F1FB", padding: "1px 6px", borderRadius: 8, marginRight: 5 }}>📦 {o.boxInfo}</span>}
                                {orderItemsText(o) || "상품 없음"}
                                {o.boxVolume && <span style={{ color: "#888780", fontSize: 10.5 }}> · 부피 {o.boxVolume}</span>}
                              </div>
                            </div>
                            <span style={{ fontSize: 11.5, fontWeight: 700, color: "#1B2430", whiteSpace: "nowrap" }}>{won(orderTotal(o))}</span>
                          </div>
                          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 5, paddingLeft: multi ? 22 : 0 }}>
                            <button
                              onClick={() => onOpenInvoice(o.id)}
                              style={{
                                fontSize: 10.5, padding: "2px 7px", borderRadius: 6, border: "1px dashed #B9BBB2",
                                background: "#F5F6F2", color: o.invoiceNo ? "#1B2430" : "#888780", cursor: "pointer",
                              }}
                            >
                              {o.invoiceNo ? `${o.courier || "택배"} ${o.invoiceNo}` : "송장번호 입력"}
                            </button>
                            <span style={{ fontSize: 10.5, fontWeight: 700, color: st.color, background: st.bg, padding: "2px 8px", borderRadius: 20 }}>
                              {st.label}
                            </span>
                          </div>
                        </div>
                      );
                    })}
                  </div>

                  {multi && (
                    <div style={{ display: "flex", justifyContent: "flex-end", marginTop: 8, paddingTop: 7, borderTop: "1px solid #E2E4DD" }}>
                      <span style={{ fontSize: 11.5, color: "#5F5E5A" }}>총 주문금액&nbsp;</span>
                      <span style={{ fontSize: 12.5, fontWeight: 700, color: "#1B2430" }}>{won(groupTotal)}</span>
                    </div>
                  )}
                </div>
              </div>
            );
          });
        })()}
      </div>
    </div>
  );
}

function orderItemsText(order) {
  return (order.items || []).map((it) => {
    const nm = it.name || "상품";
    return `${nm} X ${it.qty}개`;
  }).join(", ");
}

function BulkSmsModal({ orders, appName, smsTemplate, fireToast, onClose }) {
  const [sentIds, setSentIds] = useState(new Set());

  const rows = orders.map((o) => {
    const phone = (o.recipient?.phone || "").replace(/[^0-9]/g, "");
    const name = o.recipient?.name || "고객";
    const body = fillSmsTemplate(smsTemplate || DEFAULT_SMS_TEMPLATE, {
      appName, name, courier: o.courier || "", invoiceNo: o.invoiceNo || "",
    });
    return { id: o.id, name, phone, body };
  });

  // 체크 선택: 기본은 연락처 있는 사람 전체 선택
  const [checkedIds, setCheckedIds] = useState(() => new Set(rows.filter((r) => r.phone).map((r) => r.id)));
  const checkedRows = rows.filter((r) => checkedIds.has(r.id));

  function toggleCheck(id) {
    setCheckedIds((prev) => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id); else next.add(id);
      return next;
    });
  }
  function toggleCheckAll() {
    const withPhone = rows.filter((r) => r.phone);
    const allChecked = withPhone.every((r) => checkedIds.has(r.id));
    setCheckedIds(allChecked ? new Set() : new Set(withPhone.map((r) => r.id)));
  }

  function markSent(id) {
    setSentIds((prev) => new Set(prev).add(id));
  }

  function copyOne(body) {
    navigator.clipboard?.writeText(body).catch(() => {});
    fireToast("메시지를 복사했어요. 카톡 대화창에 붙여넣기 하세요");
  }

  function copyChecked() {
    if (checkedRows.length === 0) { fireToast("선택한 대상이 없어요"); return; }
    const combined = checkedRows.map((r) => `▶ ${r.name} (${r.phone})\n${r.body}`).join("\n\n----------\n\n");
    navigator.clipboard?.writeText(combined).catch(() => {});
    fireToast(`선택한 ${checkedRows.length}명분 메시지를 복사했어요`);
  }

  function sendChecked() {
    const valid = checkedRows.filter((r) => r.phone);
    if (valid.length === 0) { fireToast("연락처가 있는 선택 대상이 없어요"); return; }
    const phones = valid.map((r) => r.phone).join(",");
    const body = valid[0].body;
    window.location.href = `sms:${phones}?body=${encodeURIComponent(body)}`;
    setSentIds(new Set(valid.map((r) => r.id)));
    fireToast(`선택한 ${valid.length}명에게 문자 앱을 엽니다. 내용 확인 후 전송하세요`);
  }

  const withPhoneCount = rows.filter((r) => r.phone).length;
  const allChecked = withPhoneCount > 0 && rows.filter((r) => r.phone).every((r) => checkedIds.has(r.id));

  return (
    <div style={overlayStyle} onClick={onClose}>
      <div style={{ ...sheetStyle, maxHeight: "82vh", overflowY: "auto" }} onClick={(e) => e.stopPropagation()}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
          <div style={{ fontSize: 14, fontWeight: 700 }}>발송문자 보내기 (선택 {checkedRows.length}명)</div>
          <button onClick={onClose} style={{ background: "none", border: "none", fontSize: 18, cursor: "pointer", color: "#5F5E5A" }}>✕</button>
        </div>
        <p style={{ fontSize: 11, color: "#888780", margin: "0 0 10px" }}>
          보낼 대상을 체크로 고르세요. "선택 일괄 발송"은 문자 앱을 열어 한 번에 보냅니다. 카톡으로 보내려면 "복사" 후 카톡 대화창에 붙여넣기 하세요.
        </p>

        <label style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12, color: "#5F5E5A", marginBottom: 10, cursor: "pointer", fontWeight: 700 }}>
          <input type="checkbox" checked={allChecked} onChange={toggleCheckAll} />
          전체 선택 (연락처 있는 {withPhoneCount}명)
        </label>

        <div style={{ display: "flex", gap: 6, marginBottom: 14 }}>
          <button
            onClick={sendChecked}
            style={{ flex: 1.3, padding: "11px 0", borderRadius: 10, border: "none", background: "#2F6F4E", color: "#fff", fontWeight: 700, fontSize: 13, cursor: "pointer" }}
          >
            📱 선택 일괄 발송
          </button>
          <button
            onClick={copyChecked}
            style={{ flex: 1, padding: "11px 0", borderRadius: 10, border: "1px solid #2F6F4E", background: "#fff", color: "#27500A", fontWeight: 700, fontSize: 13, cursor: "pointer" }}
          >
            📋 선택 복사 (카톡용)
          </button>
        </div>

        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          {rows.map((r) => {
            const sent = sentIds.has(r.id);
            const checked = checkedIds.has(r.id);
            const smsHref = `sms:${r.phone}?body=${encodeURIComponent(r.body)}`;
            return (
              <div key={r.id} style={{ background: "#F5F6F2", borderRadius: 10, padding: 12, border: checked ? "1px solid #2F6F4E" : "1px solid #E2E4DD" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
                  <input type="checkbox" checked={checked} onChange={() => toggleCheck(r.id)} disabled={!r.phone} />
                  <span style={{ fontSize: 13, fontWeight: 700, flex: 1 }}>{r.name} <span style={{ fontWeight: 400, color: "#888780", fontSize: 11 }}>{r.phone || "연락처 없음"}</span></span>
                  {sent && <span style={{ fontSize: 10.5, fontWeight: 700, color: "#27500A", background: "#EAF3DE", padding: "2px 8px", borderRadius: 20 }}>보냄</span>}
                </div>
                <div style={{ fontSize: 11.5, color: "#5F5E5A", whiteSpace: "pre-wrap", marginBottom: 8 }}>{r.body}</div>
                <div style={{ display: "flex", gap: 6 }}>
                  {r.phone ? (
                    <a
                      href={smsHref}
                      onClick={() => markSent(r.id)}
                      style={{ flex: 1, textAlign: "center", padding: "8px 0", borderRadius: 8, border: "none", background: "#2F6F4E", color: "#fff", fontWeight: 700, fontSize: 12, textDecoration: "none" }}
                    >
                      📱 문자
                    </a>
                  ) : (
                    <div style={{ flex: 1, textAlign: "center", padding: "8px 0", fontSize: 11, color: "#A32D2D" }}>연락처 없음</div>
                  )}
                  <button onClick={() => copyOne(r.body)} style={{ flex: 1, padding: "8px 0", borderRadius: 8, border: "1px solid #D3D1C7", background: "#fff", color: "#5F5E5A", fontWeight: 700, fontSize: 12, cursor: "pointer" }}>
                    📋 복사(카톡)
                  </button>
                </div>
              </div>
            );
          })}
        </div>

        <button onClick={onClose} style={{ width: "100%", marginTop: 14, padding: "11px 0", borderRadius: 10, border: "none", background: "#EAF3DE", color: "#27500A", fontWeight: 700, fontSize: 13, cursor: "pointer" }}>
          닫기
        </button>
      </div>
    </div>
  );
}

function InvoiceModal({ order, couriers, appName, smsTemplate, onClose, onSave, onClear }) {
  const [courier, setCourier] = useState(order.courier || couriers[0]);
  const [invoiceNo, setInvoiceNo] = useState(order.invoiceNo || "");
  const [saved, setSaved] = useState(false);
  const [messageText, setMessageText] = useState("");

  const recipientName = order.recipient?.name || "고객";
  const recipientPhone = (order.recipient?.phone || "").replace(/[^0-9]/g, "");
  const defaultSmsBody = fillSmsTemplate(smsTemplate || DEFAULT_SMS_TEMPLATE, { appName, name: recipientName, courier, invoiceNo });
  const smsBody = messageText || defaultSmsBody;
  const smsHref = `sms:${recipientPhone}?body=${encodeURIComponent(smsBody)}`;

  function handleSave() {
    if (!invoiceNo.trim()) return;
    onSave(courier, invoiceNo.trim());
    setMessageText(fillSmsTemplate(smsTemplate || DEFAULT_SMS_TEMPLATE, { appName, name: recipientName, courier, invoiceNo: invoiceNo.trim() }));
    setSaved(true);
  }

  function copyMessage() {
    navigator.clipboard?.writeText(smsBody).catch(() => {});
  }

  if (saved) {
    return (
      <div style={overlayStyle} onClick={onClose}>
        <div style={sheetStyle} onClick={(e) => e.stopPropagation()}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
            <div style={{ fontSize: 14, fontWeight: 700 }}>송장번호 저장 완료</div>
            <button onClick={onClose} style={{ background: "none", border: "none", fontSize: 18, cursor: "pointer", color: "#5F5E5A" }}>✕</button>
          </div>

          <label style={{ fontSize: 12, color: "#5F5E5A", fontWeight: 500 }}>보낼 문구 (자유롭게 수정 가능해요)</label>
          <textarea
            value={smsBody}
            onChange={(e) => setMessageText(e.target.value)}
            style={{ width: "100%", minHeight: 92, border: "1px solid #D3D1C7", borderRadius: 10, padding: 12, fontSize: 12.5, boxSizing: "border-box", resize: "vertical", marginTop: 6, marginBottom: 8, fontFamily: FONT, color: "#1B2430" }}
          />
          <button
            onClick={() => setMessageText(defaultSmsBody)}
            style={{ border: "none", background: "none", color: "#185FA5", fontSize: 11.5, fontWeight: 700, cursor: "pointer", padding: 0, marginBottom: 14 }}
          >
            ↺ 기본 문구로 되돌리기
          </button>

          {recipientPhone ? (
            <a
              href={smsHref}
              style={{ display: "block", textAlign: "center", width: "100%", padding: "12px 0", borderRadius: 10, border: "none", background: "#2F6F4E", color: "#fff", fontWeight: 700, fontSize: 13, textDecoration: "none", marginBottom: 8, boxSizing: "border-box" }}
            >
              📱 문자 앱으로 발송하기
            </a>
          ) : (
            <div style={{ fontSize: 11, color: "#A32D2D", marginBottom: 8 }}>받는분 연락처가 없어서 문자 앱을 바로 열 수 없어요. 아래에서 메시지를 복사해 직접 보내주세요.</div>
          )}

          <button onClick={copyMessage} style={{ width: "100%", padding: "11px 0", borderRadius: 10, border: "1px solid #D3D1C7", background: "#fff", color: "#5F5E5A", fontWeight: 700, fontSize: 13, cursor: "pointer", marginBottom: 8 }}>
            메시지 복사 (카톡에 붙여넣기용)
          </button>
          <button onClick={onClose} style={{ width: "100%", padding: "11px 0", borderRadius: 10, border: "none", background: "#EAF3DE", color: "#27500A", fontWeight: 700, fontSize: 13, cursor: "pointer" }}>
            닫기
          </button>
        </div>
      </div>
    );
  }

  return (
    <div style={overlayStyle} onClick={onClose}>
      <div style={sheetStyle} onClick={(e) => e.stopPropagation()}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
          <div style={{ fontSize: 14, fontWeight: 700 }}>송장번호 직접입력</div>
          <button onClick={onClose} style={{ background: "none", border: "none", fontSize: 18, cursor: "pointer", color: "#5F5E5A" }}>✕</button>
        </div>

        <label style={{ fontSize: 12, color: "#5F5E5A", fontWeight: 500 }}>택배사</label>
        <select value={courier} onChange={(e) => setCourier(e.target.value)} style={{ ...inputStyle(), marginTop: 6, marginBottom: 14 }}>
          {couriers.map((c) => (
            <option key={c} value={c}>{c}</option>
          ))}
        </select>

        <label style={{ fontSize: 12, color: "#5F5E5A", fontWeight: 500 }}>송장번호</label>
        <input
          value={invoiceNo}
          onChange={(e) => setInvoiceNo(e.target.value)}
          placeholder="송장번호를 입력하세요"
          style={{ ...inputStyle(), marginTop: 6, marginBottom: 14 }}
        />

        <button
          onClick={() => alert("바코드 스캔은 이 데모에서는 지원하지 않아요. 송장번호를 직접 입력해주세요.")}
          style={{ width: "100%", padding: "10px 0", borderRadius: 8, border: "none", background: "#2F6F4E", color: "#fff", fontWeight: 700, fontSize: 13, cursor: "pointer", marginBottom: 16 }}
        >
          운송장바코드 스캔
        </button>

        <div style={{ display: "flex", gap: 8 }}>
          <button onClick={onClear} style={{ flex: 1, padding: "11px 0", borderRadius: 10, border: "1px solid #D3D1C7", background: "#fff", color: "#5F5E5A", fontWeight: 700, fontSize: 13, cursor: "pointer" }}>
            송장번호 삭제
          </button>
          <button
            onClick={handleSave}
            disabled={!invoiceNo.trim()}
            style={{ flex: 1, padding: "11px 0", borderRadius: 10, border: "none", background: invoiceNo.trim() ? "#2F6F4E" : "#D3D1C7", color: "#fff", fontWeight: 700, fontSize: 13, cursor: invoiceNo.trim() ? "pointer" : "not-allowed" }}
          >
            완료
          </button>
        </div>
      </div>
    </div>
  );
}

const overlayStyle = {
  position: "fixed", inset: 0, background: "rgba(0,0,0,0.45)", display: "flex",
  alignItems: "flex-end", justifyContent: "center", zIndex: 200000,
  // 확인/취소를 묻는 팝업이라 다른 모든 화면(팝업/모달) 위에 항상 떠야 함.
  // (전에는 100이라, 오늘 새로 만든 백업목록 등 z-index가 높은 화면 뒤에 숨어서
  //  "눌러도 반응 없음"처럼 보이는 사고가 있었음)
};

const sheetStyle = {
  width: "100%", maxWidth: 390, background: "#fff", borderRadius: "18px 18px 0 0",

function sheetBtnStyle(bg, color) {

    width: "100%", padding: "12px 0", borderRadius: 10, border: bg === "#fff" ? "1px solid #E2E4DD" : "none",

  };
}
