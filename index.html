  function handleProductUpload(e) {
    const file = e.target.files?.[0];
    if (!file) return;
    setBusyMessage("상품 엑셀 파일을 읽고 있어요...");
    readWorkbookFile(file, (rows) => {
      const added = rows
        .map((r) => {
          const name = String(r["상품명"] || r["이름"] || "").trim();
          if (!name) return null;
          const chRaw = String(r["구분"] || "").trim();
          const channel = chRaw.includes("업체") ? "business" : chRaw.includes("일반") ? "retail" : "both";
          const commonP = Number(r["공용 가격"] || r["공용가격"] || 0);
          const retailP = Number(r["일반용 가격"] || r["일반가격"] || 0);
          const bizP = Number(r["업체가격"] || r["업체단가"] || 0);
          // 구분에 따라 대표가격(price)과 업체단가(wholesalePrice) 결정
          let price = 0, wholesalePrice = bizP;
          if (channel === "business") { price = bizP || commonP; wholesalePrice = bizP || commonP; }
          else if (channel === "retail") { price = retailP || commonP; }
          else { price = commonP || retailP; }
          // 구버전 "가격" 컬럼 호환
          if (!price) price = Number(r["가격"] || 0);
          if (!price && !wholesalePrice) return null;
          return {
            id: uid("p"),
            name,
            price: price || wholesalePrice,
            wholesalePrice: wholesalePrice || price,
            stock: Number(r["재고"] || 0),
            unit: String(r["단위"] || "kg").trim() || "kg",
            channel,
          };
        })
        .filter(Boolean);

      if (added.length === 0) {
        fireToast("추가할 상품 정보를 찾지 못했습니다");
        setBusyMessage(null);
        return;
      }

      setProducts((prev) => {
        const existingNames = new Set(prev.map((p) => p.name));
        const newOnes = added.filter((p) => !existingNames.has(p.name));
        const updates = added.filter((p) => existingNames.has(p.name));

        let next = prev;
        if (updates.length > 0) {
          next = next.map((p) => {
            const match = updates.find((u) => u.name === p.name);
            return match ? { ...p, price: match.price, wholesalePrice: match.wholesalePrice, stock: match.stock, channel: match.channel } : p;
          });
        }
        if (newOnes.length > 0) {
          next = [...next, ...newOnes];
        }
        fireToast(`상품 ${newOnes.length}건 추가, ${updates.length}건 갱신했습니다`);
        return next;
      });
      setBusyMessage(null);
    }, () => {
      setBusyMessage(null);
      fireToast("파일을 읽지 못했어요. 엑셀(.xlsx) 형식이 맞는지 확인해주세요");
    });
    e.target.value = "";
  }

  function parseCustomerRows(rows) {
    const isOrderTemplate = rows.length > 0 && ("받는분" in rows[0] || "받는분 연락처" in rows[0]);
    return rows
      .map((r) => {
        if (isOrderTemplate) {
          const name = String(r["받는분"] || r["보내는분 (주문자)"] || "").trim();
          const phone = String(r["받는분 연락처"] || r["주문자 연락처"] || "").trim();
          const address = String(r["받는분 주소(전체)"] || "").trim();
          const memo = [r["메모"], r["배송메시지"]].filter((v) => String(v || "").trim()).join(" / ");
          const postalRaw = String(r["우편번호"] || "").trim().replace(/^'/, "");
          return name
            ? {
                id: uid("c"),
                name,
                phone,
                address,
                postalCode: postalRaw || estimatePostalCode(address),
                memo,
              }
            : null;
        }
        const name = String(r["이름"] || "").trim();
        if (!name) return null;
        const address = String(r["주소"] || "").trim();
        return {
          id: uid("c"),
          name,
          phone: String(r["전화번호"] || "").trim(),
          address,
          postalCode: String(r["우편번호"] || "").trim() || estimatePostalCode(address),
          memo: String(r["메모"] || "").trim(),
        };
      })
      .filter(Boolean);
  }

  function finalizeCustomerImport(added) {
    // 같은 사람인지 정교하게 판단 (전화번호 표기가 달라도-하이픈 유무 등- 같은 사람으로 인식,
    // 전화번호 같아도 이름 다르면 별도, 이름 같아도 주소 다르면 별도로 취급)
    const dedup = [];
    added.forEach((c) => {
      if (findMatchingParty(c.name, c.phone, c.address, dedup)) return;
      dedup.push(c);
    });

    if (dedup.length > 0) {
      const newOnes = [];
      let dupCount = 0;
      dedup.forEach((c) => {
        if (findMatchingParty(c.name, c.phone, c.address, customers)) {
          dupCount += 1;
          return;
        }
        newOnes.push(c);
      });
      if (newOnes.length === 0) {
        fireToast("이미 등록된 고객들입니다");
        return;
      }
      // 애매하게 겹치는 경우(번호는 같은데 이름 다름 / 이름은 같은데 주소 다름)는 확인 알림에 담아둠
      const ambiguous = scanAmbiguousNewEntries(newOnes, customers).map((x) => ({ ...x, type: "customer" }));
      setCustomers((prev) => [...prev, ...newOnes]);
      fireToast(`고객 ${newOnes.length}명을 추가했습니다${dupCount > 0 ? ` (중복 ${dupCount}건 제외)` : ""}`);
      if (ambiguous.length > 0) setAmbiguousReview(ambiguous);
    } else {
      fireToast("추가할 고객 정보를 찾지 못했습니다");
    }
  }

  // 여러 파일을 한 번에 선택해서 올릴 수 있어요.
  function handleCustomerUpload(e) {
    const files = Array.from(e.target.files || []);
    if (files.length === 0) return;

    setBusyMessage(files.length > 1 ? `고객 엑셀 파일 ${files.length}개를 읽고 있어요...` : "고객 엑셀 파일을 읽고 있어요...");
    let remaining = files.length;
    let combined = [];
    let failCount = 0;
    const checkDone = () => {
      remaining -= 1;
      if (remaining === 0) {
        setBusyMessage(null);
        if (combined.length === 0 && failCount > 0) {
          fireToast("파일을 읽지 못했어요. 엑셀(.xlsx) 형식이 맞는지 확인해주세요");
          return;
        }
        finalizeCustomerImport(combined);
        if (failCount > 0) fireToast(`${failCount}개 파일은 읽지 못해 건너뛰었어요`);
      }
    };
    files.forEach((file) => {
      readWorkbookFile(file, (rows) => {
        combined = combined.concat(parseCustomerRows(rows));
        checkDone();
      }, () => {
        // 이 파일 하나가 깨져도 나머지 파일 처리는 계속 진행 (한 파일 오류로 전체가 멈추지 않도록)
        failCount += 1;
        checkDone();
      });
    });
    e.target.value = "";
  }

  // 클라우드에 매일 자동 저장되는 백업(backup_YYYY-MM-DD)에서 통째로 복원
  // 저장된 모든 날짜별 백업을 한 번에 훑어서, 각 날짜에 데이터가 실제로 몇 건씩 들어있는지 보여줌
  // (어느 날짜가 진짜 정상 데이터인지 하나씩 추측하지 않고 한눈에 확인하기 위함)
  const [backupList, setBackupList] = useState(null); // null=닫힘 | "loading" | 배열
  async function loadBackupList() {
    setBackupList("loading");
    try {
      const snap = await fbDb.collection("stores").get();
      const prefix = IS_TEST ? "test_backup_" : "backup_";
      const list = snap.docs
        .filter((d) => d.id.startsWith(prefix))
        .map((d) => {
          const data = d.data() || {};
          return {
            id: d.id,
            dateStr: d.id.replace(prefix, ""),
            customers: (data.customers || []).length,
            orders: (data.orders || []).length,
            products: (data.products || []).length,
            vendors: (data.vendors || []).length,
            backedUpAt: data.backedUpAt || "",
          };
        })
        .sort((a, b) => (a.dateStr < b.dateStr ? 1 : -1)); // 최신 날짜부터
      setBackupList(list);
    } catch (e) {
      setBackupList([]);
      fireToast("백업 목록을 불러오지 못했어요");
    }
  }

  async function restoreFromCloudBackup(dateStr) {
    if (!firebaseReady) { fireToast("Firebase 연결 상태에서만 사용할 수 있어요"); return; }
    try {
      const docId = (IS_TEST ? "test_backup_" : "backup_") + dateStr;
      const snap = await fbDb.collection("stores").doc(docId).get();
      if (!snap.exists) { fireToast(`${dateStr} 백업을 찾을 수 없어요. 날짜를 다시 확인해주세요`); return; }
      const data = snap.data();
      if (data.customers) setCustomers(data.customers);
      if (data.products) setProducts(data.products);
      if (data.vendors) setVendors(data.vendors);
      if (data.orders) setOrders(data.orders);
      if (data.invoices) setInvoices(data.invoices);
      if (data.supplier) setSupplier(data.supplier);
      if (data.subscriptions) setSubscriptions(data.subscriptions);
      if (data.integrations) setIntegrations(data.integrations);
      if (data.customMarketplaces) setCustomMarketplaces(data.customMarketplaces);
      if (data.couriers) setCouriers(data.couriers);
      if (data.smsTemplate) setSmsTemplate(data.smsTemplate);
      if (data.orderTemplate) setOrderTemplate(data.orderTemplate);
      if (data.customerTemplate) setCustomerTemplate(data.customerTemplate);
      if (data.productTemplate) setProductTemplate(data.productTemplate);
      if (data.courierTemplates) setCourierTemplates(data.courierTemplates);
      lastGoodDataRef.current = { customers: data.customers, orders: data.orders, products: data.products, vendors: data.vendors };
      fireToast(`${dateStr} 백업으로 복원했어요. 잠시 후 목록을 확인해주세요`);
    } catch (e) {

      subscriptions, integrations, customMarketplaces, couriers,
      smsTemplate, orderTemplate, customerTemplate, productTemplate, courierTemplates,
      savedAt: nowStamp(),
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `가게장부_백업_${nowStamp().replace(/[.\s:]/g, "")}.json`;
    a.click();
    URL.revokeObjectURL(url);
    fireToast('전체 백업 파일을 다운로드했습니다. 안전하게 보관하세요');
  }

    const reader = new FileReader();
    reader.onload = (ev) => {

        const data = JSON.parse(ev.target.result);
        if (data.customers) setCustomers(data.customers);
        if (data.products) setProducts(data.products);
        if (data.vendors) setVendors(data.vendors);
        if (data.invoices) setInvoices(data.invoices);
        if (data.supplier) setSupplier(data.supplier);
        if (data.orders) setOrders(data.orders);
        if (data.appName) setAppName(data.appName);
        if (data.appLogo) setAppLogo(data.appLogo);
        if (data.subscriptions) setSubscriptions(data.subscriptions);
        if (data.integrations) setIntegrations(data.integrations);
        if (data.customMarketplaces) setCustomMarketplaces(data.customMarketplaces);
        if (data.couriers) setCouriers(data.couriers);
        if (data.smsTemplate) setSmsTemplate(data.smsTemplate);
        if (data.orderTemplate) setOrderTemplate(data.orderTemplate);
        if (data.customerTemplate) setCustomerTemplate(data.customerTemplate);
        if (data.productTemplate) setProductTemplate(data.productTemplate);
        if (data.courierTemplates) setCourierTemplates(data.courierTemplates);
        fireToast("백업 데이터를 모두 불러왔습니다");
      } catch {
        fireToast("백업 파일을 읽을 수 없습니다");
      }
    };
    reader.readAsText(file);
    e.target.value = "";
  }

  function saveName() {
    const trimmed = draftName.trim();
    if (trimmed) setAppName(trimmed);
    setEditing(false);
  }

  // 회사 로고/사진 업로드: 256px로 리사이즈해 용량을 줄여 base64로 저장
  function handleLogoUpload(e) {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const img = new Image();
      img.onload = () => {
        const size = 256;
        const canvas = document.createElement("canvas");
        canvas.width = size; canvas.height = size;
        const ctx = canvas.getContext("2d");
        // 정사각형으로 가운데 크롭
        const min = Math.min(img.width, img.height);
        const sx = (img.width - min) / 2, sy = (img.height - min) / 2;
        ctx.drawImage(img, sx, sy, min, min, 0, 0, size, size);
        const dataUrl = canvas.toDataURL("image/jpeg", 0.85);
        setAppLogo(dataUrl);
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
    e.target.value = "";
  }

  function submit() {
    onLogin(idInput, pwInput);

    const angle = (360 / 10) * i;

    return (
      <g key={i} transform={`rotate(${angle} 50 50)`}>
        <ellipse cx="50" cy="14" rx="9" ry="16" fill={color} />

  return (
    <svg viewBox="0 0 100 100" width={size} height={size} style={{ display: "block" }}>
      <circle cx="50" cy="50" r="48" fill="#F5F6F2" />
      {leaves}

      <text x="50" y="58" textAnchor="middle" fontSize="22" fontWeight="700" fill="#27500A" fontFamily={FONT}>

                    style={smallBtn("#FCEEEE", "#A32D2D")}
                  >
                    거부
                  </button>
                </div>
              </div>

          </div>
        </div>

            <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 2, flexWrap: "wrap" }}>
              <span style={{ fontSize: 13.5, fontWeight: 700 }}>{id}</span>

              {id === currentNickname && <span style={{ color: "#185FA5", fontWeight: 400, fontSize: 11.5 }}>(나)</span>}

                <button onClick={() => { onSetDisplayName(id, nickEditValue); setNickEditId(null); }} style={smallBtn("#2F6F4E", "#fff")}>저장</button>

                  style={smallBtn("#EAF3DE", "#27500A")}
                >
                  차단 해제
                </button>
                <button
                  onClick={() => askConfirm(`"${id}" 계정을 목록에서 완전히 지울까요?\n(주의: 지우면 이 아이디로 나중에 누군가 다시 가입할 수 있게 돼요. 그냥 안 보이게만 하고 계속 막아두고 싶으면 "차단 해제"를 누르지 마시고 그대로 두세요.)`, () => onDelete(id))}
                  style={smallBtn("#EFEFE9", "#5F5E5A")}
                >
                  목록에서 완전 삭제
                </button>
              </div>
            ) : pwEditId === id ? (
              <div style={{ display: "flex", gap: 6 }}>
                <input type="password" placeholder="새 비밀번호" value={pwEditValue} onChange={(e) => setPwEditValue(e.target.value)} style={inputStyle} />
                <button onClick={() => { onChangePassword(id, pwEditValue); setPwEditId(null); setPwEditValue(""); }} style={smallBtn("#2F6F4E", "#fff")}>저장</button>
                <button onClick={() => setPwEditId(null)} style={smallBtn("#EFEFE9", "#5F5E5A")}>취소</button>
              </div>
            ) : renameEditId === id ? (
              <div style={{ display: "flex", gap: 6 }}>
                <input placeholder="새 아이디" value={renameValue} onChange={(e) => setRenameValue(e.target.value)} style={inputStyle} />

                    <button onClick={() => { setRenameEditId(id); setRenameValue(id); }} style={smallBtn("#FAEEDA", "#854F0B")}>아이디 변경</button>
                    <button onClick={() => { setNickEditId(id); setNickEditValue(info.displayName || ""); }} style={smallBtn("#EFE9F7", "#6B4EA6")}>별명 설정</button>

                      <button onClick={() => onSetRole(id, "staff")} style={smallBtn("#F1F2EC", "#5F5E5A")}>직원으로 변경</button>

                <button
                  onClick={() => askConfirm(`"${id}" 계정을 차단할까요?\n이 아이디로는 더 이상 로그인(재가입 포함)할 수 없게 돼요. 퇴사한 직원이나 안 쓰는 이름을 막을 때 사용하세요.`, () => onBlock(id))}
                  style={smallBtn("#FCEEEE", "#A32D2D")}
                >
                  차단하기
                </button>
                <button
                  onClick={() => askConfirm(
                    isRegistered
                      ? `"${id}" 계정을 목록에서 삭제할까요?\n(참고: 삭제만 하면 같은 아이디로 다시 가입할 수 있어요. 완전히 못 들어오게 하려면 "차단"을 사용하세요.)`
                      : `"${id}" 이름을 목록에서 지울까요?\n(예전 접속 기록만 지우는 거예요. 나중에 이 이름으로 로그인하면 다시 나타날 수 있어요.)`,
                    () => onDelete(id)
                  )}
                  style={smallBtn("#EFEFE9", "#5F5E5A")}
                >
                  목록에서 삭제
                </button>
              </div>

          </div>
          );
        })}
        {ids.length === 0 && (
          <div style={{ padding: "30px 0", textAlign: "center", color: "#888780", fontSize: 13 }}>등록된 계정이 없어요</div>
        )}
      </div>
    </div>
  );
}

function DeliveryTrackTab({ orders, deliveredOrders = [], customerMap, onConfirm, onSelectOrder, onBack, expectedArrivalDeadline }) {
  const [view, setView] = useState("transit"); // ★ v55: 'transit'=배송중, 'done'=배송완료
  function trackingUrl(o) {
    if (!o.invoiceNo) return null;
    // 택배사가 비어있으면(엑셀에 안 채워졌거나 수기 입력 누락 등) 주로 쓰시는 우체국택배로 간주
    // (그냥 "택배"로만 검색하면 네이버가 특정 택배사를 못 찾아서 검색결과가 아예 안 나왔음)
    const courier = o.courier || "우체국택배";
    if (courier.includes("우체국")) {
      return `https://service.epost.go.kr/trace.RetrieveDomRigiTraceList.comm?sid1=${o.invoiceNo}`;
    }
    return `https://search.naver.com/search.naver?query=${encodeURIComponent(courier + " " + o.invoiceNo + " 배송조회")}`;
  }

  const sorted = [...orders].sort((a, b) => (a.shippedAt || "") < (b.shippedAt || "") ? 1 : -1); // 최근 발송이 위로
  const list = view === "done" ? deliveredOrders : sorted;

  return (
    <div>
      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
        <button onClick={onBack} style={{ border: "none", background: "none", fontSize: 18, cursor: "pointer", padding: 0 }}>‹</button>
        <h1 style={{ fontSize: 19, fontWeight: 700, margin: 0, letterSpacing: "-0.02em" }}>배송 현황</h1>
      </div>

      {/* ★ v55: 배송중 / 배송완료 전환 */}
      <div style={{ display: "flex", gap: 6, margin: "10px 0 12px" }}>
        <button onClick={() => setView("transit")} style={{ flex: 1, padding: "9px 0", borderRadius: 8, border: view === "transit" ? "1px solid #2F6F4E" : "1px solid #E2E4DD", background: view === "transit" ? "#EAF3DE" : "#fff", color: view === "transit" ? "#27500A" : "#5F5E5A", fontWeight: 700, fontSize: 12.5, cursor: "pointer" }}>🚚 배송중 ({orders.length})</button>
        <button onClick={() => setView("done")} style={{ flex: 1, padding: "9px 0", borderRadius: 8, border: view === "done" ? "1px solid #185FA5" : "1px solid #E2E4DD", background: view === "done" ? "#E6F1FB" : "#fff", color: view === "done" ? "#185FA5" : "#5F5E5A", fontWeight: 700, fontSize: 12.5, cursor: "pointer" }}>✅ 배송완료 · 최근 10일 ({deliveredOrders.length})</button>
      </div>
      <p style={{ fontSize: 11.5, color: "#888780", margin: "0 0 14px", lineHeight: 1.6 }}>
        {view === "done"
          ? "도착 확인을 누른(배송완료) 주문 중 최근 10일 것만 보여줘요. 10일 지난 건 이 목록에서만 빠지고, 주문 기록은 그대로 남아 있어요. 항목을 누르면 주문 상세로 갑니다."
          : '발송 후 아직 "도착 확인"을 안 누른 주문이에요. 도착했으면 "도착 확인함"을 눌러 배송완료로 옮기세요.'}
      </p>

      {list.length === 0 && (
        <div style={{ padding: "40px 0", textAlign: "center", color: "#888780", fontSize: 13 }}>
          {view === "done" ? "아직 배송완료(도착확인)한 주문이 없어요" : "지금 배송중인(확인 대기) 주문이 없어요"}
        </div>
      )}

      <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
        {list.map((o) => {
          const c = customerMap[o.customerId];
          const name = o.recipient?.name || (c ? c.name : "") || "고객";
          const url = trackingUrl(o);
          const done = view === "done";
          const dl = !done && expectedArrivalDeadline(o.shippedAt || o.orderDate);
          const isLate = dl && new Date() > dl;
          const accent = done ? "#185FA5" : (isLate ? "#A32D2D" : "#2F6F4E");
          return (
            <div key={o.id} style={{ background: "#fff", border: `1px solid ${done ? "#CFE0F2" : (isLate ? "#E9B9B9" : "#D7E6DC")}`, borderLeft: `4px solid ${accent}`, borderRadius: 10, padding: "12px 14px" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 6 }}>
                <div onClick={() => onSelectOrder(o.id)} style={{ cursor: "pointer", flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 13, fontWeight: 700, color: "#1B2430" }}>
                    {name} <span style={{ fontWeight: 400, color: "#888780", fontSize: 11 }}>{o.recipient?.phone || ""}</span>
                  </div>
                  {o.recipient?.address && (
                    <div style={{ fontSize: 11, color: "#888780", marginTop: 2, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                      {o.recipient.address}
                    </div>
                  )}
                </div>
                <span style={{ fontSize: 10, fontWeight: 700, color: done ? "#185FA5" : (isLate ? "#A32D2D" : "#27500A"), background: done ? "#E6F1FB" : (isLate ? "#FCEEEE" : "#EAF3DE"), padding: "3px 8px", borderRadius: 10, whiteSpace: "nowrap", marginLeft: 8 }}>
                  {done ? "✅ 배송완료" : (isLate ? "⏰ 확인 필요" : "🚚 배송중")}
                </span>
              </div>
              <div style={{ fontSize: 11, color: "#5F5E5A", marginBottom: 8 }}>
                {o.courier || "택배"} · {o.invoiceNo} · 발송일 {o.shippedAt || o.orderDate}
                {done && o.deliveryConfirmedAt ? ` · 도착확인 ${String(o.deliveryConfirmedAt).slice(0, 10)}` : ""}
              </div>
              <div style={{ display: "flex", gap: 6 }}>
                {url && (
                  <a href={url} target="_blank" rel="noreferrer" style={{ flex: 1, textAlign: "center", padding: "9px 0", borderRadius: 8, border: "1px solid #185FA5", background: "#fff", color: "#185FA5", fontWeight: 700, fontSize: 12, textDecoration: "none" }}>
                    배송조회 열기
                  </a>
                )}
                {!done && (
                  <button onClick={() => onConfirm(o.id)} style={{ flex: 1, padding: "9px 0", borderRadius: 8, border: "none", background: "#2F6F4E", color: "#fff", fontWeight: 700, fontSize: 12, cursor: "pointer" }}>
                    도착 확인함
                  </button>
                )}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function DeliveryCheckTab({ orders, recentlyConfirmed, customerMap, onConfirm, onConfirmMany, onSelectOrder, onBack }) {
  const [checkedIds, setCheckedIds] = useState(new Set());
  const todayS = todayStr();

  function trackingUrl(o) {
    if (!o.invoiceNo) return null;
    // 택배사가 비어있으면(엑셀에 안 채워졌거나 수기 입력 누락 등) 주로 쓰시는 우체국택배로 간주
    // (그냥 "택배"로만 검색하면 네이버가 특정 택배사를 못 찾아서 검색결과가 아예 안 나왔음)
    const courier = o.courier || "우체국택배";
    if (courier.includes("우체국")) {
      return `https://service.epost.go.kr/trace.RetrieveDomRigiTraceList.comm?sid1=${o.invoiceNo}`;
    }
    return `https://search.naver.com/search.naver?query=${encodeURIComponent(courier + " " + o.invoiceNo + " 배송조회")}`;
  }

  function toggleChecked(id) {
    setCheckedIds((prev) => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id); else next.add(id);
      return next;
    });
  }

  const sorted = [...orders].sort((a, b) => (a.shippedAt || "") < (b.shippedAt || "") ? -1 : 1);
  const todayGroup = sorted.filter((o) => (o.shippedAt || o.orderDate) === todayS);
  const pastGroup = sorted.filter((o) => (o.shippedAt || o.orderDate) !== todayS);

  function toggleGroupAll(group) {
    const allChecked = group.every((o) => checkedIds.has(o.id));
    setCheckedIds((prev) => {
      const next = new Set(prev);
      group.forEach((o) => { if (allChecked) next.delete(o.id); else next.add(o.id); });
      return next;
    });
  }

  function handleConfirmChecked() {
    const ids = [...checkedIds];
    if (ids.length === 0) return;
    onConfirmMany(ids);
    setCheckedIds(new Set());
  }

  function renderGroup(title, group) {
    if (group.length === 0) return null;
    const allChecked = group.every((o) => checkedIds.has(o.id));
    return (
      <div style={{ marginBottom: 18 }}>
        <label style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12.5, fontWeight: 700, color: "#5F5E5A", marginBottom: 8, cursor: "pointer" }}>
          <input type="checkbox" checked={allChecked} onChange={() => toggleGroupAll(group)} />
          {title} ({group.length}건)
        </label>
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          {group.map((o) => {
            const c = customerMap[o.customerId];
            const name = o.recipient?.name || (c ? c.name : "") || "고객";
            const url = trackingUrl(o);
            return (
              <div key={o.id} style={{ background: "#fff", border: "1px solid #E9B9B9", borderLeft: "4px solid #A32D2D", borderRadius: 10, padding: "12px 14px" }}>
                <div style={{ display: "flex", gap: 8, alignItems: "flex-start", marginBottom: 8 }}>
                  <input type="checkbox" checked={checkedIds.has(o.id)} onChange={() => toggleChecked(o.id)} style={{ marginTop: 3, flexShrink: 0 }} />
                  <div onClick={() => onSelectOrder(o.id)} style={{ cursor: "pointer", flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 13, fontWeight: 700, color: "#1B2430" }}>
                      {name} <span style={{ fontWeight: 400, color: "#888780", fontSize: 11 }}>{o.recipient?.phone || ""}</span>
                    </div>
                    {o.recipient?.address && (
                      <div style={{ fontSize: 11, color: "#888780", marginTop: 2, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                        {o.recipient.address}
                      </div>
                    )}
                    <div style={{ fontSize: 11, color: "#5F5E5A", marginTop: 4 }}>
                      {o.courier || "택배"} · {o.invoiceNo} · 발송일 {o.shippedAt || o.orderDate}
                    </div>
                  </div>
                </div>
                <div style={{ display: "flex", gap: 6 }}>
                  {url && (
                    <a href={url} target="_blank" rel="noreferrer" style={{ flex: 1, textAlign: "center", padding: "9px 0", borderRadius: 8, border: "1px solid #185FA5", background: "#fff", color: "#185FA5", fontWeight: 700, fontSize: 12, textDecoration: "none" }}>
                      배송조회 열기
                    </a>
                  )}
                  <button onClick={() => onConfirm(o.id)} style={{ flex: 1, padding: "9px 0", borderRadius: 8, border: "none", background: "#2F6F4E", color: "#fff", fontWeight: 700, fontSize: 12, cursor: "pointer" }}>
                    도착 확인함
                  </button>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  return (
    <div>
      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
        <button onClick={onBack} style={{ border: "none", background: "none", fontSize: 18, cursor: "pointer", padding: 0 }}>‹</button>
        <h1 style={{ fontSize: 19, fontWeight: 700, margin: 0, letterSpacing: "-0.02em" }}>배송 확인</h1>
      </div>
      <p style={{ fontSize: 11.5, color: "#888780", margin: "6px 0 14px", lineHeight: 1.6 }}>
        발송(송장번호 입력) 후 정상적으로 도착했어야 할 날짜가 지났는데 아직 "확인함"을 누르지 않은 주문이에요.

};

function SubscriptionsTab({ subscriptions, customers, products, addSubscription, updateSubscription, removeSubscription, askConfirm, fireToast, onBack }) {
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({
    customerId: "", name: "", phone: "", address: "",
    cycleDays: "7", nextDate: todayStr(), cart: {}, memo: "", totalOccurrences: "",
  });

  const customerMap = useMemo(() => {
    const m = {};
    customers.forEach((c) => (m[c.id] = c));
    return m;
  }, [customers]);

  function resetForm() {
    setForm({ customerId: "", name: "", phone: "", address: "", cycleDays: "7", nextDate: todayStr(), cart: {}, memo: "", totalOccurrences: "" });
  }

  function changeQty(productId, delta) {
    setForm((prev) => {
      const cart = { ...prev.cart };
      const next = (cart[productId] || 0) + delta;
      if (next <= 0) delete cart[productId];
      else cart[productId] = next;
      return { ...prev, cart };
    });
  }

  function submit() {
    const items = Object.entries(form.cart || {}).map(([productId, qty]) => ({ productId, qty }));
    if (items.length === 0) {
      fireToast("상품을 1개 이상 선택해주세요");
      return;
    }
    const cycleDays = Number(form.cycleDays);
    if (!cycleDays || cycleDays < 1) {
      fireToast("배송 주기를 1일 이상으로 입력해주세요");
      return;
    }
    const c = form.customerId ? customerMap[form.customerId] : null;
    const recipient = c
      ? { name: c.name, phone: c.phone, address: c.address, postalCode: c.postalCode }
      : { name: form.name, phone: form.phone, address: form.address };
    if (!recipient.name) {
      fireToast("받는분 이름을 입력해주세요");
      return;
    }
    addSubscription({
      customerId: form.customerId || null,
      recipient,
      items,
      cycleDays,
      nextDate: form.nextDate,
      memo: form.memo,
      totalOccurrences: form.totalOccurrences ? Number(form.totalOccurrences) : null,
    });
    resetForm();
    setShowForm(false);
  }

  const cycleLabel = (days) => {
    if (days === 7) return "매주";
    if (days === 14) return "2주마다";
    if (days === 30) return "매월";
    return `${days}일마다`;
  };

  function requestNotificationPermission() {
    if (typeof Notification === "undefined") {
      fireToast("이 브라우저는 알림을 지원하지 않아요");
      return;
    }
    Notification.requestPermission().then((perm) => {
      fireToast(perm === "granted" ? "알림이 허용되었어요" : "알림이 거부되었어요");
    });
  }

  return (
    <div>
      <button onClick={onBack} style={{ background: "none", border: "none", color: "#5F5E5A", fontSize: 13, cursor: "pointer", padding: 0, marginBottom: 14 }}>
        ← HOME으로
      </button>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
        <h1 style={{ fontSize: 19, fontWeight: 700, margin: 0, letterSpacing: "-0.02em" }}>정기배송</h1>
        <button onClick={requestNotificationPermission} style={{ border: "1px solid #2F6F4E", background: "#fff", color: "#27500A", borderRadius: 8, padding: "6px 10px", fontSize: 11, fontWeight: 700, cursor: "pointer" }}>
          🔔 알림 켜기
        </button>
      </div>
      <p style={{ fontSize: 11.5, color: "#888780", margin: "0 0 14px" }}>
        앱을 열 때마다 발송일이 된 정기배송을 자동으로 확인해서 주문을 등록하고 알려드려요.
      </p>

      {!showForm && (
        <button onClick={() => setShowForm(true)} style={{ width: "100%", padding: "12px 0", borderRadius: 10, border: "none", background: "#2F6F4E", color: "#fff", fontWeight: 700, fontSize: 14, cursor: "pointer", marginBottom: 16 }}>
          ＋ 정기배송 등록
        </button>
      )}

      {showForm && (
        <div style={{ background: "#fff", border: "1px solid #E2E4DD", borderRadius: 10, padding: 12, marginBottom: 16 }}>
          <div style={{ fontSize: 12, fontWeight: 700, color: "#27500A", marginBottom: 8 }}>새 정기배송</div>

          <label style={{ fontSize: 12, color: "#5F5E5A" }}>고객 선택 (선택)</label>
          <select
            value={form.customerId}
            onChange={(e) => setForm({ ...form, customerId: e.target.value })}
            style={{ ...inputStyle(), marginTop: 6, marginBottom: 10 }}
          >
            <option value="">직접 입력</option>
            {customers.map((c) => (
              <option key={c.id} value={c.id}>{c.name} · {c.phone}</option>
            ))}
          </select>

          {!form.customerId && (
            <>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 8 }}>
                <input placeholder="받는분 이름" value={form.name} onChange={(e) => setForm({ ...form, name: e.target.value })} style={inputStyle()} />
                <input placeholder="연락처" value={form.phone} onChange={(e) => setForm({ ...form, phone: e.target.value })} style={inputStyle()} />
              </div>
              <input placeholder="주소" value={form.address} onChange={(e) => setForm({ ...form, address: e.target.value })} style={{ ...inputStyle(), marginBottom: 10 }} />
            </>
          )}

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 6 }}>
            <div>
              <label style={{ fontSize: 12, color: "#5F5E5A" }}>배송 주기 (일)</label>
              <input
                type="number"
                min={1}
                placeholder="예) 7"
                value={form.cycleDays}
                onChange={(e) => setForm({ ...form, cycleDays: e.target.value })}
                style={{ ...inputStyle(), marginTop: 6 }}
              />
            </div>
            <div>
              <label style={{ fontSize: 12, color: "#5F5E5A" }}>다음 발송일</label>
              <input type="date" value={form.nextDate} onChange={(e) => setForm({ ...form, nextDate: e.target.value })} style={{ ...inputStyle(), marginTop: 6 }} />
            </div>
          </div>
          <div style={{ display: "flex", gap: 6, marginBottom: 10 }}>
            {[{ d: 7, l: "매주" }, { d: 14, l: "2주마다" }, { d: 30, l: "매월" }].map((opt) => (
              <button
                key={opt.d}
                onClick={() => setForm({ ...form, cycleDays: String(opt.d) })}
                style={{
                  flex: 1, padding: "6px 0", borderRadius: 8, fontSize: 11.5, cursor: "pointer",
                  border: Number(form.cycleDays) === opt.d ? "1px solid #2F6F4E" : "1px solid #E2E4DD",
                  background: Number(form.cycleDays) === opt.d ? "#EAF3DE" : "#fff",
                  color: Number(form.cycleDays) === opt.d ? "#27500A" : "#5F5E5A",
                }}
              >
                {opt.l}
              </button>
            ))}
          </div>

          <label style={{ fontSize: 12, color: "#5F5E5A" }}>총 몇 회 주문할지 (선택 — 비우면 무제한)</label>
          <input
            type="number"
            min={1}
            placeholder="예) 10 (입력하면 10회차 발송 후 자동 종료)"
            value={form.totalOccurrences}
            onChange={(e) => setForm({ ...form, totalOccurrences: e.target.value })}
            style={{ ...inputStyle(), marginTop: 6, marginBottom: 10 }}
          />

          <label style={{ fontSize: 12, color: "#5F5E5A" }}>상품 선택</label>
          <div style={{ display: "flex", flexDirection: "column", gap: 6, margin: "6px 0 10px" }}>
            {products.map((p) => {
              const qty = (form.cart || {})[p.id] || 0;
              return (
                <div key={p.id} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", border: "1px solid #E2E4DD", borderRadius: 8, padding: "8px 10px" }}>
                  <div>
                    <div style={{ fontSize: 12.5, fontWeight: 700 }}>{p.name}</div>
                    <div style={{ fontSize: 11, color: "#5F5E5A" }}>{won(p.price)}</div>
                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <button onClick={() => changeQty(p.id, -1)} style={qtyBtnStyle}>−</button>
                    <span style={{ fontSize: 12.5, fontWeight: 700, minWidth: 14, textAlign: "center" }}>{qty}</span>
                    <button onClick={() => changeQty(p.id, 1)} style={qtyBtnStyle}>+</button>
                  </div>
                </div>
              );
            })}
          </div>

          <input placeholder="메모 (선택)" value={form.memo} onChange={(e) => setForm({ ...form, memo: e.target.value })} style={{ ...inputStyle(), marginBottom: 12 }} />

          <div style={{ display: "flex", gap: 8 }}>
            <button onClick={() => { resetForm(); setShowForm(false); }} style={{ flex: 1, padding: "10px 0", borderRadius: 8, border: "1px solid #D3D1C7", background: "#fff", color: "#5F5E5A", fontWeight: 700, fontSize: 13, cursor: "pointer" }}>
              취소
            </button>
            <button onClick={submit} style={{ flex: 2, padding: "10px 0", borderRadius: 8, border: "none", background: "#2F6F4E", color: "#fff", fontWeight: 700, fontSize: 13, cursor: "pointer" }}>
              등록
            </button>
          </div>
        </div>
      )}

      {subscriptions.length === 0 && !showForm && (
        <div style={{ padding: "40px 0", textAlign: "center", color: "#888780", fontSize: 13 }}>
          등록된 정기배송이 없습니다.
        </div>
      )}

      <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
        {subscriptions.map((s) => (
          <SubscriptionRow
            key={s.id}
            subscription={s}
            customers={customers}
            products={products}
            updateSubscription={updateSubscription}
            removeSubscription={removeSubscription}
            askConfirm={askConfirm}
            fireToast={fireToast}
            cycleLabel={cycleLabel}
          />
        ))}
      </div>
    </div>
  );
}

function SubscriptionRow({ subscription: s, customers, products, updateSubscription, removeSubscription, askConfirm, fireToast, cycleLabel }) {
  const [editing, setEditing] = useState(false);
  const [postponeDays, setPostponeDays] = useState("3");
  const [form, setForm] = useState({
    name: s.recipient.name, phone: s.recipient.phone, address: s.recipient.address,
    cycleDays: String(s.cycleDays), nextDate: s.nextDate,
    totalOccurrences: s.totalOccurrences ? String(s.totalOccurrences) : "",
    cart: Object.fromEntries((s.items || []).map((it) => [it.productId, it.qty])),
    memo: s.memo || "",
  });

  const itemsText = (s.items || []).map((it) => `${products.find((p) => p.id === it.productId)?.name || "삭제된 상품"} x${it.qty}`).join(", ");
  const nextOccurrence = (s.occurrenceCount || 0) + 1;

  function startEdit() {
    setForm({
      name: s.recipient.name, phone: s.recipient.phone, address: s.recipient.address,
      cycleDays: String(s.cycleDays), nextDate: s.nextDate,
      totalOccurrences: s.totalOccurrences ? String(s.totalOccurrences) : "",
      cart: Object.fromEntries((s.items || []).map((it) => [it.productId, it.qty])),
      memo: s.memo || "",
    });
    setEditing(true);
  }

  function changeQty(productId, delta) {
    setForm((prev) => {
      const cart = { ...prev.cart };
      const next = (cart[productId] || 0) + delta;
      if (next <= 0) delete cart[productId];
      else cart[productId] = next;
      return { ...prev, cart };
    });
  }

  function saveEdit() {
    const items = Object.entries(form.cart || {}).map(([productId, qty]) => ({ productId, qty }));
    const cycleDays = Number(form.cycleDays);
    if (items.length === 0 || !cycleDays || cycleDays < 1 || !form.name.trim()) {
      fireToast("받는분 이름·상품·주기를 확인해주세요");
      return;
    }
    updateSubscription(s.id, {
      recipient: { ...s.recipient, name: form.name.trim(), phone: form.phone.trim(), address: form.address.trim() },
      cycleDays,
      nextDate: form.nextDate,
      items,
      memo: form.memo,
      totalOccurrences: form.totalOccurrences ? Number(form.totalOccurrences) : null,
    });
    setEditing(false);
    fireToast("정기배송 내용이 수정되었습니다");
  }

  function postpone() {
    const days = Number(postponeDays);
    if (!days || days < 1) return;
    const d = new Date(s.nextDate);
    d.setDate(d.getDate() + days);
    const pad = (n) => String(n).padStart(2, "0");
    const newDate = `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
    updateSubscription(s.id, { nextDate: newDate });
    fireToast(`다음 발송일을 ${newDate}로 미뤘습니다`);
  }

  if (editing) {
    return (
      <div style={{ background: "#fff", border: "1px solid #185FA5", borderRadius: 10, padding: 12 }}>
        <div style={{ fontSize: 12, fontWeight: 700, color: "#27500A", marginBottom: 8 }}>정기배송 수정</div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 8 }}>
          <input placeholder="받는분 이름" value={form.name} onChange={(e) => setForm({ ...form, name: e.target.value })} style={inputStyle()} />
          <input placeholder="연락처" value={form.phone} onChange={(e) => setForm({ ...form, phone: e.target.value })} style={inputStyle()} />
        </div>
        <input placeholder="주소" value={form.address} onChange={(e) => setForm({ ...form, address: e.target.value })} style={{ ...inputStyle(), marginBottom: 8 }} />
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 8 }}>
          <input type="number" min={1} placeholder="주기(일)" value={form.cycleDays} onChange={(e) => setForm({ ...form, cycleDays: e.target.value })} style={inputStyle()} />
          <input type="date" value={form.nextDate} onChange={(e) => setForm({ ...form, nextDate: e.target.value })} style={inputStyle()} />
        </div>
        <input type="number" min={1} placeholder="총 회차 (비우면 무제한)" value={form.totalOccurrences} onChange={(e) => setForm({ ...form, totalOccurrences: e.target.value })} style={{ ...inputStyle(), marginBottom: 8 }} />

        <div style={{ fontSize: 11.5, color: "#5F5E5A", marginBottom: 6 }}>상품</div>
        <div style={{ display: "flex", flexDirection: "column", gap: 6, marginBottom: 8 }}>
          {products.map((p) => {
            const qty = (form.cart || {})[p.id] || 0;
            return (
              <div key={p.id} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", border: "1px solid #E2E4DD", borderRadius: 8, padding: "6px 10px" }}>
                <span style={{ fontSize: 12 }}>{p.name}</span>
                <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                  <button onClick={() => changeQty(p.id, -1)} style={qtyBtnStyle}>−</button>
                  <span style={{ fontSize: 12, fontWeight: 700, minWidth: 14, textAlign: "center" }}>{qty}</span>
                  <button onClick={() => changeQty(p.id, 1)} style={qtyBtnStyle}>+</button>
                </div>
              </div>
            );
          })}
        </div>
        <input placeholder="메모" value={form.memo} onChange={(e) => setForm({ ...form, memo: e.target.value })} style={{ ...inputStyle(), marginBottom: 10 }} />

        <div style={{ display: "flex", gap: 8 }}>
          <button onClick={() => setEditing(false)} style={{ flex: 1, padding: "9px 0", borderRadius: 8, border: "1px solid #D3D1C7", background: "#fff", color: "#5F5E5A", fontWeight: 700, fontSize: 12, cursor: "pointer" }}>취소</button>
          <button onClick={saveEdit} style={{ flex: 2, padding: "9px 0", borderRadius: 8, border: "none", background: "#2F6F4E", color: "#fff", fontWeight: 700, fontSize: 12, cursor: "pointer" }}>저장</button>
        </div>
      </div>
    );
  }

  return (
    <div style={{ background: "#fff", border: "1px solid #E2E4DD", borderRadius: 10, padding: "12px 14px" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 6 }}>
        <div>
          <div style={{ fontWeight: 700, fontSize: 13 }}>{s.recipient.name} <span style={{ fontWeight: 400, color: "#888780", fontSize: 11 }}>{s.recipient.phone}</span></div>
          <div style={{ fontSize: 12, color: "#5F5E5A", marginTop: 2 }}>{itemsText}</div>
        </div>
        <label style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 11, color: "#5F5E5A", cursor: "pointer", flexShrink: 0 }}>
          <input type="checkbox" checked={s.active} onChange={() => updateSubscription(s.id, { active: !s.active })} />
          사용중
        </label>
      </div>

      <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 6, flexWrap: "wrap" }}>
        <span style={{ fontSize: 11, fontWeight: 700, color: "#27500A", background: "#EAF3DE", padding: "2px 8px", borderRadius: 20 }}>
          {s.totalOccurrences ? `다음: ${nextOccurrence}회차 / 총 ${s.totalOccurrences}회` : `다음: ${nextOccurrence}회차 (무제한)`}
        </span>
        {(s.occurrenceCount || 0) > 0 && (
          <span style={{ fontSize: 11, color: "#888780" }}>지금까지 {s.occurrenceCount}회 발송</span>
        )}
        {!s.active && (
          <span style={{ fontSize: 11, fontWeight: 700, color: "#A32D2D", background: "#FBE5E5", padding: "2px 8px", borderRadius: 20 }}>일시정지됨</span>
        )}
      </div>

      <div style={{ fontSize: 11.5, color: "#185FA5", fontWeight: 700, marginBottom: 8 }}>
        {cycleLabel(s.cycleDays)} · 다음 발송 {s.nextDate} 오전 9시
      </div>

      <div style={{ display: "flex", gap: 6, alignItems: "center", marginBottom: 8 }}>
        <input
          type="number"
          min={1}
          value={postponeDays}
          onChange={(e) => setPostponeDays(e.target.value)}
          style={{ width: 56, padding: "6px 8px", borderRadius: 8, border: "1px solid #D3D1C7", fontSize: 12 }}
        />
        <span style={{ fontSize: 11.5, color: "#5F5E5A" }}>일 미루기</span>
        <button onClick={postpone} style={{ border: "1px solid #185FA5", background: "#fff", color: "#185FA5", borderRadius: 8, padding: "5px 10px", fontSize: 11.5, fontWeight: 700, cursor: "pointer" }}>
          연기
        </button>
      </div>

      <div style={{ display: "flex", justifyContent: "flex-end", gap: 14 }}>
        <button onClick={startEdit} style={{ border: "none", background: "none", color: "#185FA5", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>수정</button>
        <button
          onClick={() => askConfirm(`${s.recipient.name}님의 정기배송을 완전히 취소(삭제)할까요?`, () => removeSubscription(s.id))}
          style={removeBtnStyle}
        >
          취소(삭제)
        </button>
      </div>
    </div>
  );
}

function ColumnTemplateEditor({ columns, defaultColumns, onSave, fireToast, saveLabel }) {
  const [draft, setDraft] = useState(columns);

  function updateCol(idx, value) {
    setDraft((prev) => prev.map((c, i) => (i === idx ? value : c)));
  }
  function removeCol(idx) {
    setDraft((prev) => prev.filter((_, i) => i !== idx));
  }
  function addCol() {
    setDraft((prev) => [...prev, ""]);
  }
  function save() {
    const cleaned = draft.map((c) => c.trim()).filter(Boolean);
    if (cleaned.length === 0) {
      fireToast("컬럼을 1개 이상 남겨주세요");
      return;
    }
    onSave(cleaned);
    fireToast("엑셀 양식이 저장되었습니다");
  }

  return (
    <div>
      <div style={{ display: "flex", flexDirection: "column", gap: 6, marginBottom: 10 }}>
        {draft.map((c, idx) => (
          <div key={idx} style={{ display: "flex", gap: 6 }}>
            <input value={c} onChange={(e) => updateCol(idx, e.target.value)} style={{ ...inputStyle(), flex: 1 }} />
            <button onClick={() => removeCol(idx)} style={{ border: "none", background: "none", color: "#A32D2D", fontSize: 18, cursor: "pointer", padding: "0 6px" }}>×</button>
          </div>
        ))}
      </div>
      <button onClick={addCol} style={{ width: "100%", border: "1px dashed #D3D1C7", background: "#fff", color: "#5F5E5A", borderRadius: 8, padding: "7px 0", fontSize: 12, cursor: "pointer", marginBottom: 10 }}>
        + 항목 추가
      </button>
      <div style={{ display: "flex", gap: 8 }}>
        <button onClick={() => setDraft(defaultColumns)} style={{ flex: 1, padding: "9px 0", borderRadius: 8, border: "1px solid #D3D1C7", background: "#fff", color: "#5F5E5A", fontWeight: 700, fontSize: 12, cursor: "pointer" }}>
          기본값으로
        </button>
        <button onClick={save} style={{ flex: 1, padding: "9px 0", borderRadius: 8, border: "none", background: "#2F6F4E", color: "#fff", fontWeight: 700, fontSize: 12, cursor: "pointer" }}>
          {saveLabel || "저장"}
        </button>
      </div>
    </div>
  );
}

function CourierSettingsTab({
  couriers, addCourier, updateCourier, removeCourier, exportCourierPickupExcel,
  smsTemplate, setSmsTemplate,
  orderTemplate, setOrderTemplate, customerTemplate, setCustomerTemplate, productTemplate, setProductTemplate,
  courierTemplates, setCourierTemplates,
  askConfirm, fireToast, onBack,
}) {
  const [templateDraft, setTemplateDraft] = useState(smsTemplate);
  const [newName, setNewName] = useState("");
  const [editingName, setEditingName] = useState(null);
  const [editValue, setEditValue] = useState("");
  const [pickupCourier, setPickupCourier] = useState(couriers[0] || "");
  const [editingCourierTemplate, setEditingCourierTemplate] = useState(null);

  function submitAdd() {
    if (!newName.trim()) {
      fireToast("택배사 이름을 입력해주세요");
      return;
    }
    addCourier(newName);
    setNewName("");
  }

  function startEdit(name) {
    setEditingName(name);
    setEditValue(name);
  }

  function submitEdit() {
    if (!editValue.trim()) return;
    updateCourier(editingName, editValue);
    setEditingName(null);
  }

  function saveCourierTemplate(courierName, cols) {
    setCourierTemplates((prev) => ({ ...prev, [courierName]: cols }));
  }

  return (
    <div>
      <button onClick={onBack} style={{ background: "none", border: "none", color: "#5F5E5A", fontSize: 13, cursor: "pointer", padding: 0, marginBottom: 14 }}>

      <h1 style={{ fontSize: 19, fontWeight: 700, margin: "2px 0 14px", letterSpacing: "-0.02em" }}>택배접수 양식 / 엑셀 양식 설정</h1>
      <p style={{ fontSize: 11.5, color: "#888780", margin: "0 0 16px" }}>
        택배사 목록과 발송 문구, 그리고 주문·고객·상품·택배사별 엑셀 양식의 컬럼을 직접 추가·삭제·이름변경 할 수 있어요.
      </p>

      <div style={{ display: "flex", gap: 8, marginBottom: 8 }}>
        <select value={pickupCourier} onChange={(e) => setPickupCourier(e.target.value)} style={{ ...inputStyle(), flex: 1 }}>
          {couriers.map((c) => (
            <option key={c} value={c}>{c}</option>
          ))}
        </select>
        <button
          onClick={() => exportCourierPickupExcel(pickupCourier)}
          style={{ flex: 1, padding: "0 10px", borderRadius: 10, border: "none", background: "#2F6F4E", color: "#fff", fontWeight: 700, fontSize: 12.5, cursor: "pointer" }}
        >
          📦 택배접수양식 다운로드
        </button>
      </div>
      <p style={{ fontSize: 11, color: "#888780", margin: "0 0 18px" }}>
        지금 "발송준비" 상태인 주문들을, 선택한 택배사의 엑셀 양식으로 받아요. 택배사마다 양식을 다르게 설정해둘 수 있어요.
      </p>

      <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 8 }}>발송 문구 기본값</div>
      <div style={{ background: "#fff", border: "1px solid #E2E4DD", borderRadius: 10, padding: 12, marginBottom: 20 }}>
        <p style={{ fontSize: 11, color: "#888780", margin: "0 0 8px" }}>
          송장번호를 입력하면 자동으로 채워질 기본 문구예요. <br />
          {"{appName} {name} {courier} {invoiceNo}"} 자리에 각각 앱이름·받는분 이름·택배사·송장번호가 자동으로 들어가요.

              <div style={{ marginTop: 12, paddingTop: 12, borderTop: "1px dashed #E2E4DD" }}>
                <ColumnTemplateEditor
                  columns={courierTemplates[c] || DEFAULT_COURIER_TEMPLATE}
                  defaultColumns={DEFAULT_COURIER_TEMPLATE}
                  onSave={(cols) => saveCourierTemplate(c, cols)}
                  fireToast={fireToast}
                  saveLabel="이 택배사 양식 저장"
                />
              </div>
            )}
          </div>
        ))}
      </div>

      <div style={{ display: "flex", gap: 8 }}>
        <input
          placeholder="새 택배사 이름 (예: 경동택배)"
          value={newName}
          onChange={(e) => setNewName(e.target.value)}
          onKeyDown={(e) => e.key === "Enter" && submitAdd()}
          style={{ ...inputStyle(), flex: 1 }}
        />
        <button onClick={submitAdd} style={{ border: "none", background: "#2F6F4E", color: "#fff", borderRadius: 8, padding: "0 16px", fontWeight: 700, fontSize: 13, cursor: "pointer" }}>추가</button>
      </div>
    </div>
  );
}

function IntegrationsTab({ integrations, updateIntegration, customMarketplaces, addCustomMarketplace, removeCustomMarketplace, askConfirm, fireToast, onBack }) {
  const [showForm, setShowForm] = useState(false);
  const [name, setName] = useState("");
  const [fieldLabels, setFieldLabels] = useState(["API 키"]);

  function addFieldRow() {
    setFieldLabels((prev) => [...prev, ""]);
  }

  function updateFieldRow(idx, value) {
    setFieldLabels((prev) => prev.map((f, i) => (i === idx ? value : f)));
  }

  function removeFieldRow(idx) {
    setFieldLabels((prev) => prev.filter((_, i) => i !== idx));
  }

  function submit() {
    const trimmedName = name.trim();
    const labels = fieldLabels.map((f) => f.trim()).filter(Boolean);
    if (!trimmedName) {
      fireToast("쇼핑몰 이름을 입력해주세요");
      return;
    }
    if (labels.length === 0) {
      fireToast("입력 항목을 1개 이상 추가해주세요");
      return;
    }
    addCustomMarketplace(trimmedName, labels);
    setName("");
    setFieldLabels(["API 키"]);
    setShowForm(false);
  }

  return (
    <div>
      <button onClick={onBack} style={{ background: "none", border: "none", color: "#5F5E5A", fontSize: 13, cursor: "pointer", padding: 0, marginBottom: 14 }}>
        ← HOME으로
      </button>
      <h1 style={{ fontSize: 19, fontWeight: 700, margin: "2px 0 14px", letterSpacing: "-0.02em" }}>쇼핑몰 연동</h1>
      <p style={{ fontSize: 11.5, color: "#888780", margin: "0 0 16px" }}>
        각 쇼핑몰 판매자센터에서 발급받은 API 키를 입력해두세요. 키를 저장해두면, 해당 쇼핑몰의 "주문 가져오기" 서버 연동이 완성되는 즉시 자동으로 연결돼요. 목록에 없는 쇼핑몰은 아래에서 직접 추가할 수 있어요.
      </p>

      {!showForm ? (
        <button onClick={() => setShowForm(true)} style={{ width: "100%", padding: "11px 0", borderRadius: 10, border: "none", background: "#2F6F4E", color: "#fff", fontWeight: 700, fontSize: 13, cursor: "pointer", marginBottom: 16 }}>
          ＋ 새 쇼핑몰 추가
        </button>
      ) : (
        <div style={{ background: "#fff", border: "1px solid #185FA5", borderRadius: 10, padding: 12, marginBottom: 16 }}>
          <div style={{ fontSize: 12, fontWeight: 700, color: "#27500A", marginBottom: 8 }}>새 쇼핑몰 등록</div>
          <input placeholder="쇼핑몰 이름 (예: 위메프)" value={name} onChange={(e) => setName(e.target.value)} style={{ ...inputStyle(), marginBottom: 10 }} />

          <div style={{ fontSize: 11.5, color: "#5F5E5A", marginBottom: 6 }}>이 쇼핑몰을 연동할 때 필요한 입력 항목</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 6, marginBottom: 8 }}>
            {fieldLabels.map((label, idx) => (
              <div key={idx} style={{ display: "flex", gap: 6 }}>
                <input
                  placeholder="예: 판매자 ID, API 시크릿 등"
                  value={label}
                  onChange={(e) => updateFieldRow(idx, e.target.value)}
                  style={{ ...inputStyle(), flex: 1 }}
                />
                {fieldLabels.length > 1 && (
                  <button onClick={() => removeFieldRow(idx)} style={{ border: "none", background: "none", color: "#A32D2D", fontSize: 18, cursor: "pointer", padding: "0 4px" }}>×</button>
                )}
              </div>
            ))}
          </div>
          <button onClick={addFieldRow} style={{ border: "1px dashed #D3D1C7", background: "#fff", color: "#5F5E5A", borderRadius: 8, padding: "6px 0", width: "100%", fontSize: 12, cursor: "pointer", marginBottom: 12 }}>
            + 입력 항목 추가
          </button>

          <div style={{ display: "flex", gap: 8 }}>
            <button onClick={() => setShowForm(false)} style={{ flex: 1, padding: "9px 0", borderRadius: 8, border: "1px solid #D3D1C7", background: "#fff", color: "#5F5E5A", fontWeight: 700, fontSize: 12, cursor: "pointer" }}>취소</button>
            <button onClick={submit} style={{ flex: 2, padding: "9px 0", borderRadius: 8, border: "none", background: "#2F6F4E", color: "#fff", fontWeight: 700, fontSize: 12, cursor: "pointer" }}>등록</button>
          </div>
        </div>
      )}

      <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
        {MARKETPLACES.map((m) => (
          <IntegrationCard key={m.id} marketplace={m} value={integrations[m.id] || {}} updateIntegration={updateIntegration} fireToast={fireToast} />
        ))}
        {customMarketplaces.map((m) => (
          <IntegrationCard
            key={m.id}
            marketplace={m}
            value={integrations[m.id] || {}}
            updateIntegration={updateIntegration}
            fireToast={fireToast}
            onDelete={() => askConfirm(`${m.name} 쇼핑몰을 삭제할까요?`, () => removeCustomMarketplace(m.id))}
          />
        ))}
      </div>
    </div>
  );
}

function IntegrationCard({ marketplace, value, updateIntegration, fireToast, onDelete }) {
  const [form, setForm] = useState(() => {
    const initial = {};
    marketplace.fields.forEach((f) => (initial[f.key] = value[f.key] || ""));
    return initial;
  });

  const hasAnyValue = marketplace.fields.some((f) => (value[f.key] || "").trim());
  const filledNow = marketplace.fields.every((f) => (form[f.key] || "").trim());

  function save() {
    updateIntegration(marketplace.id, form);
    fireToast(`${marketplace.name} 연동 정보가 저장되었습니다`);
  }

  function fetchOrders() {
    fireToast(`${marketplace.name} 주문 가져오기는 서버(Cloud Functions) 연동이 완성되면 사용할 수 있어요. 키는 이미 저장해두셨으니 연동 작업만 남았어요.`);
  }

  return (
    <div style={{ background: "#fff", border: "1px solid #E2E4DD", borderRadius: 10, padding: 12 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <span style={{ width: 8, height: 8, borderRadius: "50%", background: marketplace.color, display: "inline-block" }} />
          <span style={{ fontWeight: 700, fontSize: 13 }}>{marketplace.name}</span>
          {marketplace.custom && (
            <span style={{ fontSize: 9.5, color: "#888780" }}>(직접 추가)</span>
          )}
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          {marketplace.ready ? (
            <span style={{ fontSize: 10, fontWeight: 700, color: hasAnyValue ? "#27500A" : "#888780", background: hasAnyValue ? "#EAF3DE" : "#F1F2EC", padding: "2px 8px", borderRadius: 20 }}>
              {hasAnyValue ? "키 저장됨" : "공식 API 가능"}
            </span>
          ) : (
            <span style={{ fontSize: 10, fontWeight: 700, color: "#A32D2D", background: "#FBE5E5", padding: "2px 8px", borderRadius: 20 }}>
              API 확인 필요
            </span>
          )}
          {onDelete && (
            <button onClick={onDelete} style={{ border: "none", background: "none", color: "#A32D2D", fontSize: 11, cursor: "pointer", padding: 0 }}>삭제</button>
          )}
        </div>
      </div>

      {!marketplace.ready && (
        <p style={{ fontSize: 11, color: "#888780", margin: "0 0 8px" }}>
          이 쇼핑몰은 일반 판매자용 공개 API를 아직 확인하지 못했어요. 메모만 남겨두시면 추후 확인되는 대로 연동해드릴게요.
        </p>
      )}

      <div style={{ display: "flex", flexDirection: "column", gap: 6, marginBottom: 8 }}>
        {marketplace.fields.map((f) => (
          <input
            key={f.key}
            placeholder={f.label}
            value={form[f.key]}
            onChange={(e) => setForm({ ...form, [f.key]: e.target.value })}
            style={inputStyle()}
          />
        ))}
      </div>

      <div style={{ display: "flex", gap: 8 }}>
        <button onClick={save} disabled={!filledNow} style={{ flex: 1, padding: "8px 0", borderRadius: 8, border: "none", background: filledNow ? "#2F6F4E" : "#D3D1C7", color: "#fff", fontWeight: 700, fontSize: 12, cursor: filledNow ? "pointer" : "not-allowed" }}>
          저장
        </button>
        {marketplace.ready && (
          <button onClick={fetchOrders} disabled={!hasAnyValue} style={{ flex: 1, padding: "8px 0", borderRadius: 8, border: "1px solid #185FA5", background: "#fff", color: hasAnyValue ? "#185FA5" : "#D3D1C7", fontWeight: 700, fontSize: 12, cursor: hasAnyValue ? "pointer" : "not-allowed" }}>
            주문 가져오기
          </button>
        )}
      </div>
    </div>
  );
}

function VendorHubTab({ vendors, invoices, products, onManageVendors, onEditSupplier, onAddInvoice, onUpdateInvoice, onRemoveInvoice, onDownloadInvoice, onGeneratePeriodSheet, invoiceInputRef2, handleInvoiceFileUpload, askConfirm }) {
  const [q, setQ] = useState("");
  const [dateQ, setDateQ] = useState("");
  const [editor, setEditor] = useState(null); // null | {mode:"new"|"edit", invoice}
  const [periodVendorId, setPeriodVendorId] = useState("");
  const [periodStart, setPeriodStart] = useState("");
  const [periodEnd, setPeriodEnd] = useState("");

  function applyPeriodPreset(months) {
    const end = new Date();
    const start = new Date();
    start.setMonth(start.getMonth() - months);
    const fmt = (d) => `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
    setPeriodStart(fmt(start));
    setPeriodEnd(fmt(end));
  }

  const invSorted = [...invoices].sort((a, b) => (a.date < b.date ? 1 : a.date > b.date ? -1 : 0));
  const isInvoiceSearching = q.trim() !== "" || dateQ.trim() !== "";
  // 2일 지난 거래명세서는 화면에서만 안 보이게 함 (데이터는 그대로 있고, 검색하면 다시 나옴)
  const twoDaysAgo = new Date();
  twoDaysAgo.setDate(twoDaysAgo.getDate() - 2);
  const twoDaysAgoStr = `${twoDaysAgo.getFullYear()}-${String(twoDaysAgo.getMonth() + 1).padStart(2, "0")}-${String(twoDaysAgo.getDate()).padStart(2, "0")}`;
  const hiddenOldCount = isInvoiceSearching ? 0 : invSorted.filter((inv) => (inv.date || "") < twoDaysAgoStr).length;
  const filtered = invSorted.filter((inv) => {
    const s = q.trim().toLowerCase();
    const nameOk = !s || (inv.vendorName || "").toLowerCase().includes(s);
    const dateOk = !dateQ || (inv.date || "").includes(dateQ);
    if (!isInvoiceSearching && (inv.date || "") < twoDaysAgoStr) return false; // 검색 중이 아니면 오래된 건 숨김
    return nameOk && dateOk;
  });

  const invTotal = (inv) => (inv.items || []).reduce((s, it) => s + (it.price || 0) * (it.qty || 0), 0);

  if (editor) {
    return <InvoiceEditor mode={editor.mode} initial={editor.invoice} vendors={vendors} products={products}
      onCancel={() => setEditor(null)}
      onSave={(inv) => { if (editor.mode === "edit") onUpdateInvoice(editor.invoice.id, inv); else onAddInvoice(inv); setEditor(null); }} />;
  }

  return (
    <div>
      <h1 style={{ fontSize: 19, fontWeight: 700, margin: "2px 0 12px", letterSpacing: "-0.02em" }}>업체 관리</h1>

      <div style={{ display: "flex", gap: 6, marginBottom: 10 }}>
        <button onClick={onManageVendors} style={{ flex: 1, padding: "11px 0", borderRadius: 9, border: "1px solid #854F0B", background: "#FAEEDA", color: "#854F0B", fontWeight: 700, fontSize: 13, cursor: "pointer" }}>업체(거래처) 등록·관리</button>
        <button onClick={onEditSupplier} style={{ flex: 1, padding: "11px 0", borderRadius: 9, border: "1px solid #D3D1C7", background: "#fff", color: "#5F5E5A", fontWeight: 700, fontSize: 13, cursor: "pointer" }}>공급자 정보 설정</button>
      </div>

      <div style={{ display: "flex", gap: 6, marginBottom: 12 }}>
        <button onClick={() => setEditor({ mode: "new", invoice: null })} style={{ flex: 1, padding: "11px 0", borderRadius: 9, border: "none", background: "#2F6F4E", color: "#fff", fontWeight: 700, fontSize: 13, cursor: "pointer" }}>+ 거래명세서 작성</button>
        <button onClick={() => invoiceInputRef2.current?.click()} style={{ flex: 1, padding: "11px 0", borderRadius: 9, border: "1px solid #185FA5", background: "#fff", color: "#185FA5", fontWeight: 700, fontSize: 13, cursor: "pointer" }}>명세서 업로드</button>
        <input ref={invoiceInputRef2} type="file" accept=".xlsx,.xls,.csv" onChange={handleInvoiceFileUpload} style={{ display: "none" }} />
      </div>

      <div style={{ fontSize: 10.5, color: "#888780", marginBottom: 14, lineHeight: 1.6, background: "#F7F8F4", borderRadius: 8, padding: "8px 10px" }}>
        업체 주문을 등록하면 거래명세서가 자동으로 여기 저장돼요. 직접 작성·수정·삭제도 가능하고, 업체명·날짜로 검색해 다운로드/업로드할 수 있어요. (주문서 작성은 하단 "+" 또는 주문 탭에서 통합으로 합니다.)
      </div>

      <div style={{ border: "1px solid #E2E4DD", borderRadius: 10, padding: "12px 14px", marginBottom: 16, background: "#FAFAF7" }}>
        <div style={{ fontSize: 13, fontWeight: 700, color: "#1B2430", marginBottom: 4 }}>📅 업체별 기간 정산서 만들기</div>
        <div style={{ fontSize: 10.5, color: "#888780", marginBottom: 10, lineHeight: 1.5 }}>
          업체를 고르고 기간을 정하면, 그 기간 동안의 거래명세서를 전부 합쳐서 정산서 한 장으로 다운로드해요.
        </div>

        <label style={{ fontSize: 11.5, color: "#5F5E5A", fontWeight: 700 }}>업체 선택</label>
        <select
          value={periodVendorId}
          onChange={(e) => setPeriodVendorId(e.target.value)}
          style={{ width: "100%", padding: "9px 10px", borderRadius: 8, border: "1px solid #D3D1C7", fontSize: 13, margin: "4px 0 10px", background: "#fff" }}
        >
          <option value="">— 업체를 선택하세요 —</option>
          {vendors.map((v) => (
            <option key={v.id} value={v.id}>{v.name}</option>
          ))}
        </select>

        <label style={{ fontSize: 11.5, color: "#5F5E5A", fontWeight: 700 }}>기간</label>
        <div style={{ display: "flex", alignItems: "center", gap: 6, margin: "4px 0 8px" }}>
          <input type="date" value={periodStart} onChange={(e) => setPeriodStart(e.target.value)} style={{ flex: 1, padding: "8px 8px", borderRadius: 8, border: "1px solid #D3D1C7", fontSize: 12.5 }} />
          <span style={{ color: "#888780", fontSize: 12 }}>~</span>
          <input type="date" value={periodEnd} onChange={(e) => setPeriodEnd(e.target.value)} style={{ flex: 1, padding: "8px 8px", borderRadius: 8, border: "1px solid #D3D1C7", fontSize: 12.5 }} />
        </div>

        <div style={{ display: "flex", gap: 6, marginBottom: 12 }}>
          <button onClick={() => applyPeriodPreset(1)} style={quickPeriodBtnStyle}>최근 1개월</button>
          <button onClick={() => applyPeriodPreset(6)} style={quickPeriodBtnStyle}>최근 6개월</button>
          <button onClick={() => applyPeriodPreset(12)} style={quickPeriodBtnStyle}>최근 1년</button>
        </div>

        <button
          onClick={() => onGeneratePeriodSheet(periodVendorId, periodStart, periodEnd)}
          style={{ width: "100%", padding: "11px 0", borderRadius: 9, border: "none", background: "#185FA5", color: "#fff", fontWeight: 700, fontSize: 13, cursor: "pointer" }}
        >
          ⬇ 정산서 다운로드
        </button>
      </div>

      <div style={{ fontSize: 12, fontWeight: 700, color: "#854F0B", marginBottom: 8 }}>거래명세서 검색</div>
      <div style={{ display: "flex", gap: 6, marginBottom: 8 }}>
        <div style={{ flex: 1.5, display: "flex", alignItems: "center", gap: 6, background: "#fff", border: "1px solid #E2E4DD", borderRadius: 10, padding: "8px 12px" }}>
          <span style={{ color: "#888780" }}>🔍</span>
          <input value={q} onChange={(e) => setQ(e.target.value)} placeholder="업체명" style={{ flex: 1, border: "none", outline: "none", fontSize: 13 }} />
        </div>
        <input type="date" value={dateQ} onChange={(e) => setDateQ(e.target.value)} style={{ flex: 1, border: "1px solid #E2E4DD", borderRadius: 10, padding: "8px 10px", fontSize: 12.5, color: "#5F5E5A" }} />
      </div>
      {(q || dateQ) && (
        <button onClick={() => { setQ(""); setDateQ(""); }} style={{ border: "none", background: "none", color: "#185FA5", fontSize: 11.5, fontWeight: 700, cursor: "pointer", marginBottom: 8 }}>검색 초기화</button>

      {hiddenOldCount > 0 && (
        <div style={{ fontSize: 10.5, color: "#888780", marginBottom: 8 }}>
          (2일 지난 {hiddenOldCount}건은 화면에서 숨겨져 있어요. 업체명이나 날짜로 검색하면 찾을 수 있어요)
        </div>
      )}

      <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
        {filtered.length === 0 && <div style={{ padding: "36px 0", textAlign: "center", color: "#888780", fontSize: 13 }}>거래명세서가 없습니다. "거래명세서 작성"으로 만들거나, 업체 주문을 등록하면 자동 생성돼요.</div>}
        {filtered.map((inv) => (
          <div key={inv.id} style={{ background: "#fff", border: "1px solid #E2E4DD", borderLeft: "4px solid #2F6F4E", borderRadius: 10, padding: "12px 14px" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 6 }}>
              <div>
                <div style={{ fontWeight: 700, fontSize: 14 }}>{inv.vendorName}</div>
                <div style={{ fontSize: 11.5, color: "#888780", marginTop: 2 }}>{inv.date} · 품목 {inv.items?.length || 0}개 · {won(invTotal(inv))}</div>
              </div>

            <div style={{ fontSize: 11.5, color: "#5F5E5A", marginBottom: 10, lineHeight: 1.5 }}>
              {(inv.items || []).slice(0, 3).map((it) => `${it.name} ${it.qty}${it.unit || ""}`).join(", ")}{(inv.items || []).length > 3 ? " 외" : ""}
            </div>
            <div style={{ display: "flex", gap: 6 }}>
              <button onClick={() => onDownloadInvoice(inv)} style={{ flex: 1.3, padding: "7px 0", borderRadius: 7, border: "none", background: "#2F6F4E", color: "#fff", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>다운로드</button>
