      if (activeRef.current && phaseRef.current === 'idle') setTimeout(() => beginListening(), 150);
    } else {
      // 눌러 말하기: 지금 듣던 것 멈추고 대기
      stopRec(); stopBargeIn();
      clearTimeout(accumTimerRef.current);
      setPhaseSync('idle');
    }
  }

  // ★ v20: 소음 억제 — 권한·오디오모드만 확보하고 마이크는 즉시 놓아줌
  //  (v19에서 마이크를 붙잡아 인식이 안 되던 문제 수정. 이제 인식과 충돌 없음)
  async function primeNoiseSuppression() {
    try {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) return;
      const s = await navigator.mediaDevices.getUserMedia({
        audio: { noiseSuppression: true, echoCancellation: true, autoGainControl: true },
      });
      // 즉시 트랙 정지 → SpeechRecognition가 마이크를 온전히 쓸 수 있음
      s.getTracks().forEach(t => t.stop());
    } catch (e) { /* 권한 거부·미지원 — 무시, 인식 정상 동작 */ }
  }
  function stopNoiseSuppression() {
    try { if (audioStreamRef.current) audioStreamRef.current.getTracks().forEach(t => t.stop()); } catch (e) {}
    audioStreamRef.current = null;
  }

  // 마운트 시 자동 시작
  React.useEffect(() => {
    activeRef.current = true;
    // ★ v28: 조비서 팝업이 열리는 순간(마운트) 자동으로 음성 인식 시작 — 마이크를 다시 누를 필요 없음.
    //  (배경 상시대기 웨이크워드는 꺼둔 상태라 팝업 닫혀 있을 땐 마이크가 켜지지 않음 → '디릭디릭' 재발 없음)
    let t;
    primeNoiseSuppression().finally(() => {
      t = setTimeout(() => { if (activeRef.current) beginListening(); }, 400);
    });
    return () => {
      activeRef.current = false;
      clearTimeout(t);
      stopRec();
      stopBargeIn();                       // ★ v23: 끼어들기 감지기 정리
      clearTimeout(accumTimerRef.current);  // ★ v23: 누적 타이머 정리
      accumBufRef.current = '';
      stopNoiseSuppression();
      window.speechSynthesis && window.speechSynthesis.cancel();
      clearTimeout(ttsTimerRef.current);
      clearTimeout(silenceTimerRef.current);
      clearInterval(countdownRef.current);
    };
  }, []);

  // ★ v8: 삼성 prefix-cascade 반복 제거 (node 9케이스 검증 완료)
  //  "주문 주문 창 주문 창 열어 주문 창 열어 줘" → "주문 창 열어 줘"
  function dedupCascade(s) {
    if (!s) return '';
    let t = s.replace(/\s+/g, ' ').trim();
    // 1) 연속 중복 단어 제거: "오늘 오늘 오늘" → "오늘"
    t = t.replace(/(\S+)(?:\s+\1)+/g, '$1');
    const toks = t.split(' ');
    if (toks.length < 2) return t;
    // 2) prefix-cascade 제거: 첫 단어 반복 시 가장 긴(완전한) 구간 선택
    const first = toks[0];
    const idxs = [];
    for (let i = 0; i < toks.length; i++) if (toks[i] === first) idxs.push(i);
    if (idxs.length >= 2) {
      let best = '';
      for (let k = 0; k < idxs.length; k++) {
        const end = (k+1 < idxs.length) ? idxs[k+1] : toks.length;
        const seg = toks.slice(idxs[k], end).join(' ');
        if (seg.length > best.length) best = seg;
      }
      return best;
    }
    return t;
  }

  // ★ v17: 인식 후보 점수 — 등록된 이름·상품·명령어에 잘 맞을수록 높음
  function scoreTranscript(txt) {
    const t = (txt || '').replace(/\s/g, '');
    if (!t) return -1;
    let score = 0;
    const names = [];
    (customers || []).forEach(c => { if (c && c.name) names.push(String(c.name).trim()); });
    (vendors || []).forEach(v => { if (v && v.name) names.push(String(v.name).trim()); });
    // 정확히 포함된 이름(+4)을 유사매칭(+3)보다 우선 → 깨끗한 후보 선택
    const hasExactName = names.some(n => n.length >= 2 && t.includes(n.replace(/\s/g, '')));
    if (hasExactName) score += 4;
    else if (matchName(txt, names)) score += 3;
    (products || []).forEach(p => { if (p && p.name && t.includes(p.name.replace(/\s/g, ''))) score += 2; });
    if (/주문|발송|고객|업체|배송|상품|등록|보여|알려|오늘|미발송|목록|정보|접수|취소|검색/.test(t)) score += 1;
    return score;
  }
  // ★ v17: 여러 인식 후보 중 앱 데이터에 가장 잘 맞는 것 선택 (오인식 보정)
  function pickBestTranscript(primary, alts) {
    if (!alts || alts.length <= 1) return primary;
    let best = primary, bestScore = scoreTranscript(primary);
    for (const a of alts) {
      const s = scoreTranscript(a);
      if (s > bestScore) { bestScore = s; best = dedupCascade(a); }
    }
    return best;
  }

  // ★ v23: 끝까지 듣기 — 한 번에 다 못 말해도 끊지 않고 잠깐 더 기다렸다가 합쳐서 처리
  //  (주문 대화 중에만 적용 — 조회·이동은 바로 반응)
  const ACCUM_MS = 1600;  // 이 시간(ms)만큼 침묵하면 그때 말 끝난 것으로 보고 처리
  function isTerminalUtterance(s) {
    const t = (s || '').replace(/\s/g, '');
    if (/등록|저장|확정|취소|그만|관둬|관두|됐어|됐다|처음부터|다시주문|리셋/.test(t)) return true;
    if (/^(응|네|예|그래|맞아|맞아요|맞습니다|좋아|오케이|오케|아니|아니요|아니야)$/.test(t)) return true;
    return false;
  }
  function collectSpeech(text) {
    accumBufRef.current = (accumBufRef.current ? accumBufRef.current + ' ' : '') + text;
    const buf = accumBufRef.current.trim();
    setInterim(buf);
    // 확실한 종료 명령(등록/취소/응/아니 등)은 기다리지 않고 즉시 처리
    if (isTerminalUtterance(text)) { flushCollected(); return; }
    // 더 말할 수 있게 잠깐 더 듣기 — 침묵이 이어지면 타이머가 마무리
    clearTimeout(accumTimerRef.current);
    accumTimerRef.current = setTimeout(() => { flushCollected(); }, ACCUM_MS);
    setPhaseSync('listening');
    setTimeout(() => { if (activeRef.current && phaseRef.current === 'listening') beginListening(); }, 100);
  }
  function flushCollected() {
    clearTimeout(accumTimerRef.current);
    const full = (accumBufRef.current || '').trim();
    accumBufRef.current = '';
    stopRec();   // 마무리 — 열려있던 듣기 세션 정리
    if (full) processUserSpeech(full);
    else if (activeRef.current && phaseRef.current === 'listening') beginListening();
  }
  // 인식된 발화 라우팅 — 주문 대화 중이면 끝까지 듣기(누적), 그 외엔 즉시 처리
  function routeCapturedSpeech(text) {
    if (orderModeRef.current) collectSpeech(text);
    else processUserSpeech(text);
  }

  // ★ v23: 끼어들기(barge-in) — AI가 말하는 도중 사용자가 말하면 TTS를 멈추고 바로 듣기
  function isEchoOfSpoken(heard, spoken) {
    const h = (heard || '').replace(/\s/g, '');
    const s = (spoken || '').replace(/\s/g, '');
    if (!h) return true;
    if (!s) return false;
    if (s.includes(h)) return true;         // 방금 말한 문장에 그대로 들어있으면 에코
    let hit = 0; for (const ch of h) if (s.includes(ch)) hit++;
    return hit / h.length > 0.7;            // 대부분 겹치면 에코로 간주
  }
  function startBargeIn() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR || !activeRef.current) return;
    if (!autoListenRef.current) return;   // ★ v25: 눌러 말하기 모드에선 말하는 중 마이크 안 켬(소음 방지)
    stopBargeIn();
    try {
      const rec = new SR();
      rec.lang = 'ko-KR'; rec.continuous = false; rec.interimResults = true; rec.maxAlternatives = 1;
      let fired = false;
      rec.onresult = (e) => {
        if (fired || bargeRecRef.current !== rec) return;
        let txt = '';
        for (let i = 0; i < e.results.length; i++) txt += e.results[i][0].transcript;
        txt = txt.trim();
        if ((txt.match(/[가-힣A-Za-z]/g) || []).length < 2) return;   // 잡음 무시
        if (isEchoOfSpoken(txt, speakTextRef.current)) return;          // 내 TTS 에코 무시
        fired = true;
        // 사용자가 끼어듦 → TTS 즉시 중단하고 정식 듣기로 전환(이어 말하면 누적됨)
        try { window.speechSynthesis && window.speechSynthesis.cancel(); } catch (_) {}
        stopBargeIn();
        clearTimeout(ttsTimerRef.current);
        setPhaseSync('idle');
        setTimeout(() => { if (activeRef.current) beginListening(); }, 60);
      };
      rec.onerror = () => {};
      rec.onend = () => {};
      bargeRecRef.current = rec;
      rec.start();
    } catch (e) { bargeRecRef.current = null; }
  }
  function stopBargeIn() {
    const r = bargeRecRef.current; bargeRecRef.current = null;
    if (r) { try { r.abort(); } catch (e) {} try { r.stop(); } catch (e) {} }
  }

  // ★ v8: continuous=false — 한 발화당 한 세션 (삼성 브라우저 안정)
  //  삼성은 continuous=true에서 중간결과를 각각 final로 발생 → 반복 원인
  //  false로 하면 한 발화 끝에 깨끗한 결과 1개만 나옴
  function beginListening() {
    if (!activeRef.current) return;
    if (phaseRef.current === 'thinking' || phaseRef.current === 'speaking') return;
    clearInterval(countdownRef.current);
    setRetryCountdown(0);
    stopBargeIn();     // ★ v23: 정식 듣기 시작 전 끼어들기 감지기 정리(중복 마이크 방지)
    stopRec();
    setPhaseSync('listening');
    setInterim('');

    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) {
      setLastAI('Chrome/삼성인터넷 브라우저에서 사용해주세요.');
      return;
    }
    const rec = new SR();
    rec.lang = 'ko-KR';
    rec.continuous = false;      // ★ v8: 삼성 안정 — 반복 원천 차단
    rec.interimResults = true;   // 실시간 표시용
    rec.maxAlternatives = 5;     // ★ v17: 후보 여러 개 → 앱 데이터에 맞는 것 선택

    const myId = ++recIdRef.current;
    const isStale = () => recIdRef.current !== myId;

    let finalText = '';
    let finalAlts = [];   // ★ v17: 마지막 확정 결과의 인식 후보들

    rec.onresult = (e) => {
      if (isStale()) return;
      // ★ v8: 매번 e.results 전체를 새로 조립 (누적 금지 = 반복 차단)
      let finals = '';
      let interim = '';
      for (let i = 0; i < e.results.length; i++) {
        if (e.results[i].isFinal) {
          finals += e.results[i][0].transcript + ' ';
          // ★ v17: 이 확정 결과의 후보들 수집
          const alts = [];
          for (let j = 0; j < e.results[i].length; j++) alts.push(e.results[i][j].transcript);
          finalAlts = alts;
        } else {
          interim += e.results[i][0].transcript;
        }
      }
      finalText = dedupCascade(finals.trim());
      const disp = dedupCascade((finals + interim).trim());
      setInterim(disp);
    };

    rec.onerror = (e) => {
      if (isStale() || !activeRef.current) return;
      if (e.error === 'aborted' || e.error === 'not-allowed') return;
      if (e.error === 'no-speech') return;  // onend가 처리
      // ★ v19: 마이크 점유 충돌(audio-capture)이면 소음억제 스트림을 풀어 마이크 양보 후 재시작
      if (e.error === 'audio-capture' && audioStreamRef.current) {
        nsDisabledRef.current = true;
        stopNoiseSuppression();
        setTimeout(() => { if (!isStale() && activeRef.current && phaseRef.current === 'listening') beginListening(); }, 400);
        return;
      }
      // network 등 — 조용히 대기 (자동 연속 재시작 안 함 = 피링 방지)
    };

    rec.onend = () => {
      if (isStale() || !activeRef.current) return;
      // 삼성: onend가 onresult보다 먼저 올 수 있어 120ms 대기
      setTimeout(() => {
        if (isStale() || !activeRef.current) return;
        // ★ v17: 후보 중 앱 데이터에 가장 잘 맞는 것 선택 (오인식 보정)
        const text = pickBestTranscript(dedupCascade(finalText.trim()), finalAlts);
        finalText = ''; finalAlts = [];
        if (text && phaseRef.current === 'listening') {
          silenceCountRef.current = 0;   // ★ v25: 말이 들어오면 무음 카운터 초기화
          routeCapturedSpeech(text);  // ★ v23: 주문 대화면 누적(끝까지 듣기), 아니면 즉시 처리
        } else if (phaseRef.current === 'listening') {
          // ★ v23: 주문 중 누적 버퍼에 내용이 있으면 아직 이어 말할 수 있으니 계속 듣기
          //  (마무리는 collectSpeech가 건 침묵 타이머가 담당 — 사용자 말을 중간에 끊지 않음)
          if (orderModeRef.current && (accumBufRef.current || '').trim()) {
            setTimeout(() => {
              if (!isStale() && activeRef.current && phaseRef.current === 'listening') beginListening();
            }, 300);
          } else {
            // ★ v25: 시끄러운 곳 "디릭디릭" 방지 — 연속 무음이 쌓이면(또는 자동듣기 꺼짐)
            //  자동 재시작을 멈추고 대기(idle)로. 사용자가 "다시 듣기"를 누르면 재개.
            silenceCountRef.current += 1;
            // ★ v33: 농장 소음 환경에서 대화가 조기에 끊기지 않도록 무음 제한치 완화
            //  (주문 대화 중엔 더 오래 기다림). 자동대화 ON일 때만 재시작.
            const limit = orderModeRef.current ? 12 : 7;
            if (!autoListenRef.current || silenceCountRef.current >= limit) {
              setPhaseSync('idle');
            } else {
              setTimeout(() => {
                if (!isStale() && activeRef.current && phaseRef.current === 'listening') beginListening();
              }, 800);
            }
          }
        }
      }, 120);
    };

    recRef.current = rec;
    try {
      rec.start();
    } catch(e) {
      recIdRef.current++;
      setPhaseSync('idle');
      // ★ v26: 시작 실패 시 자동 듣기일 때만 재시도. 눌러 말하기면 대기.
      setTimeout(() => { if (activeRef.current && autoListenRef.current) beginListening(); }, 1000);
    }
  }

  function stopRec() {
    clearTimeout(silenceTimerRef.current);
    recIdRef.current++;  // 현재 rec ID 무효화 → stale 콜백 즉시 차단
    try { recRef.current && recRef.current.abort(); } catch(e) {}
    try { recRef.current && recRef.current.stop(); } catch(e) {}
    recRef.current = null;
  }

  // ★ v9: 화면 이동 의도 감지 확장 (node 23케이스 검증 완료)
  //  정기배송을 배송보다 먼저 검사 — "정기배송관리"가 "배송관리"에 오분류 방지
  function detectNavIntent(text) {
    const t = (text||'').replace(/\s/g,'');
    if (/새주문|주문입력|주문추가|주문등록|주문작성|주문넣|주문창|주문열|주문받|주문쓰/.test(t)) return 'goNew';
    if (/주문목록|주문리스트|주문현황|주문보여|주문내역|주문확인|주문조회/.test(t)) return 'goOrders';
    if (/고객관리|고객목록|고객리스트|고객보여|고객명단|고객조회|거래처/.test(t)) return 'goCustomers';
    if (/상품관리|상품목록|상품보여|상품리스트|상품조회|상품등록/.test(t)) return 'goProducts';
    if (/정기배송|구독관리|정기주문/.test(t)) return 'goSubscriptions';
    if (/배송관리|배송현황|배송보여|배송추적|배송조회|택배/.test(t)) return 'goDelivery';
    if (/홈화면|홈으로|대시보드|처음화면|메인화면|첫화면/.test(t)) return 'goHome';
    return null;
  }

  // ★ v9: 이동 명령의 안내 문구 (AI 없이 직접 응답)
  function navReply(action) {
    const map = { goHome:'홈 화면', goOrders:'주문 목록', goNew:'주문 입력 화면',
      goCustomers:'고객 관리', goProducts:'상품 관리', goDelivery:'배송 관리',
      goSubscriptions:'정기배송 관리' };
    return (map[action] || '해당 화면') + '으로 이동할게요';
  }

  // ★ v10: API 없이 로컬 데이터로 즉답 (할당량 초과에도 작동, node 20케이스 검증)
  //  이름·복합조건 질문은 null 반환 → Gemini로 넘김
  function quickStatAnswer(text, ctx) {
    const t = (text||'').replace(/\s/g,'');
    const asksCount = /몇|개수|건수|얼마나|얼만|수는|몇개|몇건|몇명/.test(t);
    if (!asksCount) return null;
    if (/누구|누가|언제|어디|무엇|뭐|중에|중에서|별로|이름/.test(t)) return null;
    // ★ v62: 미발송(입금대기+결제완료+발송준비) 합산 / 배송중(발송완료)
    if (/미발송|안보낸|발송안한|안나간/.test(t)) {
      const n = (ctx.pending || 0) + (ctx.pendingPay || 0) + (ctx.ready || 0);
      return `미발송건은 입금대기 ${ctx.pending}건, 결제완료 ${ctx.pendingPay}건, 발송준비 ${ctx.ready}건 포함해서 총 ${n}건이에요`;
    }
    if (/배송중/.test(t)) return `배송중(발송완료)은 ${ctx.shipped}건이에요`;
    if (/입금대기/.test(t)) return `입금 대기는 ${ctx.pending}건이에요`;
    if (/결제완료/.test(t)) return `결제 완료는 ${ctx.pendingPay}건이에요`;
    if (/발송준비/.test(t)) return `발송 준비는 ${ctx.ready}건이에요`;
    if (/발송완료|발송한/.test(t)) return `발송 완료는 ${ctx.shipped}건이에요`;
    if (/(전체|총|모든)주문|주문(총|전체)/.test(t)) return `전체 주문은 ${ctx.total}건이에요`;
    if (/오늘주문|오늘신규|오늘들어온|오늘받은|오늘.*주문.*몇/.test(t)) return `오늘 신규 주문은 ${ctx.today}건이에요`;
    if (/고객수|고객몇|고객이몇|고객은몇|등록고객|총고객|전체고객|고객얼마|고객명수/.test(t)) return `등록된 고객은 ${ctx.customers}명이에요`;
    if (/상품종류|상품몇|상품개수|상품수|취급상품|상품얼마/.test(t)) return `취급 상품은 ${ctx.products}개예요`;
    return null;
  }

  // ★ v13: 자연어 데이터 조회 엔진 ─────────────────────────────
  //  "조용택 주문 보여줘" / "오늘 발송건 리스트" / "오늘 미발송 있나요" 등을
  //  실제 데이터에서 찾아 요약 설명 + 해당 화면(필터 적용)으로 이동
  function statusKo(s) {
    return { waiting:'입금대기', pending:'결제완료', ready:'발송준비', shipped:'발송완료' }[s] || s || '';
  }
  // 실제 데이터에 있는 이름만 매칭 (엉뚱한 이름 추측 방지). 긴 이름 우선.
  //  ★ v15: 고객 + 업체(거래처) + 주문 받는분/주문자 모두 검색
  function findKnownName(text) {
    const names = new Set();
    (customers || []).forEach(c => { if (c && c.name) names.add(String(c.name).trim()); });
    (vendors || []).forEach(v => { if (v && v.name) names.add(String(v.name).trim()); });
    (orders || []).forEach(o => {
      if (o.recipient && o.recipient.name) names.add(String(o.recipient.name).trim());
      if (o.sender && o.sender.name) names.add(String(o.sender.name).trim());
    });
    // ★ v16: 명령어 제거 + 유사발음 매칭 (STT 오인식·"주문하려고" 속 오매칭 방지)
    return matchName(text, [...names]);
  }
  // ★ v15: 이름으로 고객/업체 연락처·주소 조회
  function contactFor(name) {
    const c = (customers || []).find(x => x && x.name === name);
    if (c) return { phone: c.phone || '', address: c.address || '', kind: '고객' };
    const v = (vendors || []).find(x => x && x.name === name);
    if (v) return { phone: v.phone || '', address: v.address || '', kind: '업체' };
    return null;
  }
  function jarvisToday() {
    const d = new Date(), p = n => String(n).padStart(2, '0');
    return `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())}`;
  }
  // 화면 필터 설정 도우미 (setter 없을 때도 안전)
  function applyOrderView({ search = '', status = 'all', date = 'all' }) {
    if (setSearchQuery)  setSearchQuery(search);
    if (setStatusFilter) setStatusFilter(status);
    if (setDateFilter)   setDateFilter(date);
    setTab('orders');
    setMinimized(true);
  }
  // 데이터 조회 실행 → 말할 요약 문자열 반환, 해당 없으면 null
  function runDataQuery(text) {
    const t = (text || '').replace(/\s/g, '');
    const ords = orders || [];
    const today = jarvisToday();

    // ★ v62 A0) 이름 + 미발송/발송(배송중) 조회: "대솔본점 미발송건 있나요", "하레하레 배송중인 거 있어"
    //  미발송 = 입금대기+결제완료+발송준비, 발송 = 배송중(status shipped)
    const nmStatus = findKnownName(text);
    if (nmStatus) {
      const unshippedAsk = /미발송|안발송|안보낸|안보냈|발송안|발송전|아직안보|못보낸|안나간/.test(t);
      const shippedAsk = !unshippedAsk && /(발송건|발송한거|발송했|배송중|보낸건|나간건|보냈어|보냈나)/.test(t);
      if (unshippedAsk || shippedAsk) {
        const mineAll = ords.filter(o => (o.recipient && o.recipient.name === nmStatus) || (o.sender && o.sender.name === nmStatus));
        if (unshippedAsk) {
          const un = mineAll.filter(o => o.status !== 'shipped');
          const c = { waiting: 0, pending: 0, ready: 0 }; un.forEach(o => { if (c[o.status] !== undefined) c[o.status]++; });
          applyOrderView({ search: nmStatus, status: 'all', date: 'all' });
          if (!un.length) return `${nmStatus} 님은 미발송건이 없어요. (다 보냈거나 주문이 없어요)`;
          return `${nmStatus} 님 미발송건이 ${un.length}건 있어요. 입금대기 ${c.waiting}건, 결제완료 ${c.pending}건, 발송준비 ${c.ready}건이에요. 화면에 띄웠어요.`;
        }
        const sh = mineAll.filter(o => o.status === 'shipped');
        applyOrderView({ search: nmStatus, status: 'shipped', date: 'all' });
        if (!sh.length) return `${nmStatus} 님은 발송(배송중)건이 없어요.`;
        return `${nmStatus} 님 발송(배송중)건은 ${sh.length}건이에요. 화면에 띄웠어요.`;
      }
    }

    // A) 고객/업체/이름 조회: "조용택 주문 보여줘", "하레하레 정보", "대솔 연락처"
    const name = findKnownName(text);
    if (name && /주문|정보|내역|보여|알려|조회|현황|건|어때|얼마|샀|시켰|배송|어디|연락처|전화|번호|주소/.test(t)) {
      const matched = ords.filter(o =>
        (o.recipient && o.recipient.name === name) || (o.sender && o.sender.name === name));
      const contact = contactFor(name);
      applyOrderView({ search: name, status: 'all', date: 'all' });
      if (matched.length === 0) {
        if (contact) {
          const bits = [];
          if (contact.phone) bits.push(`연락처는 ${contact.phone}`);
          if (contact.address) bits.push(`주소는 ${String(contact.address).slice(0, 25)}`);
          const who = contact.kind === '업체' ? `${name} 업체` : `${name} 님`;
          return `${who} 정보예요. ${bits.length ? bits.join(', ') + '. ' : '등록된 연락처가 없어요. '}아직 주문 내역은 없어요.`;
        }
        return `${name} 님 이름으로 된 주문은 아직 없어요.`;
      }
      const byStatus = {};
      matched.forEach(o => { byStatus[o.status] = (byStatus[o.status] || 0) + 1; });
      const parts = Object.keys(byStatus).map(s => `${statusKo(s)} ${byStatus[s]}건`).join(', ');
      const recent = matched.slice().sort((a, b) => String(b.orderDate || '').localeCompare(String(a.orderDate || '')))[0];
      const addr = (recent.recipient && recent.recipient.address) ? `, 주소는 ${String(recent.recipient.address).slice(0, 20)}` : '';
      return `${name} 님 주문은 모두 ${matched.length}건이에요. ${parts}. 가장 최근 주문은 ${recent.orderDate || ''}, ${statusKo(recent.status)} 상태${addr}예요. 화면에 목록을 띄웠어요.`;
    }

    // 미발송(부정) 여부 먼저 판정 — "발송 안 한/못 한/미발송" 등
    const isUnshippedAsk = /미발송|안발송/.test(t)
      || (/발송|보내/.test(t) && /안한|안했|못한|못했|안보|못보|아직/.test(t));

    // B) 오늘 발송건: "오늘 발송건 리스트 보여줘", "오늘 발송한 거"
    if (!isUnshippedAsk
        && (/(오늘|금일).*발송|오늘발송/.test(t) || /발송.*(리스트|목록|현황|보여|내역)/.test(t))) {
      const shippedToday = ords.filter(o => o.status === 'shipped' && String(o.shippedAt || '').slice(0, 10) === today);
      applyOrderView({ search: '', status: 'shipped', date: 'all' });
      if (shippedToday.length === 0) return `오늘 발송한 주문은 아직 없어요. 발송완료 목록을 화면에 띄웠어요.`;
      const nm = shippedToday.slice(0, 5).map(o => (o.recipient && o.recipient.name) || '').filter(Boolean).join(', ');
      return `오늘 발송한 주문은 ${shippedToday.length}건이에요.${nm ? ' ' + nm + ' 님 것을 보냈어요.' : ''} 발송완료 목록을 화면에 띄웠어요.`;
    }

    // C) 미발송건: "오늘 미발송건 있나요", "아직 안 보낸 거", "발송 안 한 거"
    if (isUnshippedAsk) {
      const unshipped = ords.filter(o => o.status !== 'shipped');
      const c = { waiting: 0, pending: 0, ready: 0 };
      unshipped.forEach(o => { if (c[o.status] !== undefined) c[o.status]++; });
      applyOrderView({ search: '', status: c.ready > 0 ? 'ready' : 'all', date: 'all' });
      if (unshipped.length === 0) return `아직 발송 안 한 주문은 없어요. 다 보내셨네요.`;
      return `아직 발송 안 한 주문은 모두 ${unshipped.length}건이에요. 입금대기 ${c.waiting}건, 결제완료 ${c.pending}건, 발송준비 ${c.ready}건이에요. 화면에 띄웠어요.`;
    }

    return null;
  }

  // ★ v14/v15: 음성 주문 시작 의도 감지
  //  (1) 등록/접수/받아 등 명시 동사, 또는
  //  (2) 알려진 고객·업체 이름 + "주문" + 조회동사 없음 → "하레하레 베이커리 주문" 등
  function detectVoiceOrderIntent(text) {
    const t = (text || '').replace(/\s/g, '');
    // ★ v18: 명시 동사(주문하려/할게/해줘 포함) → 이름 매칭 없어도 주문 시작 (AI가 이름 해석)
    if (/주문(을|를)?(등록|접수|받아|받을|받자|작성|넣어|만들|하려|할게|하자|해줘|하겠|넣을)|음성주문|음성으로주문|주문받아줘|주문접수/.test(t)) return true;
    // "주문"이 있고 조회/목록/화면/수정 요청이 아니면 주문 시작 (AI가 이름·상품 해석)
    // ★ v38: 수정·편집·삭제·묶음 요청은 새 주문이 아니라 '기존 주문 편집'이므로 여기서 제외
    if (/주문/.test(t)
        && !/보여|알려|정보|조회|내역|현황|몇|건|어디|얼마|상태|목록|리스트|검색|취소|화면|열어|폼|입력창|수정|고쳐|고칠|고치|바꿔|바꾸|변경|편집|삭제|빼|묶음|박스/.test(t)) return true;
    // ★ v40: "저번처럼/지난번처럼"에 등록된 고객·업체 이름이 함께 있으면 주문 시작 (고객 기억 주문)
    if (/저번처럼|지난번처럼|늘하던|평소처럼|하던대로/.test(t) && findKnownNameIn(text, customers, vendors, products)) return true;
    return false;
  }

  // ★ v18: 이름→고객/업체, 상품명→상품ID 연결 (무게 붙은 이름도 처리)
  function resolveOrderLinks(d) {
    const draft = { ...d, items: (d.items || []).map(it => ({ ...it })) };
    if (draft.name) {
      const vNames = (vendors || []).map(v => v.name).filter(Boolean);
      const cNames = (customers || []).map(c => c.name).filter(Boolean);
      const vHit = matchName(draft.name, vNames);
      const cHit = vHit ? null : matchName(draft.name, cNames);
      if (vHit) { const v = (vendors || []).find(x => x.name === vHit); if (v) { draft.name = v.name; draft.vendorId = v.id; draft.customerId = null; if (v.phone) draft.phone = v.phone; if (v.address) draft.address = v.address; } }
      else if (cHit) { const c = (customers || []).find(x => x.name === cHit); if (c) { draft.name = c.name; draft.customerId = c.id; if (c.phone) draft.phone = c.phone; if (c.address) draft.address = c.address; } }
    }
    const _learns = [];   // ★ v64: 퍼지로 교정한 발음 후보 (주문 등록되면 자동 학습)
    for (const it of draft.items) {
      if (it.productId) continue;
      const base = String(it.name || '').replace(/\s+/g, '').trim();
      // 1) 정확 포함: 등록 상품명(공백무시)이 이 항목에 들어있으면 연결 (예: "채소 2kg"→등록품 "채소2kg")
      let prod = (products || []).find(pp => pp.name && base && base.includes(pp.name.replace(/\s/g, '')));
      let viaFuzzy = false;
      // 2) 퍼지·별칭: 그래도 없으면 가장 비슷한 등록 상품 (예: "채소 2키로"→"채소2kg", "가피라"→"카이피라")
      if (!prod && typeof fuzzyProductMatch === 'function') { prod = fuzzyProductMatch(it.name || '', products, 0.62); viaFuzzy = !!prod; }
      if (prod) {
        // ★ v64: 퍼지로 알아들은(오인식 교정) 경우, 말한 발음→상품 핵심명을 학습 후보로 기록
        if (viaFuzzy) {
          const coreOf = (s) => String(s || '').replace(new RegExp(WEIGHT_RE, 'g'), '').replace(/[\s\d]/g, '').trim();
          const from = coreOf(it.name), to = coreOf(prod.name);
          if (from.length >= 2 && to.length >= 2 && from !== to && (typeof canonicalizeSpoken !== 'function' || canonicalizeSpoken(from) !== to)) {
            _learns.push({ from, to });
          }
        }
        it.productId = prod.id; it.name = prod.name;
      }
    }
    if (_learns.length) draft._pendingLearns = [...(draft._pendingLearns || []), ..._learns];
    return draft;
  }
  function orderReadback(d) {
    const parts = [];
    if (d.name) parts.push(`${d.name} 님`);
    if (d.items && d.items.length) parts.push(d.items.map(i => `${i.name} ${i.qty}개`).join(', '));
    if (d.reserveDate) parts.push(`발송 ${d.reserveDate}`);
    if (d.deliveryMessage) parts.push(`메시지 ${d.deliveryMessage}`);
    return parts.join(', ');
  }
  function orderNextPrompt(d) {
    if (!d.name) return '누구 주문인가요?';
    if (!d.items || !d.items.length) {
      // ★ v40: 고객 기억 — 지난 주문이 있으면 알려주고 "저번처럼"으로 그대로 담을 수 있게 안내
      const last = lastOrderForName(d.name, orders, customers);
      if (last && (last.items || []).length) {
        const sm = (last.items || []).map((i) => `${i.name} ${i.qty}개`).join(', ');
        return `${d.name} 님, 어떤 상품 몇 개 드릴까요? 지난 주문은 ${sm}였어요. "저번처럼"이라고 하시면 그대로 담을게요.`;
      }
      return `${d.name} 님, 어떤 상품 몇 개 드릴까요?`;
    }
    return `${orderReadback(d)}. 맞으면 등록, 고칠 건 말씀하세요.`;
  }

  // ★ v24: 묶음 계획을 초안에 반영하고 박스 목록 반환 (못 알아들으면 null)
  function applyBundlePlanToDraft(planText) {
    const cur = orderDraftRef.current || { items: [] };
    const plan = parseBundleUtterance(planText, cur.items || []);
    if (!plan) return null;
    cur.awaitingBundle = false; cur.boxPlan = plan; cur.boxMode = plan.mode;
    orderDraftRef.current = cur;
    if (plan.mode === 'auto') {
      const pm = {}; (products || []).forEach(p => { if (p && p.id) pm[p.id] = p; });
      const b = splitIntoBoxes((cur.items || []).map(it => ({ productId: it.productId || null, name: it.name, qty: Number(it.qty) || 1 })), pm);
      return b.length ? b : [{ items: cur.items }];
    }
    return buildBoxItems(cur.items || [], plan);
  }

  // ★ v18: 하이브리드 음성 주문 — 확인/취소/재시작은 로컬 즉시, 내용은 AI 이해(실패 시 로컬)
  async function handleOrderTurn(text) {
    const t = (text || '').replace(/\s/g, '');
    const cur = orderDraftRef.current || { items: [] };
    const hasProd = (products || []).some(p => p && p.name && t.includes(p.name.replace(/\s/g, '')));
    const say = (r) => { setLastAI(r); pushExchange(text, r); processingRef.current = false; speakThenListen(r); };

    // ★ v39: 낱개 자동 분할 결과(박스 규칙: 카테고리별 최대 2개) — '나눌 수 있는지' 판단·안내용
    const autoSplitBoxes = (items) => {
      const pm = {}; (products || []).forEach(p => { if (p && p.id) pm[p.id] = p; });
      return splitIntoBoxes((items || []).map(it => ({ productId: it.productId || null, name: it.name, qty: Number(it.qty) || 1 })), pm);
    };
    // ★ v39: 현재 초안을 실제 주문으로 등록 (묶음 계획 boxPlan/boxMode 반영)
    const finalizeRegister = () => {
      const cur2 = orderDraftRef.current || cur;
      const linked = resolveOrderLinks(cur2);
      linked.boxPlan = cur2.boxPlan || null;
      linked.boxMode = cur2.boxMode || null;
      const createdArr = createVoiceOrder ? createVoiceOrder(linked) : null;
      const created = Array.isArray(createdArr) ? createdArr[0] : createdArr;
      const boxN = Array.isArray(createdArr) ? createdArr.length : 1;
      orderModeRef.current = false; orderDraftRef.current = null;
      if (created) {
        if (setSearchQuery) setSearchQuery(linked.name || '');
        if (setStatusFilter) setStatusFilter('all');
        if (setDateFilter) setDateFilter('all');
        setTab('orders'); setMinimized(true);
        // ★ v64: 자동 학습 — 주문이 잘 등록되면, 알아들으려 교정했던 발음을 기억 (다음에 더 잘 인식). 잘못 배우면 "AI가 배운 말"에서 삭제.
        let learnNote = '';
        try {
          const done = [];
          (linked._pendingLearns || []).forEach(({ from, to }) => { if (typeof learnAlias === 'function' && learnAlias(from, to)) done.push(`'${from}'는 '${to}'`); });
          if (done.length) learnNote = ` 그리고 앞으로 ${done.slice(0, 2).join(', ')}로 알아들을게요.`;
        } catch (e) {}
        say(`${orderReadback(linked)}${boxN > 1 ? ` ${boxN}박스로 나눠서` : ''} 주문을 등록했어요.${learnNote}`);
      } else { say('정보가 부족해 등록을 못 했어요. 고객과 상품을 다시 말씀해 주세요.'); }
    };

    if (/그만|관둬|중단|하지마|안할래|주문취소|취소할|다취소|취소해/.test(t) || (/취소/.test(t) && !hasProd)) {
      orderModeRef.current = false; orderDraftRef.current = null; say('주문 등록을 취소했어요.'); return;
    }
    if (/처음부터|다시주문|새로주문|리셋|다시시작|새로시작/.test(t)) {
      orderDraftRef.current = { items: [] }; say('네, 처음부터 다시 할게요. 누구 주문인가요?'); return;
    }

    // ★ v43: Working Memory — 직전 상품 수량 조절 ("두 개 더", "하나 더", "조금 줄여", "하나 빼")
    //  상품명 없이 증감 의도만 있을 때, 방금 다룬 상품(cur.lastItemKey)에 적용. "채소 빼"처럼 상품명이 있으면 아래 삭제 로직으로.
    if ((cur.items || []).length) {
      // 상품명(정식명 또는 무게 뗀 핵심명)이 문장에 있으면 WM 조절 대상이 아님 → 아래 삭제/신규 파싱으로
      const coreNm = (s) => String(s || "").replace(new RegExp(WEIGHT_RE, "g"), "").replace(/\s/g, "");
      const nameInText = (nm) => { if (!nm) return false; const full = nm.replace(/\s/g, ""); const c = coreNm(nm); return t.includes(full) || (c.length >= 2 && t.includes(c)); };
      const hasProdName = (products || []).some((p) => p && nameInText(p.name))
        || (cur.items || []).some((it) => nameInText(it.name));
      const incIntent = /(더넣|더줘|더담|더주문|하나더|한개더|두개더|세개더|조금더|더시켜|늘려|늘리|추가)/.test(t) && !/빼|줄|삭제|덜|없애/.test(t);
      const decIntent = /(빼|줄여|줄이|덜어|덜|내려|적게)/.test(t);
      const numMap = { 한: 1, 하나: 1, 한개: 1, 두: 2, 둘: 2, 두개: 2, 세: 3, 셋: 3, 세개: 3, 네: 4, 넷: 4, 네개: 4, 다섯: 5, 다섯개: 5 };
      const numFrom = (s) => { const m = s.match(/(\d+)/); if (m) return parseInt(m[1], 10); for (const k in numMap) { if (s.includes(k)) return numMap[k]; } return null; };
      if (!hasProdName && (incIntent || decIntent)) {
        let idx = -1;
        if (cur.lastItemKey) idx = cur.items.findIndex((it) => (it.productId || it.name) === cur.lastItemKey);
        if (idx < 0) idx = cur.items.length - 1;
        if (idx >= 0) {
          let n = numFrom(t); if (n == null) n = 1;   // "조금 더 / 조금 줄여" = 1
          const delta = incIntent ? n : -n;
          const nm = cur.items[idx].name;
          cur.items[idx].qty = (Number(cur.items[idx].qty) || 0) + delta;
          if (cur.items[idx].qty <= 0) { cur.items.splice(idx, 1); cur.lastItemKey = null; }
          else cur.lastItemKey = cur.items[idx].productId || cur.items[idx].name;
          cur.boxPlan = null; cur.boxMode = null; cur.awaitingBundle = false; cur.bundleAsked = false;
          orderDraftRef.current = cur;
          if (!cur.items.length) { say(`${nm} 뺐어요. 이제 상품이 없어요 — 어떤 상품 몇 개 드릴까요?`); return; }
          say(`${nm} ${incIntent ? '늘렸' : '줄였'}어요. ${orderReadback(cur)}. 맞으면 등록, 고칠 건 말씀하세요.`);
          return;
        }
      }
    }

    // ★ v38: 주문 확인 중 '빼기/삭제' 지시는 로컬에서 확정 처리 (AI 불확실성 제거, 키/인터넷 없이도 동작)
    //  "모든 채소 빼줘"→이름에 '채소' 든 항목 전부 삭제, "전부 빼줘"→모두 삭제
    if (/(빼|삭제|제외|없애|지워|빼고|빼줘|빼주)/.test(t) && (cur.items || []).length) {
      const clearAll = /(전부|전체|모두|모조리|싹다|다빼|다삭제|전부삭제|모두삭제|전부빼|모두빼|다지워|전체삭제|전체빼)/.test(t);
      const stripRm = (s) => s
        .replace(/(빼주세요|빼줘|빼주|빼고|빼기|빼|삭제해줘|삭제해|삭제|제외해줘|제외해|제외|없애줘|없애|지워줘|지워)/g, '')
        .replace(/(모든|모두|전부|전체|모조리|싹|좀|주문|상품|그거|이거|저거|그것|이것|저것|것|거)/g, '')
        .replace(new RegExp('(\\d+|한|두|세|네|다섯|여섯|일곱|여덟|아홉|열)\\s*(?:' + COUNT_UNIT + ')', 'g'), '')
        .replace(/\d+개/g, '');
      const coreOf = (s) => String(s || '').replace(new RegExp(WEIGHT_RE, 'g'), '').replace(/[\s\d]/g, '').trim();
      const spokenCore = coreOf(stripRm(t));
      let kept, removed = [];
      if (clearAll && !spokenCore) {
        removed = cur.items.slice(); kept = [];
      } else if (spokenCore) {
        kept = cur.items.filter((it) => {
          const c = coreOf(it.name);
          const hit = !!c && (c.includes(spokenCore) || spokenCore.includes(c));
          if (hit) removed.push(it);
          return !hit;
        });
      } else {
        say(`무엇을 뺄까요? 현재 ${cur.items.map((i) => i.name).join(', ')} 있어요. 예: "채소 빼줘" 또는 "전부 빼줘".`);
        return;
      }
      if (!removed.length) {
        say(`"${spokenCore}"에 해당하는 상품이 없어요. 현재 ${cur.items.map((i) => i.name).join(', ')} 있어요.`);
        return;
      }
      cur.items = kept; cur.boxPlan = null; cur.boxMode = null; cur.awaitingBundle = false; cur.bundleAsked = false;
      orderDraftRef.current = cur;
      if (!kept.length) {
        say(`${removed.map((i) => i.name).join(', ')} 뺐어요. 이제 상품이 없어요 — 어떤 상품 몇 개 드릴까요? (그만하려면 "취소")`);
      } else {
        say(`${removed.map((i) => i.name).join(', ')} 뺐어요. ${orderNextPrompt(cur)}`);
      }
      return;
    }

    // ★ v40: 고객 기억 — "저번처럼 / 지난번처럼 / 똑같이 / 늘 하던대로" → 그 고객의 지난 주문 그대로 불러오기
    if (/저번처럼|저번거|저번이랑|지난번처럼|지난번거|지난주문|지난거|똑같이|똑같은거|똑같은걸|평소처럼|늘하던|하던대로|전이랑같|이전과같|같은걸로|같은거로/.test(t)) {
      // 이름이 아직 없으면 이번 말에서 찾아봄
      if (!cur.name) {
        const nm = findKnownNameIn(text, customers, vendors, products);
        if (nm) { const mp = matchPerson(nm, customers, vendors); cur.name = mp.name; if (mp.phone) cur.phone = mp.phone; if (mp.address) cur.address = mp.address; cur.customerId = mp.customerId || null; if (mp.vendorId) cur.vendorId = mp.vendorId; }
      }
      if (!cur.name) { say('누구 주문인지 먼저 말씀해 주세요. 그다음 "저번처럼"이라고 하시면 지난 주문 그대로 담을게요.'); return; }
      const last = lastOrderForName(cur.name, orders, customers);
      if (!last || !(last.items || []).length) { say(`${cur.name} 님의 지난 주문을 못 찾았어요. 어떤 상품 몇 개 드릴까요?`); return; }
      cur.items = (last.items || []).map((it) => ({ productId: it.productId || null, name: it.name, qty: Number(it.qty) || 1 }));
      if (cur.items.length) { const li = cur.items[cur.items.length - 1]; cur.lastItemKey = li.productId || li.name; }
      if (last.recipient && last.recipient.address && !cur.address) cur.address = last.recipient.address;
      if (last.recipient && last.recipient.phone && !cur.phone) cur.phone = last.recipient.phone;
      if (last.deliveryMessage && !cur.deliveryMessage) cur.deliveryMessage = last.deliveryMessage;
      cur.boxPlan = null; cur.boxMode = null; cur.awaitingBundle = false; cur.bundleAsked = false;
      orderDraftRef.current = cur;
      say(`지난 주문 그대로 담았어요. ${orderReadback(cur)}. 맞으면 등록, 고칠 건 말씀하세요.`);
      return;
    }

    // ★ v39: 묶음 방식을 물어본 직후면 — 이번 발화를 묶음 방법으로 해석하고, 정해지면 확인/등록
    if (cur.awaitingBundle && (cur.items || []).length >= 1
        && !/^(응|네|예|그래|맞아|맞아요|맞습니다|좋아|오케이|오케|등록)$/.test(t)
        && !/등록해|등록할|저장해|확정/.test(t)) {
      // 방법 파싱: 자동/따로따로/전부 한 박스/"A랑 B 한 박스" 모두 처리 (묶음 계획을 cur에 저장)
      let boxList = applyBundlePlanToDraft(text);
      // 바 단어(자동/알아서/그냥/기본)만 말했으면 자동 분할로 간주
      if (!boxList && /자동|알아서|그냥|기본|적당히|맡길|나눠/.test(t)) {
        cur.awaitingBundle = false; cur.boxPlan = null; cur.boxMode = 'auto'; orderDraftRef.current = cur;
        boxList = autoSplitBoxes(cur.items);
      }
      if (boxList) {
        // 확인 단계: 결과 박스를 읽어주고 "등록" 대기 (계획은 이미 cur에 저장됨)
        if (boxList.length <= 1) { say('네, 한 박스로 보낼게요. "등록"이라고 하시면 등록할게요.'); return; }
        say(`${bundleReadback(boxList)}. 이렇게 ${boxList.length}박스로 나눠 등록할까요? "등록"이라고 하세요.`); return;
      }
      say('묶는 방법을 말씀해 주세요. "자동으로 나눠줘", "전부 한 박스", "따로따로", 또는 "샐러드랑 로메인 한 박스"처럼요.'); return;
    }
    const wantsRegister = /등록해|등록할|등록하자|등록부탁|저장해|확정|이대로등록|그대로등록|응등록|네등록/.test(t) || /^(응|네|예|그래|맞아|맞아요|맞습니다|좋아|오케이|오케|등록)$/.test(t);
    if (wantsRegister && !hasProd) {
      if (!cur.name) { say('누구 주문인지 먼저 말씀해 주세요.'); return; }
      if (!cur.items || !cur.items.length) { say('상품을 먼저 말씀해 주세요.'); return; }
      // ★ v39: 묶음을 물어본 뒤 "응/등록"만 답하면 → 자동 분할로 등록
      if (cur.awaitingBundle && !cur.boxPlan && !cur.boxMode) {
        cur.awaitingBundle = false; cur.boxMode = 'auto'; orderDraftRef.current = cur;
        finalizeRegister(); return;
      }
      // ★ v39: 아직 묶음 방식을 안 정했고, 낱개가 2박스 이상으로 나뉘면 → 등록 전에 먼저 물어봄
      if (!cur.boxPlan && !cur.boxMode && !cur.bundleAsked) {
        const autoBoxes = autoSplitBoxes(cur.items);
        if (autoBoxes.length >= 2) {
          cur.awaitingBundle = true; cur.bundleAsked = true; orderDraftRef.current = cur;
          const units = (cur.items || []).reduce((s, it) => s + (Number(it.qty) || 0), 0);
          say(`${orderReadback(cur)}. 낱개 ${units}개라 자동으로 ${autoBoxes.length}박스로 나눌 수 있어요. 묶음 배송으로 등록할까요? "자동으로 나눠줘", "전부 한 박스", "따로따로", 또는 "○○랑 ○○ 한 박스"처럼 말씀하세요. 안 나누려면 "한 박스로".`);
          return;
        }
      }
      finalizeRegister(); return;
    }

    // ★ v60: 묶음 배송 — 낱개 총 2개 이상이면(한 상품 여러 개 포함) "묶음/묶어/따로/부분묶음"으로 박스 나눔
    const _bundleUnits = (cur.items || []).reduce((s, it) => s + (Number(it.qty) || 0), 0);
    if (_bundleUnits >= 2 && isBundleIntent(t)) {
      const boxList = applyBundlePlanToDraft(text);
      if (boxList) {
        if (boxList.length <= 1) { say('네, 한 박스로 보낼게요. "등록"이라고 하시면 등록할게요.'); return; }
        say(`${bundleReadback(boxList)}. 이렇게 ${boxList.length}박스로 나눠 등록할까요? "등록"이라고 하세요.`); return;
      }
      cur.awaitingBundle = true; cur.bundleAsked = true; orderDraftRef.current = cur;
      const autoBoxes = autoSplitBoxes(cur.items);
      say(`어떻게 묶을까요? "자동으로 나눠줘"(규칙대로 ${autoBoxes.length}박스), "전부 한 박스", "따로따로"(낱개 1개씩), 또는 "○○랑 ○○ 한 박스"처럼 말씀하세요.`); return;
    }

    // 내용 파싱: AI 우선(문장 전체 이해), 실패 시 로컬 규칙
    setPhaseSync('thinking');
    let draft = null;
    if (geminiKey) {
      try {
        const aiIn = { name: cur.name || '', items: (cur.items || []).map(i => ({ name: i.name, qty: i.qty })), reserveDate: cur.reserveDate || '', deliveryMessage: cur.deliveryMessage || '' };
        const ai = await callGeminiOrderParse(text, aiIn, { vendors, customers, products }, geminiKey);
        if (ai && (ai.name || (ai.items && ai.items.length))) {
          draft = { name: ai.name, items: ai.items, reserveDate: ai.reserveDate, deliveryMessage: ai.deliveryMessage };
        }
      } catch (e) { /* 로컬 폴백 */ }
    }
    if (!draft) {
      const res = applyOrderUtterance(cur, text, { products, customers, vendors, today: new Date() });
      if (res.cancelled) { orderModeRef.current = false; orderDraftRef.current = null; say(res.reply); return; }
      draft = res.draft;
    }
    const linked = resolveOrderLinks(draft);
    // ★ v43: Working Memory — 방금 다룬 상품을 기억 (다음 "두 개 더/하나 빼"의 대상)
    if (linked.items && linked.items.length) {
      const li = linked.items[linked.items.length - 1];
      linked.lastItemKey = li.productId || li.name;
    }
    orderDraftRef.current = linked;
    say(orderNextPrompt(linked));
  }

  // ★ v11: 대화 기록에 한 쌍(사용자+AI) 추가 → 대화창 표시 + 다음 대화 맥락 유지
  //  (로컬 즉답 경로도 Gemini 경로와 동일하게 history를 갱신해야 화면에 답이 보임)
  function pushExchange(userText, aiText) {
    const updated = [
      ...historyRef.current,
      { role: 'user',  parts: [{ text: userText }] },
      { role: 'model', parts: [{ text: aiText }] },
    ];
    const trimmed = updated.slice(-20);  // 최대 10쌍 유지 (토큰 한도 방지)
    historyRef.current = trimmed;
    setHistory(trimmed);
  }

  // ★ A2 Fix: 동시 실행 방지 (processingRef는 위 ref 선언부에서 정의)
  async function processUserSpeech(text) {
    if (!activeRef.current) return;
    if (processingRef.current) return;  // ★ lock
    processingRef.current = true;
    setInterim('');
    // ★ v8: dedupCascade로 반복 완전 제거 (prefix-cascade 포함)
    text = dedupCascade(text).slice(0, 200);
    setLastUser(text);

    // ★ v41: 학습 명령(승인 기반 장기 기억) — "'청겨'를 '청겨자'로 기억해" → 별칭 저장. 어느 상황에서든 최우선.
    {
      const teach = parseTeachAlias(text);
      if (teach) {
        const prod = (typeof fuzzyProductMatch === 'function') ? fuzzyProductMatch(teach.to, products, 0.55) : null;
        const stored = prod ? prod.name.replace(new RegExp(WEIGHT_RE, 'g'), '').replace(/\s/g, '') : teach.to.replace(/\s/g, '');
        learnAlias(teach.from, stored);
        clearInterval(countdownRef.current); setRetryCountdown(0);
        const shown = prod ? prod.name : teach.to;
        const msg = `네, 앞으로 "${teach.from}"는 "${shown}"로 알아들을게요.`;
        setLastAI(msg); pushExchange(text, msg);
        processingRef.current = false;
        speakThenListen(msg);
        return;
      }
    }

    // ★ v14: 음성 주문 대화 — 진행 중이거나 시작 명령이면 주문 흐름으로 (AI 없이)
    if (orderModeRef.current) {
      clearInterval(countdownRef.current); setRetryCountdown(0);
      handleOrderTurn(text); return;
    }
    if (detectVoiceOrderIntent(text)) {
      orderModeRef.current = true; orderDraftRef.current = { items: [] };
      clearInterval(countdownRef.current); setRetryCountdown(0);
      handleOrderTurn(text); return;
    }

    // ★ v38: 기존 주문 편집(수정/삭제/묶음) 의도는 앱 명령으로 먼저 처리 → 조회로 새지 않게
    {
      const tNS = (text || '').replace(/\s/g, '');
      const editIntent =
        /주문.*(수정|고쳐|고칠|고치|바꿔|바꾸|변경|편집|열어|불러)/.test(tNS)
        || /(수정|고쳐|고칠|편집)(해|하|해줘|해주세요)?$/.test(tNS)
        || /(빼|삭제|제외|없애|지워)/.test(tNS)
        || /(되돌려|되돌리|방금전으로|방금거취소|방금꺼취소|방금취소|방금주문취소|방금등록취소|마지막주문취소|마지막취소|실수했어|잘못했어)/.test(tNS)
        || /(도착확인|도착했|도착처리|배송완료처리|배송완료로|받은걸로|받았다고)/.test(tNS) || (/도착/.test(tNS) && /확인/.test(tNS))
        || /(한박스|한상자|하나로묶|하나로합|자동묶음|따로따로|따로보내|개별발송|낱개로|묶음수정|박스수정|박스편집|묶음편집)/.test(tNS);
      if (editIntent && onAppCommand && onAppCommand(text)) {
        clearInterval(countdownRef.current); setRetryCountdown(0);
        const msg = '네, 처리했어요.';
        setLastAI(msg); pushExchange(text, msg);
        processingRef.current = false;
        speakThenListen(msg);
        return;
      }
    }

    // ★ v47: AI Planner — "오늘 뭐부터 하지?" → 발송·예약·송장·입금 우선순위 브리핑 (읽기 전용)
    if (isDailyPlanQuestion(text)) {
      const _t = new Date();
      const todayISO = `${_t.getFullYear()}-${String(_t.getMonth() + 1).padStart(2, '0')}-${String(_t.getDate()).padStart(2, '0')}`;
      const plan = buildDailyPlan(orders, subscriptions, todayISO);
      clearInterval(countdownRef.current); setRetryCountdown(0);
      setLastAI(plan); pushExchange(text, plan);
      processingRef.current = false;
      speakThenListen(plan);
      return;
    }

    // ★ v13: 자연어 데이터 조회 (고객 조회·오늘 발송/미발송 등) — AI 없이 실제 데이터로 즉시 답+화면표시
    //  네비게이션보다 먼저 실행 ("조용택 주문 보여줘"가 일반 주문목록으로 새지 않도록)
    const dataAns = runDataQuery(text);
    if (dataAns) {
      clearInterval(countdownRef.current);
      setRetryCountdown(0);
      setLastAI(dataAns);
      pushExchange(text, dataAns);
      processingRef.current = false;
      speakThenListen(dataAns);
      return;
    }

    // ★ 앱 전체 데이터 기반 답변 (상품 가격/재고·송장추적·정기배송·연락처/주소·발송상태) — AI 없이 실제 데이터로
    const appDataAns = answerFromAppData(text, { orders, customers, products, vendors, subscriptions });
    if (appDataAns) {
      clearInterval(countdownRef.current);
      setRetryCountdown(0);
      setLastAI(appDataAns);
      pushExchange(text, appDataAns);
      processingRef.current = false;
      speakThenListen(appDataAns);
      return;
    }

    // ★ v9: 화면 이동 명령은 AI 호출 없이 즉시 처리 (할당량 절약 + 즉시 반응 + 429에도 작동)
    const quickNav = detectNavIntent(text);
    if (quickNav && JARVIS_TAB_MAP[quickNav]) {
      clearInterval(countdownRef.current);   // 재시도 카운트다운 있으면 중단
      setRetryCountdown(0);
      const msg = navReply(quickNav);
      setLastAI(msg);
      pushExchange(text, msg);                 // ★ v11: 대화창 표시 + 맥락 유지
      setTab(JARVIS_TAB_MAP[quickNav]);
      setMinimized(true);                     // 화면 보이게 시트 최소화
      processingRef.current = false;
      speakThenListen(msg);
      return;
    }

    // ★ v10: 간단한 숫자 질문은 로컬 데이터로 즉답 (할당량 절약 + 429에도 작동)
    const quickStat = quickStatAnswer(text, getCtx());
    if (quickStat) {
      clearInterval(countdownRef.current);
      setRetryCountdown(0);
      setLastAI(quickStat);
      pushExchange(text, quickStat);           // ★ v11: 대화창 표시 + 맥락 유지
      processingRef.current = false;
      speakThenListen(quickStat);
      return;
    }

    // ★ 통합: 위의 조회·주문·이동으로 처리 안 된 명령을 로컬 규칙(앱 제어)으로 실행.
    //  조비서 orb로 말해도 명령 마이크와 똑같이 화면이동·검색·설정열기/닫기·주문폼이 실제로 동작한다.
    if (onAppCommand && onAppCommand(text)) {
      const msg = '네, 실행했어요.';
      setLastAI(msg); pushExchange(text, msg);
      processingRef.current = false;
      speakThenListen(msg);
      return;
    }

    setPhaseSync('thinking');

    if (!geminiKey) {
      processingRef.current = false;  // ★ BUG1 Fix: 조기 return 전 잠금 해제
      const t = '못 알아들었어요. "주문목록 보여줘", "고객관리 열어줘", "OO 검색"처럼 말씀해 주세요.';
      setLastAI(t); speakThenListen(t); return;
    }

    const newHistory = [...historyRef.current, { role: 'user', parts: [{ text }] }];
    try {
      const r = await callGeminiJarvis(newHistory, getCtx(), geminiKey);
      const aiText = r.text || '죄송해요, 다시 말씀해 주세요.';
      setLastAI(aiText);
      // ★ A1 Fix: 모델 답변은 text만 저장 (action JSON 제거 → 자연스러운 대화 맥락)
      const updated = [...newHistory, { role: 'model', parts: [{ text: aiText }] }];
      // ★ B5 Fix: 대화 기록 최대 20개(10쌍)로 제한 → Gemini 토큰 한도 방지
      const trimmed = updated.slice(-20);
      historyRef.current = trimmed;
      setHistory(trimmed);
      // ★ v5 Fix: action 우선, 없으면 텍스트에서 의도 감지
      const navAction = (r.action && JARVIS_TAB_MAP[r.action])
        ? r.action
        : detectNavIntent(text) || detectNavIntent(aiText);
      if (navAction && JARVIS_TAB_MAP[navAction]) {
        setTimeout(() => {
          setTab(JARVIS_TAB_MAP[navAction]);
          setMinimized(true);  // ★ 화면 이동 후 시트 최소화 → 새 화면 보이게
        }, 1200);
      }
      speakThenListen(aiText);
    } catch(e) {
      if (e.message && e.message.startsWith('QUOTA_EXCEEDED:')) {
        // ★ v15: 자동 재시도 루프 제거 — 같은 질문을 계속 재요청해 한도만 소모하던 문제.
        //  대신 바로 듣기로 돌아가서, 화면이동·주문·조회 등 AI 없이 되는 기능은 계속 쓰게 함.
        const t2 = 'AI 사용량이 많아 잠시 뒤에 다시 물어봐 주세요. 화면 이동이나 주문 등록, 고객·업체 조회는 지금도 됩니다.';
        setLastAI(t2);
        setPhaseSync('idle');
        // ★ v26: 자동 듣기일 때만 재개. 눌러 말하기면 대기(마이크 완전 정지).
        setTimeout(() => { if (activeRef.current && autoListenRef.current) beginListening(); }, 1000);
      } else {
        const t = '오류가 발생했어요. 다시 말씀해 주세요.';
        setLastAI(t);
        setPhaseSync('idle');
        setTimeout(() => { if (activeRef.current && autoListenRef.current) beginListening(); }, 800);  // ★ v26: 눌러 말하기면 정지
      }
    } finally {
      processingRef.current = false;  // ★ A2 Fix: 항상 lock 해제
    }
  }

  function speakThenListen(text) {
    if (!activeRef.current) return;
    setPhaseSync('speaking');
    clearTimeout(ttsTimerRef.current);
    window.speechSynthesis && window.speechSynthesis.cancel();

    // ★ v4 Fix: 이모지·마크다운·특수문자 제거 강화
    const clean = text
      .replace(/[\u{1F000}-\u{1FFFF}]/gu, '')  // 이모지 전체
      .replace(/[#*`~_|>{}\[\]]/g, '')          // 마크다운 특수문자
      .replace(/\s{2,}/g, ' ')                  // 연속 공백 제거
      .trim();
    let done = false;
    speakTextRef.current = clean;   // ★ v23: 에코 판별용 — 지금 말하는 문장
    const afterSpeak = () => {
      if (done) return;
      done = true;
      clearTimeout(ttsTimerRef.current);
      stopBargeIn();                 // ★ v23: 말 끝났으니 끼어들기 감지기 정리
      speakTextRef.current = '';
      setPhaseSync('idle');
      // ★ v25: 자동듣기가 켜져 있을 때만 TTS 후 다시 듣기. 꺼져 있으면(눌러 말하기) 대기.
      if (autoListenRef.current) {
        setTimeout(() => { if (activeRef.current && autoListenRef.current) beginListening(); }, 600);  // ★ v8: 대기시간 단축
      }
    };

    if (!clean) { afterSpeak(); return; }

    // ★ Bug3 fix: cancel() 후 50ms 지연 (Android TTS 무음 버그 방지)
    setTimeout(() => {
      if (done) return;
      const u = new SpeechSynthesisUtterance(clean);
      u.lang = 'ko-KR';
      u.rate = 0.93;  // ★ 자연스러운 말하기 속도
      u.pitch = 1.0;
      // ★ B2 Fix: 최고 품질 한국어 TTS 음성 자동 선택
      // Samsung 내장 > Google 한국어 > 기타 ko-KR 순으로 선택
      try {
        const applyVoice = () => {
          const voices = window.speechSynthesis.getVoices();
          const koVoices = voices.filter(v => v.lang && v.lang.startsWith('ko'));
          const best = koVoices.find(v => /samsung|구글|google|네이버/i.test(v.name))
                    || koVoices.find(v => v.localService)
                    || koVoices[0];
          if (best) u.voice = best;
        };
        // ★ UI8 Fix: 음성 목록 비동기 로딩 대기
        if (window.speechSynthesis.getVoices().length > 0) {
          applyVoice();
        } else {
          window.speechSynthesis.onvoiceschanged = () => { applyVoice(); window.speechSynthesis.onvoiceschanged = null; };
        }
      } catch(e) {}
      u.onend   = afterSpeak;
      u.onerror = afterSpeak;
      // ★ v23: TTS 시작 직후 끼어들기 감지 시작 — 말하는 중 사용자가 말하면 멈추고 듣기
      u.onstart = () => { if (!done) setTimeout(() => { if (!done && phaseRef.current === 'speaking') startBargeIn(); }, 350); };
      // ★ Bug4 fix: 폴백 타이머 단축 (한국어 평균 발화 속도 기준)
      const ms = Math.max(1500, clean.length * 65 + 800);
      ttsTimerRef.current = setTimeout(afterSpeak, ms);
      window.speechSynthesis.speak(u);
      // onstart가 안 오는 브라우저 대비: 500ms 뒤 폴백 시작
      setTimeout(() => { if (!done && phaseRef.current === 'speaking' && !bargeRecRef.current) startBargeIn(); }, 500);
    }, 50);
  }

  async function sendText() {
    const text = inp.trim();
    // ★ Bug7 Fix: thinking과 speaking 모두 차단
    if (!text || phaseRef.current === 'thinking' || phaseRef.current === 'speaking') return;
    setInp('');
    stopRec();
    await processUserSpeech(text);
  }

  function startCountdown(secs, retryText) {
    setPhaseSync('idle');
    setRetryCountdown(secs);
    clearInterval(countdownRef.current);
    let remaining = secs;
    countdownRef.current = setInterval(() => {
      remaining--;
      setRetryCountdown(remaining);
      if (remaining <= 0) {
        clearInterval(countdownRef.current);
        setRetryCountdown(0);
        if (activeRef.current) processUserSpeech(retryText);
      }
    }, 1000);
  }

  // ★ Bug2 Fix: ctx를 객체로 반환 (callGeminiJarvis가 기대하는 형식과 일치)
  // ★ Bug2b Fix: 실제 status 코드 사용 ('waiting','pending','ready','shipped')
  function getCtx() {
    const ords  = orders || [];
    const custs = customers || [];
    const prods = products || [];
    const todayStr = new Date().toLocaleDateString('ko-KR');
    // ★ v45 타임존 버그 수정: toISOString()은 UTC라 한국 새벽(0~9시)에 하루 전 날짜가 나옴 →
    //  주문 저장에 쓰는 로컬 날짜(todayStr()·orderDate와 동일 형식)로 계산해야 '오늘 신규'가 정확함.
    const _t = new Date();
    const todayISO = `${_t.getFullYear()}-${String(_t.getMonth() + 1).padStart(2, '0')}-${String(_t.getDate()).padStart(2, '0')}`;
    // 실제 status 코드: waiting=입금대기, pending=결제완료, ready=발송준비, shipped=발송완료
    const todayNew = ords.filter(o => (o.orderDate||o.createdAt||'').startsWith(todayISO)).length;
    const pendingWait = ords.filter(o => o.status === 'waiting').length;
    const pendingPay  = ords.filter(o => o.status === 'pending').length;
    const readyCount  = ords.filter(o => o.status === 'ready').length;
    const shippedCount = ords.filter(o => o.status === 'shipped').length;
    const productNames = prods.map(p => p.name).join(', ') || '없음';
    // 최근 5개 고객
    const recentCustomers = custs.slice(-5).map(c => c.name).join(', ') || '없음';
    // 최근 3개 주문 요약
    const recentOrders = ords.slice(-3).map(o => {
      const statusMap = { waiting:'입금대기', pending:'결제완료', ready:'발송준비', shipped:'발송완료' };
      return `${o.senderName||'?'}(${statusMap[o.status]||o.status})`;
    }).join(', ');
    // 최근 주문 10건 상세 포맷 (Gemini에 구체적 정보 제공)
    const smMap = { waiting:'입금대기', pending:'결제완료', ready:'발송준비', shipped:'발송완료' };
    const recentOrdersFull = ords.slice(-10).reverse().map((o, i) => {
      const d  = (o.orderDate||o.createdAt||'').slice(5,10).replace('-','/');
      const amt= o.amount ? Number(o.amount).toLocaleString()+'원' : '금액미상';
      const st = smMap[o.status] || o.status || '';
      const addr = o.address ? ' · '+o.address.slice(0,15) : '';
      return `${i+1}. ${o.senderName||'?'} ${amt} [${st}]${d?' '+d:''}${addr}`;
    }).join('\n') || '없음';
    return {
      total:            ords.length,
      today:            todayNew,
      todayStr:         todayStr,
      pending:          pendingWait,
      pendingPay:       pendingPay,
      ready:            readyCount,
      shipped:          shippedCount,
      customers:        custs.length,
      tab: {home:'홈대시보드',orders:'주문목록',new:'새주문입력',
             customers:'고객관리',products:'상품관리',subscriptions:'정기배송',
             deliverytrack:'배송관리',integrations:'연동설정'}[tab] || tab || '홈대시보드',
      products:         prods.length,
      productNames:     productNames,
      recentCustomers:  recentCustomers,
      recentOrders:     recentOrders,
      recentOrdersFull: recentOrdersFull,
      // ★ 데이터 기반 대화 강화: 상품 가격·업체·정기배송
      productPricing: prods.slice(0, 40).map(p => `${p.name}(일반 ${(Number(p.price)||0).toLocaleString()}원${p.wholesalePrice?`/업체 ${(Number(p.wholesalePrice)||0).toLocaleString()}원`:''}${p.stock!=null&&p.stock!==''?`, 재고 ${p.stock}`:''})`).join(', ') || '없음',
      vendorNames: (vendors||[]).map(v => v.name).filter(Boolean).join(', ') || '없음',
      subsCount: (subscriptions||[]).length,
    };
  }

  // 드래그 핸들러
  function onDragStart(e) {
    dragStartY.current = e.touches ? e.touches[0].clientY : e.clientY;
    const cur = parseFloat(sheetH) || 55;
    dragStartH.current = cur;
  }
  function onDragMove(e) {
    if (dragStartY.current === null) return;
    const y = e.touches ? e.touches[0].clientY : e.clientY;
    const dy = dragStartY.current - y;
    const vh = window.innerHeight / 100;
    const newH = Math.min(70, Math.max(28, dragStartH.current + dy / vh));
    setSheetH(newH + 'vh');
  }
  function onDragEnd() {
    dragStartY.current = null;
  }

  // ─── Orb 색상 ───
  // ★ v4 Fix: idle → 앱 초록(dim), retry → 주황
  const orbColor = phase === 'listening' ? '#4CAF50'
                 : phase === 'thinking'  ? '#FF9800'
                 : phase === 'speaking'  ? '#2196F3'
                 : retryCountdown > 0    ? '#FF9800'  // 재시도 대기 중: 주황
                 : '#3d7a54';            // idle: 앱 초록 dim (어두운 배경에서 식별 가능)
  const orbAnim  = phase === 'listening' ? 'jsOrbListen 0.9s ease-in-out infinite'
                 : phase === 'thinking'  ? 'jsOrbSpin 1.0s linear infinite'
                 : phase === 'speaking'  ? 'jsOrbSpeak 0.4s ease-in-out infinite'
                 : 'jsOrbIdle 2s ease-in-out infinite';  // ★ C5 Fix: idle 맥박
  const statusText = phase === 'listening' ? '듣는 중...'
                   : phase === 'thinking'  ? '생각 중...'
                   : phase === 'speaking'  ? '답변 중...'
                   : retryCountdown > 0   ? '잠시 후 다시 시도합니다'
                   : autoListen           ? '대기 중 — 말씀해 보세요'
                   : '눌러 말하기 — 마이크 버튼을 누르세요';

  return (
    <div style={{
      position:'fixed', left:0, right:0, bottom:0, zIndex:2999,
      pointerEvents:'none'
    }}>
      {/* 바텀시트 */}
      <div
        style={{
          position:'absolute', left:0, right:0, bottom:0,
          height: minimized ? '68px' : sheetH,
          background:'linear-gradient(160deg,#1a1a2e 0%,#16213e 60%,#0f172a 100%)',  /* ★ C6 Fix */
          borderRadius:'20px 20px 0 0',
          boxShadow:'0 -4px 30px rgba(0,0,0,0.5)',
          borderTop:'2px solid rgba(47,111,78,0.6)',  /* ★ UI6: 앱 초록 포인트 */
          display:'flex', flexDirection:'column',
          pointerEvents:'auto',
          overflow:'hidden',
          transition:'height 0.28s cubic-bezier(.4,0,.2,1)',
        }}
        onMouseMove={onDragMove} onMouseUp={onDragEnd}
        onTouchMove={onDragMove} onTouchEnd={onDragEnd}
      >
        {/* ★ MINI: 미니바 vs 확장 조건부 */}
        {minimized ? (
          <div style={{display:'flex',alignItems:'center',height:'100%',padding:'0 16px',gap:10,cursor:'pointer'}}
               onClick={()=>setMinimized(false)}>
            {/* 미니 Orb */}
            <div style={{width:22,height:22,borderRadius:'50%',flexShrink:0,background:orbColor,
              boxShadow:`0 0 14px ${orbColor}`,animation:orbAnim}}/>
            {/* 상태 텍스트 */}
            <div style={{flex:1,minWidth:0}}>
              <div style={{color:'#fff',fontSize:14,fontWeight:700,lineHeight:1.2}}>🤖 조비서 AI</div>
              <div style={{color:'#aaa',fontSize:12,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',marginTop:1}}>
                {statusText}{interim ? ' "'+interim.slice(0,20)+(interim.length>20?'…':'')+'"' : ''}
              </div>
            </div>
            {/* 펼치기 */}
            <span style={{color:'#88cc88',fontSize:18,flexShrink:0}}>▲</span>
            {/* 닫기 */}
            <button onClick={e=>{e.stopPropagation();stopRec();window.speechSynthesis&&window.speechSynthesis.cancel();clearTimeout(ttsTimerRef.current);clearTimeout(silenceTimerRef.current);clearInterval(countdownRef.current);setPhaseSync('idle');onClose&&onClose();}}

function JarvisButton({ orders, customers, products, tab, setTab, geminiKey, setSearchQuery, setStatusFilter, setDateFilter, vendors, createVoiceOrder, onAppCommand, subscriptions }) {
  const [sheetOpen, setSheetOpen] = React.useState(false);
  const [wakeActive, setWakeActive] = React.useState(false);
  const [toastMsg, setToastMsg] = React.useState('');
  const wakeRecRef = React.useRef(null);
  const wakeRestartRef = React.useRef(null);
  const toastTimerRef = React.useRef(null);
  const wakeActiveRef  = React.useRef(false);
  const sheetOpenRef   = React.useRef(false);
  wakeActiveRef.current = wakeActive;
  sheetOpenRef.current  = sheetOpen;

  function showToast(msg) {
    setToastMsg(msg);
    clearTimeout(toastTimerRef.current);
    toastTimerRef.current = setTimeout(() => setToastMsg(''), 2500);
  }

  function startWakeListen() {
    if (!wakeActiveRef.current) return;  // ★ v7 Fix: wakeActive=false이면 시작 안 함
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) return;
    const rec = new SR();
    rec.lang = 'ko-KR'; rec.continuous = false; rec.interimResults = false; rec.maxAlternatives = 3;
    wakeRecRef.current = rec;
    rec.onresult = (e) => {
      let said = '';
      for (let a = 0; a < (e.results[0].length||1); a++) said += (e.results[0][a].transcript||'') + ' ';
      said = said.toLowerCase().replace(/\s/g,'');
      const orderWords = ['하이조아쌈','하이조아','조아쌈','조아씸','하이조','주문창','주문열어','조아저씨'];
      const chatWords  = ['조비서','조비서야','조비서님','비서야','비서님'];
      if (orderWords.some(w => said.includes(w))) { showToast('📦 주문창!'); setTab('new'); }
      else if (chatWords.some(w => said.includes(w))) { showToast('조비서 켤게요!'); setSheetOpen(true); }
    };
    // ★ A4 Fix: 기존 인스턴스 재사용 대신 새 인스턴스 생성 (Samsung 안정성 향상)
    rec.onend = () => {
      if (wakeActiveRef.current && !sheetOpenRef.current)
        wakeRestartRef.current = setTimeout(() => startWakeListen(), 3000);
    };
    rec.onerror = () => {
      if (wakeActiveRef.current && !sheetOpenRef.current)
        wakeRestartRef.current = setTimeout(() => startWakeListen(), 5000);
    };
    try { rec.start(); } catch(e) {}
  }

  function toggleWake() {
    if (wakeActive) {
      wakeActiveRef.current = false;  // ★ v7 Fix: ref 먼저 false
      setWakeActive(false);
      clearTimeout(wakeRestartRef.current);
      try { wakeRecRef.current?.stop(); } catch(e) {}
      showToast('음성대기 꺼짐');
    } else {
      wakeActiveRef.current = true;   // ★ v7 Fix: ref 먼저 true
      setWakeActive(true);
      showToast('"하이조아쌈" 또는 "조비서" 라고 말해보세요');
      startWakeListen();
    }
  }

  React.useEffect(() => {
    // ★ v26: 상시 대기(웨이크워드) 자동 시작 제거 — 배경에서 마이크가 계속 켜져 비프음 나던 문제 해결.
    //  이제 마이크는 사용자가 버튼을 눌렀을 때만 켜진다. (원하면 아래 마이크 길게 눌러 수동으로 웨이크 켤 수 있음)
    return () => {
      clearTimeout(wakeRestartRef.current);
      clearTimeout(toastTimerRef.current);
      try{wakeRecRef.current?.stop();}catch(e){}
    };
  }, []);

  return (
    <>
      {/* 🤖 플로팅 버튼 */}
      <div style={{ position:'fixed', bottom:'calc(84px + env(safe-area-inset-bottom, 0px))', left:12, zIndex:1000 }}>

        {/* 토스트 */}
        {toastMsg && (
          <div style={{ position:'absolute', bottom:'calc(100% + 8px)', left:0, background:'rgba(20,25,55,0.96)', color:'#fff', fontSize:12, padding:'7px 13px', borderRadius:14, whiteSpace:'pre-line', fontWeight:600, lineHeight:1.5, minWidth:150, border:'1px solid rgba(66,133,244,0.4)', boxShadow:'0 4px 14px rgba(0,0,0,0.5)', pointerEvents:'none' }}>
            {toastMsg}
          </div>
        )}

        {/* 웨이크 링 */}
        {wakeActive && !sheetOpen && (
          <div style={{ position:'absolute', inset:-6, borderRadius:'50%', border:'2px solid rgba(66,133,244,0.7)', animation:'jbRing 1.8s infinite', pointerEvents:'none' }}/>
        )}

        {/* ★ 통합 버튼: AI + 마이크 아이콘 하나로 */}
        <button onClick={()=>{
          const opening = !sheetOpen;
          if (opening) {
            // ★ v7 Fix: ref 직접 설정 → stop() 이전에 확실히 false (경쟁 조건 제거)
            clearTimeout(wakeRestartRef.current);
            wakeActiveRef.current = false;   // 비동기 state보다 먼저 ref 직접 false
            setWakeActive(false);
            try { wakeRecRef.current && wakeRecRef.current.stop(); } catch(e) {}
          } else {
            // ★ v7 Fix: ref 직접 true 후 startWakeListen (state 비동기 문제 방지)
            setTimeout(() => {
              wakeActiveRef.current = true;  // ref 먼저 true
              setWakeActive(true);
              startWakeListen();
            }, 1000);
          }
          setSheetOpen(o=>!o);
        }} title={sheetOpen ? '닫기' : '조비서 AI — 탭하거나 "조비서"라고 말하세요'}
          style={{
            width:52, height:52, borderRadius:'50%', border:'none', cursor:'pointer',
            background: sheetOpen
              ? 'rgba(219,68,55,0.90)'
              : 'linear-gradient(135deg,#2F6F4E 0%,#4CAF50 100%)',
            color:'#fff', fontSize:26,
            display:'flex', alignItems:'center', justifyContent:'center',
            boxShadow: sheetOpen
              ? '0 3px 16px rgba(219,68,55,0.55)'
              : wakeActive
                ? '0 0 0 3px rgba(76,175,80,0.45), 0 4px 18px rgba(47,111,78,0.65)'
                : '0 4px 14px rgba(47,111,78,0.5)',
            transition:'all 0.25s',
          }}>
          {sheetOpen ? '✕' : '🎤'}
        </button>
      </div>

      {/* 논모달 바텀시트 */}
      {sheetOpen && (
        <JarvisSheet
          orders={orders} customers={customers} products={products}
          tab={tab} setTab={setTab} geminiKey={geminiKey}
          setSearchQuery={setSearchQuery} setStatusFilter={setStatusFilter} setDateFilter={setDateFilter}
          vendors={vendors} createVoiceOrder={createVoiceOrder}
          onAppCommand={onAppCommand}
          subscriptions={subscriptions}
          onClose={()=>{
            setSheetOpen(false);
            // ★ v7 Fix: ref 직접 true 후 startWakeListen
            setTimeout(() => {
              wakeActiveRef.current = true;
              setWakeActive(true);
              startWakeListen();
            }, 1000);
          }}
        />
      )}

      <style>{`
        @keyframes jbRing { 0%{opacity:0.9;transform:scale(1)} 70%{opacity:0;transform:scale(1.65)} 100%{opacity:0;transform:scale(1.65)} }
      `}</style>
    </>
  );
}

function downloadWorkbook(rows, sheetName, filename, columnOrder, rowFillFn) {
  const sheet = XLSX.utils.json_to_sheet(rows, columnOrder ? { header: columnOrder } : undefined);
  // 테두리 + 헤더 음영 + (있으면) 행별 구분 색상 적용
  const range = XLSX.utils.decode_range(sheet["!ref"] || "A1");
  const headerBorder = { style: "medium", color: { rgb: "000000" } };
  const dataBorder = { style: "thin", color: { rgb: "000000" } };
  for (let R = range.s.r; R <= range.e.r; R++) {
    const isHeader = R === range.s.r;
    const b = isHeader ? headerBorder : dataBorder;
    const rowFill = !isHeader && rowFillFn ? rowFillFn(rows[R - range.s.r - 1], R - range.s.r - 1) : null;
    for (let C = range.s.c; C <= range.e.c; C++) {
      const addr = XLSX.utils.encode_cell({ r: R, c: C });
      const cell = sheet[addr];
      if (!cell) continue;
      cell.s = {
        border: { top: b, bottom: b, left: b, right: b },
        alignment: { vertical: "center", horizontal: isHeader ? "center" : "left", wrapText: false },
        font: { name: "맑은 고딕", sz: isHeader ? 11 : 10, bold: isHeader },
        fill: isHeader
          ? { patternType: "solid", fgColor: { rgb: "E6F1E9" } }
          : (rowFill ? { patternType: "solid", fgColor: { rgb: rowFill } } : undefined),
      };
    }
  }
  // 컬럼 폭 자동(대략)
  const colW = [];
  for (let C = range.s.c; C <= range.e.c; C++) {
    let maxLen = 8;
    for (let R = range.s.r; R <= range.e.r; R++) {
      const addr = XLSX.utils.encode_cell({ r: R, c: C });
      const v = sheet[addr] ? String(sheet[addr].v ?? "") : "";
      // 한글은 폭 2로 계산
      let len = 0; for (const ch of v) len += /[가-힣ㄱ-ㅎ]/.test(ch) ? 2 : 1;
      if (len > maxLen) maxLen = len;
    }
    colW.push({ wch: Math.min(maxLen + 2, 40) });
  }
  sheet["!cols"] = colW;
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, sheet, sheetName);
  XLSX.writeFile(wb, filename);
}

function readWorkbookFile(file, onRows, onError) {
  const reader = new FileReader();
  reader.onerror = () => {
    if (onError) onError(reader.error);
  };
  reader.onload = (e) => {
    try {
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, { type: "array" });
      // 네이버는 시트명이 '발송처리'인 경우가 있어 우선 사용, 없으면 첫 시트
      const sheetName = wb.SheetNames.find((n) => /발송처리|주문|order/i.test(n)) || wb.SheetNames[0];
      const sheet = wb.Sheets[sheetName];
      // 먼저 행렬로 읽어서 진짜 제목 줄(헤더)이 몇 번째인지 찾는다
      const matrix = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });
      // 제목으로 인정할 키워드들 (쇼핑몰 공통)
      const headerKeywords = ["상품주문번호", "수취인명", "받는분", "주문번호", "상품명", "수취인연락처1", "통합배송지", "구매자명"];
      let headerIdx = 0;
      for (let i = 0; i < Math.min(matrix.length, 10); i++) {
        const rowCells = (matrix[i] || []).map((c) => String(c).trim());
        // 셀 전체가 제목 키워드와 정확히 일치하는 경우만 카운트 (설명문 줄 오인 방지)
        const hits = headerKeywords.filter((k) => rowCells.some((c) => c === k)).length;
        if (hits >= 2) { headerIdx = i; break; }
      }
      // 찾은 제목 줄을 기준으로 객체 배열 생성
      const header = (matrix[headerIdx] || []).map((c) => String(c).trim());
      const rows = [];
      for (let i = headerIdx + 1; i < matrix.length; i++) {
        const cells = matrix[i] || [];
        const obj = {};
        let hasData = false;
        header.forEach((h, ci) => {
          if (!h) return;
          const val = cells[ci] !== undefined ? cells[ci] : "";
          obj[h] = val;
          if (String(val).trim()) hasData = true;
        });
        if (hasData) rows.push(obj);
      }
      onRows(rows);
    } catch (err) {
      // 파일이 깨졌거나 지원하지 않는 형식이면, 조용히 멈추지 말고 반드시 알림
      if (onError) onError(err);
    }
  };
  reader.readAsArrayBuffer(file);
}

  // 엑셀 등 무거운 파일을 처리하는 동안 "처리 중"을 화면에 보여주기 위한 상태
  // (표시가 없으면 계산하는 몇 초 동안 앱이 멈춘 것처럼 보이는 문제가 있어 추가)
  const [busyMessage, setBusyMessage] = useState(null);

          //  그 빈 상태가 실제 데이터 위에 저장되어버리는 사고로 이어질 수 있음)
          if (snap.metadata && snap.metadata.fromCache) {

          if (snap.exists) {

          if (data.customers) setCustomers(data.customers);
          if (data.products) setProducts(data.products);
          if (data.vendors) setVendors(data.vendors);
          if (data.invoices) setInvoices(data.invoices);

          if (data.subscriptions) setSubscriptions(data.subscriptions);

          if (data.customMarketplaces) setCustomMarketplaces(data.customMarketplaces);
          if (data.couriers) setCouriers(data.couriers);
          if (data.smsTemplate) setSmsTemplate(data.smsTemplate);
          if (data.orderTemplate) setOrderTemplate(data.orderTemplate);

          // (일부 필드가 통신 중 누락돼도 "직전 데이터"가 같이 오염되지 않도록)

          try {
            const counts = {
              customers: (data.customers || []).length,
              orders: (data.orders || []).length,
              products: (data.products || []).length,
              vendors: (data.vendors || []).length,
            };
            if (counts.customers || counts.orders || counts.products || counts.vendors) {
              localStorage.setItem("joassam_seen_real_data_" + DATA_DOC, "1");

          } catch { /* localStorage 사용 불가 환경이면 무시 */ }
          // 버전 검사: 서버에 기록된 "최소 허용 버전"보다 내가 낮으면 오래된 기기로 판단해 쓰기 금지.

            }

        } else {
          // 문서가 "없다"고 나온 상황. 정말 처음 쓰는 가게인지, 원래 있던 문서를 순간적으로
          // 못 읽어온 착오 상황인지 구분해야 함 → 이 기기에서 예전에 실제 데이터를 본 적이

          try { sawRealDataBefore = localStorage.getItem("joassam_seen_real_data_" + DATA_DOC) === "1"; } catch { /* ignore */ }
          if (sawRealDataBefore) {
            // 착오 상황으로 판단 → 저장 계속 금지, 화면에 경고
            fireToast("⚠ 데이터를 불러오지 못했어요. 화면을 새로고침 해주세요 (저장은 안전을 위해 잠시 막아둡니다)");
          } else {
            // 이 기기에서 한 번도 실제 데이터를 본 적 없음 → 진짜 최초 사용으로 판단, 저장 허용
            fbFirstLoadRef.current = true;
          }
        }
        setDataLoaded(true);
      },
      () => {
        // 네트워크 오류 등: 첫 로드를 완료로 표시하지 않음 → 시드/빈값으로 덮어쓰기 방지
        setDataLoaded(true);
      }
      );

      const memRef = fbDb.collection("stores").doc(MEMBERS_DOC);
      unsubMembers = memRef.onSnapshot((snap) => {
        if (snap.exists) setMembers(snap.data().list || []);
      });
    }

    // 이미 인증이 되어 있으면(익명 로그인 포함) 바로 연결, 아니면 인증이 완료되는 순간을 기다림

    if (firebaseReady) {
      // Firebase에서 첫 데이터를 받기 전에는 저장하지 않음 (시드/빈값이 실데이터를 덮어쓰는 사고 방지)

  // 주문상세)으로 돌아가도록 함. (원래는 화면 전환이 그냥 state로만 바뀌어서 브라우저
  // 기록이 안 남아있어, 뒤로가기를 누르면 앱을 벗어나 버리는 문제가 있었음)
  const isPopStateNavRef = useRef(false);

      setSelectedOrderId(state.selectedOrderId || null);

    window.addEventListener("popstate", onPopState);
    try { window.history.replaceState({ tab: "home", selectedOrderId: null }, ""); } catch {}
    return () => window.removeEventListener("popstate", onPopState);
  }, []);
  useEffect(() => {
    if (isPopStateNavRef.current) {
      // 뒤로가기로 인해 화면이 바뀐 경우엔, 새 기록을 또 쌓지 않음
      isPopStateNavRef.current = false;

  const [isListening, setIsListening] = useState(false); // 명령 마이크 동작 중 표시용
  const [voiceText, setVoiceText]     = useState("");    // 마지막으로 인식된 문장(표시용)
  // #4 동명이인/유사업체 확인 대기 상태 (있으면 등록 일시중지, 사용자 선택 대기)
  const [nameChoice, setNameChoice]   = useState(null);  // { candidates:[...], payload }
