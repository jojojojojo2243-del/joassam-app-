function OrderDetail({ order, customer, productMap, products, total, onBack, setOrderStatus, updateOrder, deleteOrder, askConfirm, couriers }) {
  const st = STATUS[order.status] || STATUS.pending;
  // 주문 당시 저장된 받는분 정보를 항상 우선. 아주 오래된 주문 등 저장된 정보가 없을 때만 연결된 고객 정보로 보완.
  const recipient = order.recipient || (customer ? { name: customer.name, phone: customer.phone, address: customer.address, postalCode: customer.postalCode } : {});

  const [editing, setEditing] = useState(false);
  const [editProdTab, setEditProdTab] = useState("all"); // 전체/공용/일반용/업체용
  const [boxEdit, setBoxEdit] = useState(null); // 묶음 수정 모달용 낱개 배열(null이면 닫힘)

  // 현재 주문의 박스 구성: 수동 지정(manualBoxes) 우선, 없으면 자동 분할
  const orderBoxes = (order.manualBoxes && order.manualBoxes.length)
    ? order.manualBoxes
    : splitIntoBoxes(order.items || [], productMap);
  const totalUnits = (order.items || []).reduce((s, it) => s + (Number(it.qty) || 0), 0);

  // 묶음 수정 모달 열기 — 주문 품목을 낱개로 펼쳐 BoxPlanModal에 전달
  function openBoxEdit() {
    const unitItems = [];
    (order.items || []).forEach((it) => {
      const p = productMap[it.productId];
      const name = p ? p.name : (it.name || "상품");
      const price = it.price != null ? it.price : (p ? (p.wholesalePrice || p.price) : 0);
      const unit = p ? (p.unit || "kg") : (it.unit || "kg");
      const qty = Number(it.qty) || 0;
      for (let i = 0; i < qty; i++) unitItems.push({ productId: it.productId, name, price, unit });
    });
    setBoxEdit(unitItems);
  }

  // 묶음선택 완료 → 수동 박스 구성 저장 (등록 때 applyBoxPlan과 동일 규칙)
  function applyBoxEdit(boxesOfUnits) {
    const boxes = boxesOfUnits.map((unitArr) => {
      const map = {};
      unitArr.forEach((u) => {
        const key = u.productId || u.name;
        if (!map[key]) map[key] = { productId: u.productId, name: u.name, qty: 0, price: u.price, unit: u.unit };
        map[key].qty += 1;
      });
      const items = Object.values(map);
      return { items, volume: volumeForBoxItems(items, productMap) };
    });
    updateOrder(order.id, { manualBoxes: boxes });
    setBoxEdit(null);
  }
  const [form, setForm] = useState(() => ({
    sender: { ...order.sender },
    recipient: { ...order.recipient },
    boxVolume: order.boxVolume || "",
    deliveryMessage: order.deliveryMessage || "",
    memo: order.memo || "",
    reserveDate: order.reserveDate || "",
    items: JSON.parse(JSON.stringify(order.items || [])),   // ★ 커스텀 상품(productId 없음)도 보존
  }));

  function startEdit() {
    setForm({
      sender: { ...order.sender },
      recipient: { ...order.recipient },
      boxVolume: order.boxVolume || "",
      deliveryMessage: order.deliveryMessage || "",
      memo: order.memo || "",
      reserveDate: order.reserveDate || "",
      items: JSON.parse(JSON.stringify(order.items || [])),   // ★ 커스텀 상품(productId 없음)도 보존
    });
    setEditing(true);
  }

  // key = productId(등록상품) 또는 name(커스텀상품). meta는 없던 항목을 새로 추가할 때 사용.
  function changeFormQty(key, delta, meta) {
    setForm((prev) => {
      const items = JSON.parse(JSON.stringify(prev.items || []));   // 깊은 복사(불변성)
      const idx = items.findIndex((it) => (it.productId || it.name) === key);
      if (idx === -1) {
        if (delta > 0 && meta) items.push({ ...meta, qty: 1 });
      } else {
        items[idx].qty = (Number(items[idx].qty) || 0) + delta;
        if (items[idx].qty <= 0) items.splice(idx, 1);
      }
      return { ...prev, items };
    });
  }

  function saveEdit() {
    const items = (form.items || []).map((it) => {
      if (it.productId) {
        const p = productMap[it.productId];
        const isBiz = order.isBusiness || (p && p.channel === "business");
        const price = p ? (isBiz ? (p.wholesalePrice || p.price) : p.price) : (it.price || 0);
        return { productId: it.productId, name: p ? p.name : (it.name || "상품"), qty: it.qty, price };
      }
      return { productId: null, name: it.name || "상품", qty: it.qty, price: it.price || 0 };   // 커스텀 상품 그대로 보존
    }).filter((it) => (Number(it.qty) || 0) > 0);
    if (items.length === 0) return;
    updateOrder(order.id, {
      sender: form.sender,
      recipient: { ...form.recipient, phone: form.recipient.phone || form.sender.phone || "", postalCode: estimatePostalCode(form.recipient.address) },
      boxVolume: form.boxVolume,
      deliveryMessage: form.deliveryMessage,
      memo: form.memo,
      reserveDate: form.reserveDate,
      items,
      manualBoxes: null,   // 품목을 바꾸면 수동 묶음 해제 → 자동 분할로 복귀
    });
    setEditing(false);
  }

  function handleDelete() {
    askConfirm("이 주문을 삭제할까요? 삭제하면 되돌릴 수 없습니다.", () => {
      deleteOrder(order.id);
      onBack();
    });
  }

  // ★ 상세 화면에서 품목 수량을 즉석 +/- (묶음/커스텀 상품 포함). 깊은 복사로 불변성 유지, bundleId는 updateOrder가 보존.
  function quickAdjustQty(key, delta) {
    const items = JSON.parse(JSON.stringify(order.items || []));   // 깊은 복사
    const idx = items.findIndex((it) => (it.productId || it.name) === key);
    if (idx === -1) return;
    items[idx].qty = Math.max(0, (Number(items[idx].qty) || 0) + delta);
    const kept = items.filter((it) => (Number(it.qty) || 0) > 0);
    if (kept.length === 0) {
      askConfirm("상품이 모두 0이 됩니다. 이 주문을 삭제할까요?", () => { deleteOrder(order.id); onBack(); });
      return;
    }
    // 수량이 바뀌면 낱개 구성이 달라지므로 수동 묶음은 해제하고 자동 분할로 되돌린다.
    updateOrder(order.id, { items: kept, manualBoxes: null });
  }

  const formItems = (form.items || []).map((it) => ({ productId: it.productId, name: it.name, qty: it.qty, price: it.price }));

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
        <button onClick={onBack} style={{ background: "none", border: "none", color: "#5F5E5A", fontSize: 13, cursor: "pointer", padding: 0 }}>
          ← 주문 목록으로
        </button>
        {!editing && (
          <div style={{ display: "flex", gap: 10 }}>
            <button onClick={startEdit} style={{ background: "none", border: "none", color: "#185FA5", fontSize: 13, fontWeight: 700, cursor: "pointer", padding: 0 }}>수정</button>
            <button onClick={handleDelete} style={{ background: "none", border: "none", color: "#A32D2D", fontSize: 13, fontWeight: 700, cursor: "pointer", padding: 0 }}>삭제</button>
          </div>
        )}
      </div>

      {!editing ? (
        <div style={{ background: "#fff", border: "1px solid #E2E4DD", borderRadius: 12, padding: 18 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 14 }}>
            <h2 style={{ fontSize: 16, fontWeight: 700, margin: 0 }}>주문 상세{order.isBusiness ? <span style={{ fontSize: 11, fontWeight: 700, color: "#854F0B", background: "#FAEEDA", padding: "2px 8px", borderRadius: 8, marginLeft: 8 }}>업체</span> : null}</h2>
            <span style={{ fontSize: 12, fontWeight: 700, color: st.color, background: st.bg, padding: "4px 10px", borderRadius: 20 }}>
              {st.label}
            </span>
          </div>

          <div style={{ display: "flex", flexDirection: "column", gap: 7, marginBottom: 16 }}>
            <FieldRow label="주문번호" value={order.id} />
            <FieldRow label="주문일" value={order.orderDate} />
            <FieldRow label="예약주문일" value={order.reserveDate || "-"} />
            <FieldRow label="보내는분 (주문자)" value={order.sender?.name || "-"} />
            <FieldRow label="주문자 연락처" value={order.sender?.phone || "-"} />
            <FieldRow label="받는분" value={recipient?.name || "-"} />
            <FieldRow label="받는분 연락처" value={recipient?.phone || "-"} />
            <FieldRow label="우편번호" value={recipient?.address ? (recipient.postalCode || estimatePostalCode(recipient.address)) : "-"} />
            <FieldRow label="받는분 주소(전체)" value={recipient?.address || "-"} />
            <FieldRow label="상품명" value={(order.items || []).map((it) => productMap[it.productId]?.name || it.name || "상품").join(", ") || "-"} />
            <FieldRow label="수량" value={String((order.items || []).reduce((s, it) => s + (it.qty || 0), 0))} />
            <FieldRow label="박스부피" value={order.boxVolume || "-"} />
            {order.boxInfo && <FieldRow label="박스" value={order.boxInfo} />}
            {(() => {
              // 낱개가 2개 이상이면 묶음 구성/수정 UI를 노출 (수동 묶음이 있으면 1박스여도 노출)
              const boxes = orderBoxes;
              const isManual = !!(order.manualBoxes && order.manualBoxes.length);
              if (totalUnits < 2 && !isManual) return null;
              return (
                <div style={{ background: "#F4F8F5", border: "1px solid #D7E6DC", borderRadius: 10, padding: "10px 12px", margin: "8px 0" }}>
                  <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
                    <div style={{ fontSize: 12, fontWeight: 700, color: "#2F6F4E" }}>
                      📦 발송 박스 {boxes.length}개 · 송장 {boxes.length}개
                      {isManual ? <span style={{ fontSize: 10, fontWeight: 700, color: "#185FA5", background: "#E6F1FB", padding: "1px 6px", borderRadius: 6, marginLeft: 6 }}>수동</span> : null}
                    </div>
                    <button onClick={openBoxEdit} style={{ border: "1px solid #2F6F4E", background: "#fff", color: "#2F6F4E", fontSize: 11.5, fontWeight: 700, borderRadius: 7, padding: "4px 10px", cursor: "pointer" }}>묶음 수정</button>
                  </div>
                  {boxes.map((b, i) => (
                    <div key={i} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "7px 0", borderTop: i > 0 ? "1px solid #E6EFE9" : "none" }}>
                      <span style={{ fontSize: 13, color: "#1B2430" }}>
                        {b.items.map((x) => `${x.name} X ${x.qty}개`).join(", ")}
                      </span>
                      <span style={{ display: "flex", alignItems: "center", gap: 6, flexShrink: 0, marginLeft: 8 }}>
                        <span style={{ fontSize: 10.5, color: "#888780" }}>부피 {b.volume}</span>
                        <span style={{ fontSize: 16 }}>📦</span>
                      </span>
                    </div>
                  ))}
                  {isManual && (
                    <button onClick={() => { updateOrder(order.id, { manualBoxes: null }); }} style={{ marginTop: 8, border: "none", background: "none", color: "#888780", fontSize: 11, fontWeight: 700, cursor: "pointer", padding: 0, textDecoration: "underline" }}>자동 묶음으로 되돌리기</button>
                  )}
                </div>
              );
            })()}
            <FieldRow label="메모" value={order.memo || "-"} />
            <FieldRow label="배송메시지" value={order.deliveryMessage || "-"} />
            <FieldRow label="입금금액" value={order.paymentAmount != null ? won(order.paymentAmount) : won(total)} />
          </div>

          <div style={{ marginBottom: 16 }}>
            <label style={{ fontSize: 12, color: "#5F5E5A", fontWeight: 700 }}>송장번호</label>
            <InvoiceQuickEdit order={order} updateOrder={updateOrder} couriers={couriers} />
          </div>

          <div style={{ borderTop: "1px dashed #D3D1C7", borderBottom: "1px dashed #D3D1C7", padding: "10px 0", margin: "0 0 14px" }}>
            {order.isBundle ? <div style={{ fontSize: 11, fontWeight: 700, color: "#185FA5", background: "#E6F1FB", display: "inline-block", padding: "2px 8px", borderRadius: 8, marginBottom: 8 }}>📦 묶음배송</div> : null}
            {(order.items || []).map((it, idx) => {
              const p = productMap[it.productId];
              const dispName = p ? p.name : (it.name || "상품");
              const dispPrice = p ? p.price : (it.price || 0);
              const key = it.productId || it.name;
              return (
                <div key={idx} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", fontSize: 13, marginBottom: 8, gap: 8 }}>
                  <span style={{ flex: 1 }}>{dispName}</span>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <button onClick={() => quickAdjustQty(key, -1)} style={qtyBtnStyle} title="수량 감소">−</button>
                    <span style={{ minWidth: 18, textAlign: "center", fontWeight: 700 }}>{it.qty}</span>
                    <button onClick={() => quickAdjustQty(key, +1)} style={qtyBtnStyle} title="수량 증가">＋</button>
                    <span style={{ minWidth: 62, textAlign: "right", color: "#5F5E5A" }}>{dispPrice ? won(dispPrice * it.qty) : "-"}</span>
                  </div>
                </div>
              );
            })}
          </div>

          <div style={{ display: "flex", justifyContent: "space-between", fontWeight: 700, fontSize: 15, marginBottom: 16 }}>
            <span>합계</span>
            <span>{won(total)}</span>
          </div>

          <label style={{ fontSize: 12, color: "#5F5E5A", fontWeight: 700 }}>주문 상태</label>
          <div style={{ display: "flex", gap: 6, marginTop: 6 }}>
            {Object.entries(STATUS).map(([key, val]) => (
              <button
                key={key}
                onClick={() => setOrderStatus(order.id, key)}
                style={{
                  flex: 1, padding: "8px 0", borderRadius: 8,
                  border: order.status === key ? `1px solid ${val.color}` : "1px solid #E2E4DD",
                  background: order.status === key ? val.bg : "#fff",
                  color: order.status === key ? val.color : "#5F5E5A",
                  fontWeight: 700, fontSize: 12, cursor: "pointer",
                }}
              >
                {val.label}
              </button>
            ))}
          </div>
        </div>
      ) : (
        <div style={{ background: "#fff", border: "1px solid #E2E4DD", borderRadius: 12, padding: 18 }}>
          <div style={{ fontSize: 12, fontWeight: 700, color: "#27500A", marginBottom: 8 }}>주문 정보 수정</div>

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 8 }}>
            <input placeholder="보내는분(주문자)" value={form.sender.name} onChange={(e) => setForm({ ...form, sender: { ...form.sender, name: e.target.value } })} style={inputStyle()} />
            <input placeholder="주문자 연락처" value={form.sender.phone} onChange={(e) => setForm({ ...form, sender: { ...form.sender, phone: e.target.value } })} style={inputStyle()} />
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 8 }}>
            <input placeholder="받는분" value={form.recipient.name} onChange={(e) => setForm({ ...form, recipient: { ...form.recipient, name: e.target.value } })} style={inputStyle()} />
            <input placeholder="받는분 연락처" value={form.recipient.phone} onChange={(e) => setForm({ ...form, recipient: { ...form.recipient, phone: e.target.value } })} style={inputStyle()} />
          </div>
          <input placeholder="받는분 주소(전체)" value={form.recipient.address} onChange={(e) => setForm({ ...form, recipient: { ...form.recipient, address: e.target.value } })} style={{ ...inputStyle(), marginBottom: 6 }} />
          {form.recipient.address.trim() && (
            <div style={{ fontSize: 11, color: "#185FA5", marginBottom: 8 }}>자동 입력된 우편번호: {estimatePostalCode(form.recipient.address)}</div>
          )}
          <input placeholder="배송메시지 (선택)" value={form.deliveryMessage} onChange={(e) => setForm({ ...form, deliveryMessage: e.target.value })} style={{ ...inputStyle(), marginBottom: 8 }} />
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 14 }}>
            <div>
              <label style={{ fontSize: 11, color: "#5F5E5A", fontWeight: 500, display: "block", marginBottom: 4 }}>예약발송일 (선택)</label>
              <input type="date" value={form.reserveDate} onChange={(e) => setForm({ ...form, reserveDate: e.target.value })} style={{ ...inputStyle(), color: "#1B2430" }} />
            </div>
            <div>
              <label style={{ fontSize: 11, color: "#5F5E5A", fontWeight: 500, display: "block", marginBottom: 4 }}>박스부피 (선택)</label>
              <input placeholder="예: 5" value={form.boxVolume} onChange={(e) => setForm({ ...form, boxVolume: e.target.value })} style={inputStyle()} />
            </div>
          </div>
          <input placeholder="메모" value={form.memo} onChange={(e) => setForm({ ...form, memo: e.target.value })} style={{ ...inputStyle(), marginBottom: 14 }} />

          <div style={{ fontSize: 12, fontWeight: 500, color: "#5F5E5A", marginBottom: 8 }}>상품</div>
          <div style={{ display: "flex", gap: 5, marginBottom: 8 }}>
            {[["all", "전체"], ["both", "공용"], ["retail", "일반용"], ["business", "업체용"]].map(([key, label]) => (
              <button key={key} onClick={() => setEditProdTab(key)}
                style={{ flex: 1, padding: "6px 0", borderRadius: 7, border: editProdTab === key ? "1px solid #2F6F4E" : "1px solid #E2E4DD", background: editProdTab === key ? "#EAF3DE" : "#fff", color: editProdTab === key ? "#27500A" : "#5F5E5A", fontSize: 11, fontWeight: 700, cursor: "pointer" }}>
                {label}
              </button>
            ))}
          </div>
          {/* ★ 커스텀(음성/무게) 상품 — 등록상품 목록엔 없으므로 따로 수량 편집. 커스텀 상품이 사라지던 버그 해결 */}
          {(form.items || []).filter((it) => !it.productId).length > 0 && (
            <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 10 }}>
              {(form.items || []).filter((it) => !it.productId).map((it, i) => (
                <div key={"c" + i} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", border: "1px solid #D9C7A6", background: "#FBF7EE", borderRadius: 10, padding: "10px 12px" }}>
                  <div style={{ fontSize: 13, fontWeight: 700 }}>{it.name} <span style={{ fontSize: 9.5, fontWeight: 700, color: "#854F0B", background: "#F3E6CE", padding: "1px 5px", borderRadius: 6 }}>직접입력</span></div>
                  <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                    <button onClick={() => changeFormQty(it.name, -1)} style={qtyBtnStyle}>−</button>
                    <span style={{ fontSize: 13, fontWeight: 700, minWidth: 16, textAlign: "center" }}>{it.qty}</span>
                    <button onClick={() => changeFormQty(it.name, 1)} style={qtyBtnStyle}>+</button>
                  </div>
                </div>
              ))}
            </div>
          )}
          <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 14 }}>
            {products.filter((p) => editProdTab === "all" || (p.channel || "both") === editProdTab).map((p) => {
              const found = (form.items || []).find((it) => it.productId === p.id);
              const qty = found ? found.qty : 0;
              const isBizProduct = (p.channel || "both") === "business";
              const showPrice = isBizProduct ? (p.wholesalePrice || p.price) : p.price;
              const CH = { both: "공용", retail: "일반용", business: "업체용" };
              return (
                <div key={p.id} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", border: "1px solid #E2E4DD", borderRadius: 10, padding: "10px 12px" }}>
                  <div>
                    <div style={{ fontSize: 13, fontWeight: 700 }}>{p.name} <span style={{ fontSize: 9.5, fontWeight: 700, color: "#888780", background: "#EFEFE9", padding: "1px 5px", borderRadius: 6 }}>{CH[p.channel || "both"]}</span></div>
                    <div style={{ fontSize: 12, color: isBizProduct ? "#854F0B" : "#5F5E5A" }}>{won(showPrice)}{isBizProduct && p.wholesalePrice ? " (업체가)" : ""}</div>
                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                    <button onClick={() => changeFormQty(p.id, -1)} style={qtyBtnStyle}>−</button>
                    <span style={{ fontSize: 13, fontWeight: 700, minWidth: 16, textAlign: "center" }}>{qty}</span>
                    <button onClick={() => changeFormQty(p.id, 1, { productId: p.id, name: p.name, price: showPrice })} style={qtyBtnStyle}>+</button>
                  </div>
                </div>
              );
            })}
          </div>

          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
            <span style={{ fontSize: 13, color: "#5F5E5A" }}>합계</span>
            <span style={{ fontSize: 16, fontWeight: 700 }}>
              {won(formItems.reduce((s, it) => { const p = productMap[it.productId]; if (p) { const isBiz = order.isBusiness || p.channel === "business"; const pr = isBiz ? (p.wholesalePrice || p.price) : p.price; return s + pr * it.qty; } return s + (Number(it.price) || 0) * it.qty; }, 0))}
            </span>
          </div>

          <div style={{ display: "flex", gap: 8 }}>
            <button onClick={() => setEditing(false)} style={{ flex: 1, padding: "11px 0", borderRadius: 10, border: "1px solid #D3D1C7", background: "#fff", color: "#5F5E5A", fontWeight: 700, fontSize: 13, cursor: "pointer" }}>
              취소
            </button>
            <button
              onClick={saveEdit}
              disabled={formItems.length === 0}
              style={{ flex: 2, padding: "11px 0", borderRadius: 10, border: "none", background: formItems.length === 0 ? "#D3D1C7" : "#2F6F4E", color: "#fff", fontWeight: 700, fontSize: 13, cursor: formItems.length === 0 ? "not-allowed" : "pointer" }}
            >
              저장
            </button>
          </div>
        </div>
      )}

      {boxEdit && (
        <BoxPlanModal
          unitItems={boxEdit}
          productMap={productMap}
          onCancel={() => setBoxEdit(null)}
          onAutoSplit={() => { updateOrder(order.id, { manualBoxes: null }); setBoxEdit(null); }}
          onApply={applyBoxEdit}
        />
      )}
    </div>
  );
}

function FieldRow({ label, value }) {
  return (
    <div style={{ display: "flex", justifyContent: "space-between", gap: 10, fontSize: 12.5, borderBottom: "1px solid #F1F2EC", paddingBottom: 5 }}>
      <span style={{ color: "#888780", flexShrink: 0 }}>{label}</span>
      <span style={{ color: "#1B2430", textAlign: "right", wordBreak: "break-all" }}>{value}</span>
    </div>
  );
}

function InvoiceQuickEdit({ order, updateOrder, couriers }) {
  const [courier, setCourier] = useState(order.courier || couriers[0]);
  const [value, setValue] = useState(order.invoiceNo || "");
  const changed = value !== (order.invoiceNo || "") || courier !== (order.courier || couriers[0]);

  function save() {
    updateOrder(order.id, { invoiceNo: value.trim(), courier, status: value.trim() ? "shipped" : order.status });
  }

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 6, marginTop: 6 }}>
      <select value={courier} onChange={(e) => setCourier(e.target.value)} style={inputStyle()}>
        {couriers.map((c) => (
          <option key={c} value={c}>{c}</option>
        ))}
      </select>
      <div style={{ display: "flex", gap: 6 }}>
        <input value={value} onChange={(e) => setValue(e.target.value)} placeholder="송장번호 입력" style={{ ...inputStyle(), flex: 1 }} />
        <button
          onClick={save}
          disabled={!changed}
          style={{ padding: "0 16px", borderRadius: 8, border: "none", background: changed ? "#185FA5" : "#D3D1C7", color: "#fff", fontWeight: 700, fontSize: 12, cursor: changed ? "pointer" : "not-allowed" }}
        >
          저장
        </button>
      </div>
    </div>
  );
}

function CustomerSearchPicker({ customers, orders, value, onChange, onPickRaw }) {
  const [query, setQuery] = useState("");
  const selected = customers.find((c) => c.id === value);

  // 고객 리스트 + 과거 주문자(주문 이력)를 통합해 검색 대상으로 만든다.
  const searchPool = useMemo(() => {
    const pool = [];
    const seenPhones = new Set();
    // 1) 등록된 고객 우선
    customers.forEach((c) => {
      const key = (c.phone || "").replace(/-/g, "");
      pool.push({ kind: "customer", id: c.id, name: c.name, phone: c.phone, address: c.address || "", memo: c.memo || "" });
      if (key) seenPhones.add(key);
    });
    // 2) 과거 주문자 중 고객에 없는 사람 (받는분/보내는분 모두)
    (orders || []).forEach((o) => {
      [o.sender, o.recipient].forEach((person) => {
        if (!person || !person.name) return;
        const key = (person.phone || "").replace(/-/g, "");
        if (key && seenPhones.has(key)) return; // 이미 고객/이전주문에 있으면 skip
        if (!key && !person.address) return;
        if (key) seenPhones.add(key);
        pool.push({
          kind: "order",
          id: "ord_" + o.id + "_" + person.name,
          name: person.name,
          phone: person.phone || "",
          address: person.address || "",
          memo: "이전 주문 이력",
        });
      });
    });
    return pool;
  }, [customers, orders]);

  const results = useMemo(() => {
    const q = query.trim().toLowerCase();
    if (!q) return [];
    const qNum = q.replace(/-/g, "");
    return searchPool
      .filter((c) =>
        (c.name || "").toLowerCase().includes(q) ||
        (c.phone || "").replace(/-/g, "").includes(qNum) ||
        (c.address || "").toLowerCase().includes(q) ||
        (c.memo || "").toLowerCase().includes(q)
      )
      .slice(0, 10);
  }, [searchPool, query]);

  if (selected) {
    return (
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", background: "#EAF3DE", border: "1px solid #C0DD97", borderRadius: 8, padding: "10px 12px", margin: "6px 0 14px" }}>
        <span style={{ fontSize: 13, color: "#27500A", fontWeight: 700 }}>{selected.name} <span style={{ fontWeight: 400, color: "#5F5E5A" }}>· {selected.phone}</span></span>
        <button onClick={() => { onChange(""); setQuery(""); }} style={{ border: "none", background: "none", color: "#27500A", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>변경</button>
      </div>
    );
  }

  function pick(item) {
    if (item.kind === "customer") {
      onChange(item.id);
    } else {
      // 과거 주문자: 고객 id가 없으므로 정보를 직접 채운다
      onPickRaw && onPickRaw({ name: item.name, phone: item.phone, address: item.address });
    }
    setQuery("");
  }

  return (
    <div style={{ position: "relative", margin: "6px 0 14px" }}>
      <input
        value={query}
        onChange={(e) => setQuery(e.target.value)}
        placeholder="고객·이전 주문자 검색 (이름/연락처/주소, 비우면 직접 입력)"
        style={inputStyle()}
      />
      {results.length > 0 && (
        <div style={{ position: "absolute", top: "calc(100% + 4px)", left: 0, right: 0, background: "#fff", border: "1px solid #E2E4DD", borderRadius: 8, boxShadow: "0 4px 12px rgba(0,0,0,0.08)", zIndex: 20, maxHeight: 260, overflowY: "auto" }}>
          {results.map((c) => (
            <button
              key={c.id}
              onClick={() => pick(c)}
              style={{ display: "block", width: "100%", textAlign: "left", padding: "9px 12px", border: "none", background: "none", borderBottom: "1px solid #F1F2EC", cursor: "pointer" }}
            >
              <div style={{ fontSize: 13, fontWeight: 700, color: "#1B2430" }}>
                {c.name} <span style={{ fontWeight: 400, color: "#888780", fontSize: 11.5 }}>{c.phone}</span>
                {c.kind === "order" && <span style={{ marginLeft: 6, fontSize: 10, color: "#854F0B", background: "#FAEEDA", padding: "1px 6px", borderRadius: 8 }}>이전주문</span>}
                {c.kind === "customer" && <span style={{ marginLeft: 6, fontSize: 10, color: "#185FA5", background: "#E6F1FB", padding: "1px 6px", borderRadius: 8 }}>고객</span>}
              </div>
              {c.address && <div style={{ fontSize: 11, color: "#888780", marginTop: 1 }}>{c.address}</div>}
            </button>
          ))}
        </div>
      )}
      {query.trim() && results.length === 0 && (
        <div style={{ fontSize: 11, color: "#888780", marginTop: 4 }}>일치하는 고객·주문자가 없어요. 아래 정보를 직접 입력해주세요.</div>
      )}
    </div>
  );
}

function NewOrderTab({ customers, orders, products, vendors, draft, setDraft, changeCartQty, addDeliveryRow, removeDeliveryRow, updateDeliveryField, deliveryTotal, draftItems, draftTotal, submitOrder, analyzeMessage, handlePhotoCapture, ocrLoading, onBack, onGoProducts, geminiKey, photoAiResult, clearPhotoAiResult }) {
  const isGuest = !draft.customerId;
  const [prodTab, setProdTab] = useState("all");
  const [aiModalOpen, setAiModalOpen] = React.useState(false);
  const [aiResult, setAiResult] = React.useState(null);
  const [aiLoading, setAiLoading] = React.useState(false);

  // 사진 AI 분석 결과가 오면 모달 표시
  React.useEffect(() => {
    if (photoAiResult) {
      setAiResult(photoAiResult);
      setAiModalOpen(true);
      clearPhotoAiResult && clearPhotoAiResult();
    }
  }, [photoAiResult]);

  async function handleAiAnalyze() {
    const text = draft.message || "";
    if (!text.trim()) { alert("먼저 주문 문자를 붙여넣어 주세요."); return; }
    if (!geminiKey) { alert("설정에서 Gemini API 키를 먼저 입력해 주세요."); return; }
    setAiLoading(true);
    try {
      const result = await callGeminiOrder(text, products, geminiKey);
      setAiResult(result);
      setAiModalOpen(true);
    } catch(e) {
      alert("AI 분석 오류: " + e.message);
    } finally {
      setAiLoading(false);
    }
  }

  function handleAiApply(parsed) {
    // AI 상품명 → productId 매칭
    const cart = {};
    (parsed.items || []).forEach(it => {
      const name = (it.name || "").trim();
      // 상품 목록에서 이름 유사 매칭
      const matched = products.find(p =>
        p.name === name ||
        name.includes(p.name) ||
        p.name.includes(name)
      );
      const pid = matched ? matched.id : ("__ai__" + name);
      cart[pid] = (cart[pid] || 0) + (it.qty || 1);
    });

    setDraft(d => ({
      ...d,
      sender: {
        name: parsed.senderName || d.sender?.name || "",
        phone: parsed.senderPhone || d.sender?.phone || "",
      },
      deliveries: d.deliveries.map((del, idx) => idx === 0 ? {
        ...del,
        name: parsed.recipName || del.name || "",
        phone: parsed.recipPhone || del.phone || "",
        address: parsed.address || del.address || "",
        cart: Object.keys(cart).length > 0 ? cart : del.cart,
      } : del),
      reserveDate: parsed.reserveDate || d.reserveDate || "",
      deliveryMessage: parsed.deliveryMessage || d.deliveryMessage || "",
    }));
    setAiModalOpen(false);
  }

  // 받는분/연락처가 등록된 업체와 일치하는지 자동 판별
  const matchedVendor = (() => {
    const d0 = draft.deliveries[0] || {};
    const nm = (d0.name || draft.sender.name || "").trim();
    const ph = (d0.phone || draft.sender.phone || "").replace(/-/g, "");
    if (!nm && !ph) return null;
    return vendors.find((v) =>
      (ph && (v.phone || "").replace(/-/g, "") === ph) ||
      (nm && v.name && v.name === nm)
    ) || null;
  })();
  const isBiz = !!matchedVendor;

  // 업체 검색·선택용
  const [vendorQuery, setVendorQuery] = useState("");
  const vendorResults = vendorQuery.trim()
    ? vendors.filter((v) => {
        const q = vendorQuery.trim().toLowerCase();
        return (v.name || "").toLowerCase().includes(q)
          || (v.phone || "").replace(/-/g, "").includes(q.replace(/-/g, ""))
          || (v.bizNo || "").replace(/-/g, "").includes(q.replace(/-/g, ""));
      }).slice(0, 8)
    : [];

  function pickVendor(v) {
    // 업체를 고르면 받는분(첫 배송지)·보내는분에 업체 정보 자동 채움
    setDraft((prev) => {
      const deliveries = prev.deliveries.length ? [...prev.deliveries] : [{ id: uid("d"), name: "", phone: "", address: "", cart: {} }];
      deliveries[0] = { ...deliveries[0], name: v.name || "", phone: v.phone || "", address: v.address || "" };
      return {
        ...prev,
        sender: { name: v.name || "", phone: v.phone || "" },
        deliveries,
      };
    });
    setVendorQuery("");
  }

  // ★ v50: 고객·업체·이전주문자 통합검색 (기존 '업체 불러오기'와 '고객 선택' 두 칸을 하나로 합침)
  const contactResults = (() => {
    const q = vendorQuery.trim().toLowerCase();
    if (!q) return [];
    const qn = q.replace(/-/g, "");
    const hit = (x) => (x.name || "").toLowerCase().includes(q)
      || (x.phone || "").replace(/-/g, "").includes(qn)
      || (x.address || "").toLowerCase().includes(q)
      || (x.bizNo || "").replace(/-/g, "").includes(qn)
      || (x.memo || "").toLowerCase().includes(q);
    const out = []; const seen = new Set();
    (vendors || []).forEach((v) => { if (hit(v)) { out.push({ kind: "vendor", id: v.id, name: v.name, phone: v.phone || "", address: v.address || "", _v: v }); const k = (v.phone || "").replace(/-/g, ""); if (k) seen.add(k); } });
    (customers || []).forEach((c) => { if (hit(c)) { const k = (c.phone || "").replace(/-/g, ""); if (k && seen.has(k)) return; if (k) seen.add(k); out.push({ kind: "customer", id: c.id, name: c.name, phone: c.phone || "", address: c.address || "" }); } });
    (orders || []).forEach((o) => { [o.sender, o.recipient].forEach((p) => {
      if (!p || !p.name) return;
      const k = (p.phone || "").replace(/-/g, "");
      if (k && seen.has(k)) return;
      if (!k && !p.address) return;
      const okhit = (p.name || "").toLowerCase().includes(q) || (p.phone || "").replace(/-/g, "").includes(qn) || (p.address || "").toLowerCase().includes(q);
      if (!okhit) return;
      if (k) seen.add(k);
      out.push({ kind: "order", id: "ord_" + o.id + "_" + p.name, name: p.name, phone: p.phone || "", address: p.address || "" });
    }); });
    return out.slice(0, 10);
  })();
  function pickContact(item) {
    if (item.kind === "vendor") { pickVendor(item._v || (vendors || []).find((v) => v.id === item.id)); return; }
    setDraft((prev) => ({
      ...prev,
      customerId: item.kind === "customer" ? item.id : "",
      sender: { name: item.name, phone: item.phone },
      deliveries: [
        { ...(prev.deliveries[0] || { id: uid("d"), cart: {} }), name: item.name, phone: item.phone, address: item.address },
        ...prev.deliveries.slice(1),
      ],
    }));
    setVendorQuery("");
  }

  return (
    <div>
      <button onClick={onBack} style={{ background: "none", border: "none", color: "#5F5E5A", fontSize: 13, cursor: "pointer", padding: 0, marginBottom: 14 }}>
        ← 주문 목록으로
      </button>
      <h1 style={{ fontSize: 19, fontWeight: 700, margin: "2px 0 12px", letterSpacing: "-0.02em" }}>주문 입력</h1>

      <div style={{ background: "#fff", border: "1px solid #E2E4DD", borderRadius: 10, padding: 12, marginBottom: 14 }}>
        <label style={{ fontSize: 12, fontWeight: 700, color: "#27500A", display: "block", marginBottom: 6 }}>🔎 고객·업체 통합검색 (선택)</label>
        <input
          placeholder="이름·전화·주소·사업자번호로 검색 (비우면 아래에 직접 입력)"
          value={vendorQuery}
          onChange={(e) => setVendorQuery(e.target.value)}
          style={{ ...inputStyle() }}
        />
        {vendorQuery.trim() && (
          <div style={{ marginTop: 6, border: "1px solid #E2E4DD", borderRadius: 8, overflow: "hidden" }}>
            {contactResults.length === 0 ? (
              <div style={{ padding: "10px 12px", fontSize: 12, color: "#888780" }}>일치하는 고객·업체가 없어요. 아래에 직접 입력하시면 저장 시 자동 등록돼요.</div>
            ) : (
              contactResults.map((item) => (
                <div
                  key={item.kind + item.id}
                  onClick={() => pickContact(item)}
                  style={{ padding: "10px 12px", fontSize: 12.5, cursor: "pointer", borderTop: "1px solid #F0F1EC", background: "#fff" }}
                >
                  <div style={{ fontWeight: 700, color: "#1B2430" }}>
                    <span style={{ fontSize: 9.5, fontWeight: 700, color: item.kind === "vendor" ? "#854F0B" : "#2F6F4E", background: item.kind === "vendor" ? "#FAEEDA" : "#EAF3DE", padding: "1px 5px", borderRadius: 6, marginRight: 5 }}>{item.kind === "vendor" ? "업체" : item.kind === "customer" ? "고객" : "이전주문"}</span>
                    {item.name}
                  </div>
                  <div style={{ fontSize: 11, color: "#5F5E5A" }}>{item.phone || ""}{item.address ? ` · ${item.address}` : ""}</div>
                </div>
              ))
            )}
          </div>
        )}
      </div>

      {isBiz && (
        <div style={{ background: "#FAEEDA", border: "1px solid #EAD8B0", borderRadius: 10, padding: "10px 12px", marginBottom: 14, fontSize: 12, color: "#854F0B", fontWeight: 700 }}>
          🏢 등록된 업체 "{matchedVendor.name}"와 일치 — 업체 주문으로 등록되고 거래명세서가 자동 생성됩니다.
        </div>
      )}

      <div style={{ background: "#fff", border: "1px solid #E2E4DD", borderRadius: 10, padding: 12, marginBottom: 18 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <label style={{ fontSize: 12, color: "#5F5E5A", fontWeight: 500 }}>주문메시지 붙여넣기 (문자·카톡·인스타 DM 등)</label>
          <VoiceInputButton onResult={(text) => setDraft((prev) => ({ ...prev, message: (prev.message ? prev.message + " " : "") + text }))} />
        </div>
        <textarea
          value={draft.message}
          onChange={(e) => setDraft({ ...draft, message: e.target.value })}
          placeholder={"예) 보내는분: 홍길동 / 주문자 연락처: 010-1234-5678\n받는분: 홍어머니 / 받는분 연락처: 010-9876-5432\n주소: 서울시 강남구 역삼동 123\n아메리카노 2개, 크루아상 1개 보내주세요"}
          style={{ width: "100%", minHeight: 96, border: "1px solid #D3D1C7", borderRadius: 8, padding: 10, fontSize: 12, boxSizing: "border-box", resize: "vertical", marginTop: 6, fontFamily: FONT }}
        />
        <button
          onClick={analyzeMessage}
          disabled={!draft.message.trim()}
          style={{
            marginTop: 8, width: "100%", padding: "9px 0", borderRadius: 8, border: "none",
            background: draft.message.trim() ? "#185FA5" : "#D3D1C7", color: "#fff", fontWeight: 700, fontSize: 13,
            cursor: draft.message.trim() ? "pointer" : "not-allowed",
          }}
        >
          보내는분·받는분·주소·상품 자동 분석 (첫 배송지에 채워집니다)
        </button>

        <button
          onClick={handleAiAnalyze}
          disabled={!draft.message.trim() || aiLoading}
          style={{
            marginTop: 6, width: "100%", padding: "9px 0", borderRadius: 8, border: "none",
            background: draft.message.trim() && !aiLoading ? "#2F6F4E" : "#D3D1C7",
            color: "#fff", fontWeight: 700, fontSize: 13,
            cursor: draft.message.trim() && !aiLoading ? "pointer" : "not-allowed",
          }}
        >
          {aiLoading ? "🤖 AI 분석 중…" : "🤖 AI로 분석 (Gemini)"}
        </button>

        {aiModalOpen && aiResult && (
          React.createElement(AiConfirmModal, {
            result: aiResult,
            products: products,
            onApply: handleAiApply,
            onClose: () => setAiModalOpen(false),
          })
        )}

        <div style={{ display: "flex", alignItems: "center", gap: 8, margin: "10px 0" }}>
          <div style={{ flex: 1, height: 1, background: "#E2E4DD" }} />
          <span style={{ fontSize: 11, color: "#888780" }}>또는</span>
          <div style={{ flex: 1, height: 1, background: "#E2E4DD" }} />
        </div>

        <PhotoCaptureButton onCapture={handlePhotoCapture} loading={ocrLoading} />
        <p style={{ fontSize: 10.5, color: "#888780", margin: "6px 0 0" }}>
          명함, 메모지, 주문서 등을 사진으로 찍으면 이름·연락처·주소를 자동으로 읽어서 채워드려요.
        </p>
      </div>

      <label style={{ fontSize: 12, color: "#5F5E5A", fontWeight: 500 }}>주문자(보내는분) 정보</label>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, margin: "6px 0 14px" }}>
        <input placeholder="보내는분(주문자)" value={draft.sender.name} onChange={(e) => setDraft({ ...draft, sender: { ...draft.sender, name: e.target.value } })} style={inputStyle()} />
        <input placeholder="주문자 연락처" value={draft.sender.phone} onChange={(e) => setDraft({ ...draft, sender: { ...draft.sender, phone: e.target.value } })} style={inputStyle()} />
      </div>

      {/* ★ v50: 고객 검색은 상단 '고객·업체 통합검색'으로 합쳐졌습니다. (중복 제거) */}

      {(!isGuest && draft.deliveries.length === 1) ? (() => {
        const selc = customers.find((c) => c.id === draft.customerId);
        if (!selc) return null;
        return (
          <div style={{ background: "#EAF3DE", border: "1px solid #C0DD97", borderRadius: 10, padding: "12px 14px", marginBottom: 16 }}>
            <div style={{ fontSize: 11, fontWeight: 700, color: "#27500A", marginBottom: 8 }}>선택한 고객 정보로 주문합니다</div>
            <div style={{ fontSize: 12, color: "#27500A", lineHeight: 1.7 }}>
              <div><b>주문자(보내는분)</b> : {draft.sender.name || selc.name} · {draft.sender.phone || selc.phone}</div>
              <div><b>받는분</b> : {selc.name} · {selc.phone}</div>
              {selc.address && <div><b>주소</b> : [{selc.postalCode || estimatePostalCode(selc.address)}] {selc.address}</div>}
            </div>
            <div style={{ fontSize: 10.5, color: "#5F7A4E", marginTop: 8 }}>
              받는분을 따로 지정하려면 위 "고객 선택"에서 변경을 누르거나, "+ 배송지 추가"를 이용하세요.
            </div>
          </div>
        );
      })() : null}

      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
        <label style={{ fontSize: 12, color: "#5F5E5A", fontWeight: 700 }}>배송지 ({draft.deliveries.length})</label>
        <button onClick={addDeliveryRow} style={{ border: "none", background: "none", color: "#185FA5", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>+ 배송지 추가</button>
      </div>

      {draft.deliveries.map((d, idx) => {
        const usesCustomer = !isGuest && draft.deliveries.length === 1;
        const postal = estimatePostalCode(d.address);
        return (
          <div key={d.id} style={{ background: "#fff", border: "1px solid #E2E4DD", borderRadius: 10, padding: 12, marginBottom: 12 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
              <div style={{ fontSize: 12, fontWeight: 700, color: "#27500A" }}>배송지 {idx + 1}</div>
              {draft.deliveries.length > 1 && (
                <button onClick={() => removeDeliveryRow(d.id)} style={{ border: "none", background: "none", color: "#A32D2D", fontSize: 12, cursor: "pointer" }}>삭제</button>
              )}
            </div>

            {!usesCustomer && (
              <>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 8 }}>
                  <input placeholder="받는분" value={d.name} onChange={(e) => updateDeliveryField(d.id, "name", e.target.value)} style={inputStyle()} />
                  <input placeholder="받는분 연락처" value={d.phone} onChange={(e) => updateDeliveryField(d.id, "phone", e.target.value)} style={inputStyle()} />
                </div>
                <input placeholder="받는분 주소(전체)" value={d.address} onChange={(e) => updateDeliveryField(d.id, "address", e.target.value)} style={{ ...inputStyle(), marginBottom: 6 }} />
                {d.address.trim() && (
                  <div style={{ fontSize: 11, color: "#185FA5", marginBottom: 10 }}>자동 입력된 우편번호: {postal}</div>
                )}
              </>
            )}

            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
              <div style={{ fontSize: 11, fontWeight: 700, color: isBiz ? "#854F0B" : "#27500A" }}>
                {isBiz ? "상품 선택 (업체 일치 — 업체용 권장)" : "상품 선택"}
              </div>
              <button onClick={onGoProducts} style={{ border: "none", background: "none", color: "#185FA5", fontSize: 11, fontWeight: 700, cursor: "pointer" }}>+ 상품 등록</button>
            </div>

            <div style={{ display: "flex", gap: 5, marginBottom: 8 }}>
              {[["all", "전체"], ["both", "공용"], ["retail", "일반용"], ["business", "업체용"]].map(([key, label]) => (
                <button key={key} onClick={() => setProdTab(key)}
                  style={{ flex: 1, padding: "6px 0", borderRadius: 7, border: prodTab === key ? "1px solid #2F6F4E" : "1px solid #E2E4DD", background: prodTab === key ? "#EAF3DE" : "#fff", color: prodTab === key ? "#27500A" : "#5F5E5A", fontSize: 11, fontWeight: 700, cursor: "pointer" }}>
                  {label}
                </button>
              ))}
            </div>

            <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
              {(() => {
                // 선택한 구분 탭에 맞는 상품만 표시 (받는분 무관하게 직접 선택 가능)
                const tabOk = (p) => prodTab === "all" || (p.channel || "both") === prodTab;
                const list = products.filter((p) => tabOk(p));
                if (list.length === 0) {
                  const labelMap = { all: "", both: "공용", retail: "일반용", business: "업체용" };
                  return (

function VoiceInputButton({ onResult }) {
  const [listening, setListening] = useState(false);
  const [supported, setSupported] = useState(true);
  const recognitionRef = useRef(null);

  function start() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
      setSupported(false);
      return;
    }
    const rec = new SpeechRecognition();
    rec.lang = "ko-KR";
    rec.continuous = true;        // ★ 말이 길어져도 중간에 마이크가 끊기지 않게
    rec.interimResults = false;   // ★ 최종 결과만 사용
    rec.maxAlternatives = 1;
    // 여러 조각으로 나뉜 최종 결과를 모아뒀다가, 말이 끝나면(정지/침묵) 한 번에 전달
    let acc = "";
    rec.onresult = (e) => {
      for (let i = e.resultIndex; i < e.results.length; i++) {
        if (e.results[i].isFinal) acc += e.results[i][0].transcript + " ";
      }
    };
    rec.onerror = () => { setListening(false); };
    rec.onend = () => {
      setListening(false);
      const finalText = acc.trim();
      acc = "";
      if (finalText) onResult(finalText);   // 누적된 전체 문장을 명령 처리로 전달
    };
    recognitionRef.current = rec;
    rec.start();
    setListening(true);
  }

  function stop() {
    recognitionRef.current?.stop();
    setListening(false);
  }

  if (!supported) {
    return <span style={{ fontSize: 10.5, color: "#888780" }}>이 브라우저는 음성입력을 지원하지 않아요</span>;
  }

  return (
    <button
      onClick={listening ? stop : start}
      style={{
        border: "none", background: listening ? "#D14343" : "#E6F1FB",
        color: listening ? "#fff" : "#185FA5", borderRadius: 20, padding: "4px 10px",
        fontSize: 11, fontWeight: 700, cursor: "pointer", display: "flex", alignItems: "center", gap: 4,
      }}
    >
      🎤 {listening ? "듣는 중... 탭하여 중지" : "음성 입력"}
    </button>
  );
}

function ProductsTab({ products, newProduct, setNewProduct, addProduct, removeProduct, removeProducts, updateProduct, exportProductsExcel, productInputRef, handleProductUpload, askConfirm }) {
  const [channelFilter, setChannelFilter] = useState("all");
  const [selectMode, setSelectMode] = useState(false);
  const [checkedIds, setCheckedIds] = useState(new Set());

  const filters = [["all", "전체"], ["both", "공용"], ["retail", "일반용"], ["business", "업체용"]];
  const visibleProducts = products.filter((p) => channelFilter === "all" || (p.channel || "both") === channelFilter);

  function toggleCheck(id) {
    setCheckedIds((prev) => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id); else next.add(id);
      return next;
    });
  }
  function toggleAll() {
    setCheckedIds((prev) => {
      const allOn = visibleProducts.length > 0 && visibleProducts.every((p) => prev.has(p.id));
      if (allOn) return new Set();
      return new Set(visibleProducts.map((p) => p.id));
    });

  function deleteChecked() {
    if (checkedIds.size === 0) { return; }
    askConfirm(`선택한 상품 ${checkedIds.size}개를 삭제할까요?`, () => {
      removeProducts([...checkedIds]);
      setCheckedIds(new Set());
      setSelectMode(false);

    <div>
      <h1 style={{ fontSize: 19, fontWeight: 700, margin: "2px 0 14px", letterSpacing: "-0.02em" }}>상품</h1>

          <input placeholder="상품명 (예: 채소)" value={newProduct.name} onChange={(e) => setNewProduct({ ...newProduct, name: e.target.value })} style={{ ...inputStyle(), flex: 2 }} />
          <input placeholder="중량 (예: 2kg)" value={newProduct.weight} onChange={(e) => setNewProduct({ ...newProduct, weight: e.target.value })} style={{ ...inputStyle(), flex: 1 }} />
        </div>
        {(newProduct.name.trim() || newProduct.weight.trim()) && (
          <div style={{ fontSize: 11, color: "#888780" }}>저장될 상품명: <b style={{ color: "#27500A" }}>{composeNameWeight(newProduct.name, newProduct.weight) || "(상품명 입력)"}</b></div>
        )}
        <div style={{ display: "flex", gap: 8 }}>

          <input placeholder="업체 단가" type="number" value={newProduct.wholesalePrice} onChange={(e) => setNewProduct({ ...newProduct, wholesalePrice: e.target.value })} style={inputStyle()} />

function ProductRow({ product, updateProduct, removeProduct, askConfirm }) {
  const [editing, setEditing] = useState(false);
  // ★ v53: 저장된 이름("채소 2kg")을 기본명 + 중량 두 칸으로 분리해 편집
  const _init = () => { const { base, weight } = splitNameWeight(product.name); return { name: base, weight: (product.weight || weight || ""), price: String(product.price), wholesalePrice: String(product.wholesalePrice || ""), stock: String(product.stock), channel: product.channel || "both", unit: product.unit || "개" }; };
  const [form, setForm] = useState(_init);

  const CHANNEL_LABEL = { both: "공용", retail: "일반용", business: "업체용" };
  const CHANNEL_COLOR = { both: { c: "#5F5E5A", bg: "#EFEFE9" }, retail: { c: "#185FA5", bg: "#E6F1FB" }, business: { c: "#854F0B", bg: "#FAEEDA" } };

  function startEdit() {
    setForm(_init());
    setEditing(true);
  }

  function save() {
    const price = Number(form.price);
    const wholesalePrice = Number(form.wholesalePrice) || 0;
    const stock = Number(form.stock);
    if (!form.name.trim() || !price) return;
    const weight = (form.weight || "").replace(/\s/g, "").trim();
    updateProduct(product.id, { name: composeNameWeight(form.name, weight), weight, price, wholesalePrice, stock: stock || 0, channel: form.channel, unit: form.unit || "개" });
    setEditing(false);
  }

  function handleDelete() {
    askConfirm(`${product.name} 상품을 삭제할까요?`, () => {
      removeProduct(product.id);
    });
  }

  if (!editing) {
    const ch = CHANNEL_COLOR[product.channel || "both"];
    return (
      <div style={{ background: "#fff", border: "1px solid #E2E4DD", borderRadius: 10, padding: "10px 14px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <div>
          <div style={{ fontWeight: 700, fontSize: 13, display: "flex", alignItems: "center", gap: 6 }}>
            {product.name}
            <span style={{ fontSize: 10, fontWeight: 700, color: ch.c, background: ch.bg, padding: "1px 6px", borderRadius: 7 }}>{CHANNEL_LABEL[product.channel || "both"]}</span>
          </div>
          <div style={{ fontSize: 12, color: "#888780" }}>
            재고 {product.stock}{product.unit || "개"}
            {product.wholesalePrice ? ` · 업체단가 ${won(product.wholesalePrice)}` : ""}
          </div>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <span style={{ fontSize: 14, fontWeight: 700, color: "#2F6F4E" }}>{won(product.price)}</span>
          <button onClick={startEdit} style={{ border: "none", background: "none", color: "#185FA5", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>수정</button>
          <button onClick={handleDelete} style={removeBtnStyle}>삭제</button>
        </div>
      </div>
    );
  }

  return (
    <div style={{ background: "#fff", border: "1px solid #185FA5", borderRadius: 10, padding: "12px 14px" }}>
      <div style={{ display: "flex", flexDirection: "column", gap: 6, marginBottom: 8 }}>

          <input placeholder="중량 (예: 2kg)" value={form.weight} onChange={(e) => setForm({ ...form, weight: e.target.value })} style={{ ...inputStyle(), flex: 1 }} />
        </div>
        <div style={{ fontSize: 11, color: "#888780" }}>저장될 상품명: <b style={{ color: "#27500A" }}>{composeNameWeight(form.name, form.weight) || "(상품명)"}</b></div>
        <div style={{ display: "flex", gap: 8 }}>
          <input placeholder="일반 가격" type="number" value={form.price} onChange={(e) => setForm({ ...form, price: e.target.value })} style={inputStyle()} />
          <input placeholder="업체 단가" type="number" value={form.wholesalePrice} onChange={(e) => setForm({ ...form, wholesalePrice: e.target.value })} style={inputStyle()} />
        </div>
        <div style={{ display: "flex", gap: 8 }}>
          <input placeholder="재고" type="number" value={form.stock} onChange={(e) => setForm({ ...form, stock: e.target.value })} style={inputStyle()} />
          <input placeholder="단위" value={form.unit} onChange={(e) => setForm({ ...form, unit: e.target.value })} style={inputStyle()} />

        <div style={{ display: "flex", gap: 6 }}>

const AVATAR_COLORS = ["#F3A6A6", "#A6C8F3", "#F3D8A6", "#A6E0C2", "#C7A6F3", "#F3A6D0"];
function CustomerAvatar({ name }) {
  const idx = (name?.charCodeAt(0) || 0) % AVATAR_COLORS.length;
  return (
    <div style={{ width: 38, height: 38, borderRadius: "50%", background: AVATAR_COLORS[idx], display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
      <span style={{ fontSize: 14, fontWeight: 700, color: "#fff" }}>{name ? name[0] : "?"}</span>

function CustomersTab({ customers, newCustomer, setNewCustomer, addCustomer, removeCustomer, removeCustomersMulti, updateCustomer, orders, subscriptions, exportCustomersExcel, customerInputRef, handleCustomerUpload, askConfirm, backfillMissingCustomers }) {
  const [searchQuery, setSearchQuery] = useState("");
  const [checkedIds, setCheckedIds] = useState(new Set());

  function toggleChecked(id) {
    setCheckedIds((prev) => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id); else next.add(id);
      return next;
    });
  }

  function handleDeleteChecked() {
    const ids = [...checkedIds];
    if (ids.length === 0) return;
    askConfirm(`선택한 고객 ${ids.length}명을 삭제할까요?`, () => {
      removeCustomersMulti(ids);
      setCheckedIds(new Set());
    });

  const [regularOnly, setRegularOnly] = useState(false);
  const filteredCustomers = useMemo(() => {
    const q = searchQuery.trim().toLowerCase();
    let list = customers;
    if (q) {
      list = list.filter((c) =>
        (c.name || "").toLowerCase().includes(q) ||
        (c.phone || "").replace(/-/g, "").includes(q.replace(/-/g, "")) ||
        (c.address || "").toLowerCase().includes(q) ||
        (c.memo || "").toLowerCase().includes(q)
      );
    }
    if (regularOnly) list = list.filter((c) => isRegularCustomer(c, orders));
    return list;

  const regularCount = useMemo(() => customers.filter((c) => isRegularCustomer(c, orders)).length, [customers, orders]);

      <div style={{ display: "flex", gap: 6, marginBottom: 10 }}>
        <button onClick={() => exportCustomersExcel()} style={toolBtnStyle("#2F6F4E")}>전체 다운로드</button>
        <button onClick={() => customerInputRef.current?.click()} style={toolBtnStyle("#185FA5")}>업로드</button>
        <input ref={customerInputRef} type="file" accept=".xlsx,.xls,.csv" multiple onChange={handleCustomerUpload} style={{ display: "none" }} />
      </div>
      <button onClick={backfillMissingCustomers} style={{ width: "100%", padding: "10px 0", borderRadius: 8, border: "1px solid #185FA5", background: "#fff", color: "#185FA5", fontWeight: 700, fontSize: 12.5, cursor: "pointer", marginBottom: 16 }}>
        과거 주문에서 빠진 고객 채우기
      </button>
      <p style={{ fontSize: 11, color: "#888780", margin: "0 0 14px" }}>

      </p>

      <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 16 }}>
        <input placeholder="이름" value={newCustomer.name} onChange={(e) => setNewCustomer({ ...newCustomer, name: e.target.value })} style={inputStyle()} />
        <input placeholder="전화번호" value={newCustomer.phone} onChange={(e) => setNewCustomer({ ...newCustomer, phone: e.target.value })} style={inputStyle()} />
        <input placeholder="주소" value={newCustomer.address} onChange={(e) => setNewCustomer({ ...newCustomer, address: e.target.value })} style={inputStyle()} />
        {newCustomer.address.trim() && (
          <div style={{ fontSize: 11, color: "#185FA5", padding: "0 2px" }}>자동 입력된 우편번호: {estimatePostalCode(newCustomer.address)}</div>

        <input placeholder="메모" value={newCustomer.memo} onChange={(e) => setNewCustomer({ ...newCustomer, memo: e.target.value })} style={inputStyle()} />
        <button onClick={addCustomer} style={addBtnStyle}>고객 추가</button>

      <button
        onClick={() => setRegularOnly((v) => !v)}
        style={{

          fontWeight: 700, fontSize: 12.5,
        }}
      >

      <button
        onClick={() => {
          const regulars = customers.filter((c) => isRegularCustomer(c, orders));

          value={searchQuery}

            <input
              type="checkbox"
              checked={filteredCustomers.length > 0 && filteredCustomers.every((c) => checkedIds.has(c.id))}
              onChange={(e) => {
                setCheckedIds((prev) => {
                  const next = new Set(prev);
                  filteredCustomers.forEach((c) => (e.target.checked ? next.add(c.id) : next.delete(c.id)));
                  return next;
                });
              }}
            />
            전체선택

          {checkedIds.size > 0 && (
            <button onClick={handleDeleteChecked} style={{ border: "none", background: "#E24B4A", color: "#fff", fontWeight: 700, fontSize: 12, padding: "6px 12px", borderRadius: 8, cursor: "pointer" }}>

          {filteredCustomers.map((c) => {

            return (

                key={c.id} customer={c} orderCount={orderCount} subscription={sub} updateCustomer={updateCustomer}
                removeCustomer={removeCustomer} askConfirm={askConfirm} checked={checkedIds.has(c.id)}
                onToggleChecked={() => toggleChecked(c.id)} isRegular={isRegular}
                recentOrderCount={countRecentOrdersForCustomer(c.id, orders)}
              />
            );
          })}
        </div>
      )}
    </div>
  );
}

function CustomerRow({ customer, orderCount, subscription, updateCustomer, removeCustomer, askConfirm, checked, onToggleChecked, isRegular, recentOrderCount }) {
  const [editing, setEditing] = useState(false);
  const [form, setForm] = useState({ name: customer.name, phone: customer.phone, address: customer.address, memo: customer.memo });

  function startEdit() {
    setForm({ name: customer.name, phone: customer.phone, address: customer.address, memo: customer.memo });
    setEditing(true);
  }

  function save() {
    if (!form.name.trim()) return;
    updateCustomer(customer.id, { name: form.name.trim(), phone: form.phone.trim(), address: form.address.trim(), memo: form.memo.trim() });
    setEditing(false);
  }

  function handleDelete() {
    askConfirm(`${customer.name} 고객을 삭제할까요?`, () => {
      removeCustomer(customer.id);
    });
  }

  if (!editing) {
    return (
      <div style={{ background: "#fff", border: "1px solid #E2E4DD", borderRadius: 10, padding: "10px 14px", display: "flex", alignItems: "center", gap: 10 }}>
        <input type="checkbox" checked={!!checked} onChange={onToggleChecked} style={{ flexShrink: 0 }} />
        <CustomerAvatar name={customer.name} />
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ fontWeight: 700, fontSize: 13, display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap" }}>
            {customer.name} <span style={{ fontWeight: 400, color: "#888780", fontSize: 11 }}>· 주문 {orderCount}건</span>
            {isRegular && (
              <span style={{ fontSize: 10.5, fontWeight: 700, color: "#854F0B", background: "#FAEEDA", padding: "1px 7px", borderRadius: 20 }}>
                ⭐ 단골 (최근 1년 {recentOrderCount}회)
              </span>
            )}
            {subscription && (
              <span style={{ fontSize: 10.5, fontWeight: 700, color: "#185FA5", background: "#E6F1FB", padding: "1px 7px", borderRadius: 20 }}>
                정기배송 {(subscription.occurrenceCount || 0) + 1}회차
                {subscription.totalOccurrences ? ` (남은 ${Math.max(subscription.totalOccurrences - (subscription.occurrenceCount || 0), 0)}회)` : " (무제한)"}
              </span>
            )}
          </div>
          <div style={{ fontSize: 12, color: "#5F5E5A" }}>
            {customer.phone}{customer.address ? ` · [${customer.postalCode}] ${customer.address}` : ""}{customer.memo ? ` · ${customer.memo}` : ""}
          </div>
        </div>
        <div style={{ display: "flex", flexDirection: "column", gap: 4, flexShrink: 0, alignItems: "flex-end" }}>
          <div style={{ display: "flex", gap: 10 }}>
            <button onClick={startEdit} style={{ border: "none", background: "none", color: "#185FA5", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>수정</button>
            <button onClick={handleDelete} style={removeBtnStyle}>삭제</button>
          </div>
          <button
            onClick={() => updateCustomer(customer.id, { regularOverride: isRegular ? false : true })}
            style={{ border: "none", background: "none", color: isRegular ? "#A32D2D" : "#854F0B", fontSize: 11, fontWeight: 700, cursor: "pointer", padding: 0 }}
          >
            {isRegular ? "단골 해제" : "단골로 지정"}
          </button>
        </div>
      </div>
    );
  }

  return (
    <div style={{ background: "#fff", border: "1px solid #185FA5", borderRadius: 10, padding: "12px 14px" }}>
      <div style={{ display: "flex", flexDirection: "column", gap: 6, marginBottom: 8 }}>
        <input placeholder="이름" value={form.name} onChange={(e) => setForm({ ...form, name: e.target.value })} style={inputStyle()} />
        <input placeholder="전화번호" value={form.phone} onChange={(e) => setForm({ ...form, phone: e.target.value })} style={inputStyle()} />
        <input placeholder="주소" value={form.address} onChange={(e) => setForm({ ...form, address: e.target.value })} style={inputStyle()} />
        {form.address.trim() && (
          <div style={{ fontSize: 11, color: "#185FA5" }}>자동 입력된 우편번호: {estimatePostalCode(form.address)}</div>
        )}
        <input placeholder="메모" value={form.memo} onChange={(e) => setForm({ ...form, memo: e.target.value })} style={inputStyle()} />
      </div>
      <div style={{ display: "flex", gap: 8 }}>
        <button onClick={() => setEditing(false)} style={{ flex: 1, padding: "8px 0", borderRadius: 8, border: "1px solid #D3D1C7", background: "#fff", color: "#5F5E5A", fontWeight: 700, fontSize: 12, cursor: "pointer" }}>
          취소
        </button>
        <button onClick={save} style={{ flex: 2, padding: "8px 0", borderRadius: 8, border: "none", background: "#2F6F4E", color: "#fff", fontWeight: 700, fontSize: 12, cursor: "pointer" }}>
          저장
        </button>
      </div>
    </div>
  );
}

// 화면 전체를 감싸서, 예상 못한 오류가 어디서 나든 "하얀 화면"이 아니라
// 안내 메시지 + 새로고침 버튼을 보여주기 위한 안전망(Error Boundary).
// 이게 없으면, 코드 어딘가에서 처리 안 된 오류 하나만 나도 화면 전체가 하얗게 멈춰버림.
class AppErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { hasError: false, errorText: "" };
  }
  static getDerivedStateFromError(error) {
    return { hasError: true, errorText: (error && (error.stack || error.message)) || String(error) };
  }
  componentDidCatch(error, info) {
    // 콘솔에는 남겨서 나중에 원인 파악에 쓸 수 있게 함
    console.error("조아저씨쌈 앱 오류:", error, info);
  }
  render() {
    if (this.state.hasError) {
      return (
        <div style={{
          minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center",
          justifyContent: "center", padding: 24, textAlign: "center", fontFamily: "'Apple SD Gothic Neo','Malgun Gothic',system-ui,sans-serif",
          background: "#F7F8F4",
        }}>
          <div style={{ fontSize: 40, marginBottom: 12 }}>⚠️</div>
          <div style={{ fontSize: 16, fontWeight: 700, color: "#1B2430", marginBottom: 8 }}>
            일시적인 문제가 발생했어요
          </div>
          <div style={{ fontSize: 13, color: "#5F5E5A", marginBottom: 20, lineHeight: 1.5 }}>
            방금 하신 작업 중 예상 못한 오류가 있었어요.<br />
            새로고침 하면 대부분 정상으로 돌아와요. 데이터는 안전하게 저장되어 있어요.
          </div>
          <button
            onClick={() => window.location.reload()}
            style={{
              border: "none", background: "#2F6F4E", color: "#fff", fontWeight: 700,
              fontSize: 14, padding: "12px 28px", borderRadius: 10, cursor: "pointer", marginBottom: 20,
            }}
          >
            새로고침 하기
          </button>
          {this.state.errorText && (
            <div style={{ maxWidth: 520, width: "100%" }}>
              <div style={{ fontSize: 11.5, color: "#888780", marginBottom: 6 }}>
                아래 내용을 캡처해서 개발자에게 보여주시면 빠르게 고칠 수 있어요
              </div>
              <textarea
                readOnly
                value={this.state.errorText}
                onClick={(e) => e.target.select()}
                style={{
                  width: "100%", height: 140, fontSize: 11, fontFamily: "monospace", color: "#5F5E5A",
                  background: "#fff", border: "1px solid #E2E4DD", borderRadius: 8, padding: 10, resize: "vertical",
                }}
              />
            </div>
          )}
        </div>
      );
    }
    return this.props.children;
  }
}

ReactDOM.createRoot(document.getElementById("root")).render(<AppErrorBoundary><App /></AppErrorBoundary>);

</script>
<script>
  // 앱 업데이트 감지: 새 버전이 올라오면 화면에 "업데이트 있음" 알림을 띄우고,
  // 사장님/직원이 버튼을 눌러야 새 버전으로 바뀌도록 함 (조용히 자동으로 바뀌지 않음)
  let __joassamManualCheckActive = false; // "지금 확인하기" 버튼으로 확인 중인지
  let __joassamManualCheckTimer = null;

  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("service-worker.js").then((reg) => {
      window.__joassamSWReg = reg;
      // 새 서비스워커가 발견되면, 설치 완료 시 "업데이트 있음" 이벤트를 화면(React)에 알림
      reg.addEventListener("updatefound", () => {
        const newWorker = reg.installing;
        if (!newWorker) return;
        newWorker.addEventListener("statechange", () => {
          if (newWorker.state === "installed" && navigator.serviceWorker.controller) {
            window.__joassamPendingUpdate = newWorker;
            if (__joassamManualCheckActive) {
              // "지금 확인하기" 버튼으로 확인하던 중이었으면, 새 버전을 바로 자동 적용
              clearTimeout(__joassamManualCheckTimer);
              __joassamManualCheckActive = false;
              newWorker.postMessage({ type: "SKIP_WAITING" });
            } else {
              window.dispatchEvent(new CustomEvent("joassam-update-available"));
            }
          }
        });
      });
      // 주기적으로 업데이트 확인 (앱이 켜져 있는 동안 30분마다)
      setInterval(() => { reg.update().catch(() => {}); }, 30 * 60 * 1000);
      // 페이지를 처음 열 때도 한 번 확인
      reg.update().catch(() => {});
    }).catch(() => {});

    // "지금 업데이트" 버튼(알림 배너용): 이미 감지된 새 버전을 적용
    window.__joassamApplyUpdate = function () {
      if (window.__joassamPendingUpdate) {
        window.__joassamPendingUpdate.postMessage({ type: "SKIP_WAITING" });
      }
    };

    // "업데이트 확인하기" 버튼(설정 메뉴용): 지금 바로 최신 버전인지 확인.
    // 새 버전이 있으면 자동으로 적용(새로고침)되고, 없으면 "최신 버전입니다" 알림을 띄움.
    window.__joassamCheckForUpdate = function () {
      if (!window.__joassamSWReg) {
        window.dispatchEvent(new CustomEvent("joassam-no-update"));
        return;
      }
      __joassamManualCheckActive = true;
      window.__joassamSWReg.update().catch(() => {});
      // 5초 안에 새 버전이 감지되지 않으면 "이미 최신 버전"으로 판단
      __joassamManualCheckTimer = setTimeout(() => {
        if (__joassamManualCheckActive) {
          __joassamManualCheckActive = false;
          window.dispatchEvent(new CustomEvent("joassam-no-update"));
        }
      }, 5000);
    };

    // 새 서비스워커가 실제로 제어권을 가져오면 그때 페이지를 새로고침 (버튼을 누른 직후에만 발생)
    let refreshing = false;
    navigator.serviceWorker.addEventListener("controllerchange", () => {
      if (refreshing) return;
      refreshing = true;
      window.location.reload();
    });
  } else {
    window.__joassamCheckForUpdate = function () {
      window.dispatchEvent(new CustomEvent("joassam-no-update"));
    };
  }

  // 앱이 다시 화면에 보일 때(다른 앱 갔다 돌아올 때)도 업데이트 확인
  document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "visible" && navigator.serviceWorker && navigator.serviceWorker.getRegistration) {
      navigator.serviceWorker.getRegistration().then((reg) => { if (reg) reg.update().catch(() => {}); }).catch(() => {});
    }
  });
</script>
</body>
</html>
