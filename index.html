  };
  return map[label] !== undefined ? map[label] : "";
}

// 주문 목록을 훑어서, 아직 고객 목록에 없는 사람(받는분·주문자)을 찾아 새 고객 후보로 반환
// 새 주문 화면 저장, 엑셀 대량 업로드, "과거 주문에서 고객 채우기" 기능에서 공통으로 사용
// 이미 등록된 고객(이름+전화번호 일치)이 이전과 다른 주소로 주문한 경우(예: 선물을 여러 곳에 보냄,
// 집/회사 주소를 번갈아 씀 등) → 그 고객 정보를 지우거나 덮어쓰지 않고, "추가 배송지"로 메모에 기록해서
// 다음에 그 사람 이름/전화번호로 검색하면 예전에 쓰던 주소들을 다 볼 수 있게 함
function syncCustomerAddressNotes(ordersToScan, existingCustomers) {
  const normPhone = (p) => (p || "").replace(/[^0-9]/g, "");
  const patches = {}; // customerId -> 추가할 memo 텍스트 누적
  ordersToScan.forEach((o) => {
    if (o.isBusiness) return;
    [o.recipient, o.sender].forEach((who) => {
      const nm = (who?.name || "").trim();
      const ph = normPhone(who?.phone);
      const addr = (who?.address || "").trim();
      if (!nm || !ph || !addr) return;
      const cust = existingCustomers.find((c) => normPhone(c.phone) === ph && (c.name || "").trim() === nm);
      if (!cust) return;
      const curAddr = (cust.address || "").trim();
      if (!curAddr) return; // 원래 주소가 비어있으면 등록 단계에서 이미 채워짐(여기선 손 안 댐)
      if (curAddr === addr) return; // 같은 주소면 기록할 필요 없음
      const curMemo = (patches[cust.id] ?? cust.memo) || "";
      if (curMemo.includes(addr)) return; // 이미 기록된 주소면 중복 방지
      patches[cust.id] = `${curMemo ? curMemo + "\n" : ""}추가배송지: ${addr}`;
    });
  });
  return patches; // { [customerId]: 새 memo 문자열 }
}

function findMissingCustomersFromOrders(ordersToScan, existingCustomers) {
  const normPhone = (p) => (p || "").replace(/[^0-9]/g, "");
  const existing = existingCustomers;
  // 같은 사람인지 판단:
  // - 전화번호가 같으면 원칙적으로 같은 사람. 다만 이름까지 서로 다르면(한 사람이 여러 곳에
  //   선물을 보내며 자기 전화번호를 계속 쓰는 경우) 받는분마다 별도 사람으로 등록
  // - 전화번호가 없으면 이름으로 판단하되, 주소까지 다르면(동명이인 등) 별도 사람으로 등록
  const findExisting = (name, phone, address, extraList) => {
    const ph = normPhone(phone);
    const nm = (name || "").trim();
    const addr = (address || "").trim();
    const sameEntry = (cu) => {
      const cuPh = normPhone(cu.phone);
      const cuNm = (cu.name || "").trim();
      const cuAddr = (cu.address || "").trim();
      if (ph && cuPh === ph) {
        if (nm && cuNm && nm !== cuNm) return false; // 전화번호는 같아도 이름이 다르면 다른 사람
        return true;
      }
      if (!ph && nm && cuNm === nm) {
        if (addr && cuAddr && cuAddr !== addr) return false; // 이름은 같아도 주소가 다르면 다른 사람
        return true;
      }
      return false;
    };
    return existing.find(sameEntry) || extraList.find(sameEntry);
  };
  const toAdd = [];
  ordersToScan.forEach((o) => {
    if (o.isBusiness) return; // 업체 주문은 고객 자동등록 제외(업체는 별도 관리)
    const recip = o.recipient || {};
    const snd = o.sender || {};
    // 1) 받는분 등록 (보내는분과 다르면 메모에 보내는분 정보 남김)
    const recipName = (recip.name || "").trim();
    const recipPhone = (recip.phone || "").trim();
    if (recipName || recipPhone) {
      if (!findExisting(recipName, recipPhone, recip.address, toAdd)) {
        // 받는분이 주문자와 다른 경우(선물) → 메모에 보내는분 남기기
        const isGift = (snd.name && snd.name.trim() !== recipName) || (normPhone(snd.phone) && normPhone(snd.phone) !== normPhone(recipPhone));
        const giftMemo = isGift && (snd.name || snd.phone) ? `보내는분: ${snd.name || ""}님 ${snd.phone || ""}`.trim() : "";
        toAdd.push({
          id: uid("c"),
          name: recipName || "이름없음",
          phone: recipPhone,
          address: recip.address || "",
          postalCode: recip.postalCode || estimatePostalCode(recip.address || ""),
          memo: giftMemo,
        });
      }
    }
    // 2) 주문자(보내는분) 등록 — 받는분과 다른 사람이면 따로 등록
    const sndName = (snd.name || "").trim();
    const sndPhone = (snd.phone || "").trim();
    const sndDiffers = sndName !== recipName || normPhone(sndPhone) !== normPhone(recipPhone);
    if ((sndName || sndPhone) && sndDiffers) {
      if (!findExisting(sndName, sndPhone, "", toAdd)) {
        toAdd.push({
          id: uid("c"),
          name: sndName || "이름없음",
          phone: sndPhone,
          address: "",
          postalCode: "",
          memo: "",
        });
      }
    }
  });
  return toAdd;
}

function resolveCustomerField(label, c) {
  const map = { "이름": c.name, "전화번호": c.phone, "우편번호": c.postalCode, "주소": c.address, "메모": c.memo };
  return map[label] !== undefined ? map[label] : "";
}

function resolveProductField(label, p) {
  const CH = { both: "공용", retail: "일반용", business: "업체용" };
  const channel = p.channel || "both";
  // 구분에 따라 해당 가격칸에만 값을 채운다
  const map = {
    "구분": CH[channel],
    "상품명": p.name,
    "공용 가격": channel === "both" ? p.price : "",
    "일반용 가격": channel === "retail" ? p.price : "",
    "업체가격": channel === "business" ? (p.wholesalePrice || p.price) : (p.wholesalePrice || ""),
    "재고": p.stock,
  };
  return map[label] !== undefined ? map[label] : "";
}

// 같은 제목으로 같은 날 여러 번 받으면 "제목 YYYYMMDD-1", "-2" 처럼 번호가 붙어요.
function nextFilename(title) {
  const dateStr = todayStr().replace(/-/g, "");
  const key = `xlsx_count_${title}_${dateStr}`;
  let count = 0;
  try { count = parseInt(window.localStorage.getItem(key) || "0", 10); } catch {}
  count += 1;
  try { window.localStorage.setItem(key, String(count)); } catch {}
  const suffix = count > 1 ? `-${count - 1}` : "";
  return `${title} ${dateStr}${suffix}.xlsx`;
}

function loadStoredData() {
  try {
    const raw = window.localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch {
    return null;
  }
}

function saveStoredData(data) {
  try {
    window.localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch {
    /* ignore */
  }
}

async function sharedGet(key) {
  try {
    const res = await window.storage.get(key, true);
    return res ? JSON.parse(res.value) : null;
  } catch {
    return null;
  }
}

async function sharedSet(key, value) {
  try {
    await window.storage.set(key, JSON.stringify(value), true);
  } catch {
    /* ignore */
  }
}

// 상품명 비교용: 공백/대소문자 무시, 단위·숫자 제거한 핵심 이름 추출
// (엑셀 대량 업로드에서 상품명을 등록 상품과 매칭할 때 재사용 — 매 행마다 새로 만들지 않도록 최상위로 분리)
function squishStr(s) {
  return String(s || "").replace(/\s+/g, "").toLowerCase();
}
function coreStr(s) {
  return squishStr(s)
    .replace(/\d+(\.\d+)?(kg|g|개|박스|봉|팩|병|호|입|매|ml|l)?/g, "")
    .replace(/[x×*]/g, "") // "1kg X 1개" 같은 표기에서 숫자 지우고 남는 곱하기 기호(x/×/*)도 제거
    .replace(/[()[\]{}]/g, "");
}

// 저장해도 안전한지 판단하는 핵심 방어 로직 (독립적으로 20개 시나리오 테스트를 거침)
// 고객/주문/상품/업체 중 하나라도, "이번 세션 기록(prev)" 또는 "이 기기에 저장된 기록(storedFloor)"
// 중 어느 하나라도 원래 데이터가 있었다고 하는데 지금 0건이면 사고로 보고 저장을 막음.
// (한쪽 기준만 보면, 그 기준 자체가 오염되어 있을 때 놓칠 수 있어서 반드시 둘 다 확인함)
function evaluateSaveGuard({ current, prev, storedFloor }) {
  const arr = (obj, key) => (obj && obj[key]) || [];
  const keys = ["customers", "orders", "products", "vendors"];
  for (const key of keys) {
    const curLen = arr(current, key).length;
    if (curLen > 0) continue;
    const prevLen = prev ? arr(prev, key).length : 0;
    const storedLen = storedFloor ? (storedFloor[key] || 0) : 0;
    if (prevLen > 0 || storedLen > 0) {
      return { blocked: true, reason: key + "_dropped_to_empty" };
    }
  }
  return { blocked: false, reason: null };
}

function estimatePostalCode(address) {
  if (!address || !address.trim()) return "";
  let hash = 0;
  for (let i = 0; i < address.length; i++) {
    hash = (hash * 31 + address.charCodeAt(i)) % 100000;
  }
  return String(hash).padStart(5, "0");
}

}

// ── 박스 포장 규칙 ──
// 상품명에서 무게를 읽어 "소포장(500g/800g/1kg)" 또는 "큰박스(2kg)"로 분류
function boxCategory(productName) {
  const s = (productName || "").replace(/\s/g, "").toLowerCase();
  // 2kg 이상은 큰박스
  if (/(2kg|2\.0kg|3kg|2킬로)/.test(s)) return "large";
  // 500g/800g/1kg 류는 소포장
  if (/(500g|800g|1kg|1\.0kg|1킬로|750g|600g|700g|900g)/.test(s)) return "small";
  // 무게 표기가 없으면 소포장으로 간주
  return "small";
}

// 한 박스에 담긴 (카테고리, 개수)로 부피 계산
// 소포장: 1개→2, 2개→5 (한 박스 최대 2개)
// 큰박스: 1개→5, 2개→10 (한 박스 최대 2개)
function boxVolumeFor(category, count) {
  if (category === "large") {
    if (count <= 1) return 5;
    return 10; // 2개
  }
  // small
  if (count <= 1) return 2;
  return 5; // 2개
}

// 박스 내용물(items)로 부피 계산
function volumeForBoxItems(items, productMap) {
  let small = 0, large = 0;
  (items || []).forEach((it) => {
    const p = productMap[it.productId];
    const nm = p ? p.name : (it.name || "");
    if (boxCategory(nm) === "large") large += it.qty; else small += it.qty;
  });
  if (large > 0 && small === 0) return boxVolumeFor("large", large);
  if (small > 0 && large === 0) return boxVolumeFor("small", small);
  return Math.max(boxVolumeFor("large", large), boxVolumeFor("small", small));
}

// 주문 품목들을 박스 규칙으로 나눔 → 박스 배열 반환
// 각 박스: { category, items:[{productId,name,qty,price,unit}], volume }
// 소포장/큰박스 섞지 않음, 박스당 최대 2개(낱개 기준)
function splitIntoBoxes(items, productMap) {
  // 카테고리별로 낱개 단위 펼치기
  const units = { small: [], large: [] };
  items.forEach((it) => {
    const p = productMap[it.productId];
    const nm = p ? p.name : (it.name || "");
    const cat = boxCategory(nm);
    const one = { productId: it.productId, name: nm, price: it.price || (p ? (p.wholesalePrice || p.price) : 0), unit: p ? (p.unit || "kg") : (it.unit || "kg") };
    for (let i = 0; i < it.qty; i++) units[cat].push(one);
  });

  const boxes = [];
  ["small", "large"].forEach((cat) => {
    const arr = units[cat];
    for (let i = 0; i < arr.length; i += 2) {
      const chunk = arr.slice(i, i + 2); // 최대 2개
      // 같은 상품끼리 묶어 items로
      const map = {};
      chunk.forEach((u) => {
        const key = u.productId || u.name;
        if (!map[key]) map[key] = { productId: u.productId, name: u.name, qty: 0, price: u.price, unit: u.unit };
        map[key].qty += 1;
      });
      boxes.push({ category: cat, items: Object.values(map), volume: boxVolumeFor(cat, chunk.length) });
    }
  });
  return boxes;
}

// OCR 정확도를 높이기 위한 사진 전처리: 확대 + 흑백 + 대비 강화
// 파일을 받아 보정된 canvas의 dataURL을 Promise로 반환
function preprocessForOcr(file) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = (ev) => {
      const img = new Image();
      img.onload = () => {
        try {
          // 가로 1600px 기준으로 확대(작은 글자 또렷하게), 너무 크면 유지
          const targetW = 1600;
          const scale = img.width < targetW ? (targetW / img.width) : 1;
          const w = Math.round(img.width * scale);
          const h = Math.round(img.height * scale);
          const canvas = document.createElement("canvas");
          canvas.width = w; canvas.height = h;
          const ctx = canvas.getContext("2d");
          ctx.drawImage(img, 0, 0, w, h);
          const imgData = ctx.getImageData(0, 0, w, h);
          const d = imgData.data;
          // 흑백 + 대비 강화(간단한 임계 보정)
          const contrast = 1.4; // 대비 계수
          const intercept = 128 * (1 - contrast);
          for (let i = 0; i < d.length; i += 4) {
            // 그레이스케일
            let gray = 0.299 * d[i] + 0.587 * d[i + 1] + 0.114 * d[i + 2];
            // 대비 강화
            gray = gray * contrast + intercept;
            gray = gray < 0 ? 0 : (gray > 255 ? 255 : gray);
            d[i] = d[i + 1] = d[i + 2] = gray;
          }
          ctx.putImageData(imgData, 0, 0);
          resolve(canvas.toDataURL("image/jpeg", 0.92));
        } catch (e) {
          // 보정 실패 시 원본 사용
          resolve(ev.target.result);
        }
      };
      img.onerror = () => resolve(ev.target.result);
      img.src = ev.target.result;
    };
    reader.onerror = () => resolve(null);
    reader.readAsDataURL(file);
  });
}

function parseOrderMessage(text, products) {
  const result = { senderName: "", senderPhone: "", recipName: "", recipPhone: "", address: "", reserveDate: "", deliveryMessage: "", items: [] };
  if (!text) return result;

  const phones = [...text.matchAll(/01[016789][-\s]?\d{3,4}[-\s]?\d{4}/g)].map((m) => m[0].replace(/\s/g, ""));

  const senderNameM = text.match(/(?:보내는\s*분|주문자)\s*[:：]?\s*([가-힣]{2,4})/);
  const recipNameM = text.match(/받는\s*분\s*[:：]?\s*([가-힣]{2,4})/);
  const genericNameM = text.match(/(?:이름|성함)\s*[:：]?\s*([가-힣]{2,4})/);

  const senderPhoneM = text.match(/주문자\s*연락처\s*[:：]?\s*(01[016789][-\s]?\d{3,4}[-\s]?\d{4})/);
  const recipPhoneM = text.match(/받는\s*분\s*연락처\s*[:：]?\s*(01[016789][-\s]?\d{3,4}[-\s]?\d{4})/);

  let baseName = "";
  if (!senderNameM && !recipNameM && !genericNameM) {
    const lines = text.split("\n").map((l) => l.trim()).filter(Boolean);
    for (const line of lines) {
      const m = line.match(/^([가-힣]{2,4})(?:\s|님|입니다|,|$)/);
      if (m && !/주소|상품|연락처|전화|받는|보내는/.test(line)) {
        baseName = m[1];
        break;
      }
    }
  } else {
    baseName = (genericNameM && genericNameM[1]) || "";
  }

  result.senderName = (senderNameM && senderNameM[1]) || baseName;
  result.recipName = (recipNameM && recipNameM[1]) || result.senderName;
  result.senderPhone = (senderPhoneM && senderPhoneM[1].replace(/\s/g, "")) || phones[0] || "";
  result.recipPhone = (recipPhoneM && recipPhoneM[1].replace(/\s/g, "")) || phones[1] || result.senderPhone;

  const addrLabelMatch = text.match(/(?:받는\s*분\s*)?주소\s*[:：]?\s*(.+)/);
  if (addrLabelMatch) {
    result.address = addrLabelMatch[1].split(/[,\n]/)[0].trim();
  } else {
    const addrLineMatch = text.match(/[가-힣]+(?:시|도)\s?[가-힣]+(?:시|군|구)?\s?[가-힣0-9\-\s]+(?:동|로|길)[가-힣0-9\-\s]*/);
    if (addrLineMatch) result.address = addrLineMatch[0].trim();
  }

  const reserveM = text.match(/예약\s*(?:주문일|발송일)?\s*[:：]?\s*(\d{4}[-./]\d{1,2}[-./]\d{1,2})/);
  if (reserveM) result.reserveDate = reserveM[1].replace(/[./]/g, "-");

  const msgM = text.match(/(?:배송\s*메시지|요청사항)\s*[:：]?\s*(.+)/);
  if (msgM) result.deliveryMessage = msgM[1].split("\n")[0].trim();

  // 상품 매칭: 공백을 무시하고, 긴 상품명부터 검사해서 중복 매칭을 피한다.
  // 수량은 상품명 뒤(아메리카노 2개 / x2 / 두 개 / 2박스) 또는 앞(2 아메리카노)에서 읽는다.
  const squish = (s) => s.replace(/\s+/g, "");
  const textSquished = squish(text);
  const matchedRanges = []; // 이미 매칭된 구간(원문 인덱스)을 기록해 중복 방지
  const QTY_WORD = "한|두|세|네|다섯|여섯|일곱|여덟|아홉|열";

  // 긴 이름이 짧은 이름을 포함하는 경우를 막기 위해 이름 길이 내림차순 정렬
  const sortedProducts = [...products].sort((a, b) => squish(b.name).length - squish(a.name).length);

  sortedProducts.forEach((p) => {
    const nameSq = squish(p.name);
    if (!nameSq) return;
    const idxSq = textSquished.indexOf(nameSq);
    if (idxSq === -1) return;

    // 공백 제거 인덱스를 원문 인덱스로 환산
    let realIdx = 0, seen = 0;
    for (let i = 0; i < text.length; i++) {
      if (!/\s/.test(text[i])) {
        if (seen === idxSq) { realIdx = i; break; }
        seen++;
      }
    }
    // 이미 더 긴 상품으로 매칭된 구간 안이면 건너뜀
    if (matchedRanges.some((r) => realIdx >= r.start && realIdx < r.end)) return;

    const tail = text.slice(realIdx + p.name.length, realIdx + p.name.length + 14);
    const head = text.slice(Math.max(0, realIdx - 6), realIdx);
    let qty = 1;
    // 뒤쪽 우선: "2개", "x2", "2박스", "2 개", "두 개"
    const tailNum = tail.match(/\s*[x×*]?\s*(\d+)\s*(?:개|박스|병|봉|세트|팩|kg|키로)?/);
    const tailWord = tail.match(new RegExp("\\s*(" + QTY_WORD + ")\\s*(?:개|박스|병|봉|세트|팩)"));
    // 앞쪽: "2 아메리카노"
    const headNum = head.match(/(\d+)\s*(?:개|박스|병|봉|세트|팩)?\s*$/);
    if (tailWord) qty = NUM_WORDS[tailWord[1]] || 1;
    else if (tailNum && tailNum[1]) qty = parseInt(tailNum[1], 10);
    else if (headNum && headNum[1]) qty = parseInt(headNum[1], 10);

    result.items.push({ productId: p.id, qty });
    matchedRanges.push({ start: realIdx, end: realIdx + p.name.length });
  });

  return result;
}

function downloadWorkbook(rows, sheetName, filename, columnOrder, rowFillFn) {
  const sheet = XLSX.utils.json_to_sheet(rows, columnOrder ? { header: columnOrder } : undefined);
  // 테두리 + 헤더 음영 + (있으면) 행별 구분 색상 적용
  const range = XLSX.utils.decode_range(sheet["!ref"] || "A1");
  const headerBorder = { style: "medium", color: { rgb: "000000" } };
  const dataBorder = { style: "thin", color: { rgb: "000000" } };
  for (let R = range.s.r; R <= range.e.r; R++) {
    const isHeader = R === range.s.r;
    const b = isHeader ? headerBorder : dataBorder;
    const rowFill = !isHeader && rowFillFn ? rowFillFn(rows[R - range.s.r - 1], R - range.s.r - 1) : null;
    for (let C = range.s.c; C <= range.e.c; C++) {
      const addr = XLSX.utils.encode_cell({ r: R, c: C });
      const cell = sheet[addr];
      if (!cell) continue;
      cell.s = {
        border: { top: b, bottom: b, left: b, right: b },
        alignment: { vertical: "center", horizontal: isHeader ? "center" : "left", wrapText: false },
        font: { name: "맑은 고딕", sz: isHeader ? 11 : 10, bold: isHeader },
        fill: isHeader
          ? { patternType: "solid", fgColor: { rgb: "E6F1E9" } }
          : (rowFill ? { patternType: "solid", fgColor: { rgb: rowFill } } : undefined),
      };
    }
  }
  // 컬럼 폭 자동(대략)
  const colW = [];
  for (let C = range.s.c; C <= range.e.c; C++) {
    let maxLen = 8;
    for (let R = range.s.r; R <= range.e.r; R++) {
      const addr = XLSX.utils.encode_cell({ r: R, c: C });
      const v = sheet[addr] ? String(sheet[addr].v ?? "") : "";
      // 한글은 폭 2로 계산
      let len = 0; for (const ch of v) len += /[가-힣ㄱ-ㅎ]/.test(ch) ? 2 : 1;
      if (len > maxLen) maxLen = len;
    }
    colW.push({ wch: Math.min(maxLen + 2, 40) });
  }
  sheet["!cols"] = colW;
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, sheet, sheetName);
  XLSX.writeFile(wb, filename);
}

function readWorkbookFile(file, onRows, onError) {
  const reader = new FileReader();
  reader.onerror = () => {
    if (onError) onError(reader.error);
  };
  reader.onload = (e) => {
    try {
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, { type: "array" });
      // 네이버는 시트명이 '발송처리'인 경우가 있어 우선 사용, 없으면 첫 시트
      const sheetName = wb.SheetNames.find((n) => /발송처리|주문|order/i.test(n)) || wb.SheetNames[0];
      const sheet = wb.Sheets[sheetName];
      // 먼저 행렬로 읽어서 진짜 제목 줄(헤더)이 몇 번째인지 찾는다
      const matrix = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });
      // 제목으로 인정할 키워드들 (쇼핑몰 공통)
      const headerKeywords = ["상품주문번호", "수취인명", "받는분", "주문번호", "상품명", "수취인연락처1", "통합배송지", "구매자명"];
      let headerIdx = 0;
      for (let i = 0; i < Math.min(matrix.length, 10); i++) {
        const rowCells = (matrix[i] || []).map((c) => String(c).trim());
        // 셀 전체가 제목 키워드와 정확히 일치하는 경우만 카운트 (설명문 줄 오인 방지)
        const hits = headerKeywords.filter((k) => rowCells.some((c) => c === k)).length;
        if (hits >= 2) { headerIdx = i; break; }
      }
      // 찾은 제목 줄을 기준으로 객체 배열 생성
      const header = (matrix[headerIdx] || []).map((c) => String(c).trim());
      const rows = [];
      for (let i = headerIdx + 1; i < matrix.length; i++) {
        const cells = matrix[i] || [];
        const obj = {};
        let hasData = false;
        header.forEach((h, ci) => {
          if (!h) return;
          const val = cells[ci] !== undefined ? cells[ci] : "";
          obj[h] = val;
          if (String(val).trim()) hasData = true;
        });
        if (hasData) rows.push(obj);
      }
      onRows(rows);
    } catch (err) {
      // 파일이 깨졌거나 지원하지 않는 형식이면, 조용히 멈추지 말고 반드시 알림
      if (onError) onError(err);
    }
  };
  reader.readAsArrayBuffer(file);
}

      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = "sine"; osc.frequency.value = 880;
      gain.gain.setValueAtTime(0.001, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.3, ctx.currentTime + 0.05);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
      osc.start(); osc.stop(ctx.currentTime + 0.5);
      // 두 번 울리기
      setTimeout(() => {
        try {
          const o2 = ctx.createOscillator(); const g2 = ctx.createGain();
          o2.connect(g2); g2.connect(ctx.destination);
          o2.type = "sine"; o2.frequency.value = 1046;
          g2.gain.setValueAtTime(0.001, ctx.currentTime);
          g2.gain.exponentialRampToValueAtTime(0.3, ctx.currentTime + 0.05);
          g2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);

  useEffect(() => {
    if (!dataLoaded) return;
    const data = { appName, appLogo, customers, products, orders, vendors, supplier, invoices, subscriptions, integrations, customMarketplaces, couriers, smsTemplate, orderTemplate, customerTemplate, productTemplate, courierTemplates };
    if (firebaseReady) {
      // Firebase에서 첫 데이터를 받기 전에는 저장하지 않음 (시드/빈값이 실데이터를 덮어쓰는 사고 방지)
      if (!fbFirstLoadRef.current) return;
      if (isStaleVersion) return; // 오래된 버전으로 판단된 기기는 저장 자체를 하지 않음

      // 저장해도 안전한지 검증 (독립적으로 20개 시나리오 테스트를 거친 함수 사용)
      let storedFloor = null;
      try {
        const raw = localStorage.getItem("joassam_last_counts_" + DATA_DOC);
        if (raw) storedFloor = JSON.parse(raw);
      } catch { /* ignore */ }
      const guard = evaluateSaveGuard({ current: { customers, orders, products, vendors }, prev: lastGoodDataRef.current, storedFloor });
      if (guard.blocked) {
        fireToast("⚠ 데이터가 비어있는 상태로 감지되어 저장을 막았어요. 새로고침 후 다시 확인해주세요");
        logDiag("blocked_" + guard.reason, {
          prevCounts: lastGoodDataRef.current ? { customers: (lastGoodDataRef.current.customers || []).length, orders: (lastGoodDataRef.current.orders || []).length, products: (lastGoodDataRef.current.products || []).length, vendors: (lastGoodDataRef.current.vendors || []).length } : null,
          storedCounts: storedFloor,
        });
        return;
      }
      logDiag("saved");
      fbDb.collection("stores").doc(DATA_DOC).set(data, { merge: true })
        .then(() => {
          lastGoodDataRef.current = data;
          // 하루 단위 백업: 그날의 "첫 저장"만 기록하고, 그 이후로는 같은 날짜 백업을 덮어쓰지 않음
          // (전에는 그날 저장될 때마다 계속 갱신돼서, 중간에 사고가 나면 그날 백업도 같이
          //  나빠진 내용으로 바뀌어버리는 문제가 있었음 → 이제는 그날 첫 정상 저장 시점만 보존됨)
          try {
            const today = todayStr();
            const backupRef = fbDb.collection("stores").doc((IS_TEST ? "test_backup_" : "backup_") + today);
            backupRef.get().then((backupSnap) => {
              if (!backupSnap.exists) {
                backupRef.set({ ...data, backedUpAt: nowStamp() }).catch(() => {});
              }
            }).catch(() => {});
          } catch (e) {}
        })
        .catch(() => {});
    } else if (hasSharedStorage) {
      sharedSet("store-data", data);
    } else {
      saveStoredData({ ...data, members });
    }
  }, [dataLoaded, appName, appLogo, customers, products, orders, vendors, supplier, invoices, subscriptions, integrations, customMarketplaces, couriers, smsTemplate, orderTemplate, customerTemplate, productTemplate, courierTemplates, isStaleVersion]);

  const [statusFilter, setStatusFilter] = useState("all");

  const [boxPlanModal, setBoxPlanModal] = useState(null); // { deliveryIdx, items, boxes } 수동 묶음 선택

  const invoiceInputRef = useRef(null);

  const customerMap = useMemo(() => {

  const productMap = useMemo(() => {

  // 엑셀 대량 주문 업로드시 상품명 매칭 속도 개선용: 상품마다 정규화된 이름을 미리 계산해둠
  // (products가 바뀔 때만 다시 계산 — 업로드한 행마다 매번 새로 계산하지 않도록)
  const productIndex = useMemo(

  );

  // 발송은 됐지만(송장번호 있음) 아직 "도착 확인"을 안 눌렀고, 정상 도착 기준일이 지난 주문들
  // (금/토 발송은 월요일까지는 정상범위로 봐줌 — expectedArrivalDeadline 참고)
  // 발송일 기준으로, "확인 안 한 채로 너무 오래 방치된" 항목은 화면이 복잡해지지 않도록
  // 자동으로 목록에서 숨김 (데이터 자체는 지워지지 않고, 이 알림 목록에만 안 보이게 됨)
  // 기본: 정상도착기준일로부터 2일 더 지나면 숨김 / 금요일 발송건은 예외로 "월요일 오후 5시"에 숨김
  function autoHideDeadline(shippedDateStr) {
    if (!shippedDateStr) return null;
    const d = new Date(shippedDateStr);
    if (isNaN(d.getTime())) return null;
    const wd = d.getDay();
    if (wd === 5) {
      const dl = new Date(d);
      dl.setDate(dl.getDate() + 3); // 금요일 + 3일 = 월요일
      dl.setHours(17, 0, 0, 0);
      return dl;
    }
    const base = expectedArrivalDeadline(shippedDateStr);
    if (!base) return null;
    const dl = new Date(base);
    dl.setDate(dl.getDate() + 2);
    dl.setHours(23, 59, 59, 999);
    return dl;
  }

  const overdueDeliveries = useMemo(() => {
    const now = new Date();
    return orders.filter((o) => {
      if (o.status !== "shipped" || !o.invoiceNo || o.deliveryConfirmed) return false;
      const dl = expectedArrivalDeadline(o.shippedAt || o.orderDate);
      if (!dl || now <= dl) return false;
      const hideDl = autoHideDeadline(o.shippedAt || o.orderDate);
      if (hideDl && now > hideDl) return false; // 너무 오래 지나 자동으로 숨김
      return true;
    });
  }, [orders]);

  // 확인완료 처리한 건 중 최근 24시간 안에 처리한 것만 "최근 확인완료" 목록으로 잠깐 보여줌
  // (하루 지나면 이 목록에서도 자동으로 빠짐 — 화면이 계속 복잡해지지 않도록)
  const recentlyConfirmedDeliveries = useMemo(() => {
    const now = Date.now();
    return orders.filter((o) => {
      if (!o.deliveryConfirmed || !o.deliveryConfirmedAt) return false;
      const t = new Date(o.deliveryConfirmedAt).getTime();
      if (isNaN(t)) return false;
      return now - t < 24 * 3600 * 1000;
    });
  }, [orders]);

  // 배송확인 목록에서 체크한 항목들을 한 번에 "도착 확인함" 처리
  function confirmDeliveries(ids) {
    const stampIso = new Date().toISOString();
    setOrders((prev) => prev.map((o) => (ids.includes(o.id) ? { ...o, deliveryConfirmed: true, deliveryConfirmedAt: stampIso } : o)));
  }

  // 확인이 필요한 배송이 있으면, 앱을 열었을 때 딱 한 번 큰 팝업 + 알림음으로 강하게 알려줌
  const [showOverdueAlert, setShowOverdueAlert] = useState(false);
  const overdueAlertShownRef = useRef(false);
  function playOverdueAlertSound() {
    try {
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if (!Ctx) return;
      const ctx = new Ctx();
      const beep = (startTime, freq) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = "sine";
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.001, startTime);
        gain.gain.exponentialRampToValueAtTime(0.25, startTime + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, startTime + 0.35);
        osc.start(startTime);
        osc.stop(startTime + 0.36);
      };
      const now = ctx.currentTime;
      beep(now, 880);
      beep(now + 0.4, 880);
      beep(now + 0.8, 1046);
    } catch { /* 소리 재생 실패해도 팝업은 그대로 보여주면 되니 무시 */ }
  }
  useEffect(() => {
    if (!dataLoaded) return;
    if (overdueAlertShownRef.current) return; // 이번에 앱 켜있는 동안엔 한 번만
    if (overdueDeliveries.length > 0) {
      overdueAlertShownRef.current = true;
      setShowOverdueAlert(true);
      playOverdueAlertSound();
    }
  }, [dataLoaded, overdueDeliveries.length]);

  function orderTotal(order) {
    return (order.items || []).reduce((sum, it) => {
      const p = productMap[it.productId];
      const price = p ? p.price : (it.price || 0);
      return sum + price * (it.qty || 0);
    }, 0);
  }

  function orderItemsText(order) {
    return (order.items || []).map((it) => `${(productMap[it.productId]?.name) || it.name || "상품"} x${it.qty || 0}`).join(", ");
  }

  function fireToast(msg) {
    setToast(msg);
    setTimeout(() => setToast(""), 2400);
  }

  function inDateRange(order, range) {
    if (range === "all") return true;
    const d = new Date(order.orderDate);
    const now = new Date();
    if (range === "today") return order.orderDate === todayStr();
    if (range === "week") {
      const diff = (now - d) / (1000 * 60 * 60 * 24);
      return diff >= 0 && diff < 7;
    }
    if (range === "month") {
      return d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth();
    }
    return true;
  }

  const filteredOrders = orders
    .filter((o) => statusFilter === "all" || o.status === statusFilter)
    .filter((o) => methodFilter === "all" || (methodFilter === "message" ? !!o.message : !o.message))
    .filter((o) => inDateRange(o, dateFilter))
    .filter((o) => {
      if (!searchQuery.trim()) return true;
      const q = searchQuery.trim().toLowerCase();
      const c = customerMap[o.customerId];
      const name = o.recipient?.name || (c ? c.name : "") || "";
      const phone = o.recipient?.phone || (c ? c.phone : "") || "";
      const productNames = orderItemsText(o);
      return [name, phone, productNames].some((v) => v.toLowerCase().includes(q));
    })
    .sort((a, b) => (a.createdAt < b.createdAt ? 1 : -1));

  const counts = (() => {

    return {
      all: reg.length,
      waiting: reg.filter((o) => o.status === "waiting").length,
      pending: reg.filter((o) => o.status === "pending").length,
      ready: reg.filter((o) => o.status === "ready").length,

    };
  })();

  function toggleCheck(id) {
    setCheckedIds((prev) => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id);
      else next.add(id);
      return next;
    });
  }

  function toggleCheckAll() {
    setCheckedIds((prev) => {
      const allChecked = filteredOrders.every((o) => prev.has(o.id));
      if (allChecked) return new Set();
      return new Set(filteredOrders.map((o) => o.id));
    });
  }

  function setOrderStatus(orderId, status) {
    setOrders((prev) => prev.map((o) => (o.id === orderId ? { ...o, status } : o)));
  }

  // 금요일에 발송되는 주문은, 토요일 배송이 안 되면 월요일에야 도착하는데 신선식품 특성상
  // 상하거나 폐기해야 할 수 있어서, 택배사에 미리 요청하는 문구를 메모에 자동으로 남겨둠.
  // → 송장번호를 입력하는 시점이 아니라, "발송 예정일(예약일이 있으면 그 날짜, 없으면 주문 등록일)"이
  //   금요일이면 주문을 등록/저장하는 바로 그 순간에 메모에 들어가야 함 (그래야 그 직후 주문서를
  //   다운로드해서 송장 기표지를 뽑을 때 이미 문구가 포함되어 있음)
  const FRIDAY_NOTE = "토요일에 꼭 도착 부탁드립니다";
  function isDateFriday(dateStr) {
    if (!dateStr) return false;
    const d = new Date(dateStr);
    if (isNaN(d.getTime())) return false;
    return d.getDay() === 5; // 0=일 ... 5=금 6=토
  }
  function isFridayToday() {
    return new Date().getDay() === 5;
  }
  function withFridayNote(memo) {
    const cur = memo || "";
    if (cur.includes(FRIDAY_NOTE)) return cur;
    return cur ? `${cur}\n${FRIDAY_NOTE}` : FRIDAY_NOTE;
  }
  // 주문 객체(reserveDate/orderDate 보유)를 보고, 발송 예정일이 금요일이면 메모에 문구를 채워서 반환
  function applyFridayNoteIfNeeded(order) {
    const shipDate = order.reserveDate || order.orderDate || todayStr();
    if (!isDateFriday(shipDate)) return order;
    return { ...order, memo: withFridayNote(order.memo) };
  }

  // 발송일 기준으로 "이날짜까지는 도착해야 정상"인 기준일 계산
  // 금요일 발송건은 토요일 배송이 원칙이라, 토요일까지 확인이 안 되면 바로 알려야 함
  // (토요일에 못 받으면 일요일에 직접 갖다드려야 하고, 특히 주말에 영업하는 업체는 못 받으면
  //  장사에 지장이 생기기 때문에 월요일까지 미루면 안 됨)
  function expectedArrivalDeadline(shippedDateStr) {
    if (!shippedDateStr) return null;
    const d = new Date(shippedDateStr);
    if (isNaN(d.getTime())) return null;
    const wd = d.getDay(); // 0=일 ... 6=토
    const addDays = wd === 5 ? 1 : wd === 6 ? 2 : wd === 0 ? 1 : 1; // 금→토(+1) / 토→월(+2) / 그 외→다음날
    const dl = new Date(d);
    dl.setDate(dl.getDate() + addDays);
    dl.setHours(23, 59, 59, 999);
    return dl;
  }

  function updateOrder(orderId, updates) {
    setOrders((prev) => prev.map((o) => {
      if (o.id !== orderId) return o;
      const next = { ...o, ...updates };
      // 예약일을 새로 정하거나 바꿨을 때도, 그 날짜가 금요일이면 바로 메모에 반영
      if (updates.reserveDate !== undefined && isDateFriday(next.reserveDate)) {
        next.memo = withFridayNote(next.memo);
      }
      // 이번에 송장번호가 새로 들어오면서 발송완료로 바뀌는 경우만 해당 (이미 발송완료였던 걸 수정할 땐 중복 추가 안 함)
      if (updates.invoiceNo && updates.invoiceNo.trim() && next.status === "shipped" && o.status !== "shipped") {
        if (isFridayToday()) next.memo = withFridayNote(next.memo);
        next.shippedAt = todayStr();
        next.deliveryConfirmed = false;
      }
      return next;
    }));
    fireToast("주문이 수정되었습니다");
  }

  function deleteOrder(orderId) {

    setCheckedIds(new Set());

  function setCheckedOrdersBusiness(toBusiness) {
    if (checkedIds.size === 0) {
      fireToast("이동할 주문을 체크해주세요");

    }
    const n = checkedIds.size;

    // 업체 전환 시: 받는분 정보로 기존 업체 매칭 시도, 없으면 새 업체로 등록할 목록을 미리 준비
    const vendorIdByOrderId = {};
    const newVendors = [];
    if (toBusiness) {
      const normPhone = (p) => (p || "").replace(/[^0-9]/g, "");
      orders.forEach((o) => {
        if (!checkedIds.has(o.id)) return;
        const ph = normPhone(o.recipient?.phone);
        const nm = (o.recipient?.name || "").trim();
        const existing = vendors.find((x) => (ph && normPhone(x.phone) === ph) || (nm && x.name === nm));
        if (existing) {
          vendorIdByOrderId[o.id] = existing.id;
          return;
        }
        // 이미 이번에 새로 만들기로 한 업체와 같은 사람이면 그걸 재사용 (중복 방지)
        const dup = newVendors.find((v) => (ph && normPhone(v.phone) === ph) || (nm && v.name === nm));
        if (dup) {
          vendorIdByOrderId[o.id] = dup.id;
          return;
        }
        if (!nm && !ph) return; // 이름·연락처가 둘 다 없으면 업체로 등록 불가
        const created = {
          id: uid("v"), name: nm || "이름없음", bizNo: "", ceo: "", phone: o.recipient?.phone || "",
          email: "", address: o.recipient?.address || "", memo: "주문에서 자동 등록됨", bizLicense: "",
        };
        newVendors.push(created);
        vendorIdByOrderId[o.id] = created.id;
      });
      if (newVendors.length > 0) {
        setVendors((prev) => [...prev, ...newVendors]);
      }
    }

    const convertedToBiz = [];
    setOrders((prev) => prev.map((o) => {
      if (!checkedIds.has(o.id)) return o;
      if (toBusiness) {
        const updated = { ...o, isBusiness: true, vendorId: vendorIdByOrderId[o.id] || o.vendorId || "" };
        convertedToBiz.push(updated);
        return updated;
      } else {
        return { ...o, isBusiness: false, vendorId: "" };
      }
    }));
    // 업체로 이동한 주문은 거래명세서 레코드로도 저장 (업체 관리창에서 작성·수정 가능)
    if (toBusiness && convertedToBiz.length > 0) {
      convertedToBiz.length && saveInvoicesGrouped(convertedToBiz);
    }
    // 일반으로 되돌리면 그 주문으로 자동 생성된 거래명세서는 제거
    if (!toBusiness) {
      setInvoices((prev) => prev.filter((inv) => !(inv.orderId && checkedIds.has(inv.orderId))));
    }
    setCheckedIds(new Set());
    if (toBusiness) {
      const newCount = newVendors.length;
      fireToast(`주문 ${n}건을 업체 주문으로 이동했습니다${newCount ? ` (신규 업체 ${newCount}곳 자동 등록)` : ""}. 업체 탭에서 확인하세요`);
    } else {
      fireToast(`주문 ${n}건을 일반 주문으로 이동했습니다`);
    }
  }

  function addDays(dateStr, days) {
    const d = new Date(dateStr);
    d.setDate(d.getDate() + days);
    const pad = (n) => String(n).padStart(2, "0");
    return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;

  // 정기배송 중 발송일이 된 건을 자동으로 주문등록 + 알림 (회차/총회차 반영)
  function runDueSubscriptions(list) {
    const today = todayStr();
    const due = list.filter((s) => s.active && s.nextDate <= today);
    if (due.length === 0) return;

    const newOrders = due.map((s) => {
      const occurrence = (s.occurrenceCount || 0) + 1;
      return applyFridayNoteIfNeeded({
        id: uid("o"),
        customerId: s.customerId,
        sender: { name: s.recipient.name, phone: s.recipient.phone },
        recipient: { ...s.recipient, postalCode: s.recipient.postalCode || estimatePostalCode(s.recipient.address) },
        items: s.items,
        status: "pending",
        invoiceNo: "",
        courier: "",
        createdAt: nowStamp(),
        orderDate: today,
        reserveDate: "",
        boxVolume: "",
        deliveryMessage: "",
        memo: `정기배송 ${occurrence}회차${s.totalOccurrences ? ` / 총 ${s.totalOccurrences}회` : ""}${s.memo ? " · " + s.memo : ""}`,
        message: "",
        subscriptionId: s.id,
        subscriptionOccurrence: occurrence,
      });
    });

    setOrders((prev) => [...newOrders, ...prev]);
    setSubscriptions((prev) =>
      prev.map((s) => {
        const match = due.find((d) => d.id === s.id);
        if (!match) return s;
        const occurrence = (s.occurrenceCount || 0) + 1;
        const reachedLimit = s.totalOccurrences && occurrence >= s.totalOccurrences;
        return {
          ...s,
          occurrenceCount: occurrence,
          nextDate: addDays(s.nextDate, s.cycleDays),
          active: reachedLimit ? false : s.active,
        };
      })
    );

    const summary = `정기배송 ${due.length}건이 자동으로 주문 등록되었어요 (${due.map((s) => s.recipient.name).join(", ")})`;
    fireToast(summary);
    if (typeof Notification !== "undefined" && Notification.permission === "granted") {
      try { new Notification("정기배송 자동 등록", { body: summary }); } catch {}
    }
  }

  // 발송일이 된 정기배송은 그날 오전 9시에 자동등록+알림이 가도록 처리합니다.
  // (앱이 열려있는 동안에만 동작 — 완전히 꺼진 상태의 진짜 푸시는 별도 서버가 필요해요)
  useEffect(() => {
    if (!dataLoaded) return;

    function hasDueToday(list) {
      const today = todayStr();
      return list.some((s) => s.active && s.nextDate <= today);
    }

    const now = new Date();
    const nineAM = new Date();
    nineAM.setHours(9, 0, 0, 0);

    if (now >= nineAM) {
      // 이미 오전 9시를 지났으면 즉시 확인
      if (hasDueToday(subscriptions)) runDueSubscriptions(subscriptions);
    } else if (hasDueToday(subscriptions)) {
      // 아직 오전 9시 전이고 오늘 발송 건이 있으면, 9시에 맞춰 실행
      const ms = nineAM.getTime() - now.getTime();
      const timer = setTimeout(() => {
        runDueSubscriptions(subscriptions);
      }, ms);
      return () => clearTimeout(timer);
    }
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [dataLoaded]);

  // 주문으로부터 거래명세서 레코드 생성
  function makeInvoiceFromOrder(order) {
    const vendor = order.vendorId ? vendors.find((v) => v.id === order.vendorId) : null;
    const vName = vendor?.name || order.recipient?.name || order.sender?.name || "거래처";
    const items = (order.items || []).map((it) => {
      const p = productMap[it.productId];
      return {
        name: p ? p.name : (it.name || "상품"),
        unit: p ? (p.unit || "kg") : "kg",
        qty: it.qty,
        price: it.price || (p ? (p.wholesalePrice || p.price) : 0),
      };
    });
    return {
      id: uid("inv"),
      vendorId: order.vendorId || "",
      vendorName: vName,
      date: order.orderDate || todayStr(),
      items,
      memo: "",
      createdAt: nowStamp(),
      orderId: order.id || "",
    };
  }

  function saveInvoiceFromOrder(order) {
    const inv = makeInvoiceFromOrder(order);
    setInvoices((prev) => {
      const exist = order.id ? prev.find((x) => x.orderId === order.id) : null;
      if (exist) return prev.map((x) => (x.id === exist.id ? { ...inv, id: exist.id } : x));
      return [inv, ...prev];
    });
    return inv;
  }

  // 박스로 쪼개진 여러 업체주문을 (업체+받는분+날짜)별로 합쳐 거래명세서 1장씩 저장
  function saveInvoicesGrouped(orderList) {
    const groups = {};
    orderList.forEach((o) => {
      const key = `${o.vendorId || ""}|${o.recipient?.name || ""}|${o.orderDate || ""}`;
      if (!groups[key]) groups[key] = { ...o, items: [], _groupKey: key };
      (o.items || []).forEach((it) => {
        const ex = groups[key].items.find((x) => (x.productId || x.name) === (it.productId || it.name));
        if (ex) ex.qty += it.qty;
        else groups[key].items.push({ ...it });
      });
    });
    const merged = Object.values(groups);
    setInvoices((prev) => {
      let next = [...prev];
      merged.forEach((o) => {
        const inv = makeInvoiceFromOrder(o);
        inv.groupKey = o._groupKey;
        // 같은 그룹키(업체+받는분+날짜)가 이미 있으면 교체, 없으면 추가
        const existIdx = next.findIndex((x) => x.groupKey && x.groupKey === o._groupKey);
        if (existIdx >= 0) next[existIdx] = { ...inv, id: next[existIdx].id };
        else next = [inv, ...next];
      });
      return next;
    });
    return merged;
  }

  // 업체 하나를 골라 기간(예: 6월 1일~6월 30일)을 정하면, 그 기간 동안의 거래명세서를
  // 전부 모아 합친 "정산서"를 엑셀로 만들어줌. 정산할 때 한 장으로 몰아서 확인하기 위한 기능.
  function generatePeriodInvoiceSheet(vendorId, startDate, endDate) {
    if (!vendorId) { fireToast("업체를 선택해주세요"); return; }
    if (!startDate || !endDate) { fireToast("기간(시작일·종료일)을 선택해주세요"); return; }
    const vendor = vendors.find((v) => v.id === vendorId);
    const vName = vendor ? vendor.name : "거래처";
    const list = invoices
      .filter((inv) => inv.vendorId === vendorId && inv.date && inv.date >= startDate && inv.date <= endDate)
      .sort((a, b) => (a.date < b.date ? -1 : a.date > b.date ? 1 : 0));
    if (list.length === 0) {
      fireToast(`${startDate} ~ ${endDate} 기간에 ${vName}의 거래명세서가 없어요`);
      return;
    }
    // 기간 안의 모든 거래명세서를 하나로 합쳐서, 항목마다 날짜를 붙인 리스트로 만듦
    const lineItems = [];
    let grandTotal = 0;
    list.forEach((inv) => {
      (inv.items || []).forEach((it) => {
        const amount = (it.price || 0) * (it.qty || 0);
        grandTotal += amount;
        lineItems.push({ date: inv.date, name: it.name || "상품", unit: it.unit || "kg", qty: it.qty || 0, price: it.price || 0, amount });
      });
    });

    // ===== 정식 거래명세표 형식으로 엑셀 시트 작성 (7열: 월/일/품목/규격/수량/단가/공급가액) =====
    const ws = {};
    const colLetter = (n) => { let s = ""; n += 1; while (n > 0) { const m = (n - 1) % 26; s = String.fromCharCode(65 + m) + s; n = Math.floor((n - 1) / 26); } return s; };
    const A = (r, c) => colLetter(c) + (r + 1);
    const set = (r, c, v) => { ws[A(r, c)] = { v, t: typeof v === "number" ? "n" : "s" }; };
    const thin = { style: "thin", color: { rgb: "000000" } };
    const medium = { style: "medium", color: { rgb: "000000" } };
    const allThin = { top: thin, bottom: thin, left: thin, right: thin };
    const center = { vertical: "center", horizontal: "center", wrapText: true };
    const styleCell = (r, c, opts = {}) => {
      const addr = A(r, c);
      if (!ws[addr]) ws[addr] = { v: "", t: "s" };
      // 테두리는 opts.border가 없으면 매번 새 객체를 만들어야 함 (공유 객체를 쓰면, 나중에
      // 바깥쪽 셀 하나에만 굵게 바꾸려 해도 그 객체를 같이 쓰는 다른 모든 셀까지 같이 굵어짐)
      ws[addr].s = {
        border: opts.border || { top: thin, bottom: thin, left: thin, right: thin },
        alignment: opts.align ? { ...center, horizontal: opts.align } : center,
        font: { name: "맑은 고딕", sz: opts.sz || 10, bold: !!opts.bold, color: opts.color ? { rgb: opts.color } : undefined },
      };
      if (opts.fill) ws[addr].s.fill = { fgColor: { rgb: opts.fill }, patternType: "solid" };
      if (opts.num) ws[addr].z = "#,##0";
    };
    const NCOLS = 7; // 월,일,품목,규격,수량,단가,공급가액

    // 제목
    set(0, 0, "거   래   명   세   서"); styleCell(0, 0, { sz: 20, bold: true, color: "1F4E9C", border: {} });
    set(0, 4, `기간: ${startDate} ~ ${endDate}`); styleCell(0, 4, { sz: 11, align: "right", border: {} });

    // 공급받는자 / 공급자 정보 박스 (행 2~6)
    set(2, 0, "공급받는자"); styleCell(2, 0, { bold: true, fill: "EAF1FB" });
    set(2, 1, "상호(업체명)"); styleCell(2, 1, { sz: 9 });
    set(2, 2, vName); styleCell(2, 2, { bold: true, color: "1F4E9C", sz: 12 });
    set(3, 1, "주소"); styleCell(3, 1, { sz: 9 });
    set(3, 2, vendor?.address || ""); styleCell(3, 2, { align: "left" });
    set(4, 1, "연락처"); styleCell(4, 1, { sz: 9 });
    set(4, 2, vendor?.phone || ""); styleCell(4, 2, {});

    set(2, 4, "공급자"); styleCell(2, 4, { bold: true, fill: "EAF1FB" });
    set(2, 5, "상호(법인명)"); styleCell(2, 5, { sz: 9 });
    set(2, 6, supplier.name || ""); styleCell(2, 6, { bold: true, color: "1F4E9C", sz: 12 });
    set(3, 5, "사업자번호"); styleCell(3, 5, { sz: 9 });
    set(3, 6, supplier.bizNo || ""); styleCell(3, 6, {});
    set(4, 5, "전화번호"); styleCell(4, 5, { sz: 9 });
    set(4, 6, supplier.phone || ""); styleCell(4, 6, {});

    set(5, 0, "합계금액"); styleCell(5, 0, { bold: true, fill: "EAF1FB" });
    set(5, 1, "₩" + grandTotal.toLocaleString()); styleCell(5, 1, { bold: true, color: "1F4E9C", sz: 12 });
    set(5, 4, "거래건수"); styleCell(5, 4, { bold: true, fill: "EAF1FB" });
    set(5, 5, `${list.length}건 (품목 ${lineItems.length}개)`); styleCell(5, 5, { bold: true });
    for (let c = 2; c <= 3; c++) styleCell(5, c, {});
    for (let c = 6; c <= 6; c++) styleCell(5, c, {});

    // 품목 헤더
    const HEAD = 7;
    ["월", "일", "품목", "규격", "수량", "단가", "공급가액"].forEach((t, c) => {
      set(HEAD, c, t); styleCell(HEAD, c, { bold: true, fill: "EAF1FB", sz: 10 });
    });

    // 품목 행 (기간 안의 모든 거래를 날짜순으로, 항목 수만큼 동적으로 생성)
    lineItems.forEach((it, i) => {
      const r = HEAD + 1 + i;
      const parts = (it.date || "").split("-");
      set(r, 0, parts[1] ? Number(parts[1]) : ""); styleCell(r, 0, { sz: 9 });
      set(r, 1, parts[2] ? Number(parts[2]) : ""); styleCell(r, 1, { sz: 9 });
      set(r, 2, it.name); styleCell(r, 2, { sz: 9, align: "left" });
      set(r, 3, it.unit); styleCell(r, 3, { sz: 9 });
      set(r, 4, it.qty); styleCell(r, 4, { sz: 9, num: true });
      set(r, 5, it.price); styleCell(r, 5, { sz: 9, num: true, align: "right" });
      set(r, 6, it.amount); styleCell(r, 6, { sz: 9, num: true, align: "right" });
    });

    // 합계 행
    const SUM = HEAD + 1 + lineItems.length;
    set(SUM, 0, "합      계"); styleCell(SUM, 0, { bold: true, fill: "EAF1FB" });
    for (let c = 1; c <= 5; c++) styleCell(SUM, c, { fill: "EAF1FB" });
    set(SUM, 6, grandTotal); styleCell(SUM, 6, { bold: true, num: true, align: "right", fill: "EAF1FB" });

    // 바깥 테두리를 굵게
    for (let c = 0; c < NCOLS; c++) {
      const topAddr = A(2, c); if (ws[topAddr]?.s?.border) ws[topAddr].s.border.top = medium;
      const botAddr = A(SUM, c); if (ws[botAddr]?.s?.border) ws[botAddr].s.border.bottom = medium;
    }
    for (let r = 2; r <= SUM; r++) {
      const leftAddr = A(r, 0); if (ws[leftAddr]?.s?.border) ws[leftAddr].s.border.left = medium;
      const rightAddr = A(r, NCOLS - 1); if (ws[rightAddr]?.s?.border) ws[rightAddr].s.border.right = medium;
    }

    ws["!cols"] = [{ wch: 5 }, { wch: 5 }, { wch: 22 }, { wch: 8 }, { wch: 8 }, { wch: 10 }, { wch: 12 }];
    ws["!merges"] = [
      { s: { r: 0, c: 0 }, e: { r: 0, c: 3 } },
      { s: { r: 0, c: 4 }, e: { r: 0, c: 6 } },
      { s: { r: 5, c: 2 }, e: { r: 5, c: 3 } },
      { s: { r: SUM, c: 0 }, e: { r: SUM, c: 5 } },
    ];
    ws["!ref"] = "A1:" + A(SUM, NCOLS - 1);

    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "정산서");
    XLSX.writeFile(wb, `거래명세서_${vName}_정산(${startDate}~${endDate}).xlsx`);
    fireToast(`${vName} 정산서 (거래 ${list.length}건, 합계 ${grandTotal.toLocaleString()}원)를 다운로드했어요`);
  }


  function addInvoice(inv) {
    setInvoices((prev) => [{ ...inv, id: uid("inv"), createdAt: nowStamp() }, ...prev]);
    fireToast("거래명세서를 저장했습니다");
  }
  function updateInvoice(id, updates) {
    setInvoices((prev) => prev.map((x) => (x.id === id ? { ...x, ...updates } : x)));
    fireToast("거래명세서를 수정했습니다");
  }
  function removeInvoice(id) {
    setInvoices((prev) => prev.filter((x) => x.id !== id));
    fireToast("거래명세서를 삭제했습니다");
  }

  // 거래명세서 레코드 → 엑셀 다운로드 (generateInvoiceSheet가 order 형태를 받으므로 변환)
  function downloadInvoice(inv) {
    const pseudoOrder = {
      vendorId: inv.vendorId,
      orderDate: inv.date,
      recipient: { name: inv.vendorName },
      sender: { name: inv.vendorName },
      items: inv.items.map((it) => ({ productId: null, name: it.name, qty: it.qty, price: it.price, unit: it.unit })),
    };
    generateInvoiceSheet(pseudoOrder);
  }

  // 거래명세서 엑셀 업로드 → 레코드로 저장
  function handleInvoiceFileUpload(e) {
    const file = e.target.files?.[0];
    if (!file) return;
    setBusyMessage("거래명세서 파일을 읽고 있어요...");
    readWorkbookFile(file, (rows) => {
      const items = [];
      let vendorName = "";
      const date = todayStr();
      rows.forEach((r) => {
        const nm = String(r["상품명"] || r["품목"] || r["품          목"] || r["D"] || "").trim();
        const qty = Number(String(r["수량"] || r["수 량"] || r["O"] || "").toString().replace(/[^0-9.]/g, "")) || 0;
        const price = Number(String(r["단가"] || r["단    가"] || r["Q"] || "").toString().replace(/[^0-9.]/g, "")) || 0;
        const unit = String(r["규격"] || r["규   격"] || r["J"] || "kg").trim() || "kg";
        if (nm && (qty || price)) items.push({ name: nm, unit, qty: qty || 1, price });
        if (!vendorName && (r["상호(법인명)"] || r["상호"] || r["공급받는자"])) vendorName = String(r["상호(법인명)"] || r["상호"] || r["공급받는자"]).trim();
      });
      if (items.length === 0) { fireToast("거래명세서에서 품목을 찾지 못했습니다. 양식을 확인해주세요"); setBusyMessage(null); return; }
      const matchedVendor = vendors.find((v) => v.name === vendorName);
      addInvoice({ vendorId: matchedVendor ? matchedVendor.id : "", vendorName: vendorName || "거래처", date, items, memo: "업로드한 명세서" });
      setBusyMessage(null);
    }, () => {
      setBusyMessage(null);
      fireToast("파일을 읽지 못했어요. 엑셀(.xlsx) 형식이 맞는지 확인해주세요");
    });
    e.target.value = "";
  }

  // ── 거래명세서 자동 생성 (업로드한 양식 기반) ──
  function generateInvoiceSheet(order) {
    const vendor = order.vendorId ? vendors.find((v) => v.id === order.vendorId) : null;
    const vName = vendor?.name || order.recipient?.name || order.sender?.name || "거래처";
    const vAddr = vendor?.address || order.recipient?.address || "";
    const vPhone = vendor?.phone || order.recipient?.phone || "";
    const dateStr = order.orderDate || todayStr();
    const parts = dateStr.split("-");
    const yy = parts[0] || "", mm = parts[1] || "", dd = parts[2] || "";

    const ws = {};
    const colLetter = (n) => { let s = ""; n += 1; while (n > 0) { const m = (n - 1) % 26; s = String.fromCharCode(65 + m) + s; n = Math.floor((n - 1) / 26); } return s; };
    const A = (r, c) => colLetter(c) + (r + 1); // 0-based r,c → 주소
    const set = (r, c, v, opt) => {
      const cell = { v: v, t: typeof v === "number" ? "n" : "s" };
      if (opt && opt.bold) cell.s = Object.assign({}, cell.s, { font: { bold: true } });
      ws[A(r, c)] = cell;
    };

    // 테두리/정렬 스타일을 위해 모든 셀에 기본 스타일 적용
    const thin = { style: "thin", color: { rgb: "000000" } };
    const allBorder = { top: thin, bottom: thin, left: thin, right: thin };
    const centerWrap = { vertical: "center", horizontal: "center", wrapText: true };
    const styleCell = (r, c, opts) => {
      const addr = A(r, c);
      if (!ws[addr]) ws[addr] = { v: "", t: "s" };
      ws[addr].s = Object.assign({
        border: allBorder,
        alignment: centerWrap,
        font: { name: "맑은 고딕", sz: opts && opts.sz ? opts.sz : 10, bold: !!(opts && opts.bold), color: opts && opts.color ? { rgb: opts.color } : undefined },
      }, opts && opts.s ? opts.s : {});
      if (opts && opts.fill) ws[addr].s.fill = { fgColor: { rgb: opts.fill }, patternType: "solid" };
      if (opts && opts.align) ws[addr].s.alignment = Object.assign({}, centerWrap, { horizontal: opts.align });
      if (opts && opts.num) ws[addr].z = "#,##0";
    };

    // ===== 상단 헤더 =====
    set(0, 0, "거 래 일 자"); styleCell(0, 0, { sz: 9 });
    set(1, 0, `${yy}년 ${Number(mm)}월 ${Number(dd)}일`); styleCell(1, 0, { sz: 9 });
    set(0, 7, "거  래  명  세  표"); styleCell(0, 7, { sz: 20, bold: true, color: "1F4E9C" });
    set(0, 27, "(공급받는자용)"); styleCell(0, 27, { sz: 9 });

    set(2, 0, "공급받는자"); styleCell(2, 0, { bold: true });
    set(2, 2, "상  호\n(법인명)"); styleCell(2, 2, { sz: 9 });
    set(2, 5, vName); styleCell(2, 5, { bold: true, color: "1F4E9C", sz: 12 });
    set(2, 15, "귀하"); styleCell(2, 15, {});
    set(2, 17, "공\n급\n자"); styleCell(2, 17, { bold: true });
    set(2, 18, "등록번호"); styleCell(2, 18, { sz: 9 });

    // 등록번호: 한 칸(V3~AF3 병합)에 통째로 표기
    const bizNoFull = (supplier.bizNo || "").trim();
    set(2, 21, bizNoFull); styleCell(2, 21, { bold: true, align: "center" });

    set(4, 2, "사 업 장"); styleCell(4, 2, { sz: 9 });
    set(5, 2, "주    소"); styleCell(5, 2, { sz: 9 });
    set(4, 5, vAddr); styleCell(4, 5, { align: "center" });
    set(4, 18, "상  호\n(법인명)"); styleCell(4, 18, { sz: 9 });
    set(4, 21, supplier.name || ""); styleCell(4, 21, { bold: true, color: "1F4E9C", sz: 12 });
    set(4, 28, "성명"); styleCell(4, 28, { sz: 9 });
    set(4, 29, supplier.ceo || ""); styleCell(4, 29, { bold: true });

    set(6, 2, "전화번호"); styleCell(6, 2, { sz: 9 });
    set(6, 5, vPhone); styleCell(6, 5, {});
    set(6, 18, "사 업 장"); styleCell(6, 18, { sz: 9 });
    set(7, 18, "주    소"); styleCell(7, 18, { sz: 9 });
    set(6, 21, supplier.address || ""); styleCell(6, 21, { align: "center" });

    set(8, 2, "합계금액"); styleCell(8, 2, { sz: 9 });
    set(8, 18, "전    화"); styleCell(8, 18, { sz: 9 });
    set(8, 21, supplier.phone || ""); styleCell(8, 21, {});
    set(8, 27, "팩스"); styleCell(8, 27, { sz: 9 });
    set(8, 28, supplier.fax || ""); styleCell(8, 28, {});

    // ===== 품목 헤더 (행 10, 0-based) =====
    const HEAD = 10;
    const headers = [[0, "월"], [1, "일"], [2, "번호"], [3, "품          목"], [9, "규   격"], [14, "수 량"], [16, "단    가"], [21, "공 급 가 액"], [26, "세    액"], [31, "비고"]];
    headers.forEach(([c, t]) => { set(HEAD, c, t); });
    // 헤더 줄 전체 스타일
    for (let c = 0; c <= 32; c++) styleCell(HEAD, c, { bold: true, fill: "EAF1FB", sz: 9 });

    // ===== 품목 행 (행 11~34, 최대 24개) =====
    let total = 0;
    const maxRows = 24;
    for (let i = 0; i < maxRows; i++) {
      const r = HEAD + 1 + i;
      const it = order.items[i];
      // 모든 칸 테두리
      for (let c = 0; c <= 32; c++) styleCell(r, c, { sz: 9 });
      if (it) {
        const p = productMap[it.productId];
        const nm = p ? p.name : (it.name || "상품");
        const unit = p ? (p.unit || "kg") : "kg";
        const price = p ? (p.wholesalePrice || p.price) : (it.price || 0);
        const amount = price * it.qty;
        total += amount;
        if (i === 0) { set(r, 0, Number(mm)); styleCell(r, 0, { sz: 9 }); set(r, 1, Number(dd)); styleCell(r, 1, { sz: 9 }); }
        set(r, 2, i + 1); styleCell(r, 2, { sz: 9 });
        set(r, 3, nm); styleCell(r, 3, { sz: 9, align: "center" });
        set(r, 9, unit); styleCell(r, 9, { sz: 9 });
        set(r, 14, it.qty); styleCell(r, 14, { sz: 9, num: true });
        set(r, 16, price); styleCell(r, 16, { sz: 9, num: true, align: "right" });
        set(r, 21, amount); styleCell(r, 21, { sz: 9, num: true, align: "right" });
      }
    }

    // ===== 계좌 (행 35) =====
    const BANK = 35;
    set(BANK, 0, supplier.bank || ""); styleCell(BANK, 0, { sz: 9, align: "center" });
    for (let c = 0; c <= 32; c++) styleCell(BANK, c, { sz: 9 });
    set(BANK, 0, supplier.bank || ""); styleCell(BANK, 0, { sz: 9, align: "center" });

    // ===== 합계 (행 38) =====
    const SUM = 38;
    set(SUM, 0, "합      계"); styleCell(SUM, 0, { bold: true, fill: "EAF1FB" });
    for (let c = 0; c <= 20; c++) styleCell(SUM, c, { bold: true, fill: "EAF1FB" });
    set(SUM, 21, total); styleCell(SUM, 21, { bold: true, num: true, align: "right", fill: "EAF1FB" });
    for (let c = 22; c <= 32; c++) styleCell(SUM, c, { fill: "EAF1FB" });

    // ===== 하단 합계 박스 (행 39) =====
    const FOOT = SUM + 1; // 39
    set(FOOT, 0, "공급\n가액"); styleCell(FOOT, 0, { bold: true, sz: 9 });
    set(FOOT, 3, total); styleCell(FOOT, 3, { num: true, bold: true, align: "right" });
    set(FOOT, 8, "미수금"); styleCell(FOOT, 8, { bold: true, sz: 9 });
    set(FOOT, 10, 0); styleCell(FOOT, 10, { num: true, align: "right" });
    set(FOOT, 14, "합계\n금액"); styleCell(FOOT, 14, { bold: true, sz: 9 });
    set(FOOT, 16, total); styleCell(FOOT, 16, { num: true, bold: true, align: "right" });
    set(FOOT, 26, "인수자"); styleCell(FOOT, 26, { bold: true, sz: 9 });
    for (let c = 0; c <= 32; c++) styleCell(FOOT, c, { sz: 9 });
    set(FOOT, 0, "공급\n가액"); styleCell(FOOT, 0, { bold: true, sz: 9 });
    set(FOOT, 3, total); styleCell(FOOT, 3, { num: true, bold: true, align: "right" });
    set(FOOT, 8, "미수금"); styleCell(FOOT, 8, { bold: true, sz: 9 });
    set(FOOT, 14, "합계\n금액"); styleCell(FOOT, 14, { bold: true, sz: 9 });
    set(FOOT, 16, total); styleCell(FOOT, 16, { num: true, bold: true, align: "right" });
    set(FOOT, 26, "인수자"); styleCell(FOOT, 26, { bold: true, sz: 9 });

    // 합계금액 상단 표시
    set(8, 5, "₩" + total.toLocaleString()); styleCell(8, 5, { bold: true, color: "1F4E9C", sz: 11, align: "center" });

    // ===== 병합 (수정본과 동일 구조) =====
    const M = (r1, c1, r2, c2) => ({ s: { r: r1, c: c1 }, e: { r: r2, c: c2 } });
    const merges = [
      M(0,0,0,6), M(0,7,1,26), M(0,27,0,32), M(1,0,1,6), M(1,27,1,32),
      M(2,0,9,1),
      M(2,2,3,4), M(2,5,3,14), M(2,15,3,16), M(2,17,9,17), M(2,18,3,20), M(2,21,3,32),
      M(4,2,4,4), M(4,5,5,16), M(4,18,5,20), M(4,21,5,27), M(4,28,5,28), M(4,29,5,32),
      M(5,2,5,4),
      M(6,2,7,4), M(6,5,7,16), M(6,18,6,20), M(6,21,7,32),
      M(7,18,7,20),
      M(8,2,9,4), M(8,5,9,16), M(8,18,9,20), M(8,21,9,26), M(8,27,9,27), M(8,28,9,32),
    ];
    // 품목 헤더(행10) + 품목 행(11~34)
    for (let r = 10; r <= 34; r++) {
      merges.push(M(r,3,r,8), M(r,9,r,13), M(r,14,r,15), M(r,16,r,20), M(r,21,r,25), M(r,26,r,30), M(r,31,r,32));
    }
    // 계좌(35), 빈줄(36,37), 합계(38), 하단(39)
    merges.push(M(35,0,35,32), M(36,0,36,32), M(37,0,37,32));
    merges.push(M(38,0,38,20), M(38,21,38,25), M(38,26,38,30), M(38,31,38,32));
    merges.push(M(39,0,39,2), M(39,3,39,7), M(39,8,39,9), M(39,10,39,13), M(39,14,39,15), M(39,16,39,25), M(39,26,39,27), M(39,28,39,32));
    ws["!merges"] = merges;

    // ===== 열 너비 / 행 높이 / 범위 =====
    ws["!cols"] = Array.from({ length: 33 }, (_, i) => {
      if (i === 2) return { wch: 4.4 }; // 번호
      return { wch: 3 };
    });
    ws["!rows"] = Array.from({ length: FOOT + 1 }, (_, i) => {
      if (i === HEAD) return { hpt: 22 };
      if (i === SUM) return { hpt: 28 };
      return { hpt: 22 };
    });

  function changeCartQty(deliveryId, productId, delta) {
    setDraft((prev) => ({
      ...prev,
      deliveries: prev.deliveries.map((d) => {
        if (d.id !== deliveryId) return d;
        const cart = { ...d.cart };
        const next = Math.round(((cart[productId] || 0) + delta) * 10) / 10;
        if (next <= 0) delete cart[productId];
        else cart[productId] = next;
        return { ...d, cart };
      }),
    }));
  }

  function addDeliveryRow() {
    setDraft((prev) => ({
      ...prev,
      deliveries: [...prev.deliveries, { id: uid("d"), name: "", phone: "", address: "", cart: {} }],
    }));
  }

  function removeDeliveryRow(deliveryId) {
    setDraft((prev) => {
      if (prev.deliveries.length <= 1) return prev;
      return { ...prev, deliveries: prev.deliveries.filter((d) => d.id !== deliveryId) };
    });
  }

  function updateDeliveryField(deliveryId, field, value) {
    setDraft((prev) => ({
      ...prev,
      deliveries: prev.deliveries.map((d) => (d.id === deliveryId ? { ...d, [field]: value } : d)),
    }));
  }

  function deliveryTotal(d) {
    // 받는분/연락처가 등록 업체와 일치하면 업체 단가 적용
    const ph = (d.phone || draft.sender.phone || "").replace(/-/g, "");
    const nm = (d.name || draft.sender.name || "").trim();
    const biz = vendors.some((v) =>
      (ph && (v.phone || "").replace(/-/g, "") === ph) || (nm && v.name === nm)
    );
    return Object.entries(d.cart).reduce((sum, [productId, qty]) => {
      const p = productMap[productId];
      const price = p ? (((biz || (p.channel === "business")) ? (p.wholesalePrice || p.price) : p.price)) : 0;
      return sum + price * qty;
    }, 0);
  }

  const draftItems = draft.deliveries.flatMap((d) => Object.entries(d.cart).map(([productId, qty]) => ({ productId, qty })));
  const draftTotal = draft.deliveries.reduce((sum, d) => sum + deliveryTotal(d), 0);

  function applyParsedMessage(text) {
    const parsed = parseOrderMessage(text, products);
    const matched = customers.find((c) => parsed.recipPhone && (c.phone || "").replace(/-/g, "") === parsed.recipPhone.replace(/-/g, ""));
    const cart = {};
    (parsed.items || []).forEach((it) => {
      cart[it.productId] = (cart[it.productId] || 0) + it.qty;
    });
    setDraft((prev) => ({
      ...prev,
      message: text,
      customerId: matched ? matched.id : "",
      sender: { name: parsed.senderName, phone: parsed.senderPhone },
      deliveries: [
        {
          ...prev.deliveries[0],
          name: parsed.recipName,
          phone: parsed.recipPhone,
          address: parsed.address,
          cart: Object.keys(cart).length ? cart : prev.deliveries[0].cart,
        },
        ...prev.deliveries.slice(1),
      ],
      reserveDate: parsed.reserveDate,
      deliveryMessage: parsed.deliveryMessage,
    }));
    return parsed;
  }

  // 사진(명함/메모/문서)을 찍어서 글자를 인식하고 주문정보를 자동으로 채웁니다.
  function handlePhotoCapture(file) {
    if (!file) return;
    if (typeof Tesseract === "undefined") {
      fireToast("이 기기에서는 사진 인식 기능을 불러오지 못했어요. 인터넷 연결을 확인해주세요");
      return;
    }
    setOcrLoading(true);
    // 사진을 보정(확대·흑백·대비강화)한 뒤 인식 → 정확도 향상
    preprocessForOcr(file).then((dataUrl) => {
      const target = dataUrl || file;
      return Tesseract.recognize(target, "kor+eng");
    })
      .then(({ data }) => {
        const text = data.text || "";
        if (!text.trim()) {
          fireToast("사진에서 글자를 찾지 못했어요. 더 밝은 곳에서 평평하게 다시 찍어보세요");
        } else {
          applyParsedMessage(text);
          fireToast("사진에서 글자를 인식해서 자동으로 채웠어요. 확인 후 등록해주세요");
        }
      })
      .catch(() => {
        fireToast("사진 인식 중 문제가 발생했어요. 다시 시도해주세요");
      })
      .finally(() => setOcrLoading(false));
  }

  function analyzeMessage() {
    const parsed = applyParsedMessage(draft.message);
    if (!parsed.senderPhone && !parsed.senderName && parsed.items.length === 0) {
      fireToast("메시지에서 인식된 정보가 없습니다");
    } else if (parsed.items.length === 0) {
      fireToast("연락처·주소는 채웠어요. 상품명이 메시지에 없어 상품은 아래에서 직접 선택해주세요");
    } else {
      fireToast("주문 정보를 자동으로 채웠어요. 확인 후 등록해주세요");
    }
  }

  function registerNewCustomersFromOrders(ordersToScan) {
    setCustomers((prevCustomers) => {
      const toAdd = findMissingCustomersFromOrders(ordersToScan, prevCustomers);
      const merged = toAdd.length > 0 ? [...prevCustomers, ...toAdd] : prevCustomers;
      const patches = syncCustomerAddressNotes(ordersToScan, merged);

      return merged.map((c) => (patches[c.id] !== undefined ? { ...c, memo: patches[c.id] } : c));
    });
  }
