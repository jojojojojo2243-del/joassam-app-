  // ── 화면 자동 잠금 방지 (Wake Lock) ──
  //  앱이 화면에 보이는 동안 화면이 꺼지지 않게 유지. 백그라운드로 가면 자동 해제,
  //  다시 돌아오면 재획득. 미지원 브라우저/권한거부는 조용히 무시(앱 정상 동작).
  const wakeLockRef = useRef(null);
  useEffect(() => {
    let cancelled = false;
    async function acquireWakeLock() {
      try {
        if ("wakeLock" in navigator && document.visibilityState === "visible" && !cancelled) {
          wakeLockRef.current = await navigator.wakeLock.request("screen");
          // 시스템이 강제 해제(전화 수신 등)하면 참조만 정리
          if (wakeLockRef.current && wakeLockRef.current.addEventListener) {
            wakeLockRef.current.addEventListener("release", () => { wakeLockRef.current = null; });
          }
        }
      } catch (e) { /* 미지원/거부 — 무시 */ }
    }
    async function releaseWakeLock() {
      try { if (wakeLockRef.current) { await wakeLockRef.current.release(); } } catch (e) {}
      wakeLockRef.current = null;
    }
    function onVisibility() {
      if (document.visibilityState === "visible") acquireWakeLock();
      else releaseWakeLock();
    }
    acquireWakeLock();
    document.addEventListener("visibilitychange", onVisibility);
    return () => {
      cancelled = true;
      document.removeEventListener("visibilitychange", onVisibility);
      releaseWakeLock();
    };
  }, []);

  // AI가 준 명령(JSON)에 따라 앱을 실제로 제어
  // #3+#4: 선택된 고객(또는 말한 이름)으로 새 주문 폼을 채움 (상품은 퍼지매칭). 저장은 안 함.
  function fillOrderFromChoice(cand, p) {
    setTab("new");
    setDraft((prev) => {
      const next = JSON.parse(JSON.stringify(prev));
      const d = next.deliveries && next.deliveries[0];
      if (!d) return prev;
      d.name = cand ? cand.name : (p.name || d.name || "");
      if (cand && cand.phone) d.phone = cand.phone;
      if (cand && cand.address) d.address = cand.address;
      if (p.note) next.message = (next.message ? next.message + " " : "") + p.note;
      if (p.product) {
        const prod = fuzzyProductMatch(p.product, products);   // '가피라'→'카이피라'
        const qtyNum = parseInt(String(p.qty || "").replace(/[^0-9]/g, ""), 10) || 1;
        if (prod) d.cart = { ...(d.cart || {}), [prod.id]: qtyNum };
        else next.message = (next.message ? next.message + " " : "") + `[상품:${p.product} ${p.qty || ""}]`;
      }
      return next;
    });
    fireToast(`📝 새 주문 폼을 채웠어요${cand ? ` (${cand._kind || ""} ${cand.name})` : (p.name ? ` (${p.name})` : "")} — 확인 후 저장하세요`);
  }

  // #4: 후보 확정 (버튼 터치 또는 음성 선택)
  function confirmNameChoice(cand) {
    const pending = nameChoiceRef.current;
    setNameChoice(null);
    if (pending) fillOrderFromChoice(cand, pending.payload || {});
  }

  // #2: 기존 주문 묶음배송 / 부분 묶음 — setOrders로 bundleId·isBundle 부여 (기존 저장 경로 사용)
  function bundleExistingOrders(name, productList, partial) {
    let targets = findOrdersForBundle(name, orders);
    if (partial && productList && productList.length) targets = targets.filter((o) => orderHasAnyProduct(o, productList));
    if (!targets.length) { fireToast(`'${name || "해당 고객"}'의 묶을 미발송 주문을 못 찾았어요`); return; }
    if (targets.length < 2) { fireToast(`'${name}' 미발송 주문이 1건뿐이라 묶을 게 없어요`); setTab("orders"); setSearchQuery(name || ""); return; }
    const bundleId = uid("bundle");
    const idset = new Set(targets.map((o) => o.id));
    setOrders((prev) => prev.map((o) => (idset.has(o.id) ? { ...o, isBundle: true, bundleId } : o)));
    setTab("orders"); setSearchQuery(name || "");
    fireToast(`📦 ${partial ? "부분 " : ""}묶음배송: '${name}' 주문 ${targets.length}건을 한 묶음으로 처리했어요`);
  }

  // ★ v38: 말한 이름으로 기존 주문 1건 찾기 (발송완료 포함, 가장 최근 것 우선). 못 찾으면 null.
  // ★ v42: 실수 복구 — 주문을 바꾸기 직전 상태를 1단계 저장. 이후 "되돌려"로 복원.
  function recordUndo(label) {
    lastUndoRef.current = { label: label || "방금 작업", orders: orders };
  }
  function undoLast() {
    const u = lastUndoRef.current;
    if (!u || !Array.isArray(u.orders)) { fireToast("되돌릴 작업이 없어요"); return false; }
    justSubmittedRef.current = true;   // 되돌리기로 인한 개수 변화는 '새 주문 알림'에서 제외
    setOrders(u.orders);
    lastUndoRef.current = null;
    fireToast(`↩️ ${u.label}을(를) 되돌렸어요`);
    return true;
  }

  function findOrderBySpokenName(spokenName) {
    const q = String(spokenName || "").replace(/\s/g, "").trim();
    if (!q) return null;
    const scoreName = (nm) => {
      const n = String(nm || "").replace(/\s/g, "");
      if (!n) return 0;
      if (n === q) return 1;
      if (n.includes(q) || q.includes(n)) return 0.9;
      return (typeof simJamo === "function") ? simJamo(q, n) : 0;
    };
    let best = null, bestScore = 0.6;
    (orders || []).forEach((o) => {
      const cand = Math.max(
        scoreName(orderRecipientName(o)),
        scoreName((customerMap[o.customerId] || {}).name),
        scoreName(o.name)
      );
      // 점수가 같거나 높으면 뒤(=더 최근에 추가된) 주문을 선택
      if (cand >= bestScore) { bestScore = cand; best = o; }
    });
    return best;
  }

  function handleVoiceAction(command) {
    if (!command || !command.action) return;
    const tabName = { orders: "주문목록", new: "새 주문", customers: "고객관리", settings: "설정" };
    switch (command.action) {
      case "NAVIGATE":
        if (command.target === "settings") { setSideMenuOpen(true); }   // 설정/메뉴 열기
        else setTab(command.target);                                    // orders / new / customers
        fireToast(`🧭 '${tabName[command.target] || command.target}' 화면으로 이동`);
        break;
      case "SEARCH":
        setTab("orders");                             // 검색 결과를 볼 수 있게 주문목록으로 강제 이동
        setSearchQuery(command.keyword);              // 통합 검색창 채우기
        if (typeof setStatusFilter === "function") setStatusFilter("all");
        fireToast(`🔍 '${command.keyword}' 검색`);
        break;
      case "CONTROL":
        if (command.command === "close") {
          setSideMenuOpen(false);                     // 설정/메뉴 닫기
          fireToast("✅ 창을 닫았어요");
        } else if (command.command === "reset") {
          setDraft(blankDraft);                       // 새 주문 폼 초기화
          setSearchQuery("");                         // 검색어 지우기
          fireToast("🧹 폼·검색을 초기화했어요");
        }
        break;
      case "CREATE_ORDER": {
        const p = command.payload || {};
        // #4 동명이인/유사업체 방어: 후보가 2개 이상이면 등록 멈추고 사용자에게 선택 요청
        if (p.name) {
          const cands = findNameCandidates(p.name, customers, vendors);
          if (cands.length >= 2) {
            setNameChoice({ candidates: cands, payload: p });
            fireToast("⚠️ 비슷한 이름이 여러 곳이에요 — 누구인지 골라 주세요");
            break;
          }
          if (cands.length === 1) { fillOrderFromChoice(cands[0], p); break; }
        }
        fillOrderFromChoice(null, p); // 매칭 없음 → 말한 이름 그대로
        break;
      }
      case "ADD_TO_ORDER": {
        // #2 기존 주문에 상품/수량 추가 → 없으면 새 주문, 있으면 합치고(여러 건이면) 묶음으로 자동 전환
        const p = command.payload || {};
        const targets = findOrdersForBundle(p.name, orders);   // 미발송 주문들
        if (!targets.length) {
          fireToast(`'${p.name}'의 기존 주문이 없어 새 주문으로 열게요`);
          handleVoiceAction({ action: "CREATE_ORDER", payload: p });
          break;
        }
        const prod = fuzzyProductMatch(p.product, products);
        const qtyNum = parseInt(String(p.qty || "").replace(/[^0-9]/g, ""), 10) || 1;
        // 등록 상품이면 productId로 병합(같은 상품 수량↑), 미등록이면 이름으로 커스텀 추가
        const itemName = prod ? prod.name : (p.product || "").trim();
        const itemKey = prod ? prod.id : itemName;
        const newItem = prod ? { productId: prod.id, name: prod.name, qty: qtyNum, price: prod.price || 0 }
                             : { productId: null, name: itemName, qty: qtyNum, price: 0 };
        const target = targets[targets.length - 1];            // 가장 최근 주문에 합침
        setOrders((prev) => {
          let next = prev.map((o) => {
            if (o.id !== target.id) return o;
            const items = JSON.parse(JSON.stringify(o.items || []));   // 깊은 복사
            const idx = items.findIndex((it) => (it.productId || it.name) === itemKey);
            if (idx >= 0) items[idx].qty = (Number(items[idx].qty) || 0) + qtyNum;   // 수량 증가
            else items.push(newItem);   // 상품 합침
            return { ...o, items };
          });
          // 같은 고객 미발송 주문이 2건 이상이면 묶음으로 자동 업그레이드
          if (targets.length >= 2) {
            const bid = target.bundleId || uid("bundle");
            const idset = new Set(targets.map((o) => o.id));
            next = next.map((o) => (idset.has(o.id) ? { ...o, isBundle: true, bundleId: bid } : o));
          }
          return next;
        });
        setTab("orders"); setSearchQuery(p.name || "");
        fireToast(`➕ ${p.name} 주문에 ${itemName} ${qtyNum}개 추가${targets.length >= 2 ? " · 묶음 전환" : ""} — 확인하세요`);
        break;
      }
      case "BUNDLE_ORDERS":
        bundleExistingOrders(command.name, command.products || [], false);
        break;
      case "PARTIAL_BUNDLE":
        bundleExistingOrders(command.name, command.products || [], true);
        break;
      case "REBUNDLE_ONE": {
        // 단일 주문의 발송 박스(묶음) 재구성 — 대상: 말한 고객의 최근 미발송 주문, 없으면 현재 열린 주문
        let target = null;
        if (command.name) {
          const cands = findOrdersForBundle(command.name, orders);
          target = cands.length ? cands[cands.length - 1] : null;
        }
        if (!target && selectedOrderId) target = orders.find((o) => o.id === selectedOrderId) || null;
        if (!target) { fireToast("어느 주문인지 못 찾았어요 — 주문을 연 뒤 다시 말씀해 주세요"); break; }
        setTab("orders"); setSelectedOrderId(target.id);
        if (command.mode === "all") {
          // 전부 한 박스로 (같은 상품 수량 합산)
          const map = {};
          (target.items || []).forEach((it) => {
            const p = productMap[it.productId];
            const key = it.productId || it.name;
            if (!map[key]) map[key] = { productId: it.productId || null, name: p ? p.name : (it.name || "상품"), qty: 0, price: it.price != null ? it.price : (p ? (p.wholesalePrice || p.price) : 0), unit: p ? (p.unit || "kg") : (it.unit || "kg") };
            map[key].qty += Number(it.qty) || 0;
          });
          const items = Object.values(map);
          updateOrder(target.id, { manualBoxes: [{ items, volume: volumeForBoxItems(items, productMap) }] });
          fireToast("📦 전부 한 박스로 묶었어요");
        } else if (command.mode === "auto") {
          updateOrder(target.id, { manualBoxes: null });
          fireToast("📦 자동 묶음(박스 규칙)으로 되돌렸어요");
        } else {
          fireToast("📦 주문을 열었어요 — '묶음 수정'을 눌러 박스를 조정하세요");
        }
        break;
      }
      case "EDIT_ORDER": {
        // 기존 주문을 찾아 상세 화면을 열어 편집 준비 (발송완료 주문 포함)
        const target = findOrderBySpokenName(command.name);
        if (!target) {
          setTab("orders");
          if (command.name) setSearchQuery(command.name);
          fireToast(`${command.name || ""} 주문을 못 찾았어요 — 목록에서 골라 주세요`);
          break;
        }
        setTab("orders"); setSelectedOrderId(target.id);
        fireToast(`✏️ ${orderRecipientName(target)} 주문을 열었어요 — 상품 추가·삭제·묶음 수정 가능`);
        break;
      }
      case "UNDO_LAST":
        undoLast();   // ★ v42: 직전 주문 변경(등록·수정·삭제)을 1단계 되돌림
        break;
      case "CONFIRM_DELIVERY": {
        // ★ v58: 음성 도착 확인 — 이름(+날짜)으로 발송완료 주문을 찾아 배송완료 처리
        const dateISO = (typeof parseDate === "function") ? parseDate(command.raw || "", new Date()) : null;
        const { name, matches } = findDeliveryToConfirm(command.raw || "", orders, customers, vendors, dateISO);
        if (!name) { fireToast("누구 도착 확인인지 이름을 함께 말씀해 주세요 (예: 대솔본점 7월 2일 도착 확인)"); break; }
        if (!matches.length) {
          setTab("orders"); setSearchQuery(name);
          fireToast(`${name} 님의 도착 확인할 배송을 못 찾았어요${dateISO ? ` (${_fmtMD(dateISO)})` : ""}`);
          break;
        }
        if (matches.length > 1 && !dateISO) {
          setTab("deliverytrack");
          fireToast(`${name} 님 도착 확인할 배송이 ${matches.length}건이에요 — 날짜도 같이 말씀해 주세요 (예: 7월 2일)`);
          break;
        }
        const ids = matches.map((o) => o.id);
        confirmDeliveries(ids);
        setTab("deliverytrack");
        fireToast(`✅ ${name}${dateISO ? " " + _fmtMD(dateISO) : ""} 배송 ${ids.length}건 도착 확인했어요`);
        break;
      }
      case "REMOVE_FROM_ORDER": {
        // 기존 주문에서 상품 제거 — 대상: 말한 고객의 주문, 없으면 현재 열린 주문
        let target = command.name ? findOrderBySpokenName(command.name) : null;
        if (!target && selectedOrderId) target = orders.find((o) => o.id === selectedOrderId) || null;
        if (!target) { fireToast("어느 주문인지 못 찾았어요 — 주문을 먼저 열어 주세요"); break; }
        const raw = command.raw || "";
        const tt = raw.replace(/\s/g, "");
        const clearAll = /(전부|전체|모두|모조리|싹다|다빼|다삭제|전부삭제|모두삭제|전부빼|모두빼|다지워|전체삭제|전체빼)/.test(tt);
        const stripRm = (s) => s
          .replace(/(빼주세요|빼줘|빼주|빼고|빼기|빼|삭제해줘|삭제해|삭제|제외해줘|제외해|제외|없애줘|없애|지워줘|지워)/g, "")
          .replace(/(모든|모두|전부|전체|모조리|싹|좀|주문|상품|에서|그거|이거|저거|그것|이것|저것|것|거)/g, "")
          .replace(new RegExp("(\\d+|한|두|세|네|다섯|여섯|일곱|여덟|아홉|열)\\s*(?:" + COUNT_UNIT + ")", "g"), "")
          .replace(/\d+개/g, "");
        const nm = command.name ? command.name.replace(/\s/g, "") : "";
        const coreOf = (s) => String(s || "").replace(new RegExp(WEIGHT_RE, "g"), "").replace(/[\s\d]/g, "").trim();
        let spoken = stripRm(tt);
        if (nm) spoken = spoken.split(nm).join("");
        const spokenCore = coreOf(spoken);
        const items = JSON.parse(JSON.stringify(target.items || []));
        let kept, removed = [];
        if (clearAll && !spokenCore) { removed = items.slice(); kept = []; }
        else if (spokenCore) {

  const [invoicePreview, setInvoicePreview] = useState(null);

  // 발송일 기준으로, "확인 안 한 채로 너무 오래 방치된" 항목은 화면이 복잡해지지 않도록
  // 자동으로 목록에서 숨김 (데이터 자체는 지워지지 않고, 이 알림 목록에만 안 보이게 됨)
  // 기본: 정상도착기준일로부터 2일 더 지나면 숨김 / 금요일 발송건은 예외로 "월요일 오후 5시"에 숨김
  function autoHideDeadline(shippedDateStr) {
    if (!shippedDateStr) return null;
    const d = new Date(shippedDateStr);
    if (isNaN(d.getTime())) return null;
    const wd = d.getDay();
    if (wd === 5) {
      const dl = new Date(d);
      dl.setDate(dl.getDate() + 3); // 금요일 + 3일 = 월요일
      dl.setHours(17, 0, 0, 0);
      return dl;
    }
    const base = expectedArrivalDeadline(shippedDateStr);
    if (!base) return null;
    const dl = new Date(base);
    dl.setDate(dl.getDate() + 2);
    dl.setHours(23, 59, 59, 999);
    return dl;
  }

  const [showOverdueAlert, setShowOverdueAlert] = useState(false);
  const overdueAlertShownRef = useRef(false);
  function playOverdueAlertSound() {
    try {
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if (!Ctx) return;
      const ctx = new Ctx();
      const beep = (startTime, freq) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = "sine";
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.001, startTime);
        gain.gain.exponentialRampToValueAtTime(0.25, startTime + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, startTime + 0.35);
        osc.start(startTime);
        osc.stop(startTime + 0.36);
      };
      const now = ctx.currentTime;
      beep(now, 880);
      beep(now + 0.4, 880);
      beep(now + 0.8, 1046);
    } catch { /* 소리 재생 실패해도 팝업은 그대로 보여주면 되니 무시 */ }
  }

  // 금요일에 발송되는 주문은, 토요일 배송이 안 되면 월요일에야 도착하는데 신선식품 특성상
  // 상하거나 폐기해야 할 수 있어서, 택배사에 미리 요청하는 문구를 메모에 자동으로 남겨둠.
  // → 송장번호를 입력하는 시점이 아니라, "발송 예정일(예약일이 있으면 그 날짜, 없으면 주문 등록일)"이
  //   금요일이면 주문을 등록/저장하는 바로 그 순간에 메모에 들어가야 함 (그래야 그 직후 주문서를
  //   다운로드해서 송장 기표지를 뽑을 때 이미 문구가 포함되어 있음)
  const FRIDAY_NOTE = "토요일에 꼭 도착 부탁드립니다";
  function isDateFriday(dateStr) {
    if (!dateStr) return false;
    const d = new Date(dateStr);
    if (isNaN(d.getTime())) return false;
    return d.getDay() === 5; // 0=일 ... 5=금 6=토
  }
  function isFridayToday() {
    return new Date().getDay() === 5;
  }
  function withFridayNote(memo) {
    const cur = memo || "";
    if (cur.includes(FRIDAY_NOTE)) return cur;
    return cur ? `${cur}\n${FRIDAY_NOTE}` : FRIDAY_NOTE;
  }
  // 주문 객체(reserveDate/orderDate 보유)를 보고, 발송 예정일이 금요일이면 메모에 문구를 채워서 반환
  function applyFridayNoteIfNeeded(order) {
    const shipDate = order.reserveDate || order.orderDate || todayStr();
    if (!isDateFriday(shipDate)) return order;
    return { ...order, memo: withFridayNote(order.memo) };
  }

  // 발송일 기준으로 "이날짜까지는 도착해야 정상"인 기준일 계산
  // 금요일 발송건은 토요일 배송이 원칙이라, 토요일까지 확인이 안 되면 바로 알려야 함
  // (토요일에 못 받으면 일요일에 직접 갖다드려야 하고, 특히 주말에 영업하는 업체는 못 받으면
  //  장사에 지장이 생기기 때문에 월요일까지 미루면 안 됨)
  function expectedArrivalDeadline(shippedDateStr) {
    if (!shippedDateStr) return null;
    const d = new Date(shippedDateStr);
    if (isNaN(d.getTime())) return null;
    const wd = d.getDay(); // 0=일 ... 6=토
    const addDays = wd === 5 ? 1 : wd === 6 ? 2 : wd === 0 ? 1 : 1; // 금→토(+1) / 토→월(+2) / 그 외→다음날
    const dl = new Date(d);
    dl.setDate(dl.getDate() + addDays);
    dl.setHours(23, 59, 59, 999);
    return dl;
  }

  function updateOrder(orderId, updates) {
    recordUndo("방금 수정");   // ★ v42: 수정 전 상태 저장 → "되돌려"로 복원 가능
    setOrders((prev) => prev.map((o) => {
      if (o.id !== orderId) return o;

      if (updates.reserveDate !== undefined && isDateFriday(next.reserveDate)) {
        next.memo = withFridayNote(next.memo);

      // 이번에 송장번호가 새로 들어오면서 발송완료로 바뀌는 경우만 해당 (이미 발송완료였던 걸 수정할 땐 중복 추가 안 함)
      if (updates.invoiceNo && updates.invoiceNo.trim() && next.status === "shipped" && o.status !== "shipped") {
        if (isFridayToday()) next.memo = withFridayNote(next.memo);
        next.shippedAt = todayStr();

        const created = {

  function addDays(dateStr, days) {
    const d = new Date(dateStr);
    d.setDate(d.getDate() + days);
    const pad = (n) => String(n).padStart(2, "0");
    return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;

  // 정기배송 중 발송일이 된 건을 자동으로 주문등록 + 알림 (회차/총회차 반영)
  function runDueSubscriptions(list) {
    const today = todayStr();
    const due = list.filter((s) => s.active && s.nextDate <= today);
    if (due.length === 0) return;

    const newOrders = due.map((s) => {
      const occurrence = (s.occurrenceCount || 0) + 1;
      return applyFridayNoteIfNeeded({
        id: uid("o"),
        customerId: s.customerId,
        sender: { name: s.recipient.name, phone: s.recipient.phone },
        recipient: { ...s.recipient, postalCode: s.recipient.postalCode || estimatePostalCode(s.recipient.address) },
        items: s.items,
        status: "pending",
        invoiceNo: "",
        courier: "",
        createdAt: nowStamp(),
        orderDate: today,
        reserveDate: "",
        boxVolume: "",
        deliveryMessage: "",
        memo: `정기배송 ${occurrence}회차${s.totalOccurrences ? ` / 총 ${s.totalOccurrences}회` : ""}${s.memo ? " · " + s.memo : ""}`,
        message: "",
        subscriptionId: s.id,
        subscriptionOccurrence: occurrence,
      });
    });

    setOrders((prev) => [...newOrders, ...prev]);
    setSubscriptions((prev) =>
      prev.map((s) => {
        const match = due.find((d) => d.id === s.id);
        if (!match) return s;
        const occurrence = (s.occurrenceCount || 0) + 1;
        const reachedLimit = s.totalOccurrences && occurrence >= s.totalOccurrences;
        return {
          ...s,
          occurrenceCount: occurrence,
          nextDate: addDays(s.nextDate, s.cycleDays),
          active: reachedLimit ? false : s.active,
        };
      })
    );

    const summary = `정기배송 ${due.length}건이 자동으로 주문 등록되었어요 (${due.map((s) => s.recipient.name).join(", ")})`;
    fireToast(summary);
    if (typeof Notification !== "undefined" && Notification.permission === "granted") {
      try { new Notification("정기배송 자동 등록", { body: summary }); } catch {}
    }
  }

  // 발송일이 된 정기배송은 그날 오전 9시에 자동등록+알림이 가도록 처리합니다.
  // (앱이 열려있는 동안에만 동작 — 완전히 꺼진 상태의 진짜 푸시는 별도 서버가 필요해요)
  useEffect(() => {
    if (!dataLoaded) return;

    function hasDueToday(list) {
      const today = todayStr();
      return list.some((s) => s.active && s.nextDate <= today);
    }

    const now = new Date();
    const nineAM = new Date();
    nineAM.setHours(9, 0, 0, 0);

    if (now >= nineAM) {
      // 이미 오전 9시를 지났으면 즉시 확인
      if (hasDueToday(subscriptions)) runDueSubscriptions(subscriptions);
    } else if (hasDueToday(subscriptions)) {
      // 아직 오전 9시 전이고 오늘 발송 건이 있으면, 9시에 맞춰 실행
      const ms = nineAM.getTime() - now.getTime();
      const timer = setTimeout(() => {
        runDueSubscriptions(subscriptions);
      }, ms);
      return () => clearTimeout(timer);
    }
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [dataLoaded]);

  // 주문으로부터 거래명세서 레코드 생성
  function makeInvoiceFromOrder(order) {
    const vendor = order.vendorId ? vendors.find((v) => v.id === order.vendorId) : null;
    const vName = vendor?.name || order.recipient?.name || order.sender?.name || "거래처";
    const items = (order.items || []).map((it) => {
      const p = productMap[it.productId];
      return {
        name: p ? p.name : (it.name || "상품"),
        unit: p ? (p.unit || "kg") : "kg",
        qty: it.qty,
        price: it.price || (p ? (p.wholesalePrice || p.price) : 0),
      };
    });
    return {
      id: uid("inv"),
      vendorId: order.vendorId || "",
      vendorName: vName,
      date: order.orderDate || todayStr(),
      items,
      memo: "",
      createdAt: nowStamp(),
      orderId: order.id || "",
    };
  }

  function saveInvoiceFromOrder(order) {
    const inv = makeInvoiceFromOrder(order);
    setInvoices((prev) => {
      const exist = order.id ? prev.find((x) => x.orderId === order.id) : null;
      if (exist) return prev.map((x) => (x.id === exist.id ? { ...inv, id: exist.id } : x));
      return [inv, ...prev];
    });
    return inv;
  }

  // 박스로 쪼개진 여러 업체주문을 (업체+받는분+날짜)별로 합쳐 거래명세서 1장씩 저장
  function saveInvoicesGrouped(orderList) {
    const groups = {};
    orderList.forEach((o) => {
      const key = `${o.vendorId || ""}|${o.recipient?.name || ""}|${o.orderDate || ""}`;
      if (!groups[key]) groups[key] = { ...o, items: [], _groupKey: key };
      (o.items || []).forEach((it) => {
        const ex = groups[key].items.find((x) => (x.productId || x.name) === (it.productId || it.name));
        if (ex) ex.qty += it.qty;
        else groups[key].items.push({ ...it });
      });
    });
    const merged = Object.values(groups);
    setInvoices((prev) => {
      let next = [...prev];
      merged.forEach((o) => {
        const inv = makeInvoiceFromOrder(o);
        inv.groupKey = o._groupKey;
        // 같은 그룹키(업체+받는분+날짜)가 이미 있으면 교체, 없으면 추가
        const existIdx = next.findIndex((x) => x.groupKey && x.groupKey === o._groupKey);
        if (existIdx >= 0) next[existIdx] = { ...inv, id: next[existIdx].id };
        else next = [inv, ...next];
      });
      return next;
    });
    return merged;
  }

  // 업체 하나를 골라 기간(예: 6월 1일~6월 30일)을 정하면, 그 기간 동안의 거래명세서를
  // 전부 모아 합친 "정산서"를 엑셀로 만들어줌. 정산할 때 한 장으로 몰아서 확인하기 위한 기능.
  function generatePeriodInvoiceSheet(vendorId, startDate, endDate) {
    if (!vendorId) { fireToast("업체를 선택해주세요"); return; }
    if (!startDate || !endDate) { fireToast("기간(시작일·종료일)을 선택해주세요"); return; }
    const vendor = vendors.find((v) => v.id === vendorId);
    const vName = vendor ? vendor.name : "거래처";
    const list = invoices
      .filter((inv) => inv.vendorId === vendorId && inv.date && inv.date >= startDate && inv.date <= endDate)
      .sort((a, b) => (a.date < b.date ? -1 : a.date > b.date ? 1 : 0));
    if (list.length === 0) {
      fireToast(`${startDate} ~ ${endDate} 기간에 ${vName}의 거래명세서가 없어요`);
      return;
    }
    // 기간 안의 모든 거래명세서를 하나로 합쳐서, 항목마다 날짜를 붙인 리스트로 만듦
    const lineItems = [];
    let grandTotal = 0;
    list.forEach((inv) => {
      (inv.items || []).forEach((it) => {
        const amount = (it.price || 0) * (it.qty || 0);
        grandTotal += amount;
        lineItems.push({ date: inv.date, name: it.name || "상품", unit: it.unit || "kg", qty: it.qty || 0, price: it.price || 0, amount });
      });
    });

    // ===== 정식 거래명세표 형식으로 엑셀 시트 작성 (7열: 월/일/품목/규격/수량/단가/공급가액) =====
    const ws = {};
    const colLetter = (n) => { let s = ""; n += 1; while (n > 0) { const m = (n - 1) % 26; s = String.fromCharCode(65 + m) + s; n = Math.floor((n - 1) / 26); } return s; };
    const A = (r, c) => colLetter(c) + (r + 1);
    const set = (r, c, v) => { ws[A(r, c)] = { v, t: typeof v === "number" ? "n" : "s" }; };
    const thin = { style: "thin", color: { rgb: "000000" } };
    const medium = { style: "medium", color: { rgb: "000000" } };
    const allThin = { top: thin, bottom: thin, left: thin, right: thin };
    const center = { vertical: "center", horizontal: "center", wrapText: true };
    const styleCell = (r, c, opts = {}) => {
      const addr = A(r, c);
      if (!ws[addr]) ws[addr] = { v: "", t: "s" };
      // 테두리는 opts.border가 없으면 매번 새 객체를 만들어야 함 (공유 객체를 쓰면, 나중에
      // 바깥쪽 셀 하나에만 굵게 바꾸려 해도 그 객체를 같이 쓰는 다른 모든 셀까지 같이 굵어짐)
      ws[addr].s = {
        border: opts.border || { top: thin, bottom: thin, left: thin, right: thin },
        alignment: opts.align ? { ...center, horizontal: opts.align } : center,
        font: { name: "맑은 고딕", sz: opts.sz || 10, bold: !!opts.bold, color: opts.color ? { rgb: opts.color } : undefined },
      };
      if (opts.fill) ws[addr].s.fill = { fgColor: { rgb: opts.fill }, patternType: "solid" };
      if (opts.num) ws[addr].z = "#,##0";
    };
    const NCOLS = 7; // 월,일,품목,규격,수량,단가,공급가액

    // 제목
    set(0, 0, "거   래   명   세   서"); styleCell(0, 0, { sz: 20, bold: true, color: "1F4E9C", border: {} });
    set(0, 4, `기간: ${startDate} ~ ${endDate}`); styleCell(0, 4, { sz: 11, align: "right", border: {} });

    // 공급받는자 / 공급자 정보 박스 (행 2~6)
    set(2, 0, "공급받는자"); styleCell(2, 0, { bold: true, fill: "EAF1FB" });
    set(2, 1, "상호(업체명)"); styleCell(2, 1, { sz: 9 });
    set(2, 2, vName); styleCell(2, 2, { bold: true, color: "1F4E9C", sz: 12 });
    set(3, 1, "주소"); styleCell(3, 1, { sz: 9 });
    set(3, 2, vendor?.address || ""); styleCell(3, 2, { align: "left" });
    set(4, 1, "연락처"); styleCell(4, 1, { sz: 9 });
    set(4, 2, vendor?.phone || ""); styleCell(4, 2, {});

    set(2, 4, "공급자"); styleCell(2, 4, { bold: true, fill: "EAF1FB" });
    set(2, 5, "상호(법인명)"); styleCell(2, 5, { sz: 9 });
    set(2, 6, supplier.name || ""); styleCell(2, 6, { bold: true, color: "1F4E9C", sz: 12 });
    set(3, 5, "사업자번호"); styleCell(3, 5, { sz: 9 });
    set(3, 6, supplier.bizNo || ""); styleCell(3, 6, {});
    set(4, 5, "전화번호"); styleCell(4, 5, { sz: 9 });
    set(4, 6, supplier.phone || ""); styleCell(4, 6, {});

    set(5, 0, "합계금액"); styleCell(5, 0, { bold: true, fill: "EAF1FB" });
    set(5, 1, "₩" + grandTotal.toLocaleString()); styleCell(5, 1, { bold: true, color: "1F4E9C", sz: 12 });
    set(5, 4, "거래건수"); styleCell(5, 4, { bold: true, fill: "EAF1FB" });
    set(5, 5, `${list.length}건 (품목 ${lineItems.length}개)`); styleCell(5, 5, { bold: true });
    for (let c = 2; c <= 3; c++) styleCell(5, c, {});
    for (let c = 6; c <= 6; c++) styleCell(5, c, {});

    // 품목 헤더
    const HEAD = 7;
    ["월", "일", "품목", "규격", "수량", "단가", "공급가액"].forEach((t, c) => {
      set(HEAD, c, t); styleCell(HEAD, c, { bold: true, fill: "EAF1FB", sz: 10 });
    });

    // 품목 행 (기간 안의 모든 거래를 날짜순으로, 항목 수만큼 동적으로 생성)
    lineItems.forEach((it, i) => {
      const r = HEAD + 1 + i;
      const parts = (it.date || "").split("-");
      set(r, 0, parts[1] ? Number(parts[1]) : ""); styleCell(r, 0, { sz: 9 });
      set(r, 1, parts[2] ? Number(parts[2]) : ""); styleCell(r, 1, { sz: 9 });
      set(r, 2, it.name); styleCell(r, 2, { sz: 9, align: "left" });
      set(r, 3, it.unit); styleCell(r, 3, { sz: 9 });
      set(r, 4, it.qty); styleCell(r, 4, { sz: 9, num: true });
      set(r, 5, it.price); styleCell(r, 5, { sz: 9, num: true, align: "right" });
      set(r, 6, it.amount); styleCell(r, 6, { sz: 9, num: true, align: "right" });
    });

    // 합계 행
    const SUM = HEAD + 1 + lineItems.length;
    set(SUM, 0, "합      계"); styleCell(SUM, 0, { bold: true, fill: "EAF1FB" });
    for (let c = 1; c <= 5; c++) styleCell(SUM, c, { fill: "EAF1FB" });
    set(SUM, 6, grandTotal); styleCell(SUM, 6, { bold: true, num: true, align: "right", fill: "EAF1FB" });

    // 바깥 테두리를 굵게
    for (let c = 0; c < NCOLS; c++) {
      const topAddr = A(2, c); if (ws[topAddr]?.s?.border) ws[topAddr].s.border.top = medium;
      const botAddr = A(SUM, c); if (ws[botAddr]?.s?.border) ws[botAddr].s.border.bottom = medium;
    }
    for (let r = 2; r <= SUM; r++) {
      const leftAddr = A(r, 0); if (ws[leftAddr]?.s?.border) ws[leftAddr].s.border.left = medium;
      const rightAddr = A(r, NCOLS - 1); if (ws[rightAddr]?.s?.border) ws[rightAddr].s.border.right = medium;
    }

    ws["!cols"] = [{ wch: 5 }, { wch: 5 }, { wch: 22 }, { wch: 8 }, { wch: 8 }, { wch: 10 }, { wch: 12 }];
    ws["!merges"] = [
      { s: { r: 0, c: 0 }, e: { r: 0, c: 3 } },
      { s: { r: 0, c: 4 }, e: { r: 0, c: 6 } },
      { s: { r: 5, c: 2 }, e: { r: 5, c: 3 } },
      { s: { r: SUM, c: 0 }, e: { r: SUM, c: 5 } },
    ];
    ws["!ref"] = "A1:" + A(SUM, NCOLS - 1);

    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "정산서");
    XLSX.writeFile(wb, `거래명세서_${vName}_정산(${startDate}~${endDate}).xlsx`);
    fireToast(`${vName} 정산서 (거래 ${list.length}건, 합계 ${grandTotal.toLocaleString()}원)를 다운로드했어요`);
  }


  function addInvoice(inv) {
    setInvoices((prev) => [{ ...inv, id: uid("inv"), createdAt: nowStamp() }, ...prev]);
    fireToast("거래명세서를 저장했습니다");
  }
  function updateInvoice(id, updates) {
    setInvoices((prev) => prev.map((x) => (x.id === id ? { ...x, ...updates } : x)));
    fireToast("거래명세서를 수정했습니다");
  }
  function removeInvoice(id) {
    setInvoices((prev) => prev.filter((x) => x.id !== id));
    fireToast("거래명세서를 삭제했습니다");
  }

  // 거래명세서 레코드 → 엑셀 다운로드 (generateInvoiceSheet가 order 형태를 받으므로 변환)
  function downloadInvoice(inv) {
    const pseudoOrder = {
      vendorId: inv.vendorId,
      orderDate: inv.date,
      recipient: { name: inv.vendorName },
      sender: { name: inv.vendorName },
      items: inv.items.map((it) => ({ productId: null, name: it.name, qty: it.qty, price: it.price, unit: it.unit })),
    };
    generateInvoiceSheet(pseudoOrder);
  }

  // 거래명세서 엑셀 업로드 → 레코드로 저장
  function handleInvoiceFileUpload(e) {
    const file = e.target.files?.[0];
    if (!file) return;
    setBusyMessage("거래명세서 파일을 읽고 있어요...");
    readWorkbookFile(file, (rows) => {
      const items = [];
      let vendorName = "";
      const date = todayStr();
      rows.forEach((r) => {
        const nm = String(r["상품명"] || r["품목"] || r["품          목"] || r["D"] || "").trim();
        const qty = Number(String(r["수량"] || r["수 량"] || r["O"] || "").toString().replace(/[^0-9.]/g, "")) || 0;
        const price = Number(String(r["단가"] || r["단    가"] || r["Q"] || "").toString().replace(/[^0-9.]/g, "")) || 0;
        const unit = String(r["규격"] || r["규   격"] || r["J"] || "kg").trim() || "kg";
        if (nm && (qty || price)) items.push({ name: nm, unit, qty: qty || 1, price });
        if (!vendorName && (r["상호(법인명)"] || r["상호"] || r["공급받는자"])) vendorName = String(r["상호(법인명)"] || r["상호"] || r["공급받는자"]).trim();
      });
      if (items.length === 0) { fireToast("거래명세서에서 품목을 찾지 못했습니다. 양식을 확인해주세요"); setBusyMessage(null); return; }
      const matchedVendor = vendors.find((v) => v.name === vendorName);
      addInvoice({ vendorId: matchedVendor ? matchedVendor.id : "", vendorName: vendorName || "거래처", date, items, memo: "업로드한 명세서" });
      setBusyMessage(null);
    }, () => {
      setBusyMessage(null);
      fireToast("파일을 읽지 못했어요. 엑셀(.xlsx) 형식이 맞는지 확인해주세요");
    });
    e.target.value = "";
  }

  // ── 거래명세서 자동 생성 (업로드한 양식 기반) ──
  function generateInvoiceSheet(order) {
    const vendor = order.vendorId ? vendors.find((v) => v.id === order.vendorId) : null;
    const vName = vendor?.name || order.recipient?.name || order.sender?.name || "거래처";
    const vAddr = vendor?.address || order.recipient?.address || "";
    const vPhone = vendor?.phone || order.recipient?.phone || "";
    const dateStr = order.orderDate || todayStr();
    const parts = dateStr.split("-");
    const yy = parts[0] || "", mm = parts[1] || "", dd = parts[2] || "";

    const ws = {};
    const colLetter = (n) => { let s = ""; n += 1; while (n > 0) { const m = (n - 1) % 26; s = String.fromCharCode(65 + m) + s; n = Math.floor((n - 1) / 26); } return s; };
    const A = (r, c) => colLetter(c) + (r + 1); // 0-based r,c → 주소
    const set = (r, c, v, opt) => {
      const cell = { v: v, t: typeof v === "number" ? "n" : "s" };
      if (opt && opt.bold) cell.s = Object.assign({}, cell.s, { font: { bold: true } });
      ws[A(r, c)] = cell;
    };

    // 테두리/정렬 스타일을 위해 모든 셀에 기본 스타일 적용
    const thin = { style: "thin", color: { rgb: "000000" } };
    const allBorder = { top: thin, bottom: thin, left: thin, right: thin };
    const centerWrap = { vertical: "center", horizontal: "center", wrapText: true };
    const styleCell = (r, c, opts) => {
      const addr = A(r, c);
      if (!ws[addr]) ws[addr] = { v: "", t: "s" };
      ws[addr].s = Object.assign({
        border: allBorder,
        alignment: centerWrap,
        font: { name: "맑은 고딕", sz: opts && opts.sz ? opts.sz : 10, bold: !!(opts && opts.bold), color: opts && opts.color ? { rgb: opts.color } : undefined },
      }, opts && opts.s ? opts.s : {});
      if (opts && opts.fill) ws[addr].s.fill = { fgColor: { rgb: opts.fill }, patternType: "solid" };
      if (opts && opts.align) ws[addr].s.alignment = Object.assign({}, centerWrap, { horizontal: opts.align });
      if (opts && opts.num) ws[addr].z = "#,##0";
    };

    // ===== 상단 헤더 =====
    set(0, 0, "거 래 일 자"); styleCell(0, 0, { sz: 9 });
    set(1, 0, `${yy}년 ${Number(mm)}월 ${Number(dd)}일`); styleCell(1, 0, { sz: 9 });
    set(0, 7, "거  래  명  세  표"); styleCell(0, 7, { sz: 20, bold: true, color: "1F4E9C" });
    set(0, 27, "(공급받는자용)"); styleCell(0, 27, { sz: 9 });

    set(2, 0, "공급받는자"); styleCell(2, 0, { bold: true });
    set(2, 2, "상  호\n(법인명)"); styleCell(2, 2, { sz: 9 });
    set(2, 5, vName); styleCell(2, 5, { bold: true, color: "1F4E9C", sz: 12 });
    set(2, 15, "귀하"); styleCell(2, 15, {});
    set(2, 17, "공\n급\n자"); styleCell(2, 17, { bold: true });
    set(2, 18, "등록번호"); styleCell(2, 18, { sz: 9 });

    // 등록번호: 한 칸(V3~AF3 병합)에 통째로 표기
    const bizNoFull = (supplier.bizNo || "").trim();
    set(2, 21, bizNoFull); styleCell(2, 21, { bold: true, align: "center" });

    set(4, 2, "사 업 장"); styleCell(4, 2, { sz: 9 });
    set(5, 2, "주    소"); styleCell(5, 2, { sz: 9 });
    set(4, 5, vAddr); styleCell(4, 5, { align: "center" });
    set(4, 18, "상  호\n(법인명)"); styleCell(4, 18, { sz: 9 });
    set(4, 21, supplier.name || ""); styleCell(4, 21, { bold: true, color: "1F4E9C", sz: 12 });
    set(4, 28, "성명"); styleCell(4, 28, { sz: 9 });
    set(4, 29, supplier.ceo || ""); styleCell(4, 29, { bold: true });

    set(6, 2, "전화번호"); styleCell(6, 2, { sz: 9 });
    set(6, 5, vPhone); styleCell(6, 5, {});
    set(6, 18, "사 업 장"); styleCell(6, 18, { sz: 9 });
    set(7, 18, "주    소"); styleCell(7, 18, { sz: 9 });
    set(6, 21, supplier.address || ""); styleCell(6, 21, { align: "center" });

    set(8, 2, "합계금액"); styleCell(8, 2, { sz: 9 });
    set(8, 18, "전    화"); styleCell(8, 18, { sz: 9 });
    set(8, 21, supplier.phone || ""); styleCell(8, 21, {});
    set(8, 27, "팩스"); styleCell(8, 27, { sz: 9 });
    set(8, 28, supplier.fax || ""); styleCell(8, 28, {});

    // ===== 품목 헤더 (행 10, 0-based) =====
    const HEAD = 10;
    const headers = [[0, "월"], [1, "일"], [2, "번호"], [3, "품          목"], [9, "규   격"], [14, "수 량"], [16, "단    가"], [21, "공 급 가 액"], [26, "세    액"], [31, "비고"]];
    headers.forEach(([c, t]) => { set(HEAD, c, t); });
    // 헤더 줄 전체 스타일
    for (let c = 0; c <= 32; c++) styleCell(HEAD, c, { bold: true, fill: "EAF1FB", sz: 9 });

    // ===== 품목 행 (행 11~34, 최대 24개) =====
    let total = 0;
    const maxRows = 24;
    for (let i = 0; i < maxRows; i++) {
      const r = HEAD + 1 + i;
      const it = order.items[i];
      // 모든 칸 테두리
      for (let c = 0; c <= 32; c++) styleCell(r, c, { sz: 9 });
      if (it) {
        const p = productMap[it.productId];
        const nm = p ? p.name : (it.name || "상품");
        const unit = p ? (p.unit || "kg") : "kg";
        const price = p ? (p.wholesalePrice || p.price) : (it.price || 0);
        const amount = price * it.qty;
        total += amount;
        if (i === 0) { set(r, 0, Number(mm)); styleCell(r, 0, { sz: 9 }); set(r, 1, Number(dd)); styleCell(r, 1, { sz: 9 }); }
        set(r, 2, i + 1); styleCell(r, 2, { sz: 9 });
        set(r, 3, nm); styleCell(r, 3, { sz: 9, align: "center" });
        set(r, 9, unit); styleCell(r, 9, { sz: 9 });
        set(r, 14, it.qty); styleCell(r, 14, { sz: 9, num: true });
        set(r, 16, price); styleCell(r, 16, { sz: 9, num: true, align: "right" });
        set(r, 21, amount); styleCell(r, 21, { sz: 9, num: true, align: "right" });
      }
    }

    // ===== 계좌 (행 35) =====
    const BANK = 35;
    set(BANK, 0, supplier.bank || ""); styleCell(BANK, 0, { sz: 9, align: "center" });
    for (let c = 0; c <= 32; c++) styleCell(BANK, c, { sz: 9 });
    set(BANK, 0, supplier.bank || ""); styleCell(BANK, 0, { sz: 9, align: "center" });

    // ===== 합계 (행 38) =====
    const SUM = 38;
    set(SUM, 0, "합      계"); styleCell(SUM, 0, { bold: true, fill: "EAF1FB" });
    for (let c = 0; c <= 20; c++) styleCell(SUM, c, { bold: true, fill: "EAF1FB" });
    set(SUM, 21, total); styleCell(SUM, 21, { bold: true, num: true, align: "right", fill: "EAF1FB" });
    for (let c = 22; c <= 32; c++) styleCell(SUM, c, { fill: "EAF1FB" });

    // ===== 하단 합계 박스 (행 39) =====
    const FOOT = SUM + 1; // 39
    set(FOOT, 0, "공급\n가액"); styleCell(FOOT, 0, { bold: true, sz: 9 });
    set(FOOT, 3, total); styleCell(FOOT, 3, { num: true, bold: true, align: "right" });
    set(FOOT, 8, "미수금"); styleCell(FOOT, 8, { bold: true, sz: 9 });
    set(FOOT, 10, 0); styleCell(FOOT, 10, { num: true, align: "right" });
    set(FOOT, 14, "합계\n금액"); styleCell(FOOT, 14, { bold: true, sz: 9 });
    set(FOOT, 16, total); styleCell(FOOT, 16, { num: true, bold: true, align: "right" });
    set(FOOT, 26, "인수자"); styleCell(FOOT, 26, { bold: true, sz: 9 });
    for (let c = 0; c <= 32; c++) styleCell(FOOT, c, { sz: 9 });
    set(FOOT, 0, "공급\n가액"); styleCell(FOOT, 0, { bold: true, sz: 9 });
    set(FOOT, 3, total); styleCell(FOOT, 3, { num: true, bold: true, align: "right" });
    set(FOOT, 8, "미수금"); styleCell(FOOT, 8, { bold: true, sz: 9 });

  function changeCartQty(deliveryId, productId, delta) {
    setDraft((prev) => ({
      ...prev,
      deliveries: prev.deliveries.map((d) => {
        if (d.id !== deliveryId) return d;
        const cart = { ...d.cart };
        // 업체 상품도 소수점(0.1kg 단위) 없이 정수(1개 단위)로만 조절
        const next = Math.round((cart[productId] || 0) + delta);
        if (next <= 0) delete cart[productId];
        else cart[productId] = next;
        return { ...d, cart };
      }),
    }));
  }

  function addDeliveryRow() {
    setDraft((prev) => ({
      ...prev,
      deliveries: [...prev.deliveries, { id: uid("d"), name: "", phone: "", address: "", cart: {} }],
    }));
  }

  function removeDeliveryRow(deliveryId) {
    setDraft((prev) => {
      if (prev.deliveries.length <= 1) return prev;
      return { ...prev, deliveries: prev.deliveries.filter((d) => d.id !== deliveryId) };
    });
  }

  function updateDeliveryField(deliveryId, field, value) {
    setDraft((prev) => ({
      ...prev,
      deliveries: prev.deliveries.map((d) => (d.id === deliveryId ? { ...d, [field]: value } : d)),
    }));
  }

  function deliveryTotal(d) {
    // 받는분/연락처가 등록 업체와 일치하면 업체 단가 적용
    const ph = (d.phone || draft.sender.phone || "").replace(/-/g, "");
    const nm = (d.name || draft.sender.name || "").trim();
    const biz = vendors.some((v) =>
      (ph && (v.phone || "").replace(/-/g, "") === ph) || (nm && v.name === nm)
    );
    return Object.entries(d.cart || {}).reduce((sum, [productId, qty]) => {
      const p = productMap[productId];
      const price = p ? (((biz || (p.channel === "business")) ? (p.wholesalePrice || p.price) : p.price)) : 0;
      return sum + price * qty;
    }, 0);
  }

  const draftItems = draft.deliveries.flatMap((d) => Object.entries(d.cart || {}).map(([productId, qty]) => ({ productId, qty })));
  const draftTotal = draft.deliveries.reduce((sum, d) => sum + deliveryTotal(d), 0);

  function applyParsedMessage(text) {
    const parsed = parseOrderMessage(text, products);
    const matched = customers.find((c) => parsed.recipPhone && (c.phone || "").replace(/-/g, "") === parsed.recipPhone.replace(/-/g, ""));
    const cart = {};
    (parsed.items || []).forEach((it) => {
      cart[it.productId] = (cart[it.productId] || 0) + it.qty;
    });
    setDraft((prev) => ({
      ...prev,
      message: text,
      customerId: matched ? matched.id : "",
      sender: { name: parsed.senderName, phone: parsed.senderPhone },
      deliveries: [
        {
          ...prev.deliveries[0],
          name: parsed.recipName,
          phone: parsed.recipPhone,
          address: parsed.address,
          cart: Object.keys(cart || {}).length ? cart : ((prev.deliveries[0] && prev.deliveries[0].cart) || {}),
        },
        ...prev.deliveries.slice(1),
      ],
      reserveDate: parsed.reserveDate,
      deliveryMessage: parsed.deliveryMessage,
    }));
    return parsed;
  }

  // 사진(명함/메모/문서)을 찍어서 글자를 인식하고 주문정보를 자동으로 채웁니다.
  function handlePhotoCapture(file) {
    if (!file) return;
    // Gemini Vision 사용 가능하면 AI로 분석 (훨씬 정확)
    if (geminiKey) {
      setOcrLoading(true);
      analyzePhotoWithGemini(file, products, geminiKey)
        .then(result => {
          setPhotoAiResult(result);
          fireToast("📷 AI가 사진을 분석했습니다. 결과를 확인해주세요!");
        })
        .catch(e => fireToast("사진 AI 분석 오류: " + e.message))
        .finally(() => setOcrLoading(false));
      return;
    }
    // Gemini 키 없으면 기존 Tesseract OCR 사용
    if (typeof Tesseract === "undefined") {
      fireToast("이 기기에서는 사진 인식 기능을 불러오지 못했어요. 인터넷 연결을 확인해주세요");
      return;
    }
    setOcrLoading(true);
    preprocessForOcr(file).then((dataUrl) => {
      const target = dataUrl || file;
      return Tesseract.recognize(target, "kor+eng");
    })
      .then(({ data }) => {
        const text = data.text || "";
        if (!text.trim()) {
          fireToast("사진에서 글자를 찾지 못했어요. 더 밝은 곳에서 평평하게 다시 찍어보세요");
        } else {
          applyParsedMessage(text);
          fireToast("사진에서 글자를 인식해서 자동으로 채웠어요. 확인 후 등록해주세요");
        }
      })
      .catch(() => fireToast("사진 인식 중 문제가 발생했어요. 다시 시도해주세요"))
      .finally(() => setOcrLoading(false));
  }

  function analyzeMessage() {
    const parsed = applyParsedMessage(draft.message);
    if (!parsed.senderPhone && !parsed.senderName && parsed.items.length === 0) {
      fireToast("메시지에서 인식된 정보가 없습니다");
    } else if (parsed.items.length === 0) {
      fireToast("연락처·주소는 채웠어요. 상품명이 메시지에 없어 상품은 아래에서 직접 선택해주세요");
    } else {
      fireToast("주문 정보를 자동으로 채웠어요. 확인 후 등록해주세요");
    }
  }

  // 고객 자동 등록: 주문 목록에 들어간 받는분·주문자를 고객 리스트에 추가 (새 사람만, 중복 방지)
  // + 이미 있는 고객이 새로운(다른) 주소로 주문했으면, 그 주소를 메모에 "추가배송지"로 기록
  // 새 주문 화면 저장과 엑셀 대량 업로드 등록, 양쪽에서 공통으로 사용
  function registerNewCustomersFromOrders(ordersToScan) {
    setCustomers((prevCustomers) => {
      const toAdd = findMissingCustomersFromOrders(ordersToScan, prevCustomers);
      const merged = toAdd.length > 0 ? [...prevCustomers, ...toAdd] : prevCustomers;
      const patches = syncCustomerAddressNotes(ordersToScan, merged);
      if (Object.keys(patches).length === 0) return merged;
      return merged.map((c) => (patches[c.id] !== undefined ? { ...c, memo: patches[c.id] } : c));
    });
  }

  // 과거에 등록된 주문 전체를 훑어서, 고객 목록에 빠진 사람을 찾아 한 번에 채워넣기
  // + 이미 등록된 고객이 예전에 다른 주소로도 주문한 적 있으면 그 주소도 메모에 기록
  function backfillMissingCustomers() {
    const toAdd = findMissingCustomersFromOrders(orders, customers);
    const merged = toAdd.length > 0 ? [...customers, ...toAdd] : customers;
    const patches = syncCustomerAddressNotes(orders, merged);
    const patchCount = Object.keys(patches).length;
    if (toAdd.length === 0 && patchCount === 0) {
      fireToast("빠진 고객이나 추가 주소가 없어요, 이미 다 정리되어 있어요");
      return;
    }
    setCustomers(merged.map((c) => (patches[c.id] !== undefined ? { ...c, memo: patches[c.id] } : c)));
    const parts = [];
    if (toAdd.length > 0) parts.push(`신규 고객 ${toAdd.length}명`);
    if (patchCount > 0) parts.push(`추가 주소 ${patchCount}건`);
    fireToast(`과거 주문에서 ${parts.join(", ")}을 찾아서 반영했어요`);
  }

  // ★ v14: 음성 주문 등록 — 조비서가 만든 주문서를 바로 주문으로 저장 (자동 Firestore 저장)
  // ★ v24: 음성 주문 등록 — 묶음(박스) 계획이 있으면 박스별 주문으로 나눠 등록
  //  반환: 생성된 주문 배열 (박스 1개면 길이 1). 같은 batchId로 묶여 목록에 한 카드로 표시됨.
  function createVoiceOrder(vo) {
    if (!vo || !vo.name || !vo.items || !vo.items.length) return null;
    recordUndo("방금 등록한 주문");   // ★ v42: 등록 전 상태 저장 → "되돌려"로 취소 가능
    justSubmittedRef.current = true;
    const baseItems = vo.items.map((it) => ({ productId: it.productId || null, name: it.name || "", qty: Number(it.qty) || 1 }));
    const plan = vo.boxPlan || (vo.boxMode ? { mode: vo.boxMode } : null);
    let boxList;
    if (plan && plan.mode === 'auto') {
      const b = splitIntoBoxes(baseItems, productMap);
      boxList = b.length ? b : [{ items: baseItems }];
    } else {
      boxList = buildBoxItems(baseItems, plan);
    }
    if (!boxList.length) boxList = [{ items: baseItems }];
    const recipient = { name: vo.name, phone: vo.phone || "", address: vo.address || "", postalCode: estimatePostalCode(vo.address || "") };
    const sender = { name: vo.name, phone: vo.phone || "" };
    const total = boxList.length;
    const batchId = total > 1 ? uid("batch") : "";
    const orders = boxList.map((box, i) => ({
      id: uid("o"),
      batchId,
      customerId: vo.customerId || null,
      sender,
      recipient,
      items: (box.items || []).map((it) => ({ productId: it.productId || null, name: it.name || "", qty: Number(it.qty) || 1 })),
      status: "pending",
      invoiceNo: "", courier: "",
      createdAt: nowStamp(),
      orderDate: todayStr(),
      reserveDate: vo.reserveDate || "",
      boxVolume: "", deliveryMessage: vo.deliveryMessage || "", memo: "",
      boxInfo: total > 1 ? `${i + 1}/${total}박스` : "",
      message: "",
      isBusiness: !!vo.vendorId,
      vendorId: vo.vendorId || "",
    }));
    // ★ #3 자동 묶음/병합: 같은 날 + 같은 고객/업체 + (있으면)같은 배송지의 미발송 기존 주문이 있으면
    //  - 단일 주문(박스 1개)이면 그 주문에 '수량 합산·새 품목 추가'로 하나로 병합
    //  - 여러 박스로 나뉜 주문이면 공통 bundleId로 묶음 처리
    //  (깊은 복사로 불변성 유지 → 화면 실시간 반영)
    setOrders((prev) => {
      const nmNS = (recipient.name || "").replace(/\s/g, "");
      const addrNS = (recipient.address || "").replace(/\s/g, "");
      const today = todayStr();
      const sameDay = prev.filter((o) => o && o.status !== "shipped"
        && orderRecipientName(o).replace(/\s/g, "") === nmNS && nmNS
        && (o.orderDate === today)
        && (!addrNS || !(o.recipient && o.recipient.address) || String(o.recipient.address).replace(/\s/g, "") === addrNS));
      if (sameDay.length && total === 1 && !plan) {
        // 하나로 병합 (별개 주문으로 쪼개지 않음)
        const targetId = sameDay[0].id;
        return prev.map((o) => {
          if (o.id !== targetId) return o;
          const items = JSON.parse(JSON.stringify(o.items || []));   // 깊은 복사
          for (const ni of baseItems) {
            const key = ni.productId || ni.name;
            const idx = items.findIndex((it) => (it.productId || it.name) === key);
            if (idx >= 0) items[idx].qty = (Number(items[idx].qty) || 0) + ni.qty;   // 수량 합산
            else items.push({ ...ni });                                             // 새 품목 병합
          }
          return { ...o, items };
        });
      }
      if (sameDay.length) {
        // 여러 박스 신규 → 공통 bundleId로 묶음
        const bid = sameDay[0].bundleId || uid("bundle");
        const idset = new Set(sameDay.map((o) => o.id));
        const taggedNew = orders.map((o) => ({ ...o, isBundle: true, bundleId: bid }));
        const taggedPrev = prev.map((o) => (idset.has(o.id) ? { ...o, isBundle: true, bundleId: bid } : o));
        return [...taggedNew, ...taggedPrev];
      }
      return [...orders, ...prev];
    });
    return orders;
  }

  function submitOrder(manualBoxesByIdx) {
    const activeDeliveries = draft.deliveries.filter((d) => Object.keys(d.cart || {}).length > 0);
    if (activeDeliveries.length === 0) return;
    justSubmittedRef.current = true; // 내가 등록하는 주문은 알림에서 제외
    const c = draft.customerId ? customerMap[draft.customerId] : null;
    // 이번 한 번의 "등록" 작업에서 만들어지는 모든 박스가 공유하는 고유 번호
    // (주문 목록 화면에서 "진짜로 같은 순간에 함께 등록된 박스"만 한 카드로 묶기 위한 기준)
    const batchId = uid("batch");

    // 받는분 이름/연락처가 등록된 업체와 일치하는지 판별하는 함수
    const findVendorFor = (name, phone) => {
      const ph = (phone || "").replace(/-/g, "");
      const nm = (name || "").trim();
      if (!ph && !nm) return null;
      return vendors.find((v) =>
        (ph && (v.phone || "").replace(/-/g, "") === ph) ||
        (nm && v.name && v.name === nm)
      ) || null;
    };

    const newOrders = activeDeliveries.flatMap((d, idx) => {
      // 이 배송지의 받는분 정보 (비어있으면 보내는분 정보로 채움)
      const recipName = ((c && draft.deliveries.length === 1) ? c.name : d.name) || draft.sender.name || "";
      const recipPhone = ((c && draft.deliveries.length === 1) ? c.phone : d.phone) || draft.sender.phone || "";
      const vendor = findVendorFor(recipName, recipPhone) || findVendorFor(draft.sender.name, draft.sender.phone);
      const biz = !!vendor;

      const recipient = vendor
        ? {
            // 받는분 이름을 직접 입력하셨으면 그 이름을 그대로 쓰고(전화번호 우연 일치로 엉뚱한
            // 업체명으로 바뀌는 사고 방지), 비어있을 때만 등록된 업체명으로 채움
            name: recipName || vendor.name,
            phone: recipPhone || vendor.phone,
            address: d.address || vendor.address,
            postalCode: estimatePostalCode(d.address || vendor.address || ""),
          }
        : (c && draft.deliveries.length === 1
          ? { name: c.name, phone: c.phone || draft.sender.phone || "", address: c.address, postalCode: c.postalCode }
          : { name: recipName, phone: recipPhone, address: d.address, postalCode: estimatePostalCode(d.address) });
      const sender = vendor
        ? { name: draft.sender.name || vendor.name, phone: draft.sender.phone || vendor.phone }
        : (c ? { name: c.name, phone: c.phone } : draft.sender);

      // 장바구니를 items로 변환(가격 포함)
      const allItems = Object.entries(d.cart || {}).map(([productId, qty]) => {
        const p = productMap[productId];
        const price = p ? (((biz || (p.channel === "business")) ? (p.wholesalePrice || p.price) : p.price)) : 0;
        return { productId, name: p ? p.name : "", qty, price };
      });

      // 수동 묶음(manualBoxesByIdx)이 있으면 그대로, 없으면 자동 분할
      const manual = manualBoxesByIdx && manualBoxesByIdx[idx];
      const boxes = manual && manual.length > 0 ? manual : splitIntoBoxes(allItems, productMap);
      const boxList = boxes.length > 0 ? boxes : [{ items: allItems, volume: "" }];
      const totalBoxes = boxList.length;

      return boxList.map((box, bIdx) => {
        const items = box.items.map((it) => {
          const p = productMap[it.productId];
          const price = it.price != null ? it.price : (p ? (((biz || (p.channel === "business")) ? (p.wholesalePrice || p.price) : p.price)) : 0);
          return { productId: it.productId, name: it.name || (p ? p.name : ""), qty: it.qty, price };
        });
        const total = items.reduce((s, it) => s + (it.price || 0) * it.qty, 0);
        return applyFridayNoteIfNeeded({
          id: uid("o"),
          batchId,
          customerId: c && draft.deliveries.length === 1 ? draft.customerId : null,
          isBusiness: biz,
          vendorId: vendor ? vendor.id : "",
          sender: sender.name || sender.phone ? sender : recipient,
          recipient,
          items,
          status: draft.paymentMethod === "transfer" ? "waiting" : "pending",
          invoiceNo: "",
          courier: "",
          createdAt: nowStamp(),
          orderDate: todayStr(),
          reserveDate: draft.reserveDate,
          boxVolume: (box.volume !== undefined && box.volume !== "") ? String(box.volume) : (totalBoxes >= 1 ? String(volumeForBoxItems(box.items, productMap)) : draft.boxVolume),
          boxInfo: totalBoxes > 1 ? `${bIdx + 1}/${totalBoxes}박스` : "",
          deliveryMessage: draft.deliveryMessage,
          memo: draft.memo,
          message: (idx === 0 && bIdx === 0) ? draft.message : "",
          paymentAmount: draft.paymentAmount.trim() && totalBoxes === 1 ? Number(draft.paymentAmount) : total,
        });
      });
    });

    setOrders((prev) => [...newOrders, ...prev]);

    // 고객 자동 등록: 주문에 들어간 받는분·주문자를 고객 리스트에 추가 (새 사람만, 중복 방지)
    registerNewCustomersFromOrders(newOrders);

    setDraft(blankDraft);
    const boxCount = newOrders.length;
    const bizOrders = newOrders.filter((o) => o.isBusiness);
    if (bizOrders.length > 0) {
      // 박스로 쪼개진 업체 주문을 (업체+받는분)별로 합쳐 거래명세서 1장 생성
      const merged = saveInvoicesGrouped(bizOrders);
      try { generateInvoiceSheet(merged[0]); } catch (e) {}
      fireToast(`업체 주문 등록(박스 ${boxCount}개) + 거래명세서를 생성했습니다`);
      setTab("vendorhub");
    } else {
      fireToast(boxCount > 1 ? `박스 ${boxCount}개로 나뉘어 주문이 등록되었습니다 (송장 ${boxCount}개)` : "주문이 등록되었습니다");
      setTab("orders");
    }
    setStatusFilter("all");
  }

  // 주문 등록 시도: 단일 배송지에 낱개 2개 이상이면 묶음 선택 모달, 아니면 바로 자동 등록
  function handleSubmitOrder() {
    const active = draft.deliveries.filter((d) => Object.keys(d.cart || {}).length > 0);
    if (active.length === 0) return;
    // 배송지가 1개이고, 담긴 낱개 합이 2개 이상이면 묶음 선택 제공
    if (active.length === 1) {
      const d = active[0];
      const units = Object.entries(d.cart || {}).reduce((s, [, qty]) => s + qty, 0);
      if (units >= 2) {
        // 낱개 펼치기 (각 낱개를 개별 항목으로)
        const unitItems = [];
        Object.entries(d.cart || {}).forEach(([productId, qty]) => {
          const p = productMap[productId];
          const price = p ? (p.channel === "business" ? (p.wholesalePrice || p.price) : p.price) : 0;
          for (let i = 0; i < qty; i++) unitItems.push({ productId, name: p ? p.name : "", price, unit: p ? (p.unit || "kg") : "kg" });
        });
        setBoxPlanModal({ deliveryIdx: 0, unitItems });
        return;
      }
    }
    submitOrder();
  }

  // 묶음 모달에서 확정 → 박스 구성 만들어 submitOrder 호출
  function applyBoxPlan(boxesOfUnits) {
    // boxesOfUnits: [[unitItem,...], ...] 각 배열이 한 박스
    const boxes = boxesOfUnits.map((unitArr) => {
      const map = {};
      unitArr.forEach((u) => {
        const key = u.productId || u.name;
        if (!map[key]) map[key] = { productId: u.productId, name: u.name, qty: 0, price: u.price, unit: u.unit };
        map[key].qty += 1;
      });
      const items = Object.values(map);
      return { items, volume: volumeForBoxItems(items, productMap) };
    });
    setBoxPlanModal(null);
    submitOrder({ 0: boxes });
  }

  function orderToRow(o) {
    return Object.fromEntries(orderTemplate.map((label) => [label, resolveOrderField(label, o)]));
  }

  // 주문 하나를 박스 규칙으로 펼쳐 박스별 가상주문 배열로 반환 (발송/송장용)
  // 이미 분할된 주문(boxInfo 있음)이나 박스 1개면 그대로 1건 반환
  // 주문의 박스 구성: 사용자가 수동으로 지정한 manualBoxes가 있으면 그것을, 없으면 자동 분할
  function getOrderBoxes(o) {
    if (o && Array.isArray(o.manualBoxes) && o.manualBoxes.length) return o.manualBoxes;
    return splitIntoBoxes((o && o.items) || [], productMap);
  }
  function expandOrderToBoxes(o) {
    const boxes = getOrderBoxes(o);
    if (boxes.length <= 1) {
      // 단일 박스: 부피만 채워서 반환
      const vol = boxes[0] ? boxes[0].volume : o.boxVolume;
      return [{ ...o, boxVolume: o.boxVolume || (vol !== undefined ? String(vol) : ""), boxInfo: o.boxInfo || "" }];
    }
    const total = boxes.length;
    return boxes.map((box, i) => ({
      ...o,
      id: `${o.id}-b${i + 1}`,
      items: box.items.map((it) => {
        const p = productMap[it.productId];
        const price = it.price != null ? it.price : (p ? (p.wholesalePrice || p.price) : 0);
        return { productId: it.productId, name: it.name || (p ? p.name : ""), qty: it.qty, price };
      }),
      boxVolume: String(box.volume),
      boxInfo: `${i + 1}/${total}박스`,
      paymentAmount: box.items.reduce((s, it) => {
        const p = productMap[it.productId];
        const price = it.price != null ? it.price : (p ? (p.wholesalePrice || p.price) : 0);
        return s + price * it.qty;
      }, 0),
    }));
  }

  // 엑셀 한 행을 주문 미리보기 항목으로 변환 (주문목록 다운로드 서식 기준)
  function rowToBulkOrder(r, idx) {
    // 네이버 스마트스토어, 쿠팡 등 쇼핑몰 엑셀의 다양한 칸 이름을 모두 인식
    const senderName = String(r["보내는분 (주문자)"] || r["보내는분"] || r["주문자"] || r["구매자명"] || "").trim();
    const senderPhone = String(r["주문자 연락처"] || r["보내는분 연락처"] || r["구매자연락처"] || "").trim();
    const recipName = String(r["받는분"] || r["수취인명"] || r["수령인"] || r["수취인"] || senderName).trim();
    const recipPhone = String(r["받는분 연락처"] || r["수취인연락처1"] || r["수취인연락처"] || r["수령인연락처"] || senderPhone).trim();
    const address = String(r["받는분 주소(전체)"] || r["통합배송지"] || r["배송지"] || r["수취인주소"] || r["주소"] || "").trim();
    const postalCode = String(r["우편번호"] || "").trim() || estimatePostalCode(address);
    const deliveryMessage = String(r["배송메시지"] || r["배송메세지"] || r["배송요청사항"] || "").trim();
    const reserveDate = String(r["예약주문일"] || r["예약발송일"] || "").trim();
    const boxVolume = String(r["박스부피"] || "").trim();
    const memo = String(r["메모"] || "").trim();
    const courier = String(r["택배사"] || "").trim();
    const invoiceNo = String(r["송장번호"] || r["운송장번호"] || "").trim();
    // "구분(일반/업체)" 칸이 있으면 업체 주문 여부 판별에 사용
    const gubunRaw = String(r["구분 (일반 /업체)"] || r["구분"] || "").trim();
    const isBiz = /업체/.test(gubunRaw);
    const payRaw = String(r["입금금액"] || r["결제금액"] || r["상품별 총 주문금액"] || "").replace(/[^0-9.]/g, "");
    // 상품명: 네이버는 '상품명' + '옵션정보'(예: "상품선택: 모듬쌈 1Kg")가 따로. 옵션이 있으면 옵션 우선
    const optionText = String(r["옵션정보"] || r["옵션"] || "").replace(/^상품선택\s*:\s*/, "").trim();
    const baseProductName = String(r["상품명"] || "").trim();
    const productText = (optionText || baseProductName).trim();
    const qtyRaw = String(r["수량"] || "").trim();
    const priceRaw = String(r["가격"] || r["단가"] || "").replace(/[^0-9.]/g, "");
    const rowPrice = priceRaw ? Number(priceRaw) : 0;

    // 상품명 매칭: 불확실한 이름도 등록 상품과 가까우면 등록 상품명으로 변경해서 등록
    // (squish/core는 미리 계산해둔 productIndex를 사용 — 행마다 다시 계산하지 않아 대량 업로드가 빨라짐)
    const items = [];
    const unmatched = [];
    const squish = squishStr;
    const core = coreStr;
    const matchProduct = (nm) => {
      const q = squish(nm), qc = core(nm);
      if (!q) return { product: null, confidence: "none", candidates: [] };
      // 입력에 포함된 "크기/용량" 단위 토큰만 추출 (예: "모듬쌈 800g" → "800g")
      // "개/박스/팩/세트" 등은 상품의 크기가 아니라 "주문 수량"을 나타내는 경우가 대부분이라
      // (예: "모듬쌈1kg (1개)"의 "1개"), 여기 섞이면 등록된 상품 이름엔 "1개"가 없어서
      // 오히려 크기가 다른 엉뚱한 상품이 골라지는 사고로 이어짐 → 무게/부피 단위만 신뢰
      const unitTok = (squish(nm).match(/\d+(\.\d+)?(kg|g|ml|l)/g) || []);
      // 1) 정확/공백무시 일치 → 확신 높음, 그대로 사용
      const exact = productIndex.find((e) => e.sq === q);
      if (exact) return { product: exact.p, confidence: "exact", candidates: [] };
      // 2) 핵심 토큰(단위/숫자 제거) 일치
      let coreMatches = qc ? productIndex.filter((e) => e.co === qc) : [];
      if (coreMatches.length === 1) return { product: coreMatches[0].p, confidence: "exact", candidates: [] };
      if (coreMatches.length > 1 && unitTok.length) {
        const withUnit = coreMatches.filter((e) => unitTok.every((u) => e.sq.includes(u)));
        if (withUnit.length === 1) return { product: withUnit[0].p, confidence: "exact", candidates: [] };
        if (withUnit.length > 1) coreMatches = withUnit; // 단위까지 같은데 여러개면 후보로 넘김(아래에서 확인요청)
      }
      if (coreMatches.length >= 1) {
        // 이름은 같은데(예: "모듬쌈") 용량이 여러 개(500g/800g/1kg 등)라 헷갈릴 수 있음 → 추천목록으로
        return { product: coreMatches[0].p, confidence: "low", candidates: coreMatches.slice(0, 4).map((e) => e.p) };
      }
      // 3) 부분 포함 (한쪽이 다른쪽 이름을 포함)
      let contains = productIndex.filter((e) => e.sq && (e.sq.includes(q) || q.includes(e.sq)));
      if (contains.length > 1 && unitTok.length) {
        const u = contains.filter((e) => unitTok.every((t) => e.sq.includes(t)));
        if (u.length) contains = u;
      }
      contains.sort((a, b) => b.sq.length - a.sq.length);
      if (contains.length) return { product: contains[0].p, confidence: "low", candidates: contains.slice(0, 4).map((e) => e.p) };
      // 4) 핵심 토큰 부분 포함 (제일 느슨한 매칭 → 확신 낮음)
      if (qc) {
        const c2 = productIndex.filter((e) => e.co && (e.co.includes(qc) || qc.includes(e.co))).sort((a, b) => b.co.length - a.co.length);
        if (c2.length) return { product: c2[0].p, confidence: "low", candidates: c2.slice(0, 4).map((e) => e.p) };
      }
      return { product: null, confidence: "none", candidates: [] };
    };

    if (productText) {
      const parts = productText.split(/[,/]|·/).map((s) => s.trim()).filter(Boolean);
      const multi = parts.length > 1 || /[xX×*]\s*\d/.test(productText) || /\(\s*\d+\s*(개|박스|봉|팩|병|세트)\s*\)/.test(productText);
      const pushItem = (nmRaw, q) => {
        // "상품선택: 모듬쌈 1Kg"처럼 쇼핑몰 옵션 접두어가 상품명 칸에 그대로 섞여 들어온 경우도
        // (옵션정보가 별도 칸이 아니라 상품명 칸에 합쳐져 있는 경우) 항상 제거하고 매칭
        const nm = String(nmRaw || "").replace(/^상품선택\s*[:：]\s*/, "").trim();
        const { product: prod, confidence, candidates } = matchProduct(nm);
        if (prod && confidence === "exact") {
          items.push({ productId: prod.id, name: prod.name, qty: q, confidence });
        } else {
          // 확실하지 않은 매칭(비슷하지만 확신이 낮은 경우 포함, 전혀 못 찾은 경우 포함) 전부:
          // 절대 추측해서 엉뚱한 상품으로 등록하지 않고, 업로드한 원본 상품명을 그대로 사용함.
          // (추측한 상품이 틀렸는데 그대로 발송되면 큰 사고로 이어질 수 있어서, 확실하지 않으면
          //  "상품 미지정(원본 이름 그대로 등록)" 상태로 두고 사장님이 직접 확인해서 고르게 함)
          items.push({ productId: null, name: nm, qty: q, price: rowPrice, confidence: prod ? "low" : "none", candidates, originalText: nm });
          unmatched.push(nm);
        }
      };
      if (multi) {
        parts.forEach((part) => {
          // "채소 2kg X 2개" 형식
          let m = part.match(/(.+?)\s*[xX×*]\s*(\d+)/);
          // "모듬쌈1kg (1개)" 형식 (X가 없고 괄호로 수량을 표시하는 경우)
          if (!m) m = part.match(/(.+?)\s*\(\s*(\d+)\s*(?:개|박스|봉|팩|병|세트)?\s*\)/);
          const nm = (m ? m[1] : part).trim();
          const q = m ? parseInt(m[2], 10) : 1;
          pushItem(nm, q);
        });
      } else {
        const q = parseInt(qtyRaw, 10) || 1;
        pushItem(productText, q);
      }
    }

    return {
      tempId: "bulk_" + idx,
      checked: true,
      senderName, senderPhone, recipName, recipPhone,
      address, postalCode, deliveryMessage, reserveDate, boxVolume, memo,
      courier, invoiceNo, isBusiness: isBiz,
      paymentAmount: payRaw ? Number(payRaw) : "",
      items, unmatched, productText,
    };
  }

  function startBulkOrder() {
    setBulkOrderModal({ step: "choose", mode: "" });
  }

  function pickBulkMode(mode) {
    setBulkOrderModal({ step: "choose", mode });
    setTimeout(() => bulkOrderInputRef.current?.click(), 0);
  }

  function handleBulkOrderUpload(e) {
    const file = e.target.files?.[0];
    if (!file) return;
    setBusyMessage("엑셀 파일을 분석하고 있어요...");
    readWorkbookFile(file, (rows) => {
      const parsed = rows
        .map((r, i) => rowToBulkOrder(r, i))
        .filter((r) => r.recipName || r.address || r.items.length > 0);
      if (parsed.length === 0) {
        fireToast("등록할 주문 정보를 찾지 못했습니다");
        setBulkOrderModal(null);
      } else {
        setBulkOrderModal((prev) => ({ step: "preview", mode: prev?.mode || "multi", rows: parsed }));
      }
      setBusyMessage(null);
    }, () => {
      setBusyMessage(null);
      fireToast("파일을 읽지 못했어요. 엑셀(.xlsx) 형식이 맞는지 확인해주세요");
      setBulkOrderModal(null);
    });
    e.target.value = "";
  }

  function toggleBulkRow(tempId) {
    setBulkOrderModal((prev) => ({
      ...prev,
      rows: prev.rows.map((r) => (r.tempId === tempId ? { ...r, checked: !r.checked } : r)),
    }));
  }

  // 엑셀 일괄등록 미리보기에서, 확신이 낮게 매칭된 상품을 사장님이 직접 다시 고를 때 사용
  function pickBulkItemProduct(tempId, itemIdx, productId) {
    setBulkOrderModal((prev) => ({
      ...prev,
      rows: prev.rows.map((r) => {
        if (r.tempId !== tempId) return r;
        return {
          ...r,
          items: r.items.map((it, i) => {
            if (i !== itemIdx) return it;
            if (!productId) {
              // "원본 이름 그대로 사용" 선택 시
              return { ...it, productId: null, name: it.originalText || it.name, confidence: "manual-none" };
            }
            const p = products.find((pp) => pp.id === productId);
            return { ...it, productId, name: p ? p.name : it.name, confidence: "manual" };
          }),
        };
      }),
    }));
  }

  // 다른 쇼핑몰 주문건을 옮겨 적을 수 있도록, "엑셀 파일 주문 등록"에서 쓰는 빈 양식(헤더만 있는 파일)을 다운로드
  function downloadOrderTemplate() {
    downloadWorkbook([], "주문양식", nextFilename("주문등록_양식"), ORDER_COLUMNS);
    fireToast("빈 양식을 다운로드했어요. 다른 쇼핑몰 주문 내용을 이 양식에 옮겨 적은 뒤 다시 업로드해주세요");
  }

  function applyBulkOrders() {
    try {
      const toAdd = bulkOrderModal.rows.filter((r) => r.checked && r.items.length > 0);
      if (toAdd.length === 0) {
        fireToast("등록할 항목을 선택해주세요 (상품명이 있는 행만 등록됩니다)");
        return;
      }
      const stamp = nowStamp();
      const batchId = uid("batch");

      // "구분"이 업체로 표시된 행은, 기존 업체와 매칭하거나(전화번호/이름) 없으면 새 업체로 등록
      const normPhone = (p) => String(p || "").replace(/[^0-9]/g, "");
      const vendorIdByRow = {};
      const newVendors = [];
      toAdd.forEach((r) => {
        if (!r.isBusiness) return;
        const ph = normPhone(r.recipPhone);
        const nm = (r.recipName || "").trim();
        const existing = findMatchingParty(nm, r.recipPhone, r.address, vendors);
        if (existing) { vendorIdByRow[r.tempId] = existing.id; return; }
        const dup = findMatchingParty(nm, r.recipPhone, r.address, newVendors);
        if (dup) { vendorIdByRow[r.tempId] = dup.id; return; }
        if (!nm && !ph) return;
        const created = {
          id: uid("v"), name: nm || "이름없음", bizNo: "", ceo: "", phone: r.recipPhone || "",
          email: "", address: r.address || "", memo: "엑셀 업로드에서 자동 등록됨", bizLicense: "",
        };
        newVendors.push(created);
        vendorIdByRow[r.tempId] = created.id;
      });
      if (newVendors.length > 0) setVendors((prev) => [...prev, ...newVendors]);
      // 새로 등록되는 업체 중, 기존 업체와 애매하게 겹치는 경우가 있으면 확인 목록에 담아둠
      const ambiguousVendors = scanAmbiguousNewEntries(newVendors, vendors).map((x) => ({ ...x, type: "vendor" }));

      const newOrders = toAdd.map((r, idx) => {
        const matched = customers.find((c) => r.recipPhone && (c.phone || "").replace(/-/g, "") === r.recipPhone.replace(/-/g, ""));
        const total = r.items.reduce((s, it) => s + ((productMap[it.productId]?.price ?? it.price ?? 0) * (it.qty || 0)), 0);
        return applyFridayNoteIfNeeded({
          id: uid("o"),
          batchId,
          importSeq: idx, // 엑셀 파일에서 원래 몇 번째 줄이었는지 기록 (다운로드시 순서를 그대로 지키기 위함)
          customerId: matched ? matched.id : null,
          isBusiness: !!r.isBusiness,
          vendorId: r.isBusiness ? (vendorIdByRow[r.tempId] || "") : "",
          sender: { name: r.senderName || r.recipName || "", phone: r.senderPhone || r.recipPhone || "" },
          recipient: { name: r.recipName || "", phone: r.recipPhone || "", address: r.address || "", postalCode: r.postalCode || "" },
          items: (r.items || []).map((it) => ({ productId: it.productId || null, name: it.name || "상품", qty: it.qty || 1, price: it.price || 0 })),
          status: r.invoiceNo ? "shipped" : "pending",
          invoiceNo: r.invoiceNo || "",
          courier: r.courier || "",
          createdAt: stamp,
          orderDate: todayStr(),
          reserveDate: r.reserveDate || "",
          boxVolume: r.boxVolume || "",
          deliveryMessage: r.deliveryMessage || "",
          memo: r.memo || "",
          message: "",
          paymentAmount: r.paymentAmount !== "" && r.paymentAmount !== undefined ? r.paymentAmount : total,
        });
      });
      setOrders((prev) => [...newOrders, ...prev]);
      // 새로 등록되는 고객 중, 기존 고객과 애매하게 겹치는 경우도 미리 확인
      const missingCustomers = findMissingCustomersFromOrders(newOrders, customers);
      const ambiguousCustomers = scanAmbiguousNewEntries(missingCustomers, customers).map((x) => ({ ...x, type: "customer" }));
      registerNewCustomersFromOrders(newOrders); // 업체 주문은 이 함수 내부에서 자동 제외됨
      // 엑셀에 업체 주문이 섞여 있으면, 새 주문 입력할 때와 똑같이 거래명세서를 자동 생성함
      // (박스로 여러 줄 나뉜 업체 주문은 업체+받는분별로 하나로 합쳐서 명세서 1장씩 생성)
      const bizOrders = newOrders.filter((o) => o.isBusiness);
      if (bizOrders.length > 0) saveInvoicesGrouped(bizOrders);
      fireToast(`엑셀에서 주문 ${newOrders.length}건을 등록했습니다${newVendors.length ? ` (신규 업체 ${newVendors.length}곳 자동 등록)` : ""}${bizOrders.length ? ` · 업체 거래명세서 자동 생성` : ""}`);
      const allAmbiguous = [...ambiguousVendors, ...ambiguousCustomers];
      if (allAmbiguous.length > 0) setAmbiguousReview(allAmbiguous);
      setBulkOrderModal(null);
      setTab("orders");
    } catch (err) {
      console.error("applyBulkOrders 오류:", err);
      fireToast("등록 중 오류가 발생했어요: " + (err && err.message ? err.message : String(err)));
    }
  }


  function exportOrdersExcel() {
    const targets = orders.filter((o) => checkedIds.has(o.id));
    if (targets.length === 0) {
      fireToast("체크박스로 다운로드할 주문을 선택해주세요");
      return;
    }
    // 같은 엑셀 파일(같은 batchId)로 한번에 등록된 주문들은, 업로드했던 파일에 있던
    // 원래 순서(importSeq) 그대로 정렬해서 다운로드함. 순서가 뒤바뀌면 나중에 확인
    // 작업할 때 헷갈리기 때문에, 추측하지 않고 명시적으로 순서를 고정함.
    const sortedTargets = [...targets].sort((a, b) => {
      if (a.batchId && a.batchId === b.batchId && a.importSeq != null && b.importSeq != null) {
        return a.importSeq - b.importSeq;
      }
      return 0; // 서로 다른 배치끼리는 원래(안정정렬) 순서를 그대로 둠
    });
    // 각 주문을 박스 규칙으로 펼쳐 박스마다 한 행(송장 한 개)으로 만든다
    const expanded = sortedTargets.flatMap((o) => expandOrderToBoxes(o));
    const rows = expanded.map(orderToRow);
    downloadWorkbook(rows, "Orders", nextFilename("주문목록"), orderTemplate, (row, i) => (expanded[i]?.isBusiness ? "FAEEDA" : null));

    const boxCount = expanded.length;
    const idsToAdvance = targets.filter((o) => o.status === "pending").map((o) => o.id);
    if (idsToAdvance.length > 0) {
      setOrders((prev) => prev.map((o) => (idsToAdvance.includes(o.id) ? { ...o, status: "ready" } : o)));
      fireToast(`선택한 ${targets.length}건(박스 ${boxCount}개/송장 ${boxCount}개)을 다운로드하고 발송준비로 변경했습니다`);
    } else {
      fireToast(`선택한 ${targets.length}건을 박스 ${boxCount}개(송장 ${boxCount}개)로 다운로드했습니다`);
    }
    setCheckedIds(new Set());
  }

  // 현재 화면에 보이는(상태/구분 필터된) 목록 전체를 다운로드. 발송완료 주문도 포함되며 상태는 유지(재발송 가능).
  function exportFilteredOrders(list) {
    if (!list || list.length === 0) {
      fireToast("다운로드할 주문이 없습니다");
      return;
    }
    // 화면 목록은 최신순으로 정렬되어 있는데, 같은 엑셀 파일로 한번에 등록된 주문들은
    // 그 화면 정렬과 상관없이 업로드했던 원래 순서(importSeq) 그대로 다운로드되게 함
    // (안 그러면 나중에 확인 작업할 때 순서가 뒤바뀌어 헷갈림)
    const sortedList = [...list].sort((a, b) => {
      if (a.batchId && a.batchId === b.batchId && a.importSeq != null && b.importSeq != null) {
        return a.importSeq - b.importSeq;
      }
      return 0;
    });
    const expanded = sortedList.flatMap((o) => expandOrderToBoxes(o));
    const rows = expanded.map(orderToRow);
    downloadWorkbook(rows, "Orders", nextFilename("주문목록"), orderTemplate, (row, i) => (expanded[i]?.isBusiness ? "FAEEDA" : null));
    const boxCount = expanded.length;
    // 결제완료(pending) 상태만 발송준비로 전진, 발송완료 등 나머지는 그대로 둠(재발송 가능)
    const idsToAdvance = list.filter((o) => o.status === "pending").map((o) => o.id);
    if (idsToAdvance.length > 0) {
      setOrders((prev) => prev.map((o) => (idsToAdvance.includes(o.id) ? { ...o, status: "ready" } : o)));

      fireToast(`${list.length}건(박스 ${boxCount}개)을 다운로드했습니다`);

  // 택배사별 창구 접수용 양식 다운로드 (발송준비 상태 주문 기준)
  function exportCourierPickupExcel(courierName) {
    const targets = orders.filter((o) => o.status === "ready");
    if (targets.length === 0) {
      fireToast("발송준비 상태인 주문이 없어요");
      return;
    }
    // 같은 파일로 한번에 등록된 주문은 업로드 원래 순서(importSeq) 그대로 정렬
    const sortedTargets = [...targets].sort((a, b) => {
      if (a.batchId && a.batchId === b.batchId && a.importSeq != null && b.importSeq != null) {
        return a.importSeq - b.importSeq;
      }
      return 0;
    });
    const template = (courierName && courierTemplates[courierName]) || DEFAULT_COURIER_TEMPLATE;
    const expanded = sortedTargets.flatMap((o) => expandOrderToBoxes(o));
    const rows = expanded.map((o) => Object.fromEntries(template.map((label) => [label, resolveOrderField(label, o)])));
    const title = courierName ? `택배접수양식(${courierName})` : "택배접수양식";
    downloadWorkbook(rows, "CourierPickup", nextFilename(title), template, (row, i) => (expanded[i]?.isBusiness ? "FAEEDA" : null));
    fireToast(`발송준비 ${targets.length}건을 박스 ${expanded.length}개(송장 ${expanded.length}개)로 다운로드했습니다`);
  }

  function handleInvoiceUpload(e) {
    const file = e.target.files?.[0];
    if (!file) return;
    setBusyMessage("송장번호 파일을 읽고 있어요...");
    readWorkbookFile(file, (rows) => {
      const matches = [];
      rows.forEach((row) => {
        const orderId = String(row["주문번호"] || "").trim();
        const invoiceNo = String(row["송장번호"] || row["운송장번호"] || "").trim();
        if (!orderId || !invoiceNo) return;
        const order = orders.find((o) => o.id === orderId);
        if (!order) return;
        const c = customerMap[order.customerId];
        matches.push({
          orderId,
          invoiceNo,
          checked: true,
          name: order.recipient?.name || (c ? c.name : "") || "고객",
          phone: order.recipient?.phone || (c ? c.phone : "") || "",
        });
      });
      if (matches.length === 0) {
        fireToast("일치하는 주문번호를 찾지 못했습니다");
      } else {
        setInvoicePreview({ rows: matches });
      }
      setBusyMessage(null);
    }, () => {
      setBusyMessage(null);
      fireToast("파일을 읽지 못했어요. 엑셀(.xlsx) 형식이 맞는지 확인해주세요");
    });
    e.target.value = "";
  }

  function applyInvoicePreview() {

    const smsRows = [];

      prev.map((o) => {
        const match = toApply.find((r) => r.orderId === o.id);
        if (!match) return o;
        const courier = o.courier || "우체국택배";
        const recip = o.recipient || {};
        const phone = recip.phone || o.sender?.phone || "";
        const name = recip.name || o.sender?.name || "고객";
        if (phone) {
          smsRows.push({
            orderId: o.id,
            name,
            phone,
            checked: true,
            message: fillSmsTemplate(smsTemplate, { appName, name, courier, invoiceNo: match.invoiceNo }),
          });
        }
        return {
          ...o,
          invoiceNo: match.invoiceNo,
          courier,
          status: "shipped",
          memo: (o.status !== "shipped" && isFridayToday()) ? withFridayNote(o.memo) : o.memo,
          shippedAt: o.status !== "shipped" ? todayStr() : o.shippedAt,
          deliveryConfirmed: o.status !== "shipped" ? false : o.deliveryConfirmed,
        };
      })

      setSmsBatch({ rows: smsRows });

      fireToast(`송장번호 ${toApply.length}건 반영, 발송완료 처리했습니다`);

  // 폰: 여러 수신자에게 같은 문자를 보내도록 SMS 앱을 연다.
  // (개인화된 송장번호가 각각 달라서, 같은 번호끼리 묶지 않고 한 명씩 여는 게 정확하지만,
  //  여러 명 한 번에 열기 위해 쉼표로 수신자를 묶고 대표 안내문을 넣는다.)
  function openSmsApp() {
    const targets = smsBatch.rows.filter((r) => r.checked);
    if (targets.length === 0) { fireToast("보낼 대상을 선택해주세요"); return; }
    // 문자 내용이 모두 동일하면 한 번에, 아니면 첫 번째 기준으로 안내
    const phones = targets.map((r) => (r.phone || "").replace(/[^0-9]/g, "")).join(",");
    const body = targets.length === 1
      ? targets[0].message
      : targets[0].message; // 대표 1건 본문(번호별 상이 시 아래 복사 기능 권장)
    const url = `sms:${phones}?body=${encodeURIComponent(body)}`;
    window.location.href = url;
    fireToast(`문자 앱을 엽니다 (${targets.length}명). 내용 확인 후 전송해주세요`);
  }

  // PC: 수신자별 번호+문자를 클립보드에 복사
  function copySmsBatch() {
    const targets = smsBatch.rows.filter((r) => r.checked);
    if (targets.length === 0) { fireToast("복사할 대상을 선택해주세요"); return; }
    const text = targets.map((r) => `${r.name} (${r.phone})\n${r.message}`).join("\n\n―――\n\n");

    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(done).catch(() => {
        window.prompt("아래 내용을 복사하세요 (Ctrl+C)", text);
      });
    } else {
      window.prompt("아래 내용을 복사하세요 (Ctrl+C)", text);
    }
  }

  function exportCustomersExcel(customerList, labelForToast) {
    const list = customerList || customers;
    if (list.length === 0) {
      fireToast("다운로드할 고객이 없습니다");
      return;
    }
    // 주문목록과 동일한 서식(orderTemplate)으로 내보낸다.
    // 각 고객의 가장 최근 주문을 기준으로, 주문이 없으면 고객 정보로 채운다.
    const rows = list.map((c) => {
      const custOrders = orders
        .filter((o) => o.customerId === c.id)
        .sort((a, b) => (a.createdAt < b.createdAt ? 1 : -1));
      const latest = custOrders[0];
      const pseudo = latest || {
        id: "",
        orderDate: "",
        reserveDate: "",
        sender: { name: c.name, phone: c.phone },
        recipient: { name: c.name, phone: c.phone, address: c.address || "", postalCode: c.postalCode || "" },
        items: [],
        boxVolume: "",
        deliveryMessage: "",
        memo: c.memo || "",
        status: "pending",
        invoiceNo: "",
        courier: "",
        paymentAmount: "",
      };
      const row = Object.fromEntries(orderTemplate.map((label) => [label, resolveOrderField(label, pseudo)]));
      // 누구한테 보낼지 직접 고르실 수 있도록, 주문 횟수와 단골 여부를 추가로 표시함
      row["최근1년 주문횟수"] = countRecentOrdersForCustomer(c.id, orders);
      row["최근한달 주문횟수"] = countOrdersInLastNDays(c.id, orders, 30);
      row["단골여부"] = isRegularCustomer(c, orders) ? "단골" : "";
      return row;
    });
    downloadWorkbook(rows, "Customers", nextFilename(labelForToast ? "단골고객목록" : "고객목록"), [...orderTemplate, "최근1년 주문횟수", "최근한달 주문횟수", "단골여부"]);
    fireToast(labelForToast || "고객목록을 주문목록 서식으로 다운로드했습니다 (주문 횟수·단골여부 포함)");
  }
