function resolveOrderField(label, o) {
  const map = {
    "주문번호": o.id,
    "주문일": o.orderDate,
    "예약주문일": o.reserveDate || "",
    "보내는분 (주문자)": o.sender?.name || "",
    "보내는분": o.sender?.name || "",
    "주문자 연락처": o.sender?.phone || "",
    "보내는분 연락처": o.sender?.phone || "",
    "받는분": o.recipient?.name || "",
    "받는분 연락처": o.recipient?.phone || "",
    "우편번호": o.recipient?.postalCode || estimatePostalCode(o.recipient?.address),
    "받는분 주소(전체)": o.recipient?.address || "",
    "상품명": orderItemsText(o),
    "수량": (o.items || []).reduce((s, it) => s + (it.qty || 0), 0),
    "박스부피": o.boxVolume || "",
    "배송메시지": o.deliveryMessage || "",
    "메모": o.memo || "",
    "상태": (STATUS[o.status] || STATUS.pending).label,
    "송장번호": o.invoiceNo || "",
    "운송장번호": o.invoiceNo || "",
    "택배사": o.courier || "",
    "입금금액": o.paymentAmount ?? "",
    "구분 (일반 /업체)": o.isBusiness ? "업체" : "일반",
  };
  return map[label] !== undefined ? map[label] : "";
}

// 주문 목록을 훑어서, 아직 고객 목록에 없는 사람(받는분·주문자)을 찾아 새 고객 후보로 반환
// 새 주문 화면 저장, 엑셀 대량 업로드, "과거 주문에서 고객 채우기" 기능에서 공통으로 사용
// 이미 등록된 고객(이름+전화번호 일치)이 이전과 다른 주소로 주문한 경우(예: 선물을 여러 곳에 보냄,
// 집/회사 주소를 번갈아 씀 등) → 그 고객 정보를 지우거나 덮어쓰지 않고, "추가 배송지"로 메모에 기록해서
// 다음에 그 사람 이름/전화번호로 검색하면 예전에 쓰던 주소들을 다 볼 수 있게 함
function syncCustomerAddressNotes(ordersToScan, existingCustomers) {
  const normPhone = (p) => String(p || "").replace(/[^0-9]/g, "");
  const patches = {}; // customerId -> 추가할 memo 텍스트 누적
  ordersToScan.forEach((o) => {
    if (o.isBusiness) return;
    [o.recipient, o.sender].forEach((who) => {
      const nm = (who?.name || "").trim();
      const ph = normPhone(who?.phone);
      const addr = (who?.address || "").trim();
      if (!nm || !ph || !addr) return;
      const cust = existingCustomers.find((c) => normPhone(c.phone) === ph && (c.name || "").trim() === nm);
      if (!cust) return;
      const curAddr = (cust.address || "").trim();
      if (!curAddr) return; // 원래 주소가 비어있으면 등록 단계에서 이미 채워짐(여기선 손 안 댐)
      if (curAddr === addr) return; // 같은 주소면 기록할 필요 없음
      const curMemo = (patches[cust.id] ?? cust.memo) || "";
      if (curMemo.includes(addr)) return; // 이미 기록된 주소면 중복 방지
      patches[cust.id] = `${curMemo ? curMemo + "\n" : ""}추가배송지: ${addr}`;
    });
  });
  return patches; // { [customerId]: 새 memo 문자열 }
}

// 이름/전화번호/주소로 "같은 사람(또는 업체)"인지 정교하게 판단하는 공용 함수.
// 고객과 업체 등록 둘 다 이 함수를 써서 똑같이 신중하게 중복을 판단함.
// - 전화번호가 같으면 원칙적으로 동일 대상. 다만 이름까지 서로 다르면 별도로 취급
//   (한 전화번호를 여러 사람/여러 업체가 쓰는 경우가 있어, 이름이 다르면 잘못 합쳐지는
//   사고를 막기 위함 - 예: 같은 담당자 번호로 여러 업체가 주문하는 경우)
// - 전화번호가 없으면 이름으로 판단하되, 주소까지 다르면 별도로 취급 (동명이인/동명업체 방지)
// 최근 1년(365일) 동안 이 고객의 주문이 몇 건인지 계산 (업체 주문은 제외, 순수 개인 고객 주문만)
function countRecentOrdersForCustomer(customerId, orders) {
  const oneYearAgo = new Date();
  oneYearAgo.setDate(oneYearAgo.getDate() - 365);
  return orders.filter((o) => {
    if (o.customerId !== customerId) return false;
    if (o.isBusiness) return false;
    const d = new Date(o.createdAt || o.orderDate || 0);
    return !isNaN(d.getTime()) && d >= oneYearAgo;
  }).length;
}

// 최근 N일 동안 이 고객의 주문이 몇 건인지 계산 (업체 주문 제외) - "한 달에 4회(주 1회 페이스)"
// 처럼 최근 짧은 기간 안의 주문 빈도를 확인할 때 씀
function countOrdersInLastNDays(customerId, orders, days) {
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - days);
  return orders.filter((o) => {
    if (o.customerId !== customerId) return false;
    if (o.isBusiness) return false;
    const d = new Date(o.createdAt || o.orderDate || 0);
    return !isNaN(d.getTime()) && d >= cutoff;
  }).length;
}

// 단골 고객인지 판단: 사장님이 직접 "단골로 지정"/"단골 해제"를 눌렀으면 그걸 우선 따르고,
// 따로 지정한 적이 없으면 아래 둘 중 하나라도 만족하면 자동으로 단골로 판단함
// ① 최근 1년간 주문 횟수가 기준(기본 10회) 이상 ② 최근 한 달(30일) 안에 4회 이상(주 1회 페이스) 주문
function isRegularCustomer(customer, orders, threshold) {
  if (customer.regularOverride === true) return true;
  if (customer.regularOverride === false) return false;
  if (countRecentOrdersForCustomer(customer.id, orders) >= (threshold || 10)) return true;
  if (countOrdersInLastNDays(customer.id, orders, 30) >= 4) return true;
  return false;
}

// "최근 한 달 안에 4회 이상(주 1회 페이스)" 조건으로만 새로 단골 후보가 된 고객 목록
// (연간 10회 기준과는 별개로, 이번 달 들어 갑자기 자주 주문하기 시작한 사람을 따로 찾아서 알려주기 위함)
function findNewMonthlyRegularCandidates(customers, orders) {
  return customers.filter((c) => {
    if (c.regularOverride === false) return false; // 수동으로 단골 아니라고 해둔 사람은 제외
    return countOrdersInLastNDays(c.id, orders, 30) >= 4;
  });
}

function findMatchingParty(name, phone, address, list) {
  const normPhone = (p) => String(p || "").replace(/[^0-9]/g, "");
  const ph = normPhone(phone);
  const nm = (name || "").trim();
  const addr = (address || "").trim();
  return list.find((item) => {
    const itemPh = normPhone(item.phone);
    const itemNm = (item.name || "").trim();
    const itemAddr = (item.address || "").trim();
    if (ph && itemPh === ph) {
      if (nm && itemNm && nm !== itemNm) return false;
      return true;
    }
    if (!ph && nm && itemNm === nm) {
      if (addr && itemAddr && itemAddr !== addr) return false;
      return true;
    }
    return false;
  });
}

// 같은 전화번호인데 이름이 다르거나, 같은 이름인데 주소가 달라서 "다른 사람(업체)"로
// 판단된 애매한 경우를 감지함. 이런 경우는 실수로 잘못 등록됐을 수도 있어서, 자동으로
// 조용히 새로 등록해버리지 않고 사장님이 한 번 더 확인해볼 수 있도록 알려주는 데 씀.
function findAmbiguousConflict(name, phone, address, list) {
  const normPhone = (p) => String(p || "").replace(/[^0-9]/g, "");
  const ph = normPhone(phone);
  const nm = (name || "").trim();
  const addr = (address || "").trim();
  return list.find((item) => {
    const itemPh = normPhone(item.phone);
    const itemNm = (item.name || "").trim();
    const itemAddr = (item.address || "").trim();
    if (ph && itemPh === ph && nm && itemNm && nm !== itemNm) return true;
    if (!ph && nm && itemNm === nm && addr && itemAddr && itemAddr !== addr) return true;
    return false;
  });
}

// 새로 등록하려는 항목들 중에서, 기존 목록과 "애매하게 비슷한"(전화번호는 같은데 이름이
// 다르거나, 이름은 같은데 주소가 다른) 경우를 찾아서 목록으로 돌려줌 - 확인 알림용
function scanAmbiguousNewEntries(newEntries, originalList) {
  const results = [];
  (newEntries || []).forEach((entry) => {
    const conflict = findAmbiguousConflict(entry.name, entry.phone, entry.address, originalList);
    if (conflict) results.push({ newEntry: entry, conflictWith: conflict });
  });
  return results;
}

function findMissingCustomersFromOrders(ordersToScan, existingCustomers) {
  const normPhone = (p) => String(p || "").replace(/[^0-9]/g, "");
  const existing = existingCustomers;
  // 같은 사람인지 판단하는 기준은 findMatchingParty(공용 함수)에 위임함 - 업체 매칭과
  // 완전히 동일한 기준(전화번호 같아도 이름 다르면 별도, 이름 같아도 주소 다르면 별도)을 씀
  const findExisting = (name, phone, address, extraList) => {
    return findMatchingParty(name, phone, address, existing) || findMatchingParty(name, phone, address, extraList);
  };
  const toAdd = [];
  ordersToScan.forEach((o) => {
    if (o.isBusiness) return; // 업체 주문은 고객 자동등록 제외(업체는 별도 관리)
    const recip = o.recipient || {};
    const snd = o.sender || {};
    // 1) 받는분 등록 (보내는분과 다르면 메모에 보내는분 정보 남김)
    const recipName = (recip.name || "").trim();
    const recipPhone = (recip.phone || "").trim();
    if (recipName || recipPhone) {
      if (!findExisting(recipName, recipPhone, recip.address, toAdd)) {
        // 받는분이 주문자와 다른 경우(선물) → 메모에 보내는분 남기기
        const isGift = (snd.name && snd.name.trim() !== recipName) || (normPhone(snd.phone) && normPhone(snd.phone) !== normPhone(recipPhone));
        const giftMemo = isGift && (snd.name || snd.phone) ? `보내는분: ${snd.name || ""}님 ${snd.phone || ""}`.trim() : "";
        toAdd.push({
          id: uid("c"),
          name: recipName || "이름없음",
          phone: recipPhone,
          address: recip.address || "",
          postalCode: recip.postalCode || estimatePostalCode(recip.address || ""),
          memo: giftMemo,
        });
      }
    }
    // 2) 주문자(보내는분) 등록 — 받는분과 다른 사람이면 따로 등록
    const sndName = (snd.name || "").trim();
    const sndPhone = (snd.phone || "").trim();
    const sndDiffers = sndName !== recipName || normPhone(sndPhone) !== normPhone(recipPhone);

function evaluateSaveGuard({ current, prev, storedFloor }) {
  const arr = (obj, key) => (obj && obj[key]) || [];
  const keys = ["customers", "orders", "products", "vendors"];
  for (const key of keys) {
    const curLen = arr(current, key).length;
    if (curLen > 0) continue;
    const prevLen = prev ? arr(prev, key).length : 0;
    const storedLen = storedFloor ? (storedFloor[key] || 0) : 0;
    if (prevLen > 0 || storedLen > 0) {

}

function lcs(a,b){ const m=a.length,n=b.length; if(!m||!n)return 0; const dp=Array(n+1).fill(0);

function simJamo(a,b){ const da=decompose(a),db=decompose(b); if(!da.length||!db.length)return 0; return lcs(da,db)/Math.max(da.length,db.length); }
const CMD_WORDS=['주문하려고','주문하려','주문할게요','주문할게','주문하자','주문해줘','주문해','주문받아줘','주문받아','주문접수','주문등록','주문','검색해줘','검색해','검색','알려줘','알려주세요','알려','정보','보여줘','보여주세요','보여','조회','내역','현황','해줘','해주세요','하려고','하니까','하네요','합니다','할게요','좀','에관한','관한','관련','내용','파악','확인'];
function stripCommands(text){ let s=(text||''); for(const w of CMD_WORDS) s=s.split(w).join(' '); return s.replace(/\s+/g,' ').trim(); }
function matchName(text, names, threshold){
  threshold=threshold||0.66;   // ★ v21: 오매칭 줄이려 상향
  const cleanNS=stripCommands(text).replace(/\s/g,'');
  const raw=(text||'').replace(/\s/g,'');
  const cand=[...new Set(names)].filter(n=>n&&n.trim().length>=2).map(n=>n.trim());
  const byLen=[...cand].sort((a,b)=>b.length-a.length);
  // 1) 정확 포함 우선
  for(const n of byLen){ if(cleanNS.includes(n.replace(/\s/g,''))) return n; }
  for(const n of byLen){ const ns=n.replace(/\s/g,''); if(ns.length>=3&&raw.includes(ns)) return n; }
  // 2) 유사매칭: 발화 전체가 "이름 길이와 비슷할 때만" (긴 문장은 이름으로 안 봄 → 잡담 오매칭 방지)
  let best=null,bs=0;

    const s=simJamo(ns,cleanNS);

  }

}

const KO_NUM={한:1,두:2,세:3,네:4,다섯:5,여섯:6,일곱:7,여덟:8,아홉:9,열:10};

function splitNameWeight(name) {

function composeNameWeight(base, weight) {

// 개수만 추출 (무게는 수량으로 안 봄)
function parseCount(seg){
  let m=seg.match(new RegExp('(\\d+)\\s*(?:'+COUNT_UNIT+')')); if(m) return parseInt(m[1],10);
  m=seg.match(new RegExp('(한|두|세|네|다섯|여섯|일곱|여덟|아홉|열)\\s*(?:'+COUNT_UNIT+')')); if(m) return KO_NUM[m[1]];
  if(/하나|한개/.test(seg)) return 1;
  m=seg.match(/(\d+)\s*개/); if(m) return parseInt(m[1],10);

function weightIn(text){ const m=(text||'').match(new RegExp(WEIGHT_RE)); return m?m[0].replace(/\s/g,''):''; }

const VO_STOP=['안녕','안녕하세요','응','네','예','그래','아니','아니요','몰라','뭐','음','어','글쎄','저기','그거','저거','네네','오케이','여보세요','시작','다시','고객','업체'];

//  "샐러드 2키로 로메인 2키로 적상추 5봉지" → 3개 품목으로 분리
function splitItemSegments(text){
  const re=new RegExp('('+WEIGHT_RE+')|((?:\\d+|한|두|세|네|다섯|여섯|일곱|여덟|아홉|열)\\s*(?:'+COUNT_UNIT+')|\\d+\\s*개)','g');
  const toks=[]; let m;
  while((m=re.exec(text))!==null){ toks.push({start:m.index, end:m.index+m[0].length, isWeight:!!m[1]}); }
  const segs=[]; let last=0;
  for(let i=0;i<toks.length;i++){
    const tk=toks[i];
    let cut=true;
    // 무게 뒤에 곧바로 개수가 오면(사이에 새 상품명 없음) 같은 품목 → 자르지 않음("모듬쌈 1키로 2박스")

    if(cut){ const seg=text.slice(last,tk.end).trim(); if(seg) segs.push(seg); last=tk.end; }

             .replace(/\d+\s*개/g,' ')
             .replace(/하나|한개|주세요|주문해|주문|줘|해줘|그리고|하고|외에|이랑|플러스|그다음에|그다음|다음은|또한|또/g,' ')
             .replace(/\s+/g,' ').trim().replace(/요$/,'').trim()
             .replace(/^(에|은|는|이|가|로|과|와|랑|외|하고|그리고|이랑)\s+/,'').trim();
    // 세그먼트 앞에 알려진 이름이 붙어 있으면 제거
    let nmNS=nm.replace(/\s/g,'');
    for(const kn of nameNS){ if(nmNS.startsWith(kn) && nmNS.length>kn.length){ nmNS=nmNS.slice(kn.length); nm=nm.replace(/\s/g,'').slice(kn.length); break; } }
    if((nm.match(/[가-힣A-Za-z]/g)||[]).length<1) continue;
    if(VO_STOP.includes(nmNS)) continue;
    // 무게가 붙은 품목("적상추 5키로")은 커스텀으로 유지 — 말한 그대로 표시, 상품 변형 오연결 방지
    // 무게 없는 이름만 등록상품에 정확히 일치할 때 연결 (적상추≠상추)
    let matched=null;

    // ★ 퍼지 보정: 정확히 안 맞으면 가장 비슷한 등록상품으로 이름 교정 ("가피라"→"카이피라")
    if(!matched && typeof fuzzyProductMatch==='function'){
      const nmForMatch=nm.replace(new RegExp(WEIGHT_RE,'g'),'').replace(/\s+/g,' ').trim();
      const fz=fuzzyProductMatch(nmForMatch||nm, products, 0.62);
      if(fz){
        if(w){
          // ★ v51: 등록 상품의 중량과 말한 중량이 같으면 그 상품으로 연결 (예: "채소 2kg 2개"→등록품 "채소2kg" qty2)
          const normW=(s)=>String(s||'').replace(/\s/g,'').toLowerCase().replace(/킬로그램|킬로그람|킬로|키로그램|키로그람|키로/g,'kg').replace(/그램|그람/g,'g');

        }

}
function parseDate(text, todayDate){
  const t=(text||'').replace(/\s/g,'');
  const d=new Date(todayDate.getTime()); const p=n=>String(n).padStart(2,'0');
  const fmt=dt=>`${dt.getFullYear()}-${p(dt.getMonth()+1)}-${p(dt.getDate())}`;
  let m;
  if(/(\d{1,2})일(?:후|뒤|있다)/.test(t)){m=t.match(/(\d{1,2})일(?:후|뒤|있다)/);d.setDate(d.getDate()+ +m[1]);return fmt(d);}
  if(/오늘|당일/.test(t))return fmt(d);
  if(/내일|낼|명일/.test(t)){d.setDate(d.getDate()+1);return fmt(d);}
  if(/모레|모래/.test(t)){d.setDate(d.getDate()+2);return fmt(d);}
  if(/글피/.test(t)){d.setDate(d.getDate()+3);return fmt(d);}
  m=t.match(/(\d{1,2})월(\d{1,2})일/); if(m){d.setMonth(+m[1]-1);d.setDate(+m[2]);return fmt(d);}
  m=t.match(/(\d{1,2})\/(\d{1,2})/); if(m){d.setMonth(+m[1]-1);d.setDate(+m[2]);return fmt(d);}
  const wd={일:0,월:1,화:2,수:3,목:4,금:5,토:6};
  m=t.match(/([월화수목금토일])요일/); if(m){const tg=wd[m[1]];let a=(tg-d.getDay()+7)%7;if(a===0)a=7;d.setDate(d.getDate()+a);return fmt(d);}
  return null;
}
function matchPerson(name, customers, vendors){
  const c=(customers||[]).find(x=>x&&x.name===name);
  if(c)return {name:c.name,phone:c.phone||'',address:c.address||'',customerId:c.id||null};
  const v=(vendors||[]).find(x=>x&&x.name===name);
  if(v)return {name:v.name,phone:v.phone||'',address:v.address||'',customerId:null,vendorId:v.id||null};
  return {name,phone:'',address:'',customerId:null};
}
function allNames(customers, vendors){
  const s=new Set();
  (customers||[]).forEach(c=>c&&c.name&&s.add(String(c.name).trim()));
  (vendors||[]).forEach(v=>v&&v.name&&s.add(String(v.name).trim()));
  return [...s];
}
function findKnownNameIn(text, customers, vendors, products){
  const prodNS=new Set((products||[]).map(p=>p&&p.name&&p.name.replace(/\s/g,'')).filter(Boolean));
  const names=allNames(customers,vendors).filter(n=>!prodNS.has(n.replace(/\s/g,'')));
  return matchName(text, names);
}
function residualMessage(text, name, items, products){
  let s=' '+text+' ';
  if(name) s=s.split(name).join(' ');
  for(const it of (items||[])){
    const p=(products||[]).find(x=>x.id===it.productId);
    if(p) s=s.replace(new RegExp(p.name.replace(/\s/g,'\\s*'),'g'),' ');
  }
  s=s.replace(new RegExp(WEIGHT_RE,'g'),' ');
  s=s.replace(new RegExp('(\\d+|한|두|세|네|다섯|여섯|일곱|여덟|아홉|열)\\s*(?:'+COUNT_UNIT+')','g'),' ');
  s=s.replace(/하나|한개|두개|세개/g,' ');
  s=s.replace(/오늘|내일|낼|명일|모레|모래|글피|당일|\d{1,2}월\s*\d{1,2}일|\d{1,2}\/\d{1,2}|\d{1,2}일\s*(?:후|뒤|있다)|[월화수목금토일]요일/g,' ');
  s=s.replace(/발송|보내줘|보내주세요|주문받아줘|주문받아|주문|님/g,' ');
  s=s.replace(/\s+/g,' ').trim().replace(/^(에|은|는|이|가|로|과|와|하고|그리고)\s*/,'').trim();
  if((s.match(/[가-힣]/g)||[]).length<2) return '';

function summarize(d){
  const parts=[];
  if(d.name) parts.push(`${d.name} 님`);
  if(d.items&&d.items.length) parts.push(d.items.map(i=>`${i.name} ${i.qty}개`).join(', '));
  if(d.reserveDate) parts.push(`발송 ${d.reserveDate}`);
  if(d.deliveryMessage) parts.push(`메시지 "${d.deliveryMessage}"`);
  return parts.join(', ');
}
function nextPrompt(d){
  if(!d.name) return '누구 주문인가요?';
  if(!d.items||!d.items.length) return `${d.name} 님, 어떤 상품 몇 개 드릴까요?`;
  return `${summarize(d)}. 맞으면 등록, 고칠 건 말씀하세요.`;
}
function applyOrderUtterance(draft, text, ctx){
  const { products, customers, vendors, today } = ctx;
  const t=(text||'').replace(/\s/g,'');
  const d={ ...draft, items:[...(draft.items||[])] };

  if(/처음부터|다시주문|새로주문|리셋|다시시작|새로시작/.test(t))
    return { draft:{items:[]}, reply:'네, 처음부터 다시 할게요. 누구 주문인가요?' };
  const hasProd=(products||[]).some(p=>p&&p.name&&t.includes(p.name.replace(/\s/g,'')));
  if(/그만|관둬|중단|하지마|안할래|주문취소|취소할|다취소|취소해|됐어|됐다|관두|그만할/.test(t) || (/취소/.test(t)&&!hasProd))
    return { cancelled:true, reply:'주문 등록을 취소했어요.' };
  const wantsRegister=/등록해|등록할|등록하자|등록부탁|저장해|확정|이대로등록|그대로등록|응등록|네등록/.test(t)
    || (/^(응|네|예|그래|맞아|맞아요|맞습니다|좋아|오케이|오케|등록)$/.test(t));
  // ★ v21: 거절·불평(짧고 상품/수량 없음)은 이름/상품으로 해석하지 않고 되묻기만
  if(!wantsRegister && /아니|아냐|틀려|틀렸|그게아니|잘못|왜.*안|안듣|안들|이상한|계속.*말/.test(t)
     && !hasProd && !weightIn(text) && !/\d/.test(t) && !parseDate(text, today)){
    return { draft:d, reply:'어느 부분을 고칠까요? 상품·수량·발송일을 말씀하시고, 그만하려면 취소라고 하세요.' };
  }

  // ★ v21: 보수적 파싱 — 명확한 주문 요소만 반영. 잡담·불평은 주문에 안 넣음.
  let captured=false; const removedIds=new Set();
  const nm=findKnownNameIn(text, customers, vendors, products);
  if(nm){ const mp=matchPerson(nm,customers,vendors); d.name=mp.name; if(mp.phone)d.phone=mp.phone; if(mp.address)d.address=mp.address; d.customerId=mp.customerId||null; if(mp.vendorId)d.vendorId=mp.vendorId; captured=true; }

  if(/빼|삭제|제외|없애/.test(t)){
    for(const p of (products||[])) if(p&&p.name&&t.includes(p.name.replace(/\s/g,''))){ d.items=d.items.filter(it=>it.productId!==p.id); removedIds.add(p.id); captured=true; }
    for(let i=d.items.length-1;i>=0;i--){ const it=d.items[i]; if(!it.productId && it.name && t.includes(it.name.replace(/\s/g,''))){ d.items.splice(i,1); captured=true; } }
  }
  // ★ v22: 이름을 제거한 텍스트에서 여러 상품을 한 번에 추출 (한 문장에 여러 품목)

      else { const ex=d.items.find(x=>x.productId==null && x.name===it.name); if(ex)ex.qty=it.qty; else d.items.push(it); }

  if(wantsRegister && !captured){
    if(!d.name) return { draft:d, reply:'누구 주문인지 먼저 말씀해 주세요.' };
    if(!d.items.length) return { draft:d, reply:'상품을 먼저 말씀해 주세요.' };

// ═══ v24: 음성 "묶음 배송" — 대화로 상품을 박스로 나누기 ═══
// 무게·숫자 뺀 핵심 이름 (매칭용)
function bundleCoreName(s){ return (s||'').replace(new RegExp(WEIGHT_RE,'g'),'').replace(/[0-9]/g,'').replace(/\s/g,'').trim(); }
// "묶음 배송" 의도인지 (개수 단위 '2박스'와 헷갈리지 않게 '묶음/묶어/따로보내' 위주로만)
function isBundleIntent(text){
  const t=(text||'').replace(/\s/g,'');
  return /묶음|묶어|따로보내|따로배송|따로담|따로포장|나눠서보내|나눠서배송|부분묶|전체묶|자동묶|각각따로|각각포장|개별포장|개별배송|박스로나눠|박스나눠|박스를나눠/.test(t);
}
// 묶음 방식 명령 (전체/각각/자동)
function bundleModeFrom(text){
  const t=(text||'').replace(/\s/g,'');
  if(/각각따로|각각포장|개별포장|개별배송|따로따로|하나씩따로|상품마다따로|낱개로|각각배송/.test(t)) return 'each';
  if(/자동묶|자동으로묶|알아서묶|자동배송으로|자동으로나눠/.test(t)) return 'auto';
  // 전체 = "전부/다/모두/전체/한번에/합쳐" 같은 '전부' 뜻이 함께 있을 때만 (그냥 'A B 한 박스'와 구별)
  if(/전체묶음|전부한박스|전부한|다한박스|모두한박스|전부같이|다같이|모두같이|한번에보내|한번에담|합쳐서|전부합|모두합|다합쳐/.test(t)) return 'all';

}
// 명시적 묶음 파싱: "샐러드랑 로메인 한 박스, 루꼴라 크리스탈벨 한 박스"
//  items: 초안 상품들 [{productId,name,qty}] → { mode:'explicit', boxes:[[key,...],...] }
function parseBundleUtterance(text, items){
  const mode=bundleModeFrom(text);
  if(mode) return { mode };
  const keyOf=it=>it.productId||it.name;
  // 박스 경계로 자름
  const segs=(text||'').split(/한?\s*박스|한?\s*통|한?\s*상자|묶음|묶어서|묶어|따로/).map(s=>s.trim()).filter(Boolean);
  const used=new Set(); const boxes=[];
  for(const seg of segs){
    const cands=seg.split(/랑|이랑|하고|그리고|과|와|및|또|플러스|,|\//).map(s=>bundleCoreName(s)).filter(s=>s.length>=1);
    const grp=[];
    for(const cand of cands){
      let best=null;
      for(const it of items){ const k=keyOf(it); if(used.has(k)) continue; const core=bundleCoreName(it.name); if(core && (core.includes(cand)||cand.includes(core))){ best=k; break; } }
      if(!best){ for(const it of items){ const k=keyOf(it); if(used.has(k)) continue; const core=bundleCoreName(it.name); if(core && simJamo(cand,core)>=0.6){ best=k; break; } } }
      if(best){ grp.push(best); used.add(best); }
    }
    if(grp.length) boxes.push(grp);
  }
  if(!boxes.length){
    // 상품 이름을 못 잡았지만 "한 박스/같이/합쳐" 뜻이면 전체 한 박스
    if(/한박스|한통|한상자|같이보내|합쳐|다보내/.test((text||'').replace(/\s/g,''))) return { mode:'all' };
    return null;
  }
  return { mode:'explicit', boxes };
}
// 묶음 계획 → 박스별 items 배열. 안 묶인 상품은 개별(1박스)로.
function buildBoxItems(items, plan){
  const all=(items||[]).map(it=>({...it}));
  if(!plan) return [{ items: all }];
  if(plan.mode==='all') return [{ items: all }];
  // ★ v39: '따로따로/낱개로' = 낱개 1개씩 개별 박스 (단일 상품 다수량도 수량만큼 박스로 분리)
  if(plan.mode==='each') return all.flatMap(it=>Array.from({length:Math.max(1,Number(it.qty)||1)},()=>({ items:[{ ...it, qty:1 }] })));
  if(plan.mode==='explicit' && plan.boxes && plan.boxes.length){
    const keyOf=it=>it.productId||it.name;
    const boxes=plan.boxes.map(keys=>({ items: all.filter(it=>keys.includes(keyOf(it))) })).filter(b=>b.items.length);
    const assigned=new Set(plan.boxes.flat());
    all.forEach(it=>{ if(!assigned.has(keyOf(it))) boxes.push({ items:[it] }); });
    return boxes.length?boxes:[{ items: all }];
  }
  return [{ items: all }];
}
// 묶음 계획 읽어주기
function bundleReadback(boxList){
  if(!boxList||boxList.length<=1) return '한 박스로 보낼게요';
  return boxList.map((b,i)=>`${i+1}번 박스: ${b.items.map(it=>it.name).join(', ')}`).join(' / ');
}


function won(n) {
  // ★ 방어: 값이 없거나 숫자가 아니면 0원 (상품 삭제·가격 누락 시 화면 크래시 방지)

// ── 박스 포장 규칙 ──
// 상품명에서 무게를 읽어 "소포장(500g/800g/1kg)" 또는 "큰박스(2kg)"로 분류
function boxCategory(productName) {
  const s = (productName || "").replace(/\s/g, "").toLowerCase();
  // 2kg 이상은 큰박스
  if (/(2kg|2\.0kg|3kg|2킬로)/.test(s)) return "large";
  // 500g/800g/1kg 류는 소포장
  if (/(500g|800g|1kg|1\.0kg|1킬로|750g|600g|700g|900g)/.test(s)) return "small";
  // 무게 표기가 없으면 소포장으로 간주
  return "small";
}

// 한 박스에 담긴 (카테고리, 개수)로 부피 계산
// 소포장: 1개→2, 2개→5 (한 박스 최대 2개)
// 큰박스: 1개→5, 2개→10 (한 박스 최대 2개)
function boxVolumeFor(category, count) {
  if (category === "large") {
    if (count <= 1) return 5;
    return 10; // 2개
  }
  // small
  if (count <= 1) return 2;
  return 5; // 2개
}

// 박스 내용물(items)로 부피 계산
function volumeForBoxItems(items, productMap) {
  let small = 0, large = 0;
  (items || []).forEach((it) => {
    const p = productMap[it.productId];
    const nm = p ? p.name : (it.name || "");
    if (boxCategory(nm) === "large") large += it.qty; else small += it.qty;
  });
  if (large > 0 && small === 0) return boxVolumeFor("large", large);
  if (small > 0 && large === 0) return boxVolumeFor("small", small);
  return Math.max(boxVolumeFor("large", large), boxVolumeFor("small", small));
}

// 주문 품목들을 박스 규칙으로 나눔 → 박스 배열 반환
// 각 박스: { category, items:[{productId,name,qty,price,unit}], volume }
// 소포장/큰박스 섞지 않음, 박스당 최대 2개(낱개 기준)
function splitIntoBoxes(items, productMap) {
  // 카테고리별로 낱개 단위 펼치기
  const units = { small: [], large: [] };
  items.forEach((it) => {
    const p = productMap[it.productId];
    const nm = p ? p.name : (it.name || "");
    const cat = boxCategory(nm);
    const one = { productId: it.productId, name: nm, price: it.price || (p ? (p.wholesalePrice || p.price) : 0), unit: p ? (p.unit || "kg") : (it.unit || "kg") };
    for (let i = 0; i < it.qty; i++) units[cat].push(one);
  });

  const boxes = [];
  ["small", "large"].forEach((cat) => {
    const arr = units[cat];
    for (let i = 0; i < arr.length; i += 2) {
      const chunk = arr.slice(i, i + 2); // 최대 2개
      // 같은 상품끼리 묶어 items로
      const map = {};
      chunk.forEach((u) => {
        const key = u.productId || u.name;
        if (!map[key]) map[key] = { productId: u.productId, name: u.name, qty: 0, price: u.price, unit: u.unit };
        map[key].qty += 1;
      });
      boxes.push({ category: cat, items: Object.values(map), volume: boxVolumeFor(cat, chunk.length) });
    }
  });
  return boxes;
}

// OCR 정확도를 높이기 위한 사진 전처리: 확대 + 흑백 + 대비 강화
// 파일을 받아 보정된 canvas의 dataURL을 Promise로 반환
function preprocessForOcr(file) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = (ev) => {
      const img = new Image();
      img.onload = () => {
        try {
          // 가로 1600px 기준으로 확대(작은 글자 또렷하게), 너무 크면 유지
          const targetW = 1600;
          const scale = img.width < targetW ? (targetW / img.width) : 1;
          const w = Math.round(img.width * scale);
          const h = Math.round(img.height * scale);
          const canvas = document.createElement("canvas");
          canvas.width = w; canvas.height = h;
          const ctx = canvas.getContext("2d");
          ctx.drawImage(img, 0, 0, w, h);
          const imgData = ctx.getImageData(0, 0, w, h);
          const d = imgData.data;
          // 흑백 + 대비 강화(간단한 임계 보정)
          const contrast = 1.4; // 대비 계수
          const intercept = 128 * (1 - contrast);
          for (let i = 0; i < d.length; i += 4) {
            // 그레이스케일
            let gray = 0.299 * d[i] + 0.587 * d[i + 1] + 0.114 * d[i + 2];
            // 대비 강화
            gray = gray * contrast + intercept;
            gray = gray < 0 ? 0 : (gray > 255 ? 255 : gray);
            d[i] = d[i + 1] = d[i + 2] = gray;
          }
          ctx.putImageData(imgData, 0, 0);
          resolve(canvas.toDataURL("image/jpeg", 0.92));
        } catch (e) {
          // 보정 실패 시 원본 사용
          resolve(ev.target.result);
        }
      };
      img.onerror = () => resolve(ev.target.result);
      img.src = ev.target.result;
    };
    reader.onerror = () => resolve(null);
    reader.readAsDataURL(file);
  });
}

function parseOrderMessage(text, products) {
  const result = { senderName: "", senderPhone: "", recipName: "", recipPhone: "", address: "", reserveDate: "", deliveryMessage: "", items: [] };
  if (!text) return result;

  const phones = [...text.matchAll(/01[016789][-\s]?\d{3,4}[-\s]?\d{4}/g)].map((m) => m[0].replace(/\s/g, ""));

  const senderNameM = text.match(/(?:보내는\s*분|주문자)\s*[:：]?\s*([가-힣]{2,4})/);
  const recipNameM = text.match(/받는\s*분\s*[:：]?\s*([가-힣]{2,4})/);
  const genericNameM = text.match(/(?:이름|성함)\s*[:：]?\s*([가-힣]{2,4})/);

  const senderPhoneM = text.match(/주문자\s*연락처\s*[:：]?\s*(01[016789][-\s]?\d{3,4}[-\s]?\d{4})/);
  const recipPhoneM = text.match(/받는\s*분\s*연락처\s*[:：]?\s*(01[016789][-\s]?\d{3,4}[-\s]?\d{4})/);

  let baseName = "";
  if (!senderNameM && !recipNameM && !genericNameM) {
    const lines = text.split("\n").map((l) => l.trim()).filter(Boolean);
    for (const line of lines) {
      const m = line.match(/^([가-힣]{2,4})(?:\s|님|입니다|,|$)/);
      if (m && !/주소|상품|연락처|전화|받는|보내는/.test(line)) {
        baseName = m[1];
        break;
      }
    }
  } else {
    baseName = (genericNameM && genericNameM[1]) || "";
  }

  result.senderName = (senderNameM && senderNameM[1]) || baseName;
  result.recipName = (recipNameM && recipNameM[1]) || result.senderName;
  result.senderPhone = (senderPhoneM && senderPhoneM[1].replace(/\s/g, "")) || phones[0] || "";
  result.recipPhone = (recipPhoneM && recipPhoneM[1].replace(/\s/g, "")) || phones[1] || result.senderPhone;

  const addrLabelMatch = text.match(/(?:받는\s*분\s*)?주소\s*[:：]?\s*(.+)/);
  if (addrLabelMatch) {
    result.address = addrLabelMatch[1].split(/[,\n]/)[0].trim();
  } else {
    const addrLineMatch = text.match(/[가-힣]+(?:시|도)\s?[가-힣]+(?:시|군|구)?\s?[가-힣0-9\-\s]+(?:동|로|길)[가-힣0-9\-\s]*/);
    if (addrLineMatch) result.address = addrLineMatch[0].trim();
  }

  const reserveM = text.match(/예약\s*(?:주문일|발송일)?\s*[:：]?\s*(\d{4}[-./]\d{1,2}[-./]\d{1,2})/);
  if (reserveM) result.reserveDate = reserveM[1].replace(/[./]/g, "-");

  const msgM = text.match(/(?:배송\s*메시지|요청사항)\s*[:：]?\s*(.+)/);
  if (msgM) result.deliveryMessage = msgM[1].split("\n")[0].trim();

  // 상품 매칭: 공백을 무시하고, 긴 상품명부터 검사해서 중복 매칭을 피한다.
  // 수량은 상품명 뒤(아메리카노 2개 / x2 / 두 개 / 2박스) 또는 앞(2 아메리카노)에서 읽는다.
  const squish = (s) => s.replace(/\s+/g, "");
  const textSquished = squish(text);
  const matchedRanges = []; // 이미 매칭된 구간(원문 인덱스)을 기록해 중복 방지
  const QTY_WORD = "한|두|세|네|다섯|여섯|일곱|여덟|아홉|열";

  // 긴 이름이 짧은 이름을 포함하는 경우를 막기 위해 이름 길이 내림차순 정렬
  const sortedProducts = [...products].sort((a, b) => squish(b.name).length - squish(a.name).length);

  sortedProducts.forEach((p) => {
    const nameSq = squish(p.name);
    if (!nameSq) return;
    const idxSq = textSquished.indexOf(nameSq);
    if (idxSq === -1) return;

    // 공백 제거 인덱스를 원문 인덱스로 환산
    let realIdx = 0, seen = 0;
    for (let i = 0; i < text.length; i++) {
      if (!/\s/.test(text[i])) {
        if (seen === idxSq) { realIdx = i; break; }
        seen++;
      }
    }
    // 이미 더 긴 상품으로 매칭된 구간 안이면 건너뜀
    if (matchedRanges.some((r) => realIdx >= r.start && realIdx < r.end)) return;

    const tail = text.slice(realIdx + p.name.length, realIdx + p.name.length + 14);
    const head = text.slice(Math.max(0, realIdx - 6), realIdx);
    let qty = 1;
    // 뒤쪽 우선: "2개", "x2", "2박스", "2 개", "두 개"
    const tailNum = tail.match(/\s*[xX×*]?\s*(\d+)\s*(?:개|박스|병|봉|세트|팩|kg|키로)?/);
    const tailWord = tail.match(new RegExp("\\s*(" + QTY_WORD + ")\\s*(?:개|박스|병|봉|세트|팩)"));
    // 앞쪽: "2 아메리카노"
    const headNum = head.match(/(\d+)\s*(?:개|박스|병|봉|세트|팩)?\s*$/);
    if (tailWord) qty = NUM_WORDS[tailWord[1]] || 1;
    else if (tailNum && tailNum[1]) qty = parseInt(tailNum[1], 10);
    else if (headNum && headNum[1]) qty = parseInt(headNum[1], 10);

    result.items.push({ productId: p.id, qty });
    matchedRanges.push({ start: realIdx, end: realIdx + p.name.length });
  });

  return result;
}

function buildGeminiKeyPool(primaryKey) {
  const pool = [];
  const add = (k) => { const t = (k || "").trim(); if (t && t !== "undefined" && !pool.includes(t)) pool.push(t); };

  return pool;
}
function geminiCooldownRemaining(key) {
  const t = _geminiCooldownUntil[key];
  if (!t) return 0;
  const rem = Math.ceil((t - Date.now()) / 1000);
  return rem > 0 ? rem : 0;
}

let _geminiModelCache = null;

async function getGeminiModel(apiKey) {
  if (_geminiModelCache && _geminiModelCacheKey === apiKey) return _geminiModelCache;
  const preferred = ["gemini-2.5-flash", "gemini-2.0-flash", "gemini-2.5-pro", "gemini-1.5-flash", "gemini-1.5-pro"];
  try {
    const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`);
    if (!r.ok) { _geminiModelCache = "gemini-2.0-flash"; _geminiModelCacheKey = apiKey; return _geminiModelCache; }
    const data = await r.json();
    const names = (data.models || [])
      .filter(m => (m.supportedGenerationMethods || []).includes("generateContent"))
      .map(m => m.name.replace("models/", ""));
    for (const p of preferred) {
      const found = names.find(n => n.startsWith(p));
      if (found) { _geminiModelCache = found; _geminiModelCacheKey = apiKey; return found; }
    }
    _geminiModelCache = names[0] || "gemini-2.0-flash";
    _geminiModelCacheKey = apiKey;

  } catch { return "gemini-2.0-flash"; }
}

  "reserveDate":     { "value": "", "confidence": "high" },
  "items": [{ "name": "상품명", "qty": 1, "confidence": "high", "note": "" }],
  "overallNote": ""
}`;

  const res = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`,
    {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        contents: [{ parts: [{ text: prompt }] }],
        generationConfig: { temperature: 0.1 },
      }),
    }
  );
  if (!res.ok) {
    const e = await res.json().catch(() => ({}));
    const detail = e.error?.message || "";
    if (res.status === 400) throw new Error("API 키 또는 모델 오류\n상세: " + detail);
    if (res.status === 429) throw new Error("요청 한도 초과 (HTTP 429)\n모델: " + model + "\n상세: " + detail + "\n→ 잠시 후 다시 시도해주세요.");
    if (res.status === 403) throw new Error("API 키 권한 없음 (HTTP 403)\n상세: " + detail);
    throw new Error(`Gemini 오류 (HTTP ${res.status})\n상세: ` + detail);
  }
  const data = await res.json();
  const raw = data.candidates?.[0]?.content?.parts?.[0]?.text || "";
  if (!raw) throw new Error("AI 응답이 비어있습니다. 다시 시도해주세요.");
  try { return JSON.parse(raw); } catch {
    const m = raw.match(/```(?:json)?\s*([\s\S]*?)```/) || raw.match(/(\{[\s\S]*\})/);
    if (!m) throw new Error("AI 응답 파싱 실패");
    return JSON.parse(m[1] || m[0]);
  }
}

    {level === "high" ? "✓ " : level === "low" ? "❗ " : "~ "}{c.label}
  </span>;

function AiFieldRow({ meta, data, confirmed, onConfirm, onEdit }) {
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState(data.value || "");
  const inputRef = useRef();
  useEffect(() => setDraft(data.value || ""), [data.value]);
  useEffect(() => { if (editing) inputRef.current?.focus(); }, [editing]);
  const conf = data.confidence || "low";
  const val = (data.value || "").trim();
  const isEmpty = !val;
  const needsAct = conf !== "high" || (isEmpty && meta.required);
  const isAlert = isEmpty && meta.required;
  const borderC = confirmed ? "#7DB85A" : isAlert || conf === "low" ? "#D97B6C" : conf === "medium" ? "#D4A84B" : "#D3D1C7";
  const bgC = confirmed ? "#F4FAF0" : isAlert || conf === "low" ? "#FDF0EE" : conf === "medium" ? "#FEF9F0" : "#fff";
  const save = () => { onEdit(draft.trim()); setEditing(false); };
  return (
    <div style={{ border: `1.5px solid ${borderC}`, borderRadius: 8, padding: "8px 10px", marginBottom: 6, background: bgC }}>
      <div style={{ display: "flex", alignItems: "center", gap: 5, marginBottom: editing ? 6 : 0 }}>
        <span style={{ fontSize: 11, color: "#666", minWidth: 80, flexShrink: 0 }}>{meta.label}</span>
        <AiConfBadge level={conf} />
        {confirmed && !editing && <span style={{ fontSize: 13, color: "#27500A", fontWeight: 900 }}>✓</span>}
        <span style={{ flex: 1 }} />
        <button onClick={() => { setDraft(data.value || ""); setEditing(!editing); }} style={{ fontSize: 10, padding: "1px 7px", borderRadius: 5, border: "1px solid #ccc", background: "#fff", color: "#555", cursor: "pointer" }}>{editing ? "취소" : "수정"}</button>
      </div>
      {editing && (
        <div style={{ display: "flex", gap: 5 }}>
          <input ref={inputRef} value={draft} onChange={e => setDraft(e.target.value)} onKeyDown={e => { if (e.key === "Enter") save(); if (e.key === "Escape") { setDraft(data.value || ""); setEditing(false); } }}
            style={{ flex: 1, padding: "5px 8px", borderRadius: 6, border: "1px solid #aaa", fontSize: 13 }} />
          <button onClick={save} style={{ padding: "5px 11px", borderRadius: 6, border: "none", background: "#2F6F4E", color: "#fff", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>저장</button>
        </div>
      )}
      {!editing && (
        <div style={{ display: "flex", alignItems: "center", gap: 6, marginTop: 3 }}>
          <span style={{ flex: 1, fontSize: 14, color: isEmpty ? "#bbb" : "#111", fontWeight: isEmpty ? 400 : 500 }}>
            {isEmpty ? (meta.required ? "⚠️ 입력 필요" : "(없음)") : val}
          </span>
          {needsAct && !confirmed && (
            <button onClick={isEmpty ? () => setEditing(true) : onConfirm} style={{ fontSize: 11, padding: "3px 10px", borderRadius: 6, border: "none", fontWeight: 700, background: isAlert || conf === "low" ? "#D97B6C" : "#D4A84B", color: "#fff", cursor: "pointer" }}>
              {isEmpty ? "입력하기" : "확인 ✓"}
            </button>
          )}
        </div>
      )}
    </div>
  );
}

function AiItemRow({ item, confirmed, onUpdate, onRemove, onConfirm }) {
  const [editing, setEditing] = useState(false);
  const [name, setName] = useState(item.name);
  const [qty, setQty] = useState(String(item.qty));

  const borderC = confirmed ? "#7DB85A" : conf === "low" ? "#D97B6C" : conf === "medium" ? "#D4A84B" : "#D3D1C7";
  const bgC = confirmed ? "#F4FAF0" : conf === "low" ? "#FDF0EE" : conf === "medium" ? "#FEF9F0" : "#fff";
  const save = () => { onUpdate({ ...item, name: name.trim(), qty: Math.max(1, parseInt(qty) || 1) }); setEditing(false); };
  return (
    <div style={{ border: `1.5px solid ${borderC}`, borderRadius: 7, padding: "7px 9px", marginBottom: 5, background: bgC }}>

          <button onClick={() => { setName(item.name); setQty(String(item.qty)); setEditing(false); }} style={{ padding: "5px 7px", borderRadius: 5, border: "1px solid #ccc", background: "#fff", fontSize: 11, cursor: "pointer" }}>취소</button>
        </div>
      ) : (
        <>
          <div style={{ display: "flex", alignItems: "center", gap: 6 }}>

            <span style={{ fontSize: 12, color: "#555" }}>{item.qty}개</span>

              : conf !== "high" && <button onClick={onConfirm} style={{ fontSize: 10, padding: "2px 7px", borderRadius: 5, border: "none", background: conf === "low" ? "#D97B6C" : "#D4A84B", color: "#fff", fontWeight: 700, cursor: "pointer" }}>확인</button>}
            <button onClick={() => setEditing(true)} style={{ fontSize: 10, padding: "2px 7px", borderRadius: 5, border: "1px solid #ccc", background: "#fff", color: "#555", cursor: "pointer" }}>수정</button>

}

function AiConfirmModal({ result, products, onApply, onClose }) {
  const [fields, setFields] = useState(() => {
    const f = {};
    AI_FIELDS.forEach(({ key }) => { f[key] = result[key] || { value: "", confidence: "low" }; });
    return f;
  });
  const [items, setItems] = useState(result.items || []);
  const [confirmedFields, setConfirmedFields] = useState(() => {
    const c = {};
    AI_FIELDS.forEach(({ key }) => { if ((result[key]?.confidence || "low") === "high") c[key] = true; });
    return c;
  });
  const [confirmedItems, setConfirmedItems] = useState(() => {
    const c = {};
    (result.items || []).forEach((it, i) => { if ((it.confidence || "low") === "high") c[i] = true; });
    return c;
  });
  const [showAdd, setShowAdd] = useState(false);
  const [addName, setAddName] = useState("");
  const [addQty, setAddQty] = useState("1");

  const editField = (key, val) => { setFields(f => ({ ...f, [key]: { ...f[key], value: val } })); setConfirmedFields(c => ({ ...c, [key]: true })); };
  const confirmField = (key) => setConfirmedFields(c => ({ ...c, [key]: true }));
  const updateItem = (i, it) => { setItems(p => p.map((x, idx) => idx === i ? it : x)); setConfirmedItems(c => ({ ...c, [i]: true })); };
  const removeItem = (i) => {
    setItems(p => p.filter((_, idx) => idx !== i));
    setConfirmedItems(c => { const n = {}; Object.entries(c).forEach(([k, v]) => { const ki = parseInt(k); if (ki < i) n[ki] = v; else if (ki > i) n[ki - 1] = v; }); return n; });
  };
  const confirmItem = (i) => setConfirmedItems(c => ({ ...c, [i]: true }));
  const addItem = () => {
    if (!addName.trim()) return;
    const idx = items.length;
    setItems(p => [...p, { name: addName.trim(), qty: Math.max(1, parseInt(addQty) || 1), confidence: "high", note: "" }]);
    setConfirmedItems(c => ({ ...c, [idx]: true }));
    setAddName(""); setAddQty("1"); setShowAdd(false);
  };

  const pendingF = AI_FIELDS.filter(({ key, required }) => {
    const f = fields[key] || { value: "", confidence: "low" };
    // 필수 항목이고 값이 비어있으면 확인 필요
    if (required && !(f.value || "").trim()) return true;
    // 선택 항목이고 값이 비어있으면 확인 불필요 (그냥 빈 값으로 적용)
    if (!required && !(f.value || "").trim()) return false;
    // 신뢰도 high면 확인 불필요
    if ((f.confidence || "low") === "high") return false;
    // 이미 확인한 항목
    if (confirmedFields[key]) return false;
    return true;
  });
  const pendingI = items.filter((it, i) => (it.confidence || "low") !== "high" && !confirmedItems[i]);
  const pendingCount = pendingF.length + pendingI.length;
  const allOk = pendingCount === 0 && items.length > 0;

  const handleApply = () => {
    const f = {};
    AI_FIELDS.forEach(({ key }) => { f[key] = (fields[key]?.value || "").trim(); });
    onApply({ ...f, items });
  };

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.5)", zIndex: 500, display: "flex", alignItems: "flex-end" }} onClick={e => e.target === e.currentTarget && onClose()}>
      <div style={{ background: "#fff", borderRadius: "16px 16px 0 0", width: "100%", maxWidth: 640, margin: "0 auto", maxHeight: "90vh", overflowY: "auto", padding: "20px 16px 40px" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
          <div>
            <div style={{ fontWeight: 700, fontSize: 16, color: "#2F6F4E" }}>🤖 AI 분석 결과</div>
            <div style={{ fontSize: 11, color: "#888", marginTop: 2 }}>확인 후 주문서에 적용하세요</div>
          </div>
          <button onClick={onClose} style={{ fontSize: 22, background: "none", border: "none", color: "#888", cursor: "pointer", lineHeight: 1 }}>×</button>
        </div>

        {result.overallNote && (
          <div style={{ background: "#FEF6E4", border: "1.5px solid #D4A84B", borderRadius: 8, padding: "9px 12px", marginBottom: 12, fontSize: 12, color: "#5C3808" }}>
            🤖 {result.overallNote}
          </div>
        )}
        {pendingCount > 0 && (
          <div style={{ background: "#FDF0EE", border: "1.5px solid #D97B6C", borderRadius: 8, padding: "9px 12px", marginBottom: 12, fontSize: 12, color: "#8A2010", fontWeight: 600 }}>
            ❗ {pendingCount}개 항목 확인 필요 {pendingF.length > 0 && `(${pendingF.map(f => f.label).join(", ")})`}
          </div>
        )}

        <div style={{ marginBottom: 14 }}>
          {AI_FIELDS.map(meta => (
            <AiFieldRow key={meta.key} meta={meta}
              data={fields[meta.key] || { value: "", confidence: "low" }}
              confirmed={!!confirmedFields[meta.key]}
              onConfirm={() => confirmField(meta.key)}
              onEdit={val => editField(meta.key, val)}
            />
          ))}
        </div>

        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
          <span style={{ fontWeight: 700, fontSize: 13, color: "#333" }}>🛒 주문 상품</span>
          <button onClick={() => setShowAdd(p => !p)} style={{ fontSize: 11, padding: "3px 9px", borderRadius: 6, border: "1.5px solid #2F6F4E", background: showAdd ? "#2F6F4E" : "#fff", color: showAdd ? "#fff" : "#2F6F4E", fontWeight: 700, cursor: "pointer" }}>+ 추가</button>
        </div>
        {items.length === 0 && !showAdd && (
          <div style={{ padding: 12, textAlign: "center", fontSize: 12, color: "#9A3020", border: "1.5px dashed #D97B6C", borderRadius: 8, background: "#FDF0EE", marginBottom: 8 }}>
            ❗ 상품을 찾지 못했습니다 — 직접 추가해주세요
          </div>
        )}
        {items.map((item, i) => (
          <AiItemRow key={i} item={item} confirmed={!!confirmedItems[i]}
            onUpdate={it => updateItem(i, it)} onRemove={() => removeItem(i)} onConfirm={() => confirmItem(i)} />
        ))}
        {showAdd && (
          <div style={{ display: "flex", gap: 5, padding: "9px 10px", background: "#E6F1E9", borderRadius: 8, marginBottom: 8 }}>
            <input value={addName} onChange={e => setAddName(e.target.value)} placeholder="상품명" autoFocus
              style={{ flex: 2, padding: "6px 8px", borderRadius: 6, border: "1px solid #ccc", fontSize: 12 }} />
            <input value={addQty} onChange={e => setAddQty(e.target.value)} type="number" min="1" placeholder="수량"
              style={{ width: 52, padding: "6px 6px", borderRadius: 6, border: "1px solid #ccc", fontSize: 12 }} />
            <button onClick={addItem} style={{ padding: "6px 10px", borderRadius: 6, border: "none", background: "#2F6F4E", color: "#fff", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>추가</button>
            <button onClick={() => setShowAdd(false)} style={{ padding: "6px 7px", borderRadius: 6, border: "1px solid #ccc", background: "#fff", fontSize: 11, cursor: "pointer" }}>취소</button>
          </div>
        )}

        <div style={{ display: "flex", gap: 8, marginTop: 18 }}>
          <button onClick={onClose} style={{ flex: 1, padding: 12, borderRadius: 10, border: "1px solid #ccc", background: "#fff", fontSize: 14, fontWeight: 600, cursor: "pointer" }}>취소</button>
          <button onClick={handleApply} disabled={!allOk}
            style={{ flex: 2, padding: 12, borderRadius: 10, border: "none", background: allOk ? "#2F6F4E" : "#9BB5A8", color: "#fff", fontSize: 14, fontWeight: 700, cursor: allOk ? "pointer" : "not-allowed" }}>
            {allOk ? "✅ 주문서에 적용" : `⏳ ${pendingCount}개 확인 필요`}
          </button>
        </div>
      </div>
    </div>
  );
}

    "   - qty는 수량+단위(예:'2박스'). note는 배송메모/특이사항.",
    '4) 기타 제어: {"action":"CONTROL","command":"close"|"reset"}',
    "   - 닫기/뒤로/그만/설정 닫기/창 닫기 → close",
    "   - 초기화/취소/폼 비우기/새로 시작/검색 지워 → reset",

    "",
    "[오인식 보정] 발음이 뭉개졌으면 아래 등록 목록에서 가장 비슷한 이름으로 교정한다.",
    "등록 상품: " + (productNames.length ? productNames.join(", ") : "(없음)"),
    "등록 고객·거래처: " + (personNames.length ? personNames.join(", ") : "(없음)"),
    "현재 화면(참고): " + (currentTab || "(모름)"),
    "",
    '위 4가지 어디에도 해당하지 않으면 {"action":"UNKNOWN"} 를 출력한다. 반드시 JSON 하나만.',

  const body = {
    systemInstruction: { parts: [{ text: systemPrompt }] },
    contents: [{ role: "user", parts: [{ text: '사용자 음성: "' + text + '"' }] }],
    generationConfig: { temperature: 0, responseMimeType: "application/json" },
  };
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeoutMs);
  let data;
  try {
    const res = await fetch("https://generativelanguage.googleapis.com/v1beta/models/" + model + ":generateContent?key=" + apiKey,
      { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body), signal: controller.signal });
    if (!res.ok) { const t = await res.text().catch(() => ""); throw new Error("Gemini " + res.status + ": " + t.slice(0, 200)); }

  const rawJson = (data && data.candidates && data.candidates[0] && data.candidates[0].content &&

}
function safeParseVoiceJson(s){ if(!s)return null; let t=String(s).trim().replace(/^\x60{3}(?:json)?/i,"").replace(/\x60{3}$/,"").trim();
  try{return JSON.parse(t)}catch(e){} const a=t.indexOf("{"),b=t.lastIndexOf("}");
  if(a!==-1&&b!==-1&&b>a){try{return JSON.parse(t.slice(a,b+1))}catch(e){}} return null; }
function normalizeVoiceCommand(obj, rawText){ const fail={action:"UNKNOWN",raw:rawText};
  if(!obj||typeof obj!=="object")return fail; const action=String(obj.action||"").toUpperCase(); const str=(v)=>v==null?"":String(v).trim();
  if(action==="NAVIGATE"){const target=["orders","new","customers","settings"].includes(obj.target)?obj.target:null; return target?{action:"NAVIGATE",target}:fail;}
  if(action==="SEARCH"){const keyword=str(obj.keyword); return keyword?{action:"SEARCH",keyword}:fail;}
  if(action==="CREATE_ORDER"){const p=obj.payload||{}; const payload={name:str(p.name),product:str(p.product),qty:str(p.qty),note:str(p.note)};
    if(!payload.product&&!payload.name)return fail; return {action:"CREATE_ORDER",payload};}
  if(action==="ADD_TO_ORDER"){const p=obj.payload||{}; const payload={name:str(p.name),product:str(p.product),qty:str(p.qty),note:str(p.note)};
    if(!payload.name||!payload.product)return fail; return {action:"ADD_TO_ORDER",payload};}
  if(action==="CONTROL"){const command=["close","reset"].includes(String(obj.command||"").toLowerCase())?String(obj.command).toLowerCase():null; return command?{action:"CONTROL",command}:fail;}
  if(action==="BUNDLE_ORDERS"||action==="PARTIAL_BUNDLE"){ return { action, name:str(obj.name), products:Array.isArray(obj.products)?obj.products.map(str).filter(Boolean):[] }; }
  if(action==="REBUNDLE_ONE"){ const mode=["all","auto","open"].includes(obj.mode)?obj.mode:"open"; return { action, mode, name:str(obj.name) }; }
  if(action==="EDIT_ORDER"){ return { action, name:str(obj.name), raw:rawText }; }
  if(action==="REMOVE_FROM_ORDER"){ return { action, name:str(obj.name), raw:rawText }; }
  if(action==="UNDO_LAST"){ return { action }; }
  if(action==="CONFIRM_DELIVERY"){ return { action, raw:rawText }; }
  return fail; }

/* ===== 로컬(규칙 기반) 음성 명령 분석 — Gemini 키가 없거나 호출 실패 시 폴백 =====
 * 인터넷/키 없이도 화면이동·검색·주문폼·닫기/초기화가 즉시 동작하게 함. 같은 JSON 규격 반환. */
function localParseVoiceCommand(rawText, ctx = {}) {
  const raw = String(rawText || "").trim();
  const t = raw.replace(/\s/g, "");
  if (!t) return { action: "UNKNOWN", raw: "" };
  const { products = [], customers = [], vendors = [] } = ctx;
  const toNames = (arr) => (arr || []).map((x) => (typeof x === "string" ? x : x && x.name)).filter(Boolean);
  const productNames = toNames(products);
  const personNames = [...toNames(customers), ...toNames(vendors)];
  const tryMatch = (text, list) => { try { return (typeof matchName === "function") ? matchName(text, list) : ""; } catch (e) { return ""; } };

  // 4) 기타 제어
  if (/(초기화|비워|지워|리셋|새로시작|다시시작|폼비워)/.test(t)) return { action: "CONTROL", command: "reset" };
  if (/(닫아|닫기|닫아줘|뒤로|나가기|그만|메뉴닫)/.test(t) && !/주문|고객|검색/.test(t)) return { action: "CONTROL", command: "close" };

  // 1) 화면 이동 (구체적인 것부터)
  if (/(설정|환경설정|메뉴열|에이아이설정|ai설정)/i.test(t)) return { action: "NAVIGATE", target: "settings" };
  if (/(새주문|주문입력|주문작성|주문쓰|주문넣는화면|주문화면열)/.test(t)) return { action: "NAVIGATE", target: "new" };
  if (/(주문목록|주문내역|주문현황|주문보여|주문리스트|주문확인|주문조회|발송목록|발송현황)/.test(t)) return { action: "NAVIGATE", target: "orders" };
  if (/(고객관리|고객목록|고객명단|고객보여|고객리스트|거래처관리|거래처목록|고객화면)/.test(t)) return { action: "NAVIGATE", target: "customers" };

  // #2.4 실수 복구 — "되돌려 / 방금 거 취소 / 마지막 주문 취소 / 방금 전으로" (주문 취소·삭제보다 먼저 판별)
  if (/(되돌려|되돌리|되돌릴|방금전으로|방금꺼로|방금거취소|방금꺼취소|방금취소|방금주문취소|방금등록취소|방금한거취소|방금수정취소|방금삭제취소|마지막주문취소|마지막주문삭제|마지막취소|아까한거취소|취소했던걸로|실수했어|실수했다|잘못했어)/.test(t)) {
    return { action: "UNDO_LAST" };
  }

  // #2.5 단일 주문의 발송 박스(묶음) 재구성 — "이 주문 한 박스로", "자동 묶음으로", "따로따로 보내", "묶음 수정"
  const boxEditIntent = /(묶음수정|묶음편집|묶음바꿔|묶음다시|박스수정|박스편집|박스바꿔|박스다시|박스나눠|한박스|한상자|하나로묶|하나로합|다같이한|자동묶음|따로따로|따로보내|개별발송|개별로보|낱개로)/.test(t);
  if (boxEditIntent) {
    let mode = "open";
    if (/(한박스|한상자|하나로묶|하나로합|다같이한|전부한|모두한|전체한)/.test(t)) mode = "all";
    else if (/(자동묶음|따로따로|따로보내|개별발송|개별로|낱개로|박스나눠|나눠서보)/.test(t)) mode = "auto";
    const nameHit = tryMatch(raw, personNames) || "";
    return { action: "REBUNDLE_ONE", mode, name: nameHit, raw };
  }

  // #2.55 배송 도착 확인 — "대솔본점 7월 2일 도착 확인 해줘", "하레하레 배송완료 처리"
  if (/(도착확인|도착했|도착처리|배송완료처리|배송완료로|받은걸로|받았다고)/.test(t) || (/도착/.test(t) && /확인/.test(t))) {
    return { action: "CONFIRM_DELIVERY", raw };
  }

  // #2.6 기존 주문 열어 수정 — "배솔수곡점 주문 수정", "하레하레 주문 고쳐줘/열어줘/바꿔줘"
  if (/(주문|오더).*(수정|고쳐|고칠|고치|바꿔|바꾸|변경|편집|열어|열자|불러|띄워)/.test(t)
      || /(수정|고쳐|고칠|편집)(해|하|해줘|해주세요)?$/.test(t)) {
    const nameHit = tryMatch(raw, personNames) || "";
    return { action: "EDIT_ORDER", name: nameHit, raw };
  }

  // #2.7 기존 주문에서 상품 빼기/삭제 — "채소 빼줘", "로메인 삭제", "홍길동 주문에서 소스 빼줘"
  if (/(빼|빼고|빼줘|빼주|삭제|제외|없애|지워)/.test(t)) {
    const nameHit = tryMatch(raw, personNames) || "";
    return { action: "REMOVE_FROM_ORDER", name: nameHit, raw };
  }

  // #2 기존 주문 묶음/부분묶음 배송 ("홍길동 주문 묶음배송", "카이피라랑 소스만 부분묶음")
  if (/(묶음|합배송|합쳐서)/.test(t) && /주문/.test(t)) {
    const isPartial = /(부분|일부|만|일부만)/.test(t);
    const nameHit = tryMatch(raw, personNames) || "";
    const coreOf = (s) => String(s).replace(new RegExp(WEIGHT_RE, "g"), "").replace(/\s/g, "");
    const prods = productNames.filter((n) => { const core = coreOf(n); return core && t.includes(core); });
    return { action: isPartial ? "PARTIAL_BUNDLE" : "BUNDLE_ORDERS", name: nameHit, products: prods, raw };
  }

  // 상품/수량 감지
  let prodHit = productNames.find((n) => n && t.includes(n.replace(/\s/g, "")));
  // ★ 찰떡 보정: 정확히 없으면 별칭·자모유사도로 등록 상품 추정 ("최소"→"채소", "가이피라"→"카이피라")
  if (!prodHit && typeof fuzzyProductMatch === "function") {
    const fz = fuzzyProductMatch(raw, products, 0.62);
    if (fz) prodHit = fz.name;
  }
  const qtyMatch = raw.match(/(\d+|한|두|세|네|다섯)\s*(박스|봉지|봉|팩|세트|개|근|망|단|포|상자|묶음|kg|킬로그램|킬로|키로그램|키로|g|그램)/);
  const hasOneWord = /(하나|한개|한 개|한개만|하나만)/.test(raw);   // "하나"=수량 1

  // 3) 신규 주문 폼 채우기 — 상품이 있거나 (수량/'하나' + 주문동사)
  if (prodHit || ((qtyMatch || hasOneWord) && /(주문|담아|넣어|받아|주세요|줘|시켜|추가|더)/.test(t))) {
    const nameHit = tryMatch(raw, personNames);
    let product = prodHit || "";
    if (!product && qtyMatch) {
      product = raw.replace(qtyMatch[0], " ")
        .replace(/(추가로|추가해줘|추가해|추가|더줘|더주문|더넣어|더넣|더담아|더담|더시켜|보태줘|보태|더|주문해줘|주문해|주문|담아줘|담아|넣어줘|넣어|받아줘|받아|주세요|줘|시켜줘|시켜)/g, " ")
        .replace(nameHit || "≈≈", " ").replace(/\s+/g, " ").trim();
    }
    // ★ #2 자동 묶음 전환: "추가/더/보태" 의도면 기존 주문에 합침(ADD_TO_ORDER), 아니면 새 주문(CREATE_ORDER)
    const addIntent = /(추가|더줘|더주문|더넣|더담|더시켜|보태|더받|더\s*주|한개더|하나더)/.test(t);
    const action = (addIntent && nameHit) ? "ADD_TO_ORDER" : "CREATE_ORDER";
    return { action, payload: { name: nameHit || "", product: product || (prodHit || ""), qty: qtyMatch ? qtyMatch[0] : (hasOneWord ? "1개" : ""), note: "" } };
  }

  // 2) 검색 — 찾아/검색/조회/보여 + 대상
  if (/(찾아|검색|조회|보여|알려)/.test(t)) {
    let kw = tryMatch(raw, [...personNames, ...productNames]);
    if (!kw) kw = raw.replace(/(좀|을|를|이|가|은|는|의|찾아줘|찾아|검색해줘|검색|조회해줘|조회|보여줘|보여주세요|보여|알려줘|알려|주문|고객)/g, "").trim();

  }

  // 이름만 말했으면 검색으로 처리
  const soloName = tryMatch(raw, personNames);
  if (soloName) return { action: "SEARCH", keyword: soloName };

  return { action: "UNKNOWN", raw };
}

/* ===== 고도화 헬퍼: 상품 퍼지매칭 · 동명이인 후보 · 선택 파싱 · 기존주문 묶음 ===== */
// #3 상품명 오인식 자동 매칭 ("가피라"→"카이피라")
/* 자주 잘못 들리는 발음 → 정식 상품 핵심명 (유사도로 못 잡는 하드 케이스 확실 교정). 필요시 계속 추가. */
const PRODUCT_ALIASES = {
  "채소": ["산체수", "산채수", "산채소", "산체소", "새채소", "새소", "채수", "체수", "쌈채", "쌈채소", "최소", "챗소", "상체수", "삼채수"],
  "카이피라": ["가피라", "카이빠라", "가이피라", "가이빠라", "카피라"],
  "루꼴라": ["루꼬라", "루콜라", "루꾸라", "루쿨라"],
  "로메인": ["로메인상추", "노메인"],
};

// ★ v41: 학습된 별칭(장기 기억) — 사용자가 "X를 Y로 기억해"라고 승인한 발음/줄임말을 localStorage에 저장.
//  { 발음(공백제거) : 상품 핵심명 } 형태. 고정 PRODUCT_ALIASES는 그대로 두고 여기에 '덧붙임'.
const LEARNED_ALIAS_KEY = "joassam_learned_aliases_v1";
let _learnedAliasCache = null;
function getLearnedAliases() {
  if (_learnedAliasCache) return _learnedAliasCache;
  try {

    _learnedAliasCache = raw ? JSON.parse(raw) : {};
  } catch (e) { _learnedAliasCache = {}; }

}
function learnAlias(from, to) {
  const f = String(from || "").replace(/\s/g, "").trim();
  const t = String(to || "").replace(/\s/g, "").trim();
  if (!f || !t || f === t) return false;
  const map = getLearnedAliases();
  map[f] = t;
  _learnedAliasCache = map;
  try { if (typeof localStorage !== "undefined") localStorage.setItem(LEARNED_ALIAS_KEY, JSON.stringify(map)); } catch (e) {}
  return true;
}
// ★ v48: 학습한 말 1건 삭제 (Memory Manager용). 성공 시 true.
function removeLearnedAlias(from) {
  const f = String(from || "").replace(/\s/g, "").trim();
  const map = getLearnedAliases();
  if (map[f] === undefined) return false;
  delete map[f];
  _learnedAliasCache = map;
  try { if (typeof localStorage !== "undefined") localStorage.setItem(LEARNED_ALIAS_KEY, JSON.stringify(map)); } catch (e) {}
  return true;
}
// "'청겨'를 '청겨자'로 기억해" / "청겨는 청겨자로 저장해" / "청겨 청겨자로 외워" → { from, to }
function parseTeachAlias(text) {
  const t = String(text || "").replace(/\s+/g, " ").trim();

  return /(오늘|지금).*(뭐부터|뭐해|뭐할|뭐하지|할일|할것|우선순위|우선|먼저|급한|정리|브리핑|업무)/.test(t)
    || /(뭐부터해|뭐부터하지|뭐부터할까|오늘할일|오늘뭐해|오늘뭐하지|할일알려|업무브리핑|오늘업무|오늘일정)/.test(t);
}
// ★ v47: 오늘 업무 우선순위 브리핑 생성 (읽기 전용 — 데이터 변경 없음). 항상 문자열 반환.
function buildDailyPlan(orders, subscriptions, todayISO) {
  const ords = orders || [];
  const isShipped = (o) => o.status === "shipped";
  const unshipped = ords.filter((o) => !isShipped(o));
  const todayReserve = unshipped.filter((o) => (o.reserveDate || "") === todayISO);
  const ready = ords.filter((o) => o.status === "ready");
  const noInvoice = unshipped.filter((o) => !(o.invoiceNo && String(o.invoiceNo).trim()));
  const waiting = ords.filter((o) => o.status === "waiting");
  const pending = ords.filter((o) => o.status === "pending");
  const todayNew = ords.filter((o) => (o.orderDate || o.createdAt || "").startsWith(todayISO)).length;
  const subsDue = (subscriptions || []).filter((s) => s && (s.nextDate || "") === todayISO).length;

  const tasks = [];
  if (todayReserve.length) tasks.push(`오늘 예약 발송이 ${todayReserve.length}건 있어요`);
  if (subsDue) tasks.push(`오늘 나갈 정기배송이 ${subsDue}건이에요`);
  if (ready.length) tasks.push(`발송 준비된 주문이 ${ready.length}건이라 송장 넣고 보내시면 돼요`);
  if (noInvoice.length) tasks.push(`송장 아직 안 넣은 주문이 ${noInvoice.length}건이에요`);
  if (waiting.length) tasks.push(`입금 대기 ${waiting.length}건 확인이 필요해요`);
  if (pending.length) tasks.push(`결제완료됐지만 아직 발송 안 한 주문이 ${pending.length}건이에요`);

  if (!tasks.length) {
    return todayNew ? `오늘 급한 발송·송장 일은 없어요. 오늘 새로 들어온 주문은 ${todayNew}건이에요.`
                    : "오늘은 발송·송장·입금 관련 급한 일이 없어요. 여유 있게 보셔도 되겠어요.";
  }
  const ordinals = ["첫째", "둘째", "셋째", "넷째", "다섯째", "여섯째"];
  const body = tasks.map((tk, i) => `${ordinals[i] || (i + 1) + "번째"}, ${tk}`).join(". ");
  const tail = todayNew ? ` 참고로 오늘 새 주문은 ${todayNew}건이에요.` : "";
  return `오늘 우선순위를 정리해 드릴게요. ${body}.${tail}`;
}

// ★ v52: 업체 주문용 단가 재계산 — 등록 상품은 업체단가(없으면 일반가격), 커스텀 상품은 그대로.
//  '공용 상품이 거래명세서에서 일반가격으로 새는' 문제를 막기 위해 업체 전환 시 사용.
function repriceItemsForBusiness(items, productMap) {
  return (items || []).map((it) => {
    const p = productMap && productMap[it.productId];
    return p ? { ...it, price: (p.wholesalePrice || p.price || 0) } : it;
  });
}

// ★ v57: 배송 상태 대화 조회 (읽기 전용) — "하레하레 배송 목록/현황", "대솔 본점 배송 어때"
//  특정 고객·업체의 발송 주문을 날짜별 배송중/배송완료로 알려줌. 이름을 못 찾으면 null(다른 핸들러로).
function _fmtMD(s) {
  const d = String(s || "").slice(0, 10).match(/(\d{4})-(\d{2})-(\d{2})/);
  return d ? `${+d[2]}월 ${+d[3]}일` : "";
}
function deliveryStatusAnswer(raw, data) {
  const t = String(raw || "").replace(/\s/g, "");
  if (!/(배송|도착|배달)/.test(t)) return null;
  const { orders = [], customers = [], vendors = [] } = data || {};
  const names = [...customers.map((c) => c && c.name).filter(Boolean), ...vendors.map((v) => v && v.name).filter(Boolean)];
  // 이름 찾기: 배송·조회 단어를 뺀 나머지로 부분일치(약어 "하레하레"→"하레하레베이커리카페"도 매칭), 실패 시 유사도
  const cand = t.replace(/(배송현황|배송상태|배송목록|배송|도착확인|도착|배달|목록|현황|상태|보여줘|보여주세요|보여|알려줘|알려|어때|어떻게|됐어|됐나|완료|리스트|줘|해줘|주세요|님|의|은|는|이|가|좀)/g, "");
  let name = "";
  for (const nm of names) { const nns = String(nm).replace(/\s/g, ""); if (nns.length >= 2 && cand.length >= 2 && (nns.includes(cand) || cand.includes(nns))) { name = nm; break; } }
  if (!name && typeof matchName === "function") name = matchName(raw, names);
  if (!name) return null; // 이름 없는 일반 배송 질문은 화면 이동 등 다른 핸들러가 처리
  const q = name.replace(/\s/g, "");
  const mine = (orders || []).filter((o) => o && o.status === "shipped" && orderRecipientName(o).replace(/\s/g, "").includes(q));
  if (!mine.length) return `${name} 님은 아직 발송(배송)된 주문이 없어요.`;
  const wantDone = /(완료|도착했|도착한|받았|받은)/.test(t) && !/(안|미|아직|중)/.test(t);
  const wantTransit = /(배송중|안왔|안온|미도착|아직|안받)/.test(t);
  let list = mine;
  if (wantDone) list = mine.filter((o) => o.deliveryConfirmed);
  else if (wantTransit) list = mine.filter((o) => !o.deliveryConfirmed);
  list = [...list].sort((a, b) => String(a.shippedAt || a.orderDate || "").localeCompare(String(b.shippedAt || b.orderDate || "")));
  if (!list.length) return `${name} 님은 해당하는 배송이 없어요.`;
  const parts = list.slice(0, 12).map((o) => {
    const done = o.deliveryConfirmed;
    const d = _fmtMD(done ? o.deliveryConfirmedAt : (o.shippedAt || o.orderDate));
    return `${d ? d + " " : ""}${done ? "배송완료" : "배송중"}`;
  });
  const doneN = mine.filter((o) => o.deliveryConfirmed).length;
  return `${name} 배송 현황이에요. ${parts.join(", ")}. (총 ${mine.length}건 중 배송완료 ${doneN}건)`;
}
// ★ v58: 음성 도착 확인 대상 찾기 — 이름(부분일치)+선택 날짜로 '발송완료·미도착확인' 주문을 고름. { name, matches }.
function findDeliveryToConfirm(raw, orders, customers, vendors, dateISO) {
  const t = String(raw || "").replace(/\s/g, "");
  const names = [...(customers || []).map((c) => c && c.name).filter(Boolean), ...(vendors || []).map((v) => v && v.name).filter(Boolean)];
  const cand = t.replace(/(도착확인|도착|확인해줘|확인|배송완료|배송|처리|해줘|해주세요|받은걸로|받았다고|받았어요|월|일|줘|님|의|은|는|이|가|좀|\d+)/g, "");
  let name = "";
  for (const nm of names) { const nns = String(nm).replace(/\s/g, ""); if (nns.length >= 2 && cand.length >= 2 && (nns.includes(cand) || cand.includes(nns))) { name = nm; break; } }
  if (!name && typeof matchName === "function") name = matchName(raw, names);
  if (!name) return { name: "", matches: [] };
  const q = name.replace(/\s/g, "");
  let mine = (orders || []).filter((o) => o && o.status === "shipped" && !o.deliveryConfirmed && orderRecipientName(o).replace(/\s/g, "").includes(q));
  if (dateISO) mine = mine.filter((o) => String(o.shippedAt || o.orderDate || "").slice(0, 10) === dateISO);
  return { name, matches: mine };
}

// ★ v59: 조회용 날짜 해석 — 오늘/어제/그제/N월N일/요일/이번주·지난주 X요일 → YYYY-MM-DD (없으면 null).
//  배송·도착 조회는 보통 과거라, 그냥 "월요일"은 '가장 가까운 지난 월요일'로 해석.
function resolveQueryDate(text, today) {
  const t = String(text || "").replace(/\s/g, "");
  const p = (n) => String(n).padStart(2, "0");
  const fmt = (d) => `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())}`;
  const base = new Date(today.getTime());
  if (/그제|그저께|그저깨/.test(t)) { base.setDate(base.getDate() - 2); return fmt(base); }
  if (/어제|어저께/.test(t)) { base.setDate(base.getDate() - 1); return fmt(base); }
  if (/오늘|당일/.test(t)) return fmt(base);
  if (/모레|모래/.test(t)) { base.setDate(base.getDate() + 2); return fmt(base); }
  if (/내일|낼|명일/.test(t)) { base.setDate(base.getDate() + 1); return fmt(base); }
  let m = t.match(/(\d{1,2})일전/); if (m) { base.setDate(base.getDate() - (+m[1])); return fmt(base); }
  m = t.match(/(\d{1,2})월(\d{1,2})일/); if (m) { base.setMonth(+m[1] - 1); base.setDate(+m[2]); return fmt(base); }
  m = t.match(/(\d{1,2})\/(\d{1,2})/); if (m) { base.setMonth(+m[1] - 1); base.setDate(+m[2]); return fmt(base); }
  const wd = { 일: 0, 월: 1, 화: 2, 수: 3, 목: 4, 금: 5, 토: 6 };
  m = t.match(/([월화수목금토일])요일/);
  if (m) {
    const target = wd[m[1]];
    const mondayOffset = (base.getDay() + 6) % 7; // 오늘→이번주 월요일까지 뒤로
    const monday = new Date(base.getTime()); monday.setDate(monday.getDate() - mondayOffset);
    const targetMonIdx = (target + 6) % 7; // 월=0..일=6
    const dt = new Date(monday.getTime()); dt.setDate(dt.getDate() + targetMonIdx);
    if (/지난주|저번주|전주/.test(t)) { dt.setDate(dt.getDate() - 7); return fmt(dt); }
    if (/다음주|담주|차주/.test(t)) { dt.setDate(dt.getDate() + 7); return fmt(dt); }
    if (/이번주|금주/.test(t)) return fmt(dt);
    if (dt.getTime() > base.getTime()) dt.setDate(dt.getDate() - 7); // 아직 안 온 요일이면 지난주
    return fmt(dt);
  }
  return null;
}
// ★ v59: 특정 날짜의 배송 내역 조회 — 그날 발송했거나 도착확인한 주문 목록 (읽기 전용).
function deliveryByDateAnswer(raw, data, today) {
  const t = String(raw || "").replace(/\s/g, "");
  if (!/(배송|도착|발송|배달)/.test(t)) return null;
  if (!/(목록|보여|알려|현황|내역|리스트|뭐있|뭐가|있어|몇건|건있)/.test(t)) return null;
  const dateISO = resolveQueryDate(raw, today || new Date());
  if (!dateISO) return null;
  const { orders = [] } = data || {};
  const onDate = (orders || []).filter((o) => {
    if (!o || o.status !== "shipped") return false;
    const sh = String(o.shippedAt || o.orderDate || "").slice(0, 10) === dateISO;
    const dc = o.deliveryConfirmed && String(o.deliveryConfirmedAt || "").slice(0, 10) === dateISO;
    return sh || dc;
  });
  const md = _fmtMD(dateISO);
  if (!onDate.length) return `${md}에는 발송·도착한 배송 내역이 없어요.`;
  const parts = onDate.slice(0, 15).map((o) => `${orderRecipientName(o) || "고객"} ${o.deliveryConfirmed ? "배송완료" : "배송중"}`);
  const doneN = onDate.filter((o) => o.deliveryConfirmed).length;
  return `${md} 배송 내역이에요. ${parts.join(", ")}. (총 ${onDate.length}건 중 배송완료 ${doneN}건)`;
}

/* ===== 앱 전체 데이터 기반 질문 답변 (상품가격·재고·송장추적·정기배송·연락처·발송상태) =====
 * 조비서가 모든 도메인 질문을 실제 앱 데이터로 답하도록. 답할 수 있으면 문장 반환, 아니면 null. */
function answerFromAppData(text, data) {
  const raw = String(text || "").trim();
  const t = raw.replace(/\s/g, "");
  if (!t) return null;
  const { orders = [], customers = [], products = [], vendors = [], subscriptions = [] } = data || {};
  const won = (n) => (Number(n) || 0).toLocaleString("ko-KR") + "원";

  // ★ v57: 특정 고객·업체 배송 상태 조회 우선 처리
  const _del = deliveryStatusAnswer(raw, { orders, customers, vendors });
  if (_del) return _del;
  // ★ v59: 이름 없이 날짜로 배송 내역 조회 ("이번주 월요일 배송 도착 목록")
  const _delDate = deliveryByDateAnswer(raw, { orders, customers, vendors }, new Date());
  if (_delDate) return _delDate;

  // 정기배송
  if (/정기배송|구독/.test(t)) {
    const n = subscriptions.length;
    if (n === 0) return "등록된 정기배송이 없어요.";
    if (/몇|건|개수|수량|목록|리스트|보여|알려/.test(t)) {
      const names = subscriptions.slice(0, 5).map((s) => s.name || s.customerName || (s.recipient && s.recipient.name) || "").filter(Boolean).join(", ");
      return `정기배송은 모두 ${n}건이에요.${names ? " " + names + " 등이 있어요." : ""}`;
    }
    return `정기배송은 모두 ${n}건 등록돼 있어요.`;
  }

  // 상품 개수
  if (/상품/.test(t) && /(몇|개수|가짓수|종류|얼마나)/.test(t) && !fuzzyProductMatch(raw, products)) {
    return `등록된 상품은 모두 ${products.length}가지예요.`;
  }

  // 상품 가격 / 재고
  const prod = fuzzyProductMatch(raw, products);
  if (prod && /(재고|남았|수량|가격|얼마|단가|price|원|팔아|판매가)/.test(t)) {
    if (/(재고|남았|수량)/.test(t)) {
      const st = prod.stock;
      return `${prod.name} 재고는 ${st == null || st === "" ? "등록 안 됨" : st + "개"}예요.`;
    }
    const rp = prod.price, wp = prod.wholesalePrice;
    const bits = [];
    if (rp != null && rp !== "") bits.push(`일반가 ${won(rp)}`);
    if (wp != null && wp !== "") bits.push(`업체가 ${won(wp)}`);
    return `${prod.name} 가격은 ${bits.length ? bits.join(", ") : "등록 안 됨"}이에요.`;
  }

  // 이름(고객/업체) — 질문어를 떼고 이름만 추출해 후보 검색
  const nameQuery = raw
    .replace(/(전화번호|송장번호|운송장번호|전화|연락처|번호|폰|핸드폰|주소|어디사|어디에|어디로|어디|송장|운송장|추적|택배사|배송조회|배송추적|발송|보냈나|보냈|출고|배송됐|배송했|배송|정보|알려줘|알려|보여줘|보여|얼마|가격|재고|님|씨|의|은|는|이|가|좀|해줘|해줄래|줘)/g, " ")
    .replace(/\s+/g, " ").trim();
  const cands = findNameCandidates(nameQuery || raw, customers, vendors);
  const person = cands.length === 1 ? cands[0] : null;
  if (person) {
    const pOrders = orders.filter((o) => orderRecipientName(o).replace(/\s/g, "") === person.name.replace(/\s/g, ""));
    // 순서 중요: '송장번호'에 '번호'가 들어있으므로 송장/발송을 연락처보다 먼저 검사
    if (/(송장|운송장|추적|택배사|배송조회|배송추적)/.test(t)) {
      const withInv = pOrders.filter((o) => o.invoiceNo);
      if (!withInv.length) return `${person.name} 님은 아직 등록된 송장번호가 없어요.`;
      const r = withInv[withInv.length - 1];
      return `${person.name} 님 최근 송장번호는 ${r.courier ? r.courier + " " : ""}${r.invoiceNo}예요.`;
    }
    if (/(발송|보냈|출고|배송됐|배송했|보냈나|갔나)/.test(t)) {
      const total = pOrders.length;
      if (!total) return `${person.name} 님 주문 내역이 없어요.`;
      const shipped = pOrders.filter((o) => o.status === "shipped").length;
      return `${person.name} 님 주문 ${total}건 중 ${shipped}건 발송완료예요.`;
    }
    if (/(전화|연락처|폰|핸드폰|번호)/.test(t)) return `${person.name} ${person._kind}의 연락처는 ${person.phone || "등록 안 됨"}이에요.`;
    if (/(주소|어디)/.test(t)) return `${person.name} ${person._kind}의 주소는 ${person.address || "등록 안 됨"}이에요.`;
  }
  return null;
}

async function analyzePhotoWithGemini(imageFile, products, apiKey) {
  const model = await getGeminiModel(apiKey);
  const base64 = await new Promise((res, rej) => {
    const r = new FileReader(); r.onload = () => res(r.result.split(',')[1]); r.onerror = rej; r.readAsDataURL(imageFile);
  });
  const productStr = products.length ? products.map(p => `- ${p.name}`).join('\n') : '(없음)';
  const prompt = `이 이미지에서 농산물 주문 정보를 추출하세요.\n\n등록 상품:\n${productStr}\n\nconfidence: "high"=명확, "medium"=추정, "low"=불확실\n없는 항목은 value="" confidence="high"\n배송 메시지/요청사항도 반드시 추출\n\nJSON으로만:\n{"senderName":{"value":"","confidence":"high"},"senderPhone":{"value":"","confidence":"high"},"recipName":{"value":"","confidence":"high"},"recipPhone":{"value":"","confidence":"high"},"address":{"value":"","confidence":"high"},"deliveryMessage":{"value":"","confidence":"high"},"reserveDate":{"value":"","confidence":"high"},"items":[{"name":"","qty":1,"confidence":"high","note":""}],"overallNote":""}`;

// ★ 여러 키 자동 전환 래퍼: 한 키가 한도(429)면 다음 키로 자동 재시도
async function callGeminiJarvis(history, ctx, apiKey) {
  const pool = buildGeminiKeyPool(apiKey);
  if (!pool.length) throw new Error('Gemini API 키가 없습니다.');
  // 살아있는 키 먼저, 전부 쿨다운이면 가장 빨리 풀리는 순서로 시도
  const live = pool.filter(k => geminiCooldownRemaining(k) === 0);
  const order = live.length ? live
    : [...pool].sort((a, b) => geminiCooldownRemaining(a) - geminiCooldownRemaining(b));
  let lastErr = null;
  for (const key of order) {
    try {
      return await callGeminiJarvisOnce(history, ctx, key);
    } catch (e) {
      if (e && e.message && e.message.startsWith('QUOTA_EXCEEDED:')) {
        const secs = parseInt(e.message.split(':')[1]) || 60;
        _geminiCooldownUntil[key] = Date.now() + secs * 1000;  // 이 키 쿨다운 등록
        lastErr = e;
        continue;  // 다음 키로 자동 전환
      }
      throw e;  // 한도 외 오류는 전환 안 함
    }
  }
  // 모든 키 소진 → 가장 빨리 풀리는 시간으로 안내
  const rems = pool.map(geminiCooldownRemaining).filter(x => x > 0);
  const minRem = rems.length ? Math.min(...rems) : 60;
  throw new Error(`QUOTA_EXCEEDED:${minRem}`);
}

  if (m) return { text: m[1].replace(/\\"/g, '"').replace(/\\n/g, ' ').trim(), action: actionM ? actionM[1] : null };
  // 전략4: 잘린 JSON (닫는 따옴표 없음) — text 값만 최대한 살림
  m = cleaned.match(/"text"\s*:\s*"([^"]*)$/);
  if (m) return { text: m[1].replace(/[{}\[\]"]+$/, '').trim() || '다시 말씀해 주세요.', action: actionM ? actionM[1] : null };
  // 전략5: JSON 흔적 완전 제거 (중괄호·따옴표가 화면에 새는 것 방지)
  const stripped = cleaned
    .replace(/^[^{]*\{/, '')
    .replace(/["']?\s*text\s*["']?\s*:\s*["']?/i, '')
    .replace(/["']?\s*,?\s*["']?action["']?\s*:[\s\S]*$/i, '')
    .replace(/[{}"]/g, '')
